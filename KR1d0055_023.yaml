  text: 禮記要義卷第二十四祭義
  hash: sha256:b804d57110bbe33d8b0095da80da8a7a0bae68d4f0066302b6a87131a364eeba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_023-1a}
body:
  text: 一禘有樂嘗無樂然周禮四時皆有樂禘有樂而嘗無樂然周禮四時之祭皆有樂殷則蒸嘗之祭亦有樂故那詩云庸鼓有斁萬舞有奕下云顧豫蒸嘗則殷秋冬亦有樂者熊氏云殷秋冬但有管絃之樂又云蒸嘗全無樂其義巳具郊特牲二齊之日五思見其所為齊致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者注云致齊思此五者也散齊七日不御不樂不弔耳見所為齊者思之熟也所嗜素所欲飲食也春秋傳曰屈到嗜芰正義曰楚語云屈到嗜芰有疾召其宗老而屬之曰祭我必以芰三祭之日必有見有聞祭之日入室僾然必有見乎其位周還出戶肅然必有聞乎其容聲出户而聽愾然必有聞乎其嘆息之聲注云周還出户謂薦設時也無尸者闔户若食間則有出户而聽之正義曰此一經明祭之日孝子想念其親入室僾然必有見乎其位者謂祭之日朝𥘉入廟室時也𥘉入室隂厭時孝子當想象僾僾髣佛見也詩云愛而不見見如見親之在神位也故論語云祭如在周還出户肅然必有聞乎其容聲者謂薦饌時也出户而聽愾然者謂祭此人為無尸之時設薦巳畢孝子出户而靜聽愾愾然也四終身之喪忌日之謂君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也注云忌日親亡之日忌日者不用舉他事如有時日之禁也祥善也志有所至至於親以此日亡其哀心如喪時五鄉之然後能饗唯聖人為能饗帝孝子為能饗親饗者鄉也鄉之然後能饗焉是故孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愈愈乎其忠也勿勿諸其欲其饗之也注云謂祭之能使之饗也帝天也言中心鄉之乃能使其祭見饗也上饗或為相色不和曰怍奠盎設盎齊之奠也此時君牽牲將薦毛血君獻尸而夫人薦豆謂繹日也儐尸主人獻尸主婦自東房薦韭菹醢勿勿猶勉勉也慤愛之貌正義曰齊齊乎其敬也者卿大夫相君命婦相夫人皆齊齊乎其恭敬齊齊謂整齊之貌故玉藻云廟中齊齊愈愈乎其忠也者愈愈和恱之貌忠謂忠心言孝子顔色愈愈然和恱盡忠心勿勿諸其欲其饗之也者勿勿猶勉勉也言孝子之心與貌勉勉欲得親之歆饗也其皆語助六文王之祭明發不寐又從而思之文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王與詩云明發不寐有懷二人文王之詩也祭之明日明發不寐饗而致之又從而思之祭之日樂與哀半饗之必樂巳至必哀注云思死者如不欲生言思親之深也如欲色者以時人於色厚假以喻之明發不寐謂夜而至旦也祭之明日謂繹日也言繹之夜不寐也二人謂父母容尸侑也正義曰此一節明文王祭思親忠敬之甚思死者如不欲生者言文王思念死者意欲隨之而死如似不復欲生稱諱如見親者言文王在廟中上不諱下於祖廟稱親之諱如似見親也王肅解欲色然如欲見父母之顔色鄭何得比父母於女色馬昭申云孔子曰吾未見好德如好色者如此亦比色於德張融亦云如好色取其甚也於文無妨文王之詩也者此幽王小雅小宛之篇而云文王詩也者記者引詩斷章取義且詩人陳文王之德以刺幽王亦得為文王之詩也七孝子之祭孝子之祭可知也其立之也敬以詘其進之也敬以愈其薦之也敬以欲退而立如將受命巳徹而退敬齊之色不絶於靣注云詘充詘形容喜貌也進之謂進血腥也愈顔色和貌也薦之謂進熟也欲婉順貌齊謂齊莊八孝子如執玉如奉盈如弗勝如將失之孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也成人之道也注云成人既冠者然則孝子不失其孺子之心也九諸侯曰霸云天子衰諸侯興故曰霸者案中候諸侯曰霸注云霸把也把天子之事也十麗牲毛牛刲取膟膋爓腥祭祭之日君牽牲穆答君卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也注云祭謂祭宗廟也穆子姓也答對也序以次第從也序或為豫麗猶繫也毛牛尚耳以耳毛為上也膟膋血與腸間脂也爓祭祭腥祭爓肉腥肉也湯肉曰爓爓祭祭腥或為合祭腥泄䐲孰也正義曰卿大夫序從者卿大夫佐幣士奉芻依次第而從君也既入廟門麗于碑者麗繫也君牽牲入廟門繫著中庭碑也王肅云以紖貫碑中君從北待之也鸞刀以刲取膟膋者謂用鸞刀刲割牲體又取血及腸間脂血以供薦而膋以供炙肝及爇蕭也案說文及字林云膟血祭膋是牛腸間脂也是膟為血膋為腸間脂也云爓祭祭腥祭爓肉腥肉也者既疊出經文爓祭之事祭腥之語然後解云謂祭爓肉也腥肉也祭爓肉即經之爓祭也云腥肉即經之祭腥也其祭腥肉爓肉並當朝踐之節此腥肉則禮運云腥其爼也爓肉即禮運云孰其殽也此先云爓者記者便文耳非先後之次云湯肉曰爓者以鬼神異於生雖曰孰殽但湯肉而巳若其小祀則煮肉令孰故郊特牲云一獻孰是爓與孰又别也云爓祭祭腥或云合祭腥泄䐲孰也者謂爓祭祭腥四字禮記他本為合祭腥泄䐲孰六字者故云或十乙崔氏祭日月三說皆非玄冕祭皆用牛祭日於東祭月於西以別外內以端其位日出於東月生於西注云端正正義曰端正也日為陽在外月為隂在內今祭日於東用朝旦之時是為外祭月於西鄉夕之時是為內是以別外內以正其位也而崔氏云祭日於壇祭月於坎還據上文郊祭之時今謂若是郊祭日與月當應同處何得祭日於壇祭月於坎日於東月於西祭不同處則崔氏說非也崔又云日月有合祭之時謂郊祭天而主日配以月其禮大用牛各祭之時謂春分朝日秋分夕月其禮小故祭法用少牢今謂小司徒云小祭祀奉牛牲鄭注謂玄冕所祭自玄冕皆用牛也何得用少牢今謂祭法日月用少牢鄭云禱祈之祭也崔氏說又非崔氏又云迎春之時兼日月者今案諸文迎春迎秋無祭日月之文小宗伯云兆五帝於四郊四望四類亦如之謂四望四類之祭亦如五帝在四郊故鄭云兆日於東郊兆月與風師於西郊不謂兆五帝之時即祭日月崔氏又非十三致物用以立民紀正義致物用以立民紀也者民豐物用則知榮辱禮節故至於物用可以立人紀也十四合鬼與神教之至也宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也注云氣謂噓吸出入者也耳目之聰明為魄合鬼神而祭之聖人之教致之也正義曰自此以下至以祀先生先公敬之至也此一節明宰我問鬼神之事夫子答以鬼神魂魄祭祀之禮又廣明天子諸侯耕藉及公桑之事今各隨文解之不知其所謂者宰我善問孔子吾唯聞鬼神之名不知此鬼神所謂何物為鬼神子曰氣也者神之盛也者此夫子答宰我以神名言神是人生存之氣氣者是人之盛極也魄也者鬼之盛也者是夫子答鬼神之事言人形魄者鬼之盛極也合鬼與神教之至也者言人死神上於天鬼降於地聖王合此鬼之與神以祭之教之至也是聖王設教致合如此故云教之至也氣謂至之也正義曰氣謂噓吸出入也者謂在口噓吸出入此氣之體無性識也但性識依此氣而生有氣則有識無氣則無識則識從氣生性則神出入也故人之精靈而謂之神云耳目之聰明為魄者魄體也若無耳目形體不得為聰明故云耳目聰明為魄云合鬼神而祭聖人之教致之也者人之死其神與形體分散各別聖人以生存之時神形和合今雖身死聚合鬼神似若生人而祭之是聖人設教興致之令其如此也十五昭明焄蒿悽愴其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也注云焄謂香臭也蒿氣蒸出貌也上言衆生此言百物明其與人同也不如人貴爾蒿或為藨正義曰此一經申明神也此科釋人氣為神言人生時形體與氣合共為生其死則形與氣分其氣之精魂發揚升於上為昭明者言此升上為神靈光明也焄蒿悽愴此百物之精也者焄謂香臭也言百物之氣或香或臭蒿謂蒸出貌言此香臭蒸而上出其氣蒿然也悽愴者謂此等之氣人聞之情有悽有愴百物之精也者人氣揚於上為昭明百物之精氣為焄蒿悽愴人與百物共同但情識為多故特謂之神此經論人亦因人神言百物也神之著也者人氣發揚於上為昭明是人神之顯著十六鬼神魂魄之辨因物之情制為之極明命鬼神以為黔首則百衆以畏萬民以服注云明命猶尊名也尊極於鬼神不可復加也黔首謂民也則法也為民作法使民亦事其祖禰鬼神民所畏服正義曰此經鬼神本為民神故下文築為宫室設為宗祧其實此鬼神亦兼山川五祀百物之屬故禮運云列於鬼神注云謂祖廟山川五祀之屬樂記云幽則有鬼神注云助天地成物者是百物之魄謂之鬼對則精靈為魂形體為魄故昭七年左傳云人生始化曰魄既生魄陽曰魂是形為魄氣為魂若散而言之魄亦性識識與魄無異故昭二十五年左傳云心之精爽是謂魂魄魂魄去之何以能久又襄二十九年左傳云天奪伯有魄又對而言之天曰神地曰祇人曰鬼散而言之通曰鬼神十七報氣以氣報魄以實二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也注云二端既立謂氣也魄也更有尊名云鬼神也二禮謂朝事與薦黍稷也朝事謂薦血腥時也薦黍稷所謂饋食也見及見間皆當為覸字之誤也羶當為馨聲之誤也燔燎馨香覸以蕭光取牲祭脂也光猶氣也有虞氏祭首夏后氏祭心殷祭肝周祭肺覸以俠甒謂雜之兩甒醴酒也相愛用情謂此以人道祭之也報氣以氣報魄以實各首其類正義曰建設朝事燔燎羶薌見以蕭光以報氣也者此明朝踐報氣之義也朝事謂早朝祭事燔燎謂取膟膋燎於爐炭羶謂馨香見以蕭光謂見覸覸謂雜也光謂氣也謂燔膟膋兼爇蕭蒿是雜以蕭氣此等三祭是以報氣也此教衆反始也者言此上之祭氣是古昔尚質之義是故教衆之以反於𥘉始此上反古復始揔包之也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也者薦黍稷者謂饋孰時薦此黍稷羞肝肺首心者羞進也謂薦黍稷之時進肝之與肺及首之與心殷祭以肝周祭以肺有虞氏以首夏后氏以心皆謂祭黍稷之時兼此物祭也故郊特牲云祭黍稷加肺謂周法也見間以俠甒者見間讀為覸亦雜也俠甒謂兩甒醴酒言祭黍稷之時雜以兩甒醴酒加以鬱鬯者謂薦此黍稷加肝肺之薦更加之以鬱鬯然後薦黍稷饋孰報魄之時始云加鬱鬯者言非但薦孰是報魄言祭𥘉所加鬱鬯亦是報魄也以魄在地下鬱鬯灌地雖是祭𥘉亦是報魄不當薦孰之時故云加也十八朝踐饋食皆焫蕭案詩生民云取蕭祭脂是取蕭與祭牲之時雜燒之一祭之中再度焫蕭朝踐燔膟膋之時亦有蕭也故郊特牲云取膟膋升首報陽也注云膟膋腸間脂也與蕭合燒之是朝踐焫蕭也郊特牲又云既奠然後焫蕭合羶薌是饋孰焫蕭也十九蠶再浴風戻桑以食之大昕之朝君皮辨素積卜三宫之夫人丗婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之注云大昕季春朔日之朝也諸侯夫人三宫半王后也風戾之者及早涼脆采之風戾之使露氣燥乃以食蠶蠶性惡濕正義曰前雖則揔舉天子諸侯此特舉諸侯玄言之奉種浴于川者言蠶將生之時而又浴之𥘉於仲春巳浴之至此更浴之風戾以食之者戾乾也二十歲單夫人以副禕受繭少牢禮之歲既單矣丗婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副禕而受之因少牢以禮之注云歲單謂三月月盡之後也言歲者蠶歲之大功事畢於此也副禕王后之服而云夫人記者容二王之後與禮之禮奉繭之丗婦草一夫人親繅布于三宫遂布于三宫夫人丗婦之吉者使繅者以夫人親繅三盆以手振出其緒訖遂布與三宫夫人丗婦之吉者草二國人稱願有子所謂孝君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也巳者言嘗薦美食但是飬也非論孝子言若人將為孝曰此子百行皆美一國之人稱楊羡願然曰如此是羡願之云此子父母有幸遇哉而有孝子如此所謂孝也巳謂然而令人羡願如此乃所謂孝也草三不虧體辱身不虧其體不辱其身可謂全矣者非直體全又須善名得全若能不虧損形體得全不損辱其身是善名得全也草四朝位君臣皆立老臣君揖先退是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟逹乎朝廷矣注云同爵上齒老者在上也君問席為布之席於堂上而與之言凡朝位立於庭魯哀公問於孔子命席不俟朝君揖之即退不待朝事畢也就之就其家也老而致仕君或不許異其禮而巳正義曰知朝位立於庭者案燕禮大射君與卿大夫皆立卿大夫立於庭君立於阼階上是也卿大夫立於庭北靣君降自阼階南鄉爾卿卿西靣爾大夫大夫皆少進皆北靣爾謂揖也於時老臣君揖則退不待朝事畢也則於路寢門外日視朝亦揖竟即退不待朝事畢也草五祀先賢西學在西郊若瞽宗則在國祀先賢於西學所以教諸侯之德也者以先賢有德故祀之令諸侯尊敬有德故云教諸侯之德此西學鄭注云周小學在西郊則王制云飬庶老於虞庠虞庠在國之西郊是也大司樂云凡有道者有德者使教焉死則以為樂祖祭於瞽宗文王丗子又云書在上庠以此知祭先賢所通之經各於所習之學若瞽宗則在國虞庠為小學者則在西郊今祀先賢則於西郊也草六百年者就見八十九十者弗敢過諸侯待于竟天子先見百年者謂天子問此諸侯之國內有百年之人天子則先往就見百年者八十九十者東行西行者弗敢過者既未滿百歲不可一一就若天子諸侯因其行次或東行西行至八十九十者或閭里之旁不敢過越而去必往就見之草七鄉飲黨正皆有不齒者鄉飲酒賔賢能其賔必少其得爵為卿大夫者必年長於賔故在賔東西靣而不齒若黨正飲酒以正齒位其賔必長故天子諸侯之國三命乃不齒知鄉飲酒爵為卿大夫乃不齒者案鄉飲酒云席于賔東公三重大夫再重注云席此二者於賔東尊之不與鄉人齒也天子之國三命者乃不齒於諸侯之國爵為大夫則不齒是大夫坐於上士立於下者謂諸侯之國若天子黨正飲酒一命下士立於下再命中士齒於又族坐於堂上三命上士席於賔東草八易抱龜南靣天子衮冕北靣昔者聖人建隂陽天地之情立以為易易抱龜南靣天子卷冕北靣雖有明知之心必進斷其志焉示不敢專以尊天也善則稱人過則稱巳教不伐以尊賢也注云立以為易謂作易易抱龜易官名周禮曰大卜大卜主三兆三易三夢之占正義曰立以為易者聖人謂伏犧文王之屬興建隂陽天地之情仰觀天文俯察地理立此隂陽以作易即今時易也易抱龜南靣天子卷冕北靣者立為占易之官抱龜南靣尊其神明故南靣天子親執卑道服衮冕北靣草九祭之日四如祭之日顔色必溫行必恐如懼不及愛然其奠之也容貌必溫身必詘如語焉而未之然宿者皆出其立卑靜以正如將弗見然及祭之後陶陶遂遂如將復入然注云如懼不及見其愛者奠之謂酌尊酒奠之及酳之屬也如語焉而未之然如有所以語親而未見答宿者皆出謂賔助祭者事畢出去也如將弗見然祭事畢而不知親所在思念之深如不見出也思念既深如覩親將復入也陶陶遂遂相隨行之貌禮記要義卷第二十四
