front:
  text: 禮記要義卷第十二內則
  hash: sha256:a31392ec0cb28cddf9cca2a42b9bb973563281c342b0ce2f25ededc68fd8ed03
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_011-1a}
body:
  text: 一子事父母之制子事父母雞𥘉鳴咸盥漱櫛縰笄總拂髦冠緌纓端韠紳搢笏左右佩用左佩紛帨刀礪小觿金燧右佩玦捍管遰大觿木燧逼屨著綦注云咸皆也縰韜髮者也總束髮也垂後為飾拂髦振去塵著之髦用髮為之象幼時鬌其制未聞也綏纓之飾也端玄端士服也庶人深衣紳大帶所以自紳約也搢猶扱也扱笏於紳笏所以記事也自佩也必佩者備尊者使令也紛帨拭物之巾也今齊人有言紛者刀礪小刀及礪礱也小觿解小結也觿貌如錐以象骨為之金燧可取火於日捍謂拾也言可以捍弦也管筆彄也遰刀鞸也木燧鑽火也逼行縢綦屨繫也二士玄端庶人深衣端玄端士服也者特牲禮士祭服玄端故云士服也云庶人深衣者以深衣是服之最下者庶人是人之賤者故知服深衣也三䈂而著纓與襟纓以佩容臭異正義曰案鄭注昏禮云婦人十五許嫁䈂而禮之因著纓明有繫也蓋以五采為之其制未聞鄭注昏禮既云笄而著纓則未笄無纓也下男女未冠笄亦云襟纓者彼未冠笄之纓用之以佩容臭故下注云容臭香物以纓佩之故童子男女皆有之與此婦人既笄之纓別也四男女末冠笄者事親之節男女未冠笄者雞𥘉鳴咸盥漱櫛縰拂髦總角襟纓皆佩容臭注云總角收髮結之容臭香物也以纓佩之為迫尊者給小使也五敦牟巵匜之制敦牟巵匜非餕莫敢用注云餕乃用之牟讀曰堥也巵匜酒漿器敦牟黍稷器也正義曰敦則周禮有玉敦今之杯盂也隱義曰堥土釡也今以木為器象土釡之形巵酒器也匜盛水漿之器故春秋僖二十三年左傳云懷嬴奉匜沃盥是也六明夷睇于左股正義曰明夷睇于左股者是明夷六二爻辭彼注云旁視為睇六二辰在酉酉是西方又下體離離為目九三體在震震東方九三又在辰辰得巽氣為股此謂六二有明德欲承九三故云睇于左股引之者證睇為旁視也七寧孰諌若物之成孰寧孰諫者犯顔而諌使父母不說其罪輕畏懼不諌使父母得罪於鄉黨州閭其罪重二者之間寧可孰諌不可使父母得罪孰諫謂純孰殷勤而諌若物之成孰然八天子之后無出案周易同人六二鄭注云天子諸侯后夫人無子不出則猶有六出也其天子之后雖失禮亦不出故鼎卦𥘉六鄭注云嫁於天子雖失禮無出道廢遠而巳若其無子不廢遠之后尊如其犯六出則廢之九介婦下冡婦舅姑若使介婦母敢敵耦於冡婦不敢並行不敢並命不敢並坐注云下冡婦也命為使令正義曰庾氏云齊人謂之差訐崔氏云北海人謂相激之事為掉磬隱義云齊人謂相絞訐為掉磬十適子庶子事宗子宗婦適子庶子祗事宗子宗婦者適子謂父及祖之適子是小宗也庶子謂適子之弟宗子謂大宗子宗婦謂大宗子之婦言小宗及庶子等敬事大宗子及宗婦也子弟猶歸器衣服裘衾車馬者猶若也歸謂歸遺也子弟若有功德𬒳尊上歸遺衣服裘衾車馬則必獻其善者於宗子若冨則具二牲獻其賢者於宗子者賢猶善也善者獻宗子使祭之不善者私用自祭也夫婦皆齊而宗敬焉者大宗子將祭之時小宗夫婦皆齊戒以助祭於大宗以加敬焉謂敬事大宗之祭終事而后敢私祭者謂大宗終竟祭事而后敢以私祭祖禰也此文雖主事大宗子其大宗之外事小宗子者亦然十一桃梅諸卵鹽桃諸梅諸卵鹽者言食桃諸梅諸之時以卵鹽和之王肅云諸菹也謂桃菹梅菹即今之藏桃也藏梅也欲藏之時必先稍乾之故周禮謂之乾鄭云桃諸梅諸是也注卵讀為鯤鯤魚子十二牛犬雞羊屬土金木火正義曰案洪範五行傳云思之不睿則有牛禍牛屬土也言之不從則有犬禍犬屬金也貌之不恭則有雞禍雞屬木也視之不明則有羊禍羊屬火也今四時各有所剋脂膏而和膳食故知牛膏薌犬膏臊雞膏腥羊膏羶也十三芝栭生於木可為菹芝栭者庾蔚云無華葉而生者曰芝栭盧氏云芝木芝也王肅云無華而實者名栭皆芝屬也庾又云自牛修至薑桂凡三十一物則芝栭應是一物也今春夏生於木可用為菹其有白者不堪食也賀氏云栭軟棗亦云芝木椹也以芝栭為二物鄭下注云三十一物則數芝栭為一物也賀氏說非也十四秩膳食閣之制羮食自諸侯以下至於庶人無等大夫無秩膳大夫七十而有閣天子之閣左逹五右逹五公侯伯於房中五大夫於閣三士於坫一注云羮食食之主也庶羞乃異耳謂五十始命未甚老也秩常也有秩膳也閣以板為之􅍥食物也逹夾室大夫言於閣與天子同處天子二五倍諸侯也五者三牲之肉及魚臘也正義曰知五十始命未甚老也者以下云六十宿肉是有常秩此經云七十而有閣故知有秩膳也然則六十者比五十者則有常肉比七十者則有無肉時也崔氏云宫室之制中央為正室正室左右為房房外有序序外有夾室天子尊庖厨遠故左夾室五閣右夾室五閣諸侯卑庖厨冝稍近故於房中減降於天子唯在一房之中而五閣也大夫既卑無嫌故亦於夾室而閣三也三者豕魚臘也士卑不得作閣但於室中為土坫􅍥食也云五者三牲之肉及魚臘也者以天子臘用六牲今云五閣是不一牲為一閣以魚臘是常食之物故知三牲及魚臘也十五孝子之身終者終其身孝子之身終者謂安樂其親之心不違其志樂其耳目安其寢處以其飲食中心養之是孝子事親之身終也終身也者非終父母之身終其身也者作記之人既云孝子之身終恐人不解謂言孝子事親至親身終故解云終身也者非終竟父母之身也終其孝子之身也言父母雖沒終竟已身而行孝道與親在無異十六生子必於側室月辰謂生月朔正義曰夫正寢之室在前燕寢在後側室又次燕寢在燕寢之旁故謂之側室妻既居側室則妾亦當然也故春秋傳云趙有側室曰穿是妾之子也生子不於夫主室及妻之燕寢必於側室者以正室燕寢尊故也經云及月辰謂生月之辰𥘉朔之日也十七生子卜士詩負士妻大夫妾食之三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方保受乃負之宰醴負子賜之束帛卜士之妻大夫之妾使食子注云接讀為捷捷勝也謂食其母使𥙷虛強氣也詩之言承也桑弧蓬矢本大古也天地四方男子所有事也代士也保保母醴當為禮聲之誤也禮以一獻之禮酬之以幣也食子不使君妾適妾有敵義不相䙝以勞辱事也士妻大夫之妾謂時自有子正義曰詩含神霧云詩者持也以手維持則承奉之事謂以手承下而抱負之使其食子須有乳汁故知時自有子者皇氏云士之妻大夫之妾者隨課用一人故桓六年左傳云卜士負之士妻食之不云有大夫妾文略也十八擇子師慈母保母擇於諸母與可者必求其寬𥙿慈惠溫良恭敬愼而寡言者使為子師其次為慈母其次為保母皆居于室他人無事不往注云此人君養子之禮也諸母衆妾也可者傅御之屬也子師教示以善道者慈母知其嗜欲者保母安其居處者士妻食乳之而巳為兒精氣微弱將驚動也十九妻以子見父之禮三月之末擇日妻以子見於父貴人則為衣服由命士以下皆漱浣男女夙興沐浴衣服具視朔食夫入門升自阼階立于阼西鄉妻抱子出自房當楣立東面注云貴人大夫以上也由自也朔食天子大牢諸侯少牢大夫特豕士特豚也入門者入側室之門也大夫以下見子就側室見妾子於內寢辟人君也二十見適子於側室庶子於適妻寢見妾子於內寢者則下文云妾將生子三月之末漱浣夙齊見於內寢是也鄭注云內寢適妻寢也大夫所以見適子於側室見庶子於適妻寢者辟人君也人君則見適子於路寢見庶子於側室故云辟人君也草一凡寢室之制正義曰知內寢適妻寢者以其稱內故知是適妻寢也凡宫室之制前有路寢次有君燕寢次夫人正寢卿大夫以下前有適室次有燕寢次有適妻之寢但夫之燕寢對夫人及適妻之寢及側室等其燕寢在外亦名外寢故前注云外寢君燕寢是也草二衆子使有司名之衆子則使有司名之注云有司臣有事者也魯桓公名子問於申繻也正義曰衆子謂衆妾之子不特寵御則使有司以名其子也草三食母乳母食子者三年而出見於公宫則劬大夫之子有食母士之妻自養其子注云劬勞也士妻大夫之妾食國君之子三年出歸其家君有以勞賜之選於傅御之中喪服所謂乳母也士賤不敢使人也草四始理男事始理男事者三十丁壯受其田土供給征役始理男事故韓詩說三十受兵若口率出泉國中則二十野則十五也禮記要義卷第十二
