body:
  text: 一君丗子告殯之禮二子丗子適子太子冡子之別君薨而丗子生者案聘禮云子即位不哭公羊云君存稱丗子君薨稱子其此旣君薨仍稱丗子者以其別於庶子又用丗子之禮告殯故雖君薨猶稱丗子異於春秋之例案左傳桓六年子同生賈杜注云不稱大子者書始生此亦始生而稱丗子者彼爲父在始生未命故直云子此是君薨𥘉生則舉以丗子之禮故云丗子也熊氏云下稱奠幣于殯東則此告丗子生謂旣殯以後若未殯之前則丗子生亦不告凡天子諸侯稱丗子春秋經稱王丗子曹丗子是也卿大夫以下謂之適子䘮服云大夫之適子是也若在䘮諸侯之子亦稱適子檀弓云君之適長殤是也天子諸侯亦謂之大子則王制云大子及檀弓云大子申生是也冡子則上下通名故内則云其非冡子則皆降一等注則言天子以下至庶人是其通名也三告神束帛之制將告神故執束帛執持也束帛十端也端則二丈鬼神質故用偶數也鬼神以丈八尺爲端鬼神之道隂陽不測故用隂陽之數求之一丈象陽八尺法隂十端六玄四纁五兩三玄二纁纁是地色玄是天色也欲徃告殯故升自西階四庾皇氏謂下室設素几熊氏謂天子諸侯殯宫有几筵正義曰案阮諶禮圖云几長五尺髙尺二寸廣二尺皇氏云周禮天子下室䘮奠有素几不云殯宫有几而諸侯雖無文當與天子同而大夫士葬前下室並無几降於人君也並葬後殯宫皆有几人君未葬前而於下室有素几其殯宫無几今丗子生旣吿權移下室之几於殯東告於繼體異常日庾氏云未虞施几筵常於下室然殯宫几筵爲朝夕之奠常在不去今更特設几筵於殯宫東者特異其事以爲丗子之生故鄭云几筵於殯東明繼體也今案旣夕禮燕養饋羞如他日則下室所供之物如平常皆用吉物即今之告靈不得有素几又司几筵云凡䘮事右素几注云䘮事謂凡奠也又云凶事仍几注云凶事謂凡奠凡朝夕相因䘮禮略以此推之即素几是殯宫朝夕設奠之几不在下室而庾皇等以爲素几設於下室未審何以知之其義非也熊氏以爲天子諸侯在殯宫則有几筵大夫士大斂有席虞始有几然殯宫几筵爲朝夕之奠常在不去今更特設几於殯東當明丗子是繼體之貴故於常几筵之外別特設之考三家之說熊以爲是皇庾以爲非五君薨名子不待三月大宰命祝史以名徧告于五祀山川注云因負子名之䘮於禮略也正義曰案内則及左傳桓六年皆三月乃名之今此因負子三日即名之以䘮事促遽於禮簡略不暇待三月也上見殯之時旣以名告故云某之子某鄭於此乃解名者以經有名文而遂解之非謂吿山川之時始作名也若依皇氏以見殯後乃作名故鄭於此解之六巳葬而丗子生因告禰乃名曽子問曰如巳葬而丗子生則如之何孔子曰大宰大宗從大祝而告于禰三月乃名于禰以名徧告及社稷宗廟山川注云告生也正義曰禰父殯宫之主也旣葬訖殯無尸柩唯有主在故告於主漸神事之故也同廟主之名故曰禰也三月乃見因見乃名故云乃名于禰也從見之人與告生不異故不重言也雖三日不見其成服衰絰自依常禮也七天子受諸侯朝于廟諸侯朝天子必禆冕爲將廟受也諸侯視朝當用玄冠緇衣素裳今視朝而服禆冕之服者案覲禮侯氏禆冕天子受之於廟八祭軷有主有尸有牲有常祀正義曰經言道而岀明諸侯將行爲祖祭道神而後岀行引聘禮者證祖道之義案聘禮記云岀祖釋軷祭酒脯彼注云祖始也行岀國門止陳車騎釋酒脯之奠於軷爲行始也春秋傳曰軷渉山川然則軷山行之名也道路以險阻爲難是以委土爲山或伏牲其上使者爲軷祭酒脯祈告也禮畢然後乗車轢之而遂行其有牲犬羊可也此城外之軷祭也其五祀行神則在宫内故鄭注聘禮云行謂行者之先其古人之名未聞天子諸侯有常祀在冬也䘮禮有毀宗躐行岀于大門則行神之位在廟門外西方又鄭注月令軷壇厚二寸廣五尺輪四尺周禮注云以菩芻棘柏爲神主此鄭釋爲軷祭之義此軷亦有尸故詩生民云取羝以軷注燔烈其肉爲尸羞是也其牲天子軷用犬故犬人云伏瘞亦如之注云伏謂伏犬於軷上諸侯用羊詩云取羝以軷謂諸侯也卿大夫以酒脯旣行祭軷竟御者以酒祭車軾前及車左右轂末故周禮大馭云及犯軷王自左馭馭下祝登受轡犯軷遂驅之又云及登酌僕僕左執轡右祭兩軹祭軌乃飲軹即轂末軌謂車軾前是也其祭宫内行神之軷及城外祖祭之軷其制不殊崔氏云宫内之軷祭古之行神城外之軷祭山川與道路之神義或然也壇名山其神曰纍九冠禮聞内外䘮之節曽子問曰將冠子冠者至揖讓而入聞齊衰大功之䘮如之何孔子曰内䘮則廢外䘮則冠而不醴徹饌而埽即位而哭如冠者未至則廢如將冠子而未及期日而有齊衰大功小功之䘮則因䘮服而冠注云冠者賔及替者内䘮同門也不醴不醴子也其廢者䘮成服因䘮而冠廢吉禮而因䘮冠俱成人之服及至也十奠虞小祥大祥彌吉之節至大祥得旅酬曽子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賔賔弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也注云奠無尸虞不致爵小祥不旅酬大祥無無筭爵彌吉孝公隱公之祖父正義曰練小祥祭也旅謂旅酬故奠無尸虞不致爵至小祥彌吉但得致爵於賔而不得行旅酬之事大祥乃得行旅酬而不得行無筭爵之事也此皆謂䘮事簡略於禮未備故也云虞不致爵者案士虞禮賔三獻尸尸卒爵禮畢無致爵以下之事所謂虞不致爵也案特牲又云尸止爵之後席于户内主婦洗爵酌致爵于主人主人拜受爵主婦拜送爵主人卒爵拜主婦荅拜受爵酌酢左執爵拜主人荅拜主人降洗酌致爵于主婦席于房中南靣主婦拜受爵主人西靣荅拜主婦卒爵拜主人更爵酢卒爵拜主婦荅拜所謂致爵也三獻之賔作尸所止爵尸飲卒爵酢賔賔飲卒爵獻祝及佐食致爵于主人主婦畢主人降阼階升酌西階上獻賔及衆賔訖主人洗觶于西階前北靣酬賔訖主人洗爵于阼階上獻長兄弟及衆兄弟及内兄弟于房中獻畢賔乃坐取主人所酬之觶於阼階前酬長兄弟長兄弟受觶於西階前酬衆賔衆賔酬衆兄弟所謂旅酬也云小祥不旅酬者賔不舉主人所酬之觶不行旅酬之事所謂小祥不旅酬謂奠酬於主人主人酬於賔賔不舉也旅酬之後賔弟子兄弟弟子各酌于其尊舉觶各於其長賔取觶酬兄弟之黨長兄弟取觶酬賔之黨所謂無筭爵也云大祥無無筭爵彌吉者大祥乃得行旅酬而不得行此無筭爵之事故云大祥無無筭爵以其漸漸備禮故云彌吉仍未純吉也昔者魯昭公練而舉酬行旅非禮也者練祭但得致爵於賔賔不合舉此爵而行旅酬今昭公行之故曰非禮也大祥彌吉得行旅酬今孝公不然亦曰非禮十一壻有䘮致命女氏女於壻亦然壻巳葬壻之伯父致命女氏曰某之子有父母之䘮不得嗣爲兄弟使某致命女氏許諾而弗敢嫁禮也壻免䘮女之父母使人謂壻弗取而后嫁之禮也女之父母死壻亦如之注云必致命者不敢以累年之䘮使人失嘉㑹之時請請成昏也女免䘮壻之父母亦使人請其巳葬時亦致命十二祭過時不祭䟽謂有追祭者曽子問曰除䘮則不復昬禮乎注復償也孔子曰祭過時不祭禮也又何反於𥘉䟽過時不祭謂四時常祭也謂祭重而昬輕重者過時尚廢輕者不復可知熊氏云若䘮祭及禘祫祭雖過時猶追而祭之故禘祫志云昭十一年齊歸薨十三年㑹于平丘冬公如晉不得祫至十四年乃追而祫之十五年乃禘也又僖公八年春當禘以正月㑹王人于洮故七月而禘故雜記云三年之䘮旣顈其練祥皆行是追行前練祥祭也十三舅姑存者厥明盥饋亡者三月廟見正義曰若舅姑存者於當夕同牢之後明日婦執棗栗腵脩見於舅姑見訖舅姑醴婦醴婦訖婦以特豚盥饋舅姑盥饋訖舅姑饗婦更無三月廟見之事此是士昬禮之文若舅姑旣没雖昬夕同牢禮畢明日無見舅姑盥饋之事至三月乃奠菜於舅姑之廟故昬禮云舅姑旣没則婦入三月乃奠菜是也昬禮奠菜之後更無祭舅姑之事此云擇日而祭於禰者正謂奠菜也則廟見奠菜祭禰是一事也熊氏云如鄭義則從天子以下至於士皆當夕成昬舅姑没者三月廟見故成九年季文子如宋致女鄭云致之使孝非是始致於夫婦也又隱八年鄭公子忽先配而後祖鄭以祖爲祖道之祭應先爲祖道然後配合今乃先爲配合而後乃爲祖道之祭如鄭此言是皆當夕成昬也若賈服之義大夫以上無問舅姑在否皆三月見祖廟之後乃始成昬故譏鄭公子忽先爲配匹乃見祖廟故服䖍注云季文子如宋致女謂成昬是三月始成昬與鄭義異也若舅姑偏有没者庾氏云昬夕厥明即見其存者以行盥饋之禮至三月不湏廟見亡者崔氏云厥明婦盥饋於其存者三月廟見於其亡者未知孰是十四老聃古壽考者之號吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟注云老聃古壽考者之號也與孔子同時藏諸主於祖廟象有凶事者聚也卒哭成事先祔之祭名也正義曰案下文助葬於巷黨老聃曰丘止柩又莊子稱孔子與老聃對言是與孔子同時也案史記云老聃陳國苦縣賴郷曲仁里也爲周柱下史或爲守藏史鄭注論語云老𥅆周之大史未知所岀十五齊車載主命曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將岀必以幣帛皮圭告于祖禰遂奉以岀載于齊車以行毎舎奠焉而后就舎反必告設奠卒歛幣玉藏諸兩階之間乃岀蓋貴命也注云以酺醢禮神乃敢即安也所告而不以岀即理之正義曰案齊僕云掌馭金路大馭掌馭玉路凡祭祀皆乗玉路齊車則降一等乗金路也遷廟主行者皇氏云謂載新遷廟之主義或然也十六䘮慈母必非魯昭公十七家語王肅所足昔者魯昭公少䘮其母有慈母良及其死也公弗忍也欲䘮之有司以聞曰古之禮慈母無服今也君爲之服是逆古之禮而亂國法也若終行之則有司將書之以遺後丗無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以䘮慈母䘮慈母自魯昭公始也注云據國君也良善之謂之慈母固爲其善國君之妾子於禮不服也昭公年三十乃䘮齊歸猶無慼容是不少又安能不忍於慈母此非昭公明矣未知何公也公之言又非也天子練冠以燕居蓋謂庶子王爲其母正義曰案家語云孝公有慈母良今鄭云未知何公者鄭不見家語故也或家語王肅所足故鄭不見也十八天子諸侯救日之制如諸侯皆在而日食則從天子救日各以方色與其兵注云示奉時事有所討也方色者東方衣青南方衣赤西方衣白北方衣黒兵未聞也正義曰榖梁云天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也范寗云凡聲陽也擊鼓爲聲所以助陽壓隂也春秋傳曰日有食之天子伐鼓於社責上公也諸侯伐鼓於朝退自責也夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走孔傳曰辰日月所㑹集合也房日月所舎而不合其所舎食可知也馳走者救日之備也奏猶擊也周禮有救日之弓但不知兵之細別故云未聞十九迎尸之節有二凡迎尸之禮其節有二一是祭𥘉迎尸於奥而行灌禮灌畢而後岀迎牲於時延尸於户外殺牲薦血毛行朝踐之禮設腥爓之俎於尸前是一也然後退而合亨更迎尸入坐於奥行饋孰之禮是二也此云不迎尸者直於堂上行朝踐禮畢則止不更迎尸而入此謂宗廟之祭郊社之祭無文不迎尸亦謂此時也熊氏云郊社五祀祭𥘉未迎尸之前巳殺牲也以其無灌故也故大宰云祀五帝納亨注云納亨謂祭之時又中􅋼禮皆爲俎奠於主乃始迎尸是郊及五祀殺牲在迎尸之前也則此不迎尸亦得爲祭𥘉不迎尸也二十天子在䘮祭五祀郊社唯宗廟俟吉天子崩未殯五祀之祭不行旣殯而祭其祭也尸入三飯不侑酳不酢而巳矣自啓至于反哭五祀之祭不行巳葬而祭祝畢獻而巳注云旣葬彌吉畢獻祝而後止郊社亦然唯甞禘宗廟俟吉也二一䘮辟郊社日五祀辟䘮日祭時䘮所仍奠王制云天地社稷爲越紼而行事是與五祀同也趙啇問云自啓至反哭五祀之祭不行注云郊社亦然者案王制云唯祭天地社稷爲越紼而行事旣云葬時郊社之祭不行何得有越紼而行事鄭荅越紼行事䘮無事時天地郊社有常日自啓及至反哭自當辟之鄭言無事者謂未殯以前是有事旣殯以後未啓以前是無事得行祭禮故有越紼行事鄭云郊社有常日自啓至反哭自當辟之者郊社旣有常日自啓反哭當辟此郊社之日郊社尊故辟其日不使相妨五祀旣卑若與啓反哭日相逢則五祀辟其日也鄭言天地社稷去殯處遠祭時踰越此紼而徃赴之五祀去殯處近暫徃則還故不爲越紼也云唯甞禘宗廟俟吉也者謂爲甞禘之禮以祭宗廟俟待於吉故王制云䘮三年不祭是也其在䘮祭郊社之時其䘮所朝夕仍奠知者雜記云國禁哭則止朝夕之奠即位自因也人臣尚爾明天子得也廿二居䘮不弔曽子問曰三年之䘮弔乎孔子曰三年之䘮練不羣立不旅行君子禮以飾情三年之䘮而吊哭不亦虚乎注云爲其苟語忘哀也爲彼哀則不專於親也爲親哀則是妄弔二三内子命婦之別正義曰案僖二十四左傳云晉趙姬請以叔隗爲内子而己下之叔隗爲趙衰妻是大夫適妻也若對而言之則卿妻曰内子大夫妻曰命婦若散而言之則大夫是卿之揔號其妻亦揔名爲内子二四誄者列行迹以作謚賤不誄貴㓜不誄長禮也唯天子稱天以誄之諸侯相誄非禮也注云誄累也累列生時行迹讀之以作謚當由尊者成以其無尊焉春秋公羊說以爲讀誄制謚於南郊若云受之於天然禮當言誄於天子也天子乃使大史賜之謚二五庶子爲大夫祭於宗子之家曽子問曰宗子爲士庶子爲大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某爲介子某薦其常事注云貴禄重宗也上牲大夫少牢介副也不言庶使若可以祭然二六宗子攝大夫若宗子有罪居于他國庶子爲大夫其祭也祝曰孝子某使介子某執其常事注云此之謂宗子攝大夫正義曰䘮服小記士不攝大夫士攝大夫唯宗子也二七攝主不敢備禮攝主不厭祭不旅不假不綏祭不配注云皆辟正主厭厭飫神也厭有隂有陽迎尸之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設於西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀爲嘏不嘏主人也不綏祭謂主人也綏周禮作墮不配者祝辭不言以某妃配某氏正義曰云迎尸至隂厭也約少牢特牲禮文祝酌奠者謂祝酌奠於鉶南且饗者祝奠訖且復以辭饗告神也是室奥隂靜之處故云隂厭尸謖之後佐食徹尸之薦俎設於西北隅得户明白之處故曰陽厭今攝主不厭謂不陽厭也所以然者厭是厭飫凡厭是神之歆饗此宗子岀在他國庶子攝不敢備禮二八宗子以罪去庶子望墓爲壇祭曽子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而爲壇以時祭若宗子死告於墓而后祭於家宗子死稱名不言孝身没而巳子游之徒有庶子祭者以此若義也今之祭者不首其義故誣於祭也注云有子孫存不可以乏先祖之祀不祭于廟無爵者賤逺辟正主言祭於家容無廟也孝宗子之稱不敢與之同其辭但言子某薦其常事至子可以稱孝以用也用此禮祭也若順首本也誣猶妄也正義曰所以不祭于宗子廟者以庶子無爵卑賤逺辟正主正主謂宗子也據鄭此言宗子去在他國謂有爵者若其無爵在家本自無廟何湏云不祭廟辟正主也鄭必知是有爵者以經云宗子去他國庶子無爵而居庶子云無爵明宗子是有爵此宗子去他國謂有罪者若其無罪則以廟從本國不得有廟故䘮服小記注云宗子去國乃以廟從謂無罪也二九金革之事無辟伯禽有爲爲之子夏問曰三年之䘮卒哭金革之事無辟也者禮與𥘉有司與孔子曰夏后氏三年之䘮旣殯而致事殷人旣葬而致事周人卒哭而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無辟也者非與孔子曰吾聞諸老聃曰昔者魯公伯禽有爲爲之也今以三年之䘮從其利者吾弗知也注云疑有司𥘉使之然致事還其職位於君周卒哭而致事不奪不可奪二者恕也孝也非與者疑禮當有然伯禽周公子封於魯有徐戎作難䘮卒哭而征之急王事也征之作費誓時多攻取之兵言非禮也正義曰伯禽爲母䘮三十神雖多猶一一祭之孔子曰天無二日土無二王甞禘郊社尊無二上未知其爲禮也注尊喻卑也神雖多猶一一祭之三一無遷主則載主命爲假主非昔者齊桓公亟舉兵作僞主以行及反藏諸祖廟廟有二主自桓公始也注僞猶假也舉兵以遷廟主行無則主命爲假主非也三二䘮有二孤盖鄰國君吊君爲主䘮之二孤則昔者衛靈公適魯遭季桓子之䘮衛君請弔哀公辭不得命公爲主客人弔康子立於門右北靣公揖讓升自東階西郷客升自西階弔公拜興哭康子拜稽顙於位有司弗辯也今之二孤自季康子始也注云辯猶正也若康子者君弔其臣之禮也鄰國之君弔君爲之主主人拜稽顙非也當哭踊而巳靈公先桓子以魯哀公二年夏卒桓子以三年秋卒是出公也三三祭成人必有尸陽厭隂厭殤則不備曽子問曰祭必有尸乎言無益無用爲若厭祭亦可乎厭時無尸孔子曰祭成䘮者必有尸尸必以孫孫㓜則使人抱之無孫則取於同姓可也人以有子孫爲成人子不殤父義由此也祭殤必厭盖弗成也厭飫而巳不成其爲人祭成而無尸是殤之也與不成人同孔子曰有隂厭有陽厭言祭殤之禮有於隂厭之者有於陽厭之者曽子問曰殤不祔祭何謂隂厭陽厭祔當爲備聲之誤也言殤乃不成人祭之不備礼而云隂厭陽厭乎此失孔子指也祭成人始誤奠於奥迎尸之前謂之隂厭尸謖之後改饌於西北隅謂之陽厭殤則不備孔子曰宗子爲殤而死庶子弗爲後也族人以其倫代之明不序昭穆立之廟其祭之就其祖而巳代之者主其礼其吉祭特牲尊宗子從成人也凡殤則特豚自卒哭成事之後爲吉祭祭殤不舉無肵爼無玄酒不告利成此其無尸及所降也其他如成人㪯肺脊肵俎利成礼之施於尸者是謂隂厭是宗子而殤祭之於奥之礼小宗爲殤其祭礼亦如之凡殤與無後者祭於宗子之家當室之白尊于東房是謂陽厭凡殤謂庶子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此則今死者皆宗子大功之内親共祖禰者言祭於宗子之家者爲有異居之道也無廟者爲墠祭之親者共其牲物宗子皆主其礼當室之白尊於東房異於宗子之爲殤當室之白謂西北隅得户明者也明者曰陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦爲凡殤過此以徃則不祭也祭適者天子下祭五諸侯下祭三大夫下祭二士以下祭子而止七卷終
