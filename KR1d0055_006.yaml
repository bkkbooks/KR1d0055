body:
  text: 一君丗子告殯之禮二子丗子適子太子冡子之別君薨而丗子生者案聘禮云子即位不哭公羊云君存稱丗子君薨稱子其此既君薨仍稱丗子者以其別於庶子又用丗子之禮告殯故雖君薨猶稱丗子異於春秋之例案左傳桓六年子同生賈杜注云不稱大子者書始生此亦始生而稱丗子者彼為父在始生未命故直云子此是君薨𥘉生則舉以丗子之禮故云丗子也熊氏云下稱奠幣于殯東則此告丗子生謂既殯以後若未殯之前則丗子生亦不告凡天子諸侯稱丗子春秋經稱王丗子曹丗子是也卿大夫以下謂之適子喪服云大夫之適子是也若在喪諸侯之子亦稱適子檀弓云君之適長殤是也天子諸侯亦謂之大子則王制云大子及檀弓云大子申生是也冡子則上下通名故內則云其非冡子則皆降一等注則言天子以下至庶人是其通名也三告神束帛之制將告神故執束帛執持也束帛十端也端則二丈鬼神質故用偶數也鬼神以丈八尺為端鬼神之道隂陽不測故用隂陽之數求之一丈象陽八尺法隂十端六玄四纁五兩三玄二纁纁是地色玄是天色也欲往告殯故升自西階四庾皇氏謂下室設素几熊氏謂天子諸侯殯宫有几筵正義曰案阮諶禮圖云几長五尺髙尺二寸廣二尺皇氏云周禮天子下室喪奠有素几不云殯宫有几而諸侯雖無文當與天子同而大夫士葬前下室並無几降於人君也並葬後殯宫皆有几人君未葬前而於下室有素几其殯宫無几今丗子生既告權移下室之几於殯東告於繼體異常日庾氏云未虞施几筵常於下室然殯宫几筵為朝夕之奠常在不去今更特設几筵於殯宫東者特異其事以為丗子之生故鄭云几筵於殯東明繼體也今案既夕禮燕養饋羞如他日則下室所供之物如平常皆用吉物即今之告靈不得有素几又司几筵云凡喪事右素几注云喪事謂凡奠也又云凶事仍几注云凶事謂凡奠凡朝夕相因喪禮略以此推之即素几是殯宫朝夕設奠之几不在下室而庾皇等以為素几設於下室未審何以知之其義非也熊氏以為天子諸侯在殯宫則有几筵大夫士大斂有席虞始有几然殯宫几筵為朝夕之奠常在不去今更特設几於殯東當明丗子是繼體之貴故於常几筵之外別特設之考三家之説熊以為是皇庾以為非五君薨名子不待三月大宰命祝史以名遍告于五祀山川注云因負子名之喪於禮略也正義曰案內則及左傳桓六年皆三月乃名之今此因負子三日即名之以喪事促遽於禮簡略不暇待三月也上見殯之時既以名告故云某之子某鄭於此乃解名者以經有名文而遂解之非謂告山川之時始作名也若依皇氏以見殯後乃作名故鄭於此解之六巳葬而丗子生因告禰乃名曽子問曰如巳葬而丗子生則如之何孔子曰大宰大宗從大祝而告于禰三月乃名于禰以名遍告及社稷宗廟山川注云告生也正義曰禰父殯宫之主也既葬訖殯無尸柩唯有主在故告於主漸神事之故也同廟主之名故曰禰也三月乃見因見乃名故云乃名于禰也從見之人與告生不異故不重言也雖三日不見其成服衰絰自依常禮也七天子受諸侯朝于廟諸侯朝天子必禆冕為將廟受也諸侯視朝當用玄冠緇衣素裳今視朝而服禆冕之服者案覲禮侯氏禆冕天子受之於廟八祭軷有主有尸有牲有常祀正義曰經言道而出明諸侯將行為祖祭道神而後出行引聘禮者證祖道之義案聘禮記云出祖釋軷祭酒脯彼注云祖始也行出國門止陳車騎釋酒脯之奠於軷為行始也春秋傳曰軷涉山川然則軷山行之名也道路以險阻為難是以委土為山或伏牲其上使者為軷祭酒脯祈告也禮畢然後乘車轢之而遂行其有牲犬羊可也此城外之軷祭也其五祀行神則在宫內故鄭注聘禮云行謂行者之先其古人之名未聞天子諸侯有常祀在冬也喪禮有毀宗躐行出于大門則行神之位在廟門外西方又鄭注月令軷壇厚二寸廣五尺輪四尺周禮注云以菩芻棘柏為神主此鄭釋為軷祭之義此軷亦有尸故詩生民云取羝以軷注燔烈其肉為尸羞是也其牲天子軷用犬故犬人云伏瘞亦如之注云伏謂伏犬於軷上諸侯用羊詩云取羝以軷謂諸侯也卿大夫以酒脯既行祭軷竟御者以酒祭車軾前及車左右轂末故周禮大馭云及犯軷王自左馭馭下祝登受轡犯軷遂驅之又云及登酌僕僕左執轡右祭兩軹祭軌乃飲軹即轂末軌謂車軾前是也其祭宫內行神之軷及城外祖祭之軷其制不殊崔氏云宫內之軷祭古之行神城外之軷祭山川與道路之神義或然也壇名山其神曰纍九冠禮聞內外喪之節曽子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰內喪則廢外喪則冠而不醴徹饌而掃即位而哭如冠者未至則廢如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠注云冠者賔及替者內喪同門也不醴不醴子也其廢者喪成服因喪而冠廢吉禮而因喪冠俱成人之服及至也十奠虞小祥大祥彌吉之節至大祥得旅酬曽子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賔賔弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也注云奠無尸虞不致爵小祥不旅酬大祥無無算爵彌吉孝公隱公之祖父正義曰練小祥祭也旅謂旅酬故奠無尸虞不致爵至小祥彌吉但得致爵於賔而不得行旅酬之事大祥乃得行旅酬而不得行無算爵之事也此皆謂喪事簡略於禮未備故也云虞不致爵者案士虞禮賔三獻尸尸卒爵禮畢無致爵以下之事所謂虞不致爵也案特牲又云尸止爵之後席于户內主婦洗爵酌致爵于主人主人拜受爵主婦拜送爵主人卒爵拜主婦答拜受爵酌酢左執爵拜主人答拜主人降洗酌致爵于主婦席于房中南靣主婦拜受爵主人西靣答拜主婦卒爵拜主人更爵酢卒爵拜主婦答拜所謂致爵也三獻之賔作尸所止爵尸飲卒爵酢賔賔飲卒爵獻祝及佐食致爵于主人主婦畢主人降阼階升酌西階上獻賔及衆賔訖主人洗觶于西階前北靣酬賔訖主人洗爵于阼階上獻長兄弟及衆兄弟及內兄弟于房中獻畢賔乃坐取主人所酬之觶於阼階前酬長兄弟長兄弟受觶於西階前酬衆賔衆賔酬衆兄弟所謂旅酬也云小祥不旅酬者賔不舉主人所酬之觶不行旅酬之事所謂小祥不旅酬謂奠酬於主人主人酬於賔賔不舉也旅酬之後賔弟子兄弟弟子各酌于其尊舉觶各於其長賔取觶酬兄弟之黨長兄弟取觶酬賔之黨所謂無算爵也云大祥無無算爵彌吉者大祥乃得行旅酬而不得行此無算爵之事故云大祥無無算爵以其漸漸備禮故云彌吉仍未純吉也昔者魯昭公練而舉酬行旅非禮也者練祭但得致爵於賔賔不合舉此爵而行旅酬今昭公行之故曰非禮也大祥彌吉得行旅酬今孝公不然亦曰非禮十一壻有喪致命女氏女於壻亦然壻巳葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人謂壻弗取而后嫁之禮也女之父母死壻亦如之注云必致命者不敢以纍年之喪使人失嘉會之時請請成昏也女免喪壻之父母亦使人請其巳葬時亦致命十二祭過時不祭疏謂有追祭者曽子問曰除喪則不復昏禮乎注復償也孔子曰祭過時不祭禮也又何反於𥘉疏過時不祭謂四時常祭也謂祭重而昏輕重者過時尚廢輕者不復可知熊氏云若喪祭及禘祫祭雖過時猶追而祭之故禘祫志云昭十一年齊歸薨十三年會于平丘冬公如晉不得祫至十四年乃追而祫之十五年乃禘也又僖公八年春當禘以正月會王人于洮故七月而禘故雜記云三年之喪既顈其練祥皆行是追行前練祥祭也十三舅姑存者厥明盥饋亡者三月廟見正義曰若舅姑存者於當夕同牢之後明日婦執棗栗腵修見於舅姑見訖舅姑醴婦醴婦訖婦以特豚盥饋舅姑盥饋訖舅姑饗婦更無三月廟見之事此是士昏禮之文若舅姑既沒雖昏夕同牢禮畢明日無見舅姑盥饋之事至三月乃奠菜於舅姑之廟故昏禮云舅姑既沒則婦入三月乃奠菜是也昏禮奠菜之後更無祭舅姑之事此云擇日而祭於禰者正謂奠菜也則廟見奠菜祭禰是一事也熊氏云如鄭義則從天子以下至於士皆當夕成昏舅姑沒者三月廟見故成九年季文子如宋致女鄭云致之使孝非是始致於夫婦也又隱八年鄭公子忽先配而後祖鄭以祖為祖道之祭應先為祖道然後配合今乃先為配合而後乃為祖道之祭如鄭此言是皆當夕成昏也若賈服之義大夫以上無問舅姑在否皆三月見祖廟之後乃始成昏故譏鄭公子忽先為配匹乃見祖廟故服虔注云季文子如宋致女謂成昏是三月始成昏與鄭義異也若舅姑偏有沒者庾氏云昏夕厥明即見其存者以行盥饋之禮至三月不須廟見亡者崔氏云厥明婦盥饋於其存者三月廟見於其亡者未知孰是十四老聃古壽考者之號吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟注云老聃古壽考者之號也與孔子同時藏諸主於祖廟象有凶事者聚也卒哭成事先祔之祭名也正義曰案下文助葬於巷黨老聃曰丘止柩又莊子稱孔子與老聃對言是與孔子同時也案史記云老聃陳國苦縣賴鄉曲仁里也為周柱下史或為守藏史鄭注論語云老𥅆周之大史未知所出十五齊車載主命曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而后就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也注云以酺醢禮神乃敢即安也所告而不以出即理之正義曰案齊僕云掌馭金路大馭掌馭玉路凡祭祀皆乘玉路齊車則降一等乘金路也遷廟主行者皇氏云謂載新遷廟之主義或然也十六喪慈母必非魯昭公十七家語王肅所足昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後丗無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也注云據國君也良善之謂之慈母固為其善國君之妾子於禮不服也昭公年三十乃喪齊歸猶無戚容是不少又安能不忍於慈母此非昭公明矣未知何公也公之言又非也天子練冠以燕居蓋謂庶子王為其母正義曰案家語云孝公有慈母良今鄭云未知何公者鄭不見家語故也或家語王肅所足故鄭不見也十八天子諸侯救日之制如諸侯皆在而日食則從天子救日各以方色與其兵注云示奉時事有所討也方色者東方衣青南方衣赤西方衣白北方衣黑兵未聞也正義曰榖梁云天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也范寧云凡聲陽也擊鼓為聲所以助陽壓隂也春秋傳曰日有食之天子伐鼓於社責上公也諸侯伐鼓於朝退自責也夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走孔傳曰辰日月所會集合也房日月所舍而不合其所舍食可知也馳走者救日之備也奏猶擊也周禮有救日之弓但不知兵之細別故云未聞十九迎尸之節有二凡迎尸之禮其節有二一是祭𥘉迎尸於奧而行灌禮灌畢而後出迎牲於時延尸於户外殺牲薦血毛行朝踐之禮設腥爓之俎於尸前是一也然後退而合亨更迎尸入坐於奧行饋孰之禮是二也此云不迎尸者直於堂上行朝踐禮畢則止不更迎尸而入此謂宗廟之祭郊社之祭無文不迎尸亦謂此時也熊氏云郊社五祀祭𥘉未迎尸之前巳殺牲也以其無灌故也故大宰云祀五帝納亨注云納亨謂祭之時又中􅋼禮皆為俎奠於主乃始迎尸是郊及五祀殺牲在迎尸之前也則此不迎尸亦得為祭𥘉不迎尸也二十天子在喪祭五祀郊社唯宗廟俟吉天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而巳矣自啓至于反哭五祀之祭不行巳葬而祭祝畢獻而巳注云既葬彌吉畢獻祝而後止郊社亦然唯嘗禘宗廟俟吉也二一喪辟郊社日五祀辟喪日祭時喪所仍奠王制云天地社稷為越紼而行事是與五祀同也趙啇問云自啓至反哭五祀之祭不行注云郊社亦然者案王制云唯祭天地社稷為越紼而行事既云葬時郊社之祭不行何得有越紼而行事鄭答越紼行事喪無事時天地郊社有常日自啓及至反哭自當辟之鄭言無事者謂未殯以前是有事既殯以後未啓以前是無事得行祭禮故有越紼行事鄭云郊社有常日自啓至反哭自當辟之者郊社既有常日自啓反哭當辟此郊社之日郊社尊故辟其日不使相妨五祀既卑若與啓反哭日相逢則五祀辟其日也鄭言天地社稷去殯處遠祭時踰越此紼而往赴之五祀去殯處近暫往則還故不為越紼也云唯嘗禘宗廟俟吉也者謂為嘗禘之禮以祭宗廟俟待於吉故王制云喪三年不祭是也其在喪祭郊社之時其喪所朝夕仍奠知者雜記云國禁哭則止朝夕之奠即位自因也人臣尚爾明天子得也草二居喪不弔曽子問曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行君子禮以飾情三年之喪而吊哭不亦虛乎注云為其苟語忘哀也為彼哀則不專於親也為親哀則是妄弔二三內子命婦之別正義曰案僖二十四左傳云晉趙姬請以叔隗為內子而己下之叔隗為趙衰妻是大夫適妻也若對而言之則卿妻曰內子大夫妻曰命婦若散而言之則大夫是卿之揔號其妻亦揔名為內子二四誄者列行迹以作諡賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄非禮也注云誄纍也纍列生時行迹讀之以作諡當由尊者成以其無尊焉春秋公羊説以為讀誄制諡於南郊若云受之於天然禮當言誄於天子也天子乃使大史賜之諡二五庶子為大夫祭於宗子之家曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事注云貴祿重宗也上牲大夫少牢介副也不言庶使若可以祭然二六宗子攝大夫若宗子有罪居于他國庶子為大夫其祭也祝曰孝子某使介子某執其常事注云此之謂宗子攝大夫正義曰喪服小記士不攝大夫士攝大夫唯宗子也二七攝主不敢備禮攝主不厭祭不旅不假不綏祭不配注云皆辟正主厭厭飫神也厭有隂有陽迎尸之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設於西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏主人也不綏祭謂主人也綏周禮作墮不配者祝辭不言以某妃配某氏正義曰云迎尸至隂厭也約少牢特牲禮文祝酌奠者謂祝酌奠於鉶南且饗者祝奠訖且復以辭饗告神也是室奧隂靜之處故云隂厭尸謖之後佐食徹尸之薦俎設於西北隅得户明白之處故曰陽厭今攝主不厭謂不陽厭也所以然者厭是厭飫凡厭是神之歆饗此宗子出在他國庶子攝不敢備禮二八宗子以罪去庶子望墓為壇祭曽子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告於墓而后祭於家宗子死稱名不言孝身沒而巳子遊之徒有庶子祭者以此若義也今之祭者不首其義故誣於祭也注云有子孫存不可以乏先祖之祀不祭于廟無爵者賤逺辟正主言祭於家容無廟也孝宗子之稱不敢與之同其辭但言子某薦其常事至子可以稱孝以用也用此禮祭也若順首本也誣猶妄也正義曰所以不祭于宗子廟者以庶子無爵卑賤逺辟正主正主謂宗子也據鄭此言宗子去在他國謂有爵者若其無爵在家本自無廟何須云不祭廟辟正主也鄭必知是有爵者以經云宗子去他國庶子無爵而居庶子云無爵明宗子是有爵此宗子去他國謂有罪者若其無罪則以廟從本國不得有廟故喪服小記注云宗子去國乃以廟從謂無罪也二九金革之事無辟伯禽有為為之子夏問曰三年之喪卒哭金革之事無辟也者禮與𥘉有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事周人卒哭而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無辟也者非與孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也注云疑有司𥘉使之然致事還其職位於君周卒哭而致事不奪不可奪二者恕也孝也非與者疑禮當有然伯禽周公子封於魯有徐戎作難喪卒哭而征之急王事也征之作費誓時多攻取之兵言非禮也正義曰伯禽為母喪三十神雖多猶一一祭之孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也注尊喻卑也神雖多猶一一祭之三一無遷主則載主命為假主非昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也注偽猶假也舉兵以遷廟主行無則主命為假主非也三二喪有二孤蓋鄰國君吊君為主喪之二孤則昔者衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客人弔康子立於門右北靣公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙於位有司弗辨也今之二孤自季康子始也注云辨猶正也若康子者君弔其臣之禮也鄰國之君弔君為之主主人拜稽顙非也當哭踊而巳靈公先桓子以魯哀公二年夏卒桓子以三年秋卒是出公也三三祭成人必有尸陽厭隂厭殤則不備曽子問曰祭必有尸乎言無益無用為若厭祭亦可乎厭時無尸孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取於同姓可也人以有子孫為成人子不殤父義由此也祭殤必厭蓋弗成也厭飫而巳不成其為人祭成而無尸是殤之也與不成人同孔子曰有隂厭有陽厭言祭殤之禮有於隂厭之者有於陽厭之者曽子問曰殤不祔祭何謂隂厭陽厭祔當為備聲之誤也言殤乃不成人祭之不備禮而云隂厭陽厭乎此失孔子指也祭成人始誤奠於奧迎尸之前謂之隂厭尸謖之後改饌於西北隅謂之陽厭殤則不備孔子曰宗子為殤而死庶子弗為後也族人以其倫代之明不序昭穆立之廟其祭之就其祖而巳代之者主其禮其吉祭特牲尊宗子從成人也凡殤則特豚自卒哭成事之後為吉祭祭殤不舉無肵爼無玄酒不告利成此其無尸及所降也其他如成人舉肺脊肵俎利成禮之施於尸者是謂隂厭是宗子而殤祭之於奧之禮小宗為殤其祭禮亦如之凡殤與無後者祭於宗子之家當室之白尊于東房是謂陽厭凡殤謂庶子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此則今死者皆宗子大功之內親共祖禰者言祭於宗子之家者為有異居之道也無廟者為墠祭之親者共其牲物宗子皆主其禮當室之白尊於東房異於宗子之為殤當室之白謂西北隅得户明者也明者曰陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦為凡殤過此以往則不祭也祭適者天子下祭五諸侯下祭三大夫下祭二士以下祭子而止七卷終
