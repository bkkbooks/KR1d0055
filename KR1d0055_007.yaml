front:
  text: 禮記要義卷第八文王丗子
  hash: sha256:f99b13f2819a1a496d7d1ff7ac60d64af75a19bce1e269cbd8e5cb183796062c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_007-1a}
body:
  text: 一文王一飯亦一飯文王一飯亦一飯文王再飯亦再飯旬有二日乃閒注云欲知氣力箴藥所勝間猶瘳也二日三朝皆言朝内則云命士以上昧爽而朝日入而夕者朝禮具夕禮簡故言夕今三皆曰朝者以其禮同故通言朝凡常丗子朝父母每日唯二今文王朝於王季日三者増一時又三者皆稱朝並是聖人之法也三文王損壽武王延年古者謂年齡齒亦齡也我百爾九十吾與爾三焉注云年天氣也齒人壽之數也九齡九十年之祥也文王以勤憂損壽武王以安樂延年正義曰皇氏云以九齡謂鈴鐸謂天以九箇鈴鐸而與武王徧驗書本齡皆從齒解爲鈴鐸於理有疑亦得爲一義四生壽不可増損年壽之數賦命自然不可延之寸隂不可减之晷刻文王九十七武王九十三天定之數今文王云吾與女三者示其傳基業於武王欲使武王承其所傳之業此乃教戒之義訓非自然之理五成王踐阼之年正義曰案鄭注金縢云文王崩後明年生成王則武王崩時成王年十歳服䘮三年畢成王年十二明年將踐阼周公欲代之攝政羣叔流言周公辟之居東都時成王年十三也居東二年成王收捕周公之屬黨時成王年十四也明年秋大孰遭雷風之變時周公居東三年成王年十五迎周公反而居攝之元年也居攝四年封康叔作康誥是成王年十八也故書傳云天子大子十八稱孟侯居攝七年成王年二十一也明年成王即政年二十二也此是鄭義推成王㓜不能踐阼之事也六鄭以大司成即師氏大司成論說在東序注云論說課其義之深淺才能優劣此云樂正司業父師司成則大司成司徒之屬師氏也師氏掌以媺詔王教國子以三德三行及國中失之事也正義曰鄭以下文云樂正司業父師司成父師與樂正相連此大司成亦與大樂正相次故知司成則大司成也以其掌教故知是司徒之屬以其父師司成又掌教國子故知當師氏也引師氏以媺詔王以下者皆師氏職文案書傳大夫爲父師周禮師氏中大夫七侍大司成間三席凡侍坐於大司成者遠近間三席可以問終則負牆列事未盡不問注云間猶容也容三席則得指畫相分別也席之制廣三尺三寸三分則是所謂函丈也郤就後席相辟錯尊者之語不敬也八釋奠先師凡學春官釋奠于其先師秋冬亦如之注云官謂禮樂詩書之官周禮曰凡有道者有德者使教焉死則以爲樂祖祭於瞽宗此之謂先師之類也若漢禮有髙堂生樂有制氏詩有毛公書有伏生億可以爲之也不言夏夏從春可知也九釋奠無迎尸以下之事非報功釋奠直奠置於物無食飲酬酢之事故云設薦饌酌奠而巳無迎尸以下之事釋奠所以無尸者以其主於行禮非報功也十釋奠與鄰國合凡釋奠者必有合也有國故則否注云國無先聖先師則所釋奠者當與鄰國合也若唐虞有夔伯夷周有周公魯有孔子則各自奠之不合也十一郊學升𥙷凡語于郊者必取賢歛才焉或以德進或以事舉或以言揚曲藝皆誓之以待又語三而一有焉乃進其等以其序謂之郊人遠之於成均以及取爵於上尊也注云語謂論說於郊學大樂正論造士之秀者升諸司馬曰進士謂此矣曲藝爲小技能也誓謹也皆使謹習其事又語爲後復論說也三說之中有一善則取之以有曲藝不必盡善進於衆學者又以其藝爲次俟事官之缺者以代之遠之者不曰俊選曰郊人賤技藝董仲舒曰五帝名大學曰成均則虞庠近是也天子飲酒于虞庠則郊人亦得酌于上尊以相旅正義曰謂之郊人者雖有次序而待職缺當擬𥙷之若國子學士未官之前俱爲俊選而以小才技藝者未官之前而不得同爲俊選但名曰郊人言其猶在郊學也遠之者所以謂爲郊人者是踈遠之故也十二釋奠有六釋菜有三正義曰前用幣直云告器成此釋菜云告器成將用則兩告不同也熊氏云用幣則無菜用菜則無幣皇氏云用幣釋菜秪是一告其義恐非也案四時釋奠不及先聖知此用幣及釋菜及先聖者以上文始立學釋奠先聖先師此文亦云始立學旣釁器用幣釋菜亦及先聖也以其始立學及器新成事重於四時常奠也故學記云皮弁祭菜鄭注禮先聖先師知及先聖者以彼云未卜禘不視學則祭菜與視學爲一也此下文云天子視學祭先聖先師故知學記祭菜及先聖也熊氏云月令釋菜不及先聖者以其四時入學釋菜故不及先聖也王制釋奠于學注以爲釋菜奠幣知非釋奠者彼是告祭之禮𥘉天子出師受成於學告之無牲明反告亦無牲也故謂釋奠時亦不及先聖也凡釋奠有六始立學釋奠一也四時釋奠有四通前五也王制師還釋奠于學六也釋菜有三春入學釋菜合舞一也此釁器釋菜二也學記皮弁祭菜三也秋頒學合聲無釋菜之文則不釋菜也釋幣唯一也即此釁器用幣是也以前皆熊氏之說義或當然也十三書傳天子有四鄰尚書大傳古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視次國之君也十四三命不踰父兄又三命不齒庶子治之雖有三命不踰父兄注云治之治公族之禮也唯於内朝則然其餘㑹聚之事則與庶姓同一命齒于郷里再命齒于父族三命不齒不齒者特爲位不在父兄行列中襄十二年叔仲子引此義異十五同宗不相賔客若公與族燕則異姓爲賔膳宰爲主人公與父兄齒注云同宗無相賔客之道君尊不獻酒親親也十六公宫大廟貴宫貴室下宫下室公若有岀疆之政庶子以公族之無事者守於公宫正室守大廟諸父守貴宫貴室諸子諸孫守下宫下室注云謂朝覲㑹同也正室適子也大廟大祖之廟謂守路寢下宫親廟也下室燕寢或言宫或言廟通異語十七天子内外朝及諸侯之朝案周禮司士掌路寢門外之朝則知此内朝是路寢庭朝也外朝謂路寢門外之朝也若公族在於外朝與異姓同處位次之時則以官之上下不復以年齒也司士爲之者謂司士之官主爲朝位之次外朝位旣司士主之則内朝庶子主之也上文内朝不云庶子爲之者以文承庶子之下主之可知故不言也司士亦司馬之屬也掌羣臣之班正朝儀之位也案周禮司士掌正朝儀之位王族故士虎士在路門之右南靣大僕從者在路門之左南靣是在路門外也故知此外朝路門外之朝也此對路寢庭朝爲外朝若對庫門外朝朝士所掌三槐九棘之朝則此路門外朝亦爲内朝也故玉藻云朝於内朝朝辨色始入君日岀而視之退適路寢是也其朝位天子之朝三公北靣東上孤東靣北上卿大夫西靣北上其士門西東靣北上若諸侯之朝案大射卿西靣北上大夫北靣東上士門西東靣北上與天子不同十八五牲屬五行馬屬火案周禮雞人屬宗伯羊人屬司馬故此云司馬奉羊犬人屬司㓂案五行傳云牛屬土雞屬木羊屬火犬屬金豕屬水司空冬官其位當水故鄭注周禮司空奉豕與案五行傳馬屬火而周禮司馬羞馬牲者以其主馬故特使供之十九一命再命齒三命不齒云一命齒于郷里者引黨正文解三命不踰父兄之事也一命尚卑若與郷里長宿燕食則猶計年也云再命齒于父族者再命漸尊不復與郷里計年唯官髙在上但父族爲重而猶與之計年爲列也云三命不齒者三命大貴則不復與父族計年若應有燕㑹則别席獨坐在賔之東也二十貴宫貴室當是路寢下云下宮上云大廟此貴宫貴室旣非大廟又非下宮下室唯當路寢也指其院宇謂之宮指其所居之處謂之室爾雅云宫謂之室室謂之宫此貴宮貴室緫據路寢上云大廟此云下宮除大廟之外唯有親廟髙祖以下故云下宮親廟也上云貴室此又云下室故知燕寢也云或言宫則下宮也成言廟則太廟也故春秋云立武宮明堂位云武公之廟武丗室也是通異語也二一公族之刑公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人公族無宫刑獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走岀致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉爲之變如其倫之䘮無服親哭之注云不於市朝者隱之也甸人掌郊野之官縣縊殺之曰磬纎讀爲殱殱刺也剸割也宮割臏墨劓則皆以刀鋸刺割人體也告讀爲鞠讀書用法曰鞠宫割滛刑成平也讞之言白也辟亦罪也宥寛也欲寛其罪出於刑也又復也對荅也先者君毎言宥則荅之以將更寛之至於三罪定不復荅走徃刑之爲君之恩無巳罪旣正不可宥乃欲赦之無宫刑重刑殺其類也白巳刑殺素服於凶事爲吉於吉事爲凶非䘮服也君雖不服臣卿大夫死則皮弁錫衰以居徃弔當事則弁絰於士蓋疑衰同姓則緦衰以弔之今無服者不徃弔也倫謂親䟽之比也素服亦皮弁矣不徃弔爲位哭之而已君於臣使有司哭之二二素服於凶事爲吉吉事爲凶正義曰案下曲禮重素鄭云重素衣裳皆素謂之重素素爲衣裳也此素服亦然也於凶事爲吉者人以凶事用布今乃用素是比於凶事爲吉也於吉事爲凶者吉時皮弁服白布深衣素積裳以采爲領縁今唯素服衣裳是比吉事爲凶也非如五服之限故云非䘮服也通前章二三三老五更之名更或爲叟正義曰三老五更各一人蔡邕以爲更字爲叟叟老稱又以三老爲三人五更爲五人非鄭義也今所不取云皆年老更事致仕者三老亦有更名五更亦有老稱但尊此老名特屬三老耳以其天子父兄所事故知致仕者知天子以父兄養之者以天子冕而緫干而舞執醬而饋是父兄事也二口凡教丗子及學士之時之官之處凡學丗子及學士必時春夏學干戈秋冬學羽籥皆於東序小樂正學干大胥賛之籥師學戈籥師丞賛之胥鼓南春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠注云四時各有冝學士謂司徒論俊選所升於學者干盾也戈旬孑㦸也干戈萬舞象武也用動作之時學之羽籥籥舞象文也用安靜之時學之詩云左手執籥右手秉翟四人皆樂官之屬也通職秋冬亦學以羽籥小樂正樂師也周禮樂師掌國學之政敎國子小舞大胥掌學士之版以待致諸子春入學舎菜合舞秋頒學合聲籥師掌教國子舞羽吹籥南南夷之樂也胥掌以六樂之㑹正舞位旄人教夷樂則以鼔節之詩云以雅以南以籥不僣誦謂歌樂也弦謂以絲播詩陽用事則學之以聲隂用事則學之以事因時順氣於功易也周立三代之學學書於有虞氏之學典謨之教所興也學舞於夏后氏之學文武中也學禮樂於殷之學功成治定與己同也正義曰云學士謂司徒論俊選所升於學者則王制云王子卿大夫元士之適子及國之俊選等升於學謂入學也故下云於東序是大學也誦謂歌樂者謂口誦歌樂之篇章不以琴瑟歌也云弦謂以絲播詩者謂以琴瑟播彼詩之音節詩音則樂章也若學舞之時春夏學干戈而用動秋冬學羽籥而用靜皆據年二十升於大學者若其未升大學之時則春誦夏弦在殷之瞽宗也云陽用事則學之以聲春夏是陽陽主清輕故學聲聲亦清輕云隂用事則學之以事秋冬屬隂隂主體質故學事事亦體質因四時所冝順動靜之氣於學功業易成也云周立三代之學者謂立虞夏殷學也其虞之學制在國兼在西郊郊則周之小學也夏殷之學亦在國而鄭注儀禮云周立四代之學於國者合周家爲言耳故與此注不同夏后氏之學在上庠即周之大學爲夏之制也云學書於虞氏之學興謨之教所興也者虞書有典有謨故就其學中而教之則周之小學也此已下追𥙷二五教凡祭與養老乞言合語之禮凡祭與養老乞言合語之禮皆小樂正詔之於東序注云學以三者之威儀也養老乞言養老人之賢者因從乞善言可行者也合語謂郷射郷飲酒大射燕射之屬也郷射記曰古者於旅也語正義曰學以三者學教也教以三者威儀容貌言祭與養老乞言及合語行禮之時皆有容貌故小樂正教之云合語謂郷射郷飲酒大射燕射之屬三者此經先云祭與養老乞言別云合語則合語非祭與養老也故知是郷射郷飲酒及大射燕射之等指儀禮成文而言之以其此等至旅酬之時皆合語也其實祭末及養老亦皆合語也故詩楚茨論祭祀之事云笑語卒獲箋云古者旅也語是祭有合語也養老旣乞言自然合語也引郷射記者證旅酬之時言說先王之法故云古者於旅也語言合語者謂合㑹義理而語說也二六小樂正教威儀大樂正教義理大樂正學舞干戚語說命乞言皆大樂正授數注云學以三者之義也戚斧也語說合語之說也數篇數正義曰前文小樂正旣教三者之威儀仐大樂正又教三者之義理故大樂正學舞干前經云祭故養老乞言與祭相連故尊之序在合語之上此經不云祭故略其養老在語說之下皆大樂正授數者謂干戚語說乞言三者皆大樂正之官授丗子及學士等篇章之數爲之講說使知義理此經與前經重序其事文勢相似前經小樂正乃教威儀事淺故云詔之東序此大樂正所教義理旣深故大樂正授數知者文承東序之下大樂正授數之時亦在東序二七天子成均飲酒郊人亦得酌上尊天子於成均之内飲酒以恩澤𬒳及於此郊人其郊人雖賤亦得取爵於堂上之尊以相旅也所以榮之凡飲酒之禮尊者酌於堂上之尊卑者酌於堂下之尊故特牲禮主人獻賔及獻衆賔及長兄弟等及次賔及次兄弟等皆酌於堂下之尊以相旅是也今郊人雖賤亦得酌於堂上尊故云取爵於上尊二八丗子記是尋常丗子非文王法丗子之記曰朝夕至于大寢之門外問於内豎曰今日安否何如注云朝夕朝朝暮夕也日中又朝文王之爲丗子非禮之制丗子之禮亡言此存其記正義曰此等五節也文王爲丗子是聖人之法也不可以爲常行故此記㝷常丗子之禮也禮記要義卷第八
