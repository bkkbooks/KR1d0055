body:
  text: 一君子三不失子曰君子不失足於人不失色於人不失口於人是故君子貌足畏也色足憚也言足信也注云失謂失其容止之節也玉藻曰足容重色容莊口容止二聘禮盛故襲享禮禓子曰禓襲之不相因也欲民之毋相瀆也注云不相因者以其或以禓為敬或以襲為敬禮盛者以襲為敬執玉龜之屬也禮不盛者以禓為敬受享是也正義曰案聘禮賔𥘉行聘時則襲故聘禮云賔襲執圭是也至聘訖受享之時賔禓奉束帛加璧行享聘為禮盛故襲享為禮不盛故禓聘時有玉故云執玉也玉藻曰執玉龜襲故云之屬也案行享執璧璧亦是玉於時禓衣而云以襲執玉龜者但享時雖執璧以璧致享比聘時執玉為輕故享雖有璧而禓也又賔介自相授玉之時介禮輕禓而執圭以授賔賔禮重則襲而受圭是賔之與介亦裼襲不相因故聘禮云上介不襲執圭屈繅授賔賔襲執圭是也三莊敬日強子曰君子莊敬日強安肆日偷君子不以一日使其躬儳焉如不終日注云肆猶放恣也偷苟且也肆或為褻儳焉可輕賤之貌也如不終日言人而無禮死無時四與仁同過然後其仁可知子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者強仁注云三謂安仁也利仁也強仁也利仁強仁功雖與安仁者同本情則異功者人所貪也過者人所辟也在過之中非其本情者或有悔者焉五鵜梁詩禮注異詩云惟鵜在梁不濡其翼彼記之子不稱其服注云鵜鵜鶘汚澤也汚澤善居泥水之中在魚梁以不濡汚其翼為才知君子以稱其服為有德正義曰案詩注云鵜鳥在梁可謂不濡其翼乎言必濡其翼也猶如小人在位必辱其職與此乖者注禮在前注詩在後故所注不同也六尊名節惠耻浮於行子曰先王諡以尊名節以一惠恥名之浮於行也注云諡者行之迹也名者謂聲譽也言先王論行以為諡以尊名者使聲譽可得而尊言也一讀為一惠猶善也言聲譽雖有衆多者節以其行一大善者為諡耳在上曰浮君子勤行成功聲譽踰行是所耻七祭上帝有秬鬯與宗廟灌異天子親耕粢盛秬鬯以事上帝者天子事上帝諸侯事天子是貴賤皆有事於天下案小宰注云天地大神至尊不祼此祭上帝有秬鬯者凡鬯有二若和之以鬱謂之鬱鬯鬱人所掌是也祭宗廟而灌也若不和鬱謂之秬鬯鬯人所掌是也謂五齊之酒以秬黍為之以芬芳調暢故言秬鬯故得以事上帝大宗伯云涖玉鬯者謂享大鬼也棫朴詩云奉璋峨峨者謂據祭宗廟也故與此不同也八得失自行其是以聽天命得之自是不得自是者得之謂得利祿也言雖得利祿自行其為是之道若不得利祿亦自行其為是之道言不問得之與失恆行其是而不行非也以聽天命者言不苟易其道也九一惠是大一鄭讀為小一正義曰上一是齊一下一是數之一二也今經文為大一之字鄭恐是均同之理故讀為小一取一箇善名而為諡耳十引吕刑堯事為舜斷章為義非虞帝其孰能如此乎者如上之事不是虞帝其誰人能得知此乎案今尚書之篇以明堯德而云虞帝者言虞帝亦能如是且記者斷章而為義也十乙大言小祿則君重財薄德臣祿各以其德能相稱若小言受大祿則臣濫若大言受小祿則君重財而薄德也十二不家食吉易曰不家食吉此大畜卦辭也案易大畜利貞不家食吉利涉大川不家食吉者言君有大畜積不唯與家人食之而巳當與賢人食之故得吉此大畜乾下艮上之卦注云自九三至上九有頥象居外是不家食吉而養賢引之者證君有祿而養賢賢有大小故祿亦有多少十三釋靖共為治理恭敬小雅曰靖共爾位正直是與神之聽之式榖以女注云靖治也爾女也式用也榖祿也言敬治女位之職事正直之人乃與為倫友神聽女之所為用祿與女正義曰此詩小雅小明之篇刺幽王之詩大夫悔仕亂丗戒其未仕者云靖共爾位靖謀也共具也言明君靖謀共具爾之爵位有正直之德者於是與也靖治也爾女也言為臣之道治理恭敬女之職位十四欲諌不欲陳引隰桑詩子曰事君欲諌不欲陳詩云心乎愛矣瑕不謂矣中心藏之何日忘之注云陳謂言其過於外也瑕之言胡也謂猶告也正義曰詩云心乎愛矣瑕不謂矣此小雅隰桑之篇刺幽王之詩君子在野詩人念之云心乎愛此君子矣瑕逺也謂勤也言念此君子逺離此不勤乎言近於勤矣終當念之中心藏之何日忘之者藏善也言中心善此君子何日忘此君子矣詩之本文如此今記人所引此云心乎愛此君子矣瑕之言胡胡何也謂猶告也言何不以事告諌於君矣中心藏之與詩文同王肅以為藏善鄭亦然也皇氏以為人臣中心包藏君惡不欲嚮人陳之非其義也凡諌者若常諌之時天子諍臣七人諸侯五人大夫三人唯大臣得諌若歲𥘉則貴賤皆得諌也故襄十四年左傳師曠對晉侯云自王以下各有父兄子弟以𥙷察其政十五君子耻輕交易絶子曰事君愼始而敬終注云輕交易絶君子所耻十六以蠱卦體釋不事王侯易曰不事王侯髙尚其事者此易蠱卦上九爻辭案易蠱卦巽下艮上上九艮爻艮為山辰在戍得乾氣父老之象是臣之致事也故不事王侯是不得事君君猶髙尚其所為之事十七鄭以譽為繩引蔡侯繩息媯以證子曰君子不以口譽人則民作忠注云譽繩也正義曰言繩可以度量於物凡口譽於人先須忖度亦量之於心故以譽為繩也案莊十四年左傳云蔡侯繩息媯以語楚子杜注云繩譽也繩既訓為譽譽亦訓繩鄭注以為此解十八諾責寧有已怨是故君子與其有諾責也寧有巳怨注云巳謂不許也言諾而不與其怨大於不許正義曰是故君子與其有諾責也者諾謂許人之物責謂許而不與而𬒳責若其有物許人不與𬒳責也寧有巳怨者巳謂休巳寧可有發𥘉休已不許而𬒳怨許而不與其責大發𥘉不與其責小十九辭欲巧與巧言不同辭欲巧者言君子情貌欲得信實言辭欲得和順美巧不違逆於理與巧言令色者異也二十三代無非卜筮惟大享不用卜昔三代明王者謂夏殷周皆事天地之神明者謂祭事天地及諸神明也無非卜筮之用者言皆須卜筮唯九月大享帝於明堂不用卜也故曲禮下篇云大饗不問卜鄭云莫適卜也以其揔饗五帝不知主何帝而卜之故不卜矣所以必須卜者不敢以其私䙝奉事上帝故皆卜之也二一有不卜有卜牲日有卜尸正義曰冬至謂祭圎丘夏至謂祭方澤正月謂祭感生之帝及四時迎氣用四時之吉日也知冬夏及四時皆卜者案大宰云祀五帝帥執事而卜日鄭注云五帝謂四郊及明堂是四郊有卜也大宰又云祀大神祭大示亦如之大神則冬至祭圎丘大示則夏至祭方澤案公羊榖梁魯郊傳云卜三正則知天子郊用夏正亦卜之故知冬夏至正月及四時皆卜日也然明堂不問卜而注大宰祀五帝卜日云四郊及明堂者廣解五帝所在其實祀明堂不卜也案周禮祀宗廟亦卜日注不言宗廟者以經云事上帝故唯解祭天之時云不違者日與牲尸者案僖三十一年左傳云禮不卜帝祀而卜其牲日是有卜牲日也案特牲少牢云大夫士筮尸則天子諸侯有卜尸也草二雖有常日猶用卜正義曰既有常時常日而用卜者亦不敢專也故曲禮篇云日而行事則必踐之又祭統云雖有明知之心必進斷其志是雖有常日猶用卜也草三內事外事以四郊為限正義曰先師以為祭天而用辛雖外用柔日祭社用甲雖內用剛日殊別於四郊之祭以言用剛柔之日不可與四郊同其餘他事今謂事之外內別乎四郊者謂四郊之外為外事若甲午祠兵吉日庚午既差我馬之屬是也四郊之內為內事若郊之用辛及宗廟少牢用丁亥之屬是也故言别於四郊外內別謂限別以四郊為限草四大人之器威敬子曰大人之器威敬天子無筮諸侯有守筮天子道以筮諸侯非其國不以筮卜宅寢室天子不卜處大廟注云言其用之尊嚴謂征伐出師若巡守也天子至尊大事皆用卜也春秋傳曰先王卜征五年歲襲其祥守筮守國之筮國有事則用之始將出卜之道有小事則用筮入他國則不筮不敢問吉凶於人之國也諸侯受封乎天子因國而國唯宫室欲改易者得卜之耳卜可建國之處吉則宫廟吉可知草四朝聘昏冠不用燕器用祭器子曰君子敬則用祭器注云謂朝聘待賔客崇敬不敢用燕器也正義曰其實昏冠亦不用燕器也用祭器也故左傳稱魯襄公冠季武子云君冠必以祼享之禮行之以金石之樂節之是用祭器也草六天子無筮無徒筮耳云天子至尊大事皆用卜也者謂不徒用筮而巳兼用卜也此云無筮無徒筮耳不謂全無筮也故簭人云國之大事先簭而後卜出師巡守皆大事也所引春秋傳者襄十三年左傳文先王卜征云云草七緇衣冠裳帶韠之制緇衣者諸侯朝服故論語云緇衣羔裘注云諸侯之朝服其服緇布衣而素裳緇帶素韠故士冠禮云主人玄冠朝服緇帶素韠注云朝服者十五升布衣而素裳也衣不言色者衣與冠同也知朝服十五升者雜記文知用布者雜記云朝服十五升去其半而緦故知布也知素裳者以冠禮云素韠韠從裳色故知裳亦素也若士之助祭者則韠用緇不與裳同色熊氏云玄冠用黑繒為之其義未甚明也二八甫刑即吕刑以甫侯即吕侯正義曰此甫刑尚書吕刑也而稱甫刑者案孝經序云春秋有吕國而無甫侯但孝經序未知是鄭作以否案春秋實無甫侯國語云申吕雖衰齊許猶在又云齊許申吕皆由大姜然則吕即甫也案孔注尚書言侯後為甫侯故穆王時謂之吕侯周宣王及平王之時為甫侯故詩嵩髙云生甫及申謂宣王時也揚之水不與我戍甫謂平王時也則孔氏義為是鄭或同之二九鄭以九黎為三苗之先孔謂即蚩尤髙辛氏之末諸侯有三苗者作亂案鄭注吕刑云苗民謂九黎之君也九黎之君於少昊氏衰而棄善道上效蚩尤重刑必變九黎言苗民者有苗九黎之後顓頊代少昊誅九黎分流其子孫為居於西裔者三苗至髙辛之衰又復九黎之君惡堯興又誅之堯末又在朝舜時又竄之後王深惡此族三生凶惡故著其氏而謂之氏民者冥也言未見仁道以此言之三苗是九黎之後九黎於少昊之末而為亂三苗於髙辛氏之末又為亂故此注云髙辛以吕刑於此苗民之下云皇帝清問下民又云乃命三后三后謂伯夷之等故以皇帝為帝堯又以苗民為髙辛氏之末也鄭以九黎為苗民先祖但上學蚩尤之惡非蚩尤子孫孔注尚書以為九黎即蚩尤也三苗則非九黎之子孫與鄭異三十狐裘黃黃鄭謂大蠟服而詩注異詩云彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望注云黃衣則狐裘大蠟之服也詩人見而說焉章文章也忠信為周也詩毛氏有之三家則亡正義曰郊特牲云黃衣黃冠而祭息田夫也此云黃衣故云大蠟之服論語云黃衣狐裘故狐裘則黃衣也案詩注云狐裘取溫𥙿而巳不云大蠟此云蠟者以正衣解之詩謂庶人有士行非關蠟祭之事故為溫𥙿也三乙葉公顧命三毋葉公之顧命曰毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士注云葉公楚縣公葉公子髙也臨死遺書曰顧命小謀小臣之謀也大作大臣之所為也嬖御人愛妾也疾亦非也莊后適夫人齊莊得禮者嬖御士愛臣也莊士亦謂士之齊莊得禮者今為大夫卿士三二鄭注尹誥不言古文尚書尹吉曰惟尹躬天見于西邑夏自周有終相亦惟終注云尹吉亦尹誥也天當為先字之誤忠信為周相助也謂臣也伊尹言尹之先祖見夏之先君臣皆忠信以自終今天絶桀者以其自作孽伊尹始仕於夏此時就湯矣夏之邑在亳西見或為敗邑或為豫正義曰鄭君不見古文尚書故云伊尹之先祖據尚書是大甲之篇言尹之往先見夏之先君是身之往先見非謂尹之先祖也云伊尹始仕於夏此時就湯矣者書序云伊尹去亳適夏既醜有夏復歸于亳是始仕於夏也經云先見西邑夏故知為誥之時就湯矣以鄭不見古文謂言尹誥是伊尹誥成湯故云此時就湯矣與尚書同三三夏邑在亳西云夏之邑在亳西者案丗本及汲冡古文並云禹都咸陽正當亳西也及後乃徙安邑鄭以為湯都偃師為亳邑則是安邑亦在亳西也三四鄭注君雅不見古文尚書君雅曰夏日暑雨小民惟曰怨資冬祁寒小民亦惟曰怨注云雅書序作牙假借字也君雅周穆王司徒作尚書篇名也資當為至齊魯之語聲之誤也祁之言是也齊西偏之語也夏日暑雨小民怨天至冬是寒小民又怨天言民恆多怨為其君難正義曰案尚書云小民惟曰怨咨今此本作資鄭又讀資當為至以鄭不見古文尚書故也三五朋友以禮義相攝不以利子曰輕絶貧賤而重絶冨貴則好賢不堅而惡惡不著也人雖曰不利吾不信也詩云朋友攸攝攝以威儀注云攸所也言朋友以禮義相攝正不以貧冨貴賤之利也正義曰此一節明交友之道唯善是仇以威儀相攝佐也三六私惠周行子曰私惠不歸德君子不自留焉詩云人之好我示我周行注云私惠謂不以公禮相慶賀時以小物相問遺也言其物不可以為德則君子不以身留此人也相惠以䙝瀆邪僻之物是為不歸於德歸或為懷行道也言示我以忠信之道三七禮記古文書今博士讀三者不同君奭曰昔在上帝周田觀文王之德其集大命于厥躬注云奭召公名也作尚書篇名也古文周田觀文王之德為割申勸寧王之德今博士讀為厥亂勸寧王之德三者皆異古文似近之割之言蓋也言文王有誠信之德天蓋申勸之集大命於其身謂命之使王天下也正義曰云古文周田觀文王之德為割申勸寧王之德者以伏生所傳歐陽夏侯所注者為今文尚書以衛賈馬所注者元從壁中所出之古文即鄭注尚書是也此周字古文為割此田字古文作申此觀字古文為勸皆字體相涉今古錯亂此文尚書為寧王亦義相涉也云今博士讀為厥亂勸王之德者謂今文尚書讀此周田觀文王之德為厥亂勸寧王之德也云三者皆異古文似近之者玄謂此禮記及古文尚書并今博士讀者三者其文各異而古文周田為割申其字近於義理故云古文似近之云割之言蓋也割蓋聲相近故割讀為蓋謂天蓋申勸之德尚書猶為割謂割制其義與此不同三九南人稱人而無恆人而無恆不可以為卜筮者南人殷掌卜之人有遺餘之言稱云人而性行無恆不可為卜筮古之遺言與龜筮猶不能得知無恆之人而况於凡人乎四十以互體釋恆九三六五爻辭正義曰此不恆其德或承之羞者是易恆卦巽下震上九三爻辭得正互體為乾乾有剛健之德體在巽巽為進退是不恆其德也又互體為兊兊為毀折是將有羞辱也云問正為偵者此恆其德偵恆卦六五爻辭以隂爻而處尊位是天子之女又互體兊兊為和說至尊主家之女以和恱幹其家事問正於人故為吉也應在九二又男子之象體在巽巽為進退是無所定而婦言是從故云夫子凶也禮記要義卷第二十八
