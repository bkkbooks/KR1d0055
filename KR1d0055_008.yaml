body:
  text: 三觀闕亦名象魏又以懸法藏舊章正義曰爾雅釋宫云觀謂之闕孫炎云宫門雙闕者舊懸法象使民觀之處因謂之闕熊氏云當門闕處以通行路既言雙闕明是門之兩旁相對為雙熊氏得焉白虎通云闕是闕疑義亦相兼案何休注公羊天子兩觀外闕諸侯臺門則諸侯不得有闕魯有闕者魯以天子之禮故得有之也公羊傳云設兩觀乘大路此皆天子之禮是也案定二年雉門災及兩觀魯之宗廟在雉門外左孔子出廟門而來至雉門遊於觀此觀又名象魏以其縣法象魏巍也其處巍巍髙大故哀三年桓宫災季桓子至御公立于象魏之外命藏象魏曰舊章不可亡也熊氏云天子藏舊章於明堂諸侯藏於祖廟知者以天子視朔于明堂諸侯於祖廟故也榖梁傳云天子班告朔于諸侯諸侯受乎禰廟非鄭義也四英俊賢傑等名案辨名記云倍人曰茂十人曰選倍選曰俊千人曰英倍英曰賢萬人曰傑倍傑曰聖毛詩傳又云萬人為英是英皆多於俊選是俊選之尤異者即禹湯文武三王之中俊異者五正君臣篤父子之辨君臣義合故曰正父子天然故云篤篤厚也兄弟同氣故言睦夫婦異姓故言和六禮本於天殽於地列於鬼神是故夫禮必本於天殽於地列於鬼神注云聖人則天之明因地之利取法度於鬼神以制禮下教令也既又祀之盡其敬也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也七皆從其𥘉死北首生南鄉故天望而地藏也體魄則降知氣在上故死者北首生者南鄉皆從其𥘉注云地藏謂葬首隂也鄉陽也謂今行之然也正義曰天望謂始死望天而招愧地藏謂葬地以藏尸也體魄則降知氣在上者覆釋所以天望地藏之意所以地藏者由體魄則降故也所以天望招之於天由知氣在上故也故死者北首生者南鄉者體魄降入於地為隂故死者北首歸隂之義死者既歸隂則生者南鄉歸陽也八精氣謂之上神以降上神與其先祖正義曰以降上神與其先祖者上神謂在上精魂之神即先祖也指其精氣謂之上神指其亡親謂之先祖協句而言之分而為二耳皇氏熊氏等云上神謂天神也九九獻之節及諸侯以下獻數用酒之法崔氏云周禮大祫於大廟則備五齊三酒朝踐王酌泛齊后酌醴齊饋食王酌盎齊后酌醍齊朝獻王酌泛齊因朝踐之尊再獻后酌醍齊因饋食之尊諸侯為賔則酌沈齊尸酢王與后皆還用所獻之齊賔長酳尸酢用清酒加爵亦用三酒大禘則用四齊三酒者醴齊以下悉用之故禮運云玄酒在室醴盞在尸粢醍在堂澄酒在下用四齊者朝踐王酌醴齊后酌盎齊饋食王酌醍齊后酌沈齊朝獻王酌醴齊再獻后還酌沈齊亦尊相因也諸侯為賔亦酌沈齊用三酒之法如祫禮也四時之祭唯二齊三酒則自祫禘以下至四時祭皆通用也二齊醴盎也故鄭注司尊彞四時祭法但云醴盎而巳用二齊者朝踐王酌醴齊后亦酌醴齊饋食王酌盎齊后亦酌盎齊朝獻王還用醴齊再獻后還用盎齊亦尊相因也諸侯為賔亦酌盎齊三酒同於祫三酒所常同不差者三酒本為王以下飲故尊卑自有常依尊卑之常不得有降祫禘時祭本明所用揔有多少故正祭之齊有差降也魯及王者之後大祫所用與王禘之禮同若禘與王四時同用三酒亦同於王侯伯子男祫禘皆用二齊醴盎而巳三酒則並用用二齊之法朝踐君夫人酌醴齊饋食君夫人酌盎齊朝獻君還酌醴齊再獻夫人還酌盎齊諸臣為賔酌盎齊尸酢君夫人用昔酒酢諸臣用事酒加爵皆清酒時祭之法用一齊故禮器云君親制祭夫人薦盎鄭云謂朝事時也又云君親割牲夫人薦酒鄭云謂進孰時也其行之法朝踐君制祭則夫人薦盎為獻進孰時君親割夫人薦酒朝獻時君酌盎齊以酳尸再獻時夫人還酌酒以終祭也賔獻皆酒加爵如禘祫之禮天子諸侯酌奠皆用齊酒卿大夫之祭酌奠皆用酒其祫祭之法既備五齊三酒以實八尊祫祭在秋案司尊彞秋嘗冬蒸朝獻用兩著尊饋獻用兩壷尊則泛齊醴齊各以著尊盛之盎齊醍齊沈齊各以壷尊盛之凡五尊也又五齊各有明水之尊凡十尊也三酒三尊各加玄酒凡六尊也通斚彞盛明水黃彞盛鬱鬯凡有十八尊故崔氏云大祫祭凡十八尊其明水玄酒陳之各在五齊三酒之上祭日之旦王服衮冕而入尸亦衮冕祝在後侑之王不出迎尸故祭統云君不迎尸所以別嫌也尸入室乃作樂降神故大司樂云凡樂圜鐘為宫九變而致人鬼是也乃灌故書云王入大室祼當灌之時衆尸皆同在大廟中依次而灌所灌鬱鬯小宰注云尸祭之啐之奠之是為一獻也王乃出迎牲后從灌二獻也迎牲而入至於庭故禮器云納牲詔於庭王親執鸞刀啓其毛而祝以血毛告於室故禮器云血毛詔於室凡牲則廟各別牢故公羊傳云周公白牡魯公騂犅案逸禮云毀廟之主昭共一牢穆共一牢於是行朝踐之事尸出於室大祖之尸坐於户西南靣其主在右昭在東穆在西相對坐主各在其右故鄭注祭統云天子諸侯之祭朝事延尸於户外是以有北靣事尸之禮祝乃取牲膟膋燎于爐炭入以詔神於室又出以墮于主前郊特牲云詔祝於室坐尸於堂是也王乃洗肝於鬱鬯而燔之以制於主前所謂制祭次乃升牲首於室中置於北墉下后薦朝事之豆籩乃薦腥於尸主之前謂之朝踐即此禮運薦其血毛腥其爼是也王乃以玉爵酌著尊泛齊以獻尸三獻也后又以玉爵酌著尊體齊以亞獻四獻也乃退而合亨至薦孰之時陳於堂故禮器云設饌於堂乃後延主入室大祖東靣昭在南靣穆在北靣徙堂上之饌於室內坐前祝以斚爵酌奠於饌南故郊特牲注云天子奠斚諸侯奠角即此之謂也既奠之後又取腸間脂焫蕭合馨薌郊特牲注云奠謂薦孰時當此大合樂也自此以前謂之接祭乃迎尸入室舉此奠斚主人拜以妥尸故郊特牲云舉斚角拜妥尸是也后薦饌獻之豆籩王乃以玉爵酌壷尊盎齊以獻尸為五獻也后又以玉爵酌壷尊醴齊以獻尸是六獻也於是尸食十五飯訖王以玉爵因朝踐之尊泛齊以酳尸為七獻也故鄭云變朝踐云朝獻尊相因也朝獻謂此王酳尸因朝踐之尊也后乃薦加豆籩尸酌酢主人主人受嘏王所以獻諸侯於是后以瑶爵因酌饋食壷尊醍齊以酳尸為八獻也鄭注司尊彞云變再獻為饋獻者亦尊相因也再獻后酳尸獻謂饋食時后之獻也於時王可以瑶爵獻卿也諸侯為賔者以瑶爵酌壷尊醍齊以獻尸為九獻九獻之後謂之加爵案特牲有三加則天子以下加爵之數依尊卑不秖三加也故特牲三加爵別有嗣子舉奠文王丗子諸侯謂之上嗣舉奠亦當然崔氏以為后獻皆用爵又以九獻之外加爵用璧角璧散今案內宰云后祼獻則贊瑶爵亦如之鄭注云瑶爵謂尸卒食王既酳尸后亞獻之始用瑶爵則后未酳尸以前不用也又鄭注司尊彞云王酳尸用玉爵而再獻者用璧角璧散可知此璧角璧散則瑶爵也崔氏乃云正獻之外諸臣加爵用璧角璧散其義非也其禘祭所用四齊者禘祭在夏醴齊盎齊盛以犧尊醍齊沈齊盛以象尊王朝踐獻用醴齊后亞獻用盎齊王饋獻用醍齊后亞獻用沈齊尸卒食王酳尸因朝踐醴齊后酳尸因饋食沈齊諸臣為賔獻亦用沈齊禘祭無降神之樂熊氏以為大祭皆有三始有降神之樂又未毀廟者皆就其廟祭之其餘皆如祫祭之禮天子時祭用二齊者春夏用犧尊盛醍齊用象尊盛沈齊秋冬用著尊盛醴齊用壷尊盛盎齊是一齊用一尊司尊彞皆云兩者以一尊盛明水故皆云兩若禘祫之祭其齊既多不得唯兩而巳前巳備釋也時祭唯用二齊其諸侯用齊及酒皆視天子具如前説其魯及王者之後皆九獻其行之法與天子同侯伯七獻朝踐及饋獻時君皆不獻於九獻之中減二故為七獻也禮器云君親制祭夫人薦盎君親割牲夫人薦酒是也子男五獻者亦以薦腥饋孰二君皆不獻酳尸之時君但一獻而巳九獻之中去其四故為五此皆崔氏之説今案特牲少牢尸食之後主人主婦及賔備行三獻主婦因獻而得受酢今子男尸食之後但得一獻夫人不得受酢不如卿大夫理亦不通蓋子男饋孰以前君與夫人並無獻也食後行三獻通二灌為五也禮器所云自據侯伯七獻之制也一曰尸酢侯伯子男亦用所獻之齊也三二天子諸侯大夫處其子孫故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度注云言今不然也春秋昭元年秦伯之弟針出奔晉刺其有千乘之國不能容其母弟正義曰天子有田以處其子孫者案王制云天子之田方千里是也以處其子孫者謂子孫若有功德者封為諸侯無功德直食邑於畿內也諸侯有國以處其子孫者謂諸侯子孫封為卿大夫若有其大功德其子孫亦有采地故左傳云官有丗功則有官族邑亦如之是處其子孫大夫有采地以處其子孫者大夫位卑不合割其采地以處子孫但大夫以采地之祿養其子孫故云以處其子孫三三天子舍諸侯祖廟亦有敬故天子適諸侯必舍其祖廟而不以禮籍入是謂天子壞法亂紀注云以禮籍入謂大史典禮執簡記奉諱惡也天子雖尊舍人宗廟猶有敬焉自拱勑也三四政者君所以藏身之固故政者君之所以藏身也是故夫政必本於天殽以降命命降于社之謂殽地降于祖廟之謂仁義降於山川之謂興作降於五祀之謂制度此聖人所以藏身之固也注云於此又遂為之言政也藏謂輝光於外而形體不見若日月星辰之神降下也殽天之氣以下教令天有運移之期隂陽之節也謂教令由社下者也社土地之主也周禮土會之法有五地之物生謂教今由祖下者大傳曰自禰率而上至于祖遠者輕仁也自祖率而下至于禰髙者重義也謂教令由山川下者也山川有草木禽獸可作器物共國事謂教令由五祀下者五祀有中􅋼門户竈行之神此始為宫室制度政之行如此何用城郭溝池之為正義曰言政之行若能如此法天隂陽使賞罰得所法地髙下令尊卑有序法之祖廟而行仁義法之山川五祀而為興作制度若能如此則民懷其德禍害不來何所防禦故云何用城郭溝池之為卅五禮所以知人心欲惡者心之大端也者端謂頭緒飲食男女是人心所欲之大端緒也死亡貧苦是人心所惡之大端緒也人藏其心不可測度禮所以知人心者有事於中心貌必見於外若七情美善十義流行則舉動無不合禮若七情違僻十義虧損則動作皆失其法故云舍禮何以哉卅六人者鬼神之會鬼神之會者鬼謂形體神謂精靈祭義云氣也者神之盛也魄也者鬼之盛也必形體精靈相會然後物生故云鬼神之會下文云鬼神以為徒覆説此經鬼神不云隂陽鬼神者隂陽鬼神天地中物故不重陳鄭下注鬼神謂山川也此義未知孰是故兩存焉卅七五行氣和然後月生而上配日故天秉陽垂日星地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕注云秉猶持也言天持陽氣施生照臨下也竅孔也言地持隂氣出內於山川以舒五行於四時此氣和乃后月生而上配日若臣功成進爵位也一盈一闕屈伸之義也必三五者播五行於四時也一曰水二曰火三曰木四曰金五曰土合為十五之成數也卅八五行之動迭相竭五行之動迭相竭也五行四時十二月還相為本也五聲六律十二管還相為宫也五味六和十二食還相為質也五色六章十二衣還相為質也注云竭猶負戴也言五行運轉更相為始也五聲宫商角徴羽也其管陽曰律隂曰吕布十二辰始於黃鐘管長九寸下生者三分去一上生者三分益一終於南吕更相為宫凡六十也五味酸苦辛鹹甘也和之者春多酸夏多苦秋多辛冬多鹹皆有滑甘是謂六和五色六章畫繢事也周禮考工記曰土以黃其象方天時變火以圜山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧也三九十二律更相為宫其管陽曰律隂曰吕布十二辰始於黃鍾管長九寸下生者三分去一上生者三分益一皆律曆志文云終於南吕更相為宫凡六十也者以十二管更相為宫以黃鍾為始當其為宫備有五聲言黃鍾下生林鍾林鍾上生大簇大簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賔蕤賔上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕此則相生之次也隨其相生之次每辰各自為宫各有五聲十二管相生之次至中吕而匝黃鍾為第一宫下生林鍾為徴上生大簇為啇下生南吕為羽上生姑洗為角林鍾為第二宫上生大簇為徴下生南吕為啇上生姑洗為羽下生應鍾為角十二宫各有五聲凡六十聲南吕最處於末故云終於南吕以此言之則南吕為是然諸本及定本多作終於南事則是京房律法案漢元帝時郎中京房知五音十二律之數上使大子大傅韋玄成等親試問房於樂府房對受學故小黃令焦延壽等六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂陽上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓犧作易紀陽氣之𥘉以為律法建日冬至之聲以黃鍾為宫大簇為啇姑洗為角林鍾為徴南吕為羽應鍾為變宮㽔賔為變徴此聲氣之元五音之正也故各統一日其餘以次運行當月者各自為宫而啇徴以類從焉禮運篇曰五聲六律十二管還相為宫此之謂也以六十律分一期之曰黃鍾自冬至始及冬至而後隂陽寒燠風雨之占生焉於以檢攝羣音考其髙下四十水信土知水知土信二説不同云龜北方之靈信則至矣者案月令冬云其蟲介注云龜鱉之屬則龜為水蟲水主信故信則至知水主信者易乾鑿度云陽氣合閉信之類故北方水為信水既為信則土為知也故乾鑿度云四時之義皆法中央中央土者可以兼四方之行知之決也是土為知但水土二行俱有信知故樂偉云宫致鳯皇身信羽致幽昌身知又中庸注云水神則信土神則知是土水俱有信知龜屬北方水大戴禮及樂緯云介蟲三百六十龜為長鱗蟲三百六十龍為長羽蟲三百六十鳯為長毛蟲三百六十麟為長案月令春其蟲鱗則龍東方木也夏其蟲羽則鳯屬南方火也秋其蟲毛則麟屬西方金也案異義説左氏者以昭二十九年傳云水官不修故龍不至以水生木故為修母致子之説故服虔注獲麟云麟中央土獸土為信信禮之子修其母致其子視明禮火修而麟土至思睿信土立而白虎金擾言從義金成而神龜水在沼聽聰知水正則名川出木龍貌恭性木仁則鳯皇火來儀又毛詩傳云麟信而應禮又云騶虞義獸有至信之德則應之皆為以修母致子之義也若鄭康成之説則異於此修當方之事則當方之物來應王制五方之民疏亦謂水為信又見中庸四一麟鳯龜龍取象非一虎雖屬西方以其淺毛得屬中央土也故月令中央土其蟲倮注云虎豹之屬恆淺毛又於隂陽虎屬寅是也麟屬東方取其性仁則屬木也故公羊説麟者木精鄭云金九以木八為妻其性義木性仁得陽氣性似父得隂氣性似母麟毛蟲得木八之氣而性仁鶡冠子云麟北方玄枵之獸是取象不一也鳯屬南方亦屬中央故樂緯云宫致鳯皇是也龜屬北方亦屬東方五行傳云一曰貌時有龜孽是也龍屬東方亦屬天五行傳云皇之不極則有龍蛇之孽是也五行傳又云二曰言時則有介蟲之孽一曰視時則有倮蟲之孽是取象既多理非一概今以煩而無用故不備言其數也四二禮列而為鬼神列而為鬼神者鬼神謂生成萬物鬼神也四時變化生成萬物皆是鬼神之功聖人制禮則陳列鬼神之功以為教也四三禮義仁三者之別故禮也者義之實也協諸義而協則禮雖先王未之有可以義起也義者藝之分仁之節也協於藝講於仁得之者強仁者義之本也順之體也得之者尊注云協合也合禮於義則與義合不乖刺以其合於義可以義起作藝猶才也有義則人服之也有仁則人仰之也四四用水火金木飲食必時用水火金木飲食必時注云用水謂漁人以時漁為梁春獻鱉蜃秋獻龜魚也用火謂司爟四時變國火以救時疾及季春出火季秋納火也用金謂丱人以時取金玉錫石也用木謂山虞仲冬斬陽木仲夏斬隂木飲食謂食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時禮記要義卷第九
