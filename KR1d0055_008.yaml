front:
  text: 禮記要義卷第九禮運一祭百神曰蠟祭宗廟曰息民昔者仲尼與於蠟賔注云蠟者索也歲十二月合聚萬物而索饗之亦祭宗廟時孔子仕魯在助祭之中正義曰蠟者索也歲十二月合聚萬物而索饗之者郊特牲文十二月者據周言之若以夏正言之則十月以殷言之則十一月謂建亥之月也以萬物功成報之云亦祭宗廟者以月令孟冬云祈來年于天宗大割祠于公社及門閭臘先祖五祀以臘先祖故云亦祭宗廟揔而言之謂之為蠟若析而言之祭百神曰蠟祭宗廟曰息民故鄭注郊特牲云息民與蠟異此據揔而言之故祭宗廟而云與於蠟賔也廣雅云夏曰清祀以清潔祭祀殷曰嘉平嘉善也平成也以歲終萬物善成就而報功其蠟與臘名巳具於上知此蠟是祭宗廟者以下云出遊於觀之上故知是祭宗廟也云時孔子仕魯在助祭之中者以某與蠟祭故知仕魯也魯臣而稱賔者以祭祀欲以賔客為榮故雖臣亦稱賔也
