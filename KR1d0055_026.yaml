front:
  text: 禮記要義卷第二十七中庸
  hash: sha256:47a00e2f775f64ea4ef7e0d348efada09c21131cd62bc2c305e17d28478dbccd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_026-1a}
body:
  text: 一中庸子思作正義曰案鄭目録云名曰中庸者以其記中和之為用也庸用也孔子之孫子思伋作之以昭明聖祖之德此於別録屬通論二水神信土神知云水神則信冬主閉藏充實不虛水有內明不欺於物信亦不虛詐也云土神則知者金木水火土無所不載土所含義者多知亦所含者衆故土神則知三性情靜動及稟氣清濁孝經説曰性者生之質命人所稟受度也不云命者鄭以通解性命為一故不復言命但性情之義説者不通亦略言之賀㻛云性之與情猶波之與水靜時是水動則是波靜時是性動則是情案左傳云天有六氣降而生五行至於含生之類皆感五行生矣唯人獨稟秀氣故禮運云人者五行之秀氣𬒳色而生既有五常仁義禮知信因五常而有六情則性之與情似金與鐶印之用非金亦因金而有鐶印情之所用非性亦因性而有情則性者靜情者動故樂記云人生而靜天之性也感於物而動性之欲也故詩序云情動於中是也但感五行在人為五常得其清氣備者則為聖人得其濁氣簡者則為愚人降聖以下愚人以上所稟或多或少不可言一故分為九等孔子云唯上知與下愚不移四飲食知味如張華等案異義云張華辨鮓師曠別薪符朗為青州刺史善能知味食雞知棲半露食鵝知其黑白此皆晉書文也五忠內盡於心恕外不欺物忠恕違道不逺忠者內盡於心恕者外不欺物恕忖也忖度其意於人違去也言身行忠恕則去道不逺也六正己而不求則夷狄無怨正已而不求於人則無怨此素夷狄行夷狄也若身入夷狄夷狄無禮義當自正已而行不得求於彼人則彼人無怨己者論語云言忠信行篤敬雖之夷狄不可棄七妻子為帑鳥尾為帑宜爾室家樂爾妻帑者宜善爾之室家愛樂爾之妻帑帑子也古者謂子孫為帑故甘誓云豫則帑戮汝於人則妻子為帑於鳥則鳥尾為帑左傳云以害鳥帑是也八萬物無不以鬼神之氣生體物而不可遺注云體猶生也可猶所也不有所遺言萬物無不以鬼神之氣生也九鬼神生物終物此鬼神即與易繫辭云是故知鬼神之情狀與天地相似以能生萬物也案彼注木火之神生物金水之鬼終物彼以春夏對秋冬故以春夏生物秋冬終物其實鬼神皆能生物終物也故此云體物而不可遺此雖説隂陽鬼神人之鬼神亦附隂陽之鬼神故此云齊明盛服以承祭祀是兼人之鬼神也十因追王遂及不降正統期明孝不以尊卑變武王末受命周公成文武之德追王大王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也注云末猶老也追王大王王季者以王迹起焉先公組紺以上至后稷也斯禮逹於諸侯大夫士庶人者謂葬之從死者之爵祭之用生者之祿也言大夫葬以大夫士葬以士則追王者改葬之矣期之喪逹於大夫者謂旁親所降在大功者其正統之期天子諸侯猶不降也大夫所降天子諸侯絶之不為服所不臣乃服之也承葬祭説期三年之喪者明子事父以孝不用其尊卑變十乙一戎衣鄭作一戎殷與書異正義曰案尚書武成云一戎衣謂一著戎衣而滅殷此云一者以經武王繼大王王季文王三人之業一用滅殷對三人之業為一耳由三人之業故一身滅之鄭必以衣為殷者以十一年觀兵于孟津十三年滅紂是再著戎服不得稱一戎衣故以衣為殷故注云齊人言殷聲如衣十二無問尊卑皆得以己祿祭先斯禮也逹乎諸侯大夫及士庶人者斯此也言周公尊崇先公之禮非直天子所行乃下逹於諸侯大夫士庶人等無問尊卑皆得上尊祖父以己之祿祭其先人猶若周公以成王天子之禮祀其先公也十三天子服正統三年喪諸侯旁親有不降三年之喪逹乎天子者謂正統在三年之喪父母及適子并妻也逹乎天子者言天子皆服之不云父母而云三年者包適子也天子為后服期以三年包之者以后卒必待三年然後娶所以逹子之志故通在三年之中是以昭十五年左傳云穆后崩大子壽卒叔向云王一歲而有三年之喪二焉是包后為三年也直云逹乎天子不云諸侯者諸侯旁親尊同則不降故喪服大功章云諸侯為姑姊妹嫁於國君者是也十四武王追王周公改葬云則追王者改葬之矣者以大王王季身為諸侯葬從死者之爵則大王王季秪得為諸侯葬禮不得言追王從天子法故知追王之時而更改葬用天子禮案大傳云武王追王大王亶父王季歷此云周公追王不同者武王既伐紂追王布告天下周公追而改葬故不同也十五宗廟序昭穆序爵事旅酬燕毛宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也注云序猶次也爵謂公卿大夫士也事謂薦羞也以辨賢者以其事別所能也若司徒羞牛宗伯共雞牲矣文王丗子曰宗廟之中以爵為位崇德也宗人授事以官尊賢也旅酬下為上者謂若特牲饋食之禮賔弟子兄弟之子各舉觴於其長也逮賤者宗廟之中以有事為榮也燕謂既祭而燕也燕以髮色為坐祭時尊尊也至燕親親也齒亦年也十六同姓貴之不必官守天官不可私同其好惡不特有所好惡於同姓雖恩不同義必同也尊重其祿位所以貴之不必授以官守天官不可私也十七既廪稱事即所謂乘其事既讀為餼餼廩稍食也稿人職曰乘其事考其弓弩以下上其食正義曰以既與廪連文又與餼字聲同故讀既為餼稍食者謂稍給之故周禮月終均其稍食是也引稿人職者證其餼廪稱事案周禮夏官稿人掌弓矢之林其職云乘其事乘謂計算其所為之事考其弓弩謂考校弓弩之善惡多少以下上其食下謂貶退上謂增益善者則增上其食惡者則減其食故也十八言前定則不跲言前定則不跲者案字林云跲躓也躓謂行倒蹶也將欲發言能豫前思定然後出口則言得流行不有躓蹶也跲其劫反皇音給十九昭昭撮土卷石勺水譬至誠非實論今夫山一卷石之多言山之𥘉小唯一卷石之多多少唯一卷石耳故鄭注云卷猶區也今夫水一勺之多言水𥘉時多少唯一勺耳此以下皆言為之不巳從小至大然天之與地造化之𥘉清濁二氣為天地分而成二體元𥘉作盤薄穹隆非是以小至大今云昭昭與撮土卷石與勺水者何伹山或壘石為髙水或衆流而成大是從微至著因説聖人至誠之功亦是從小至大以今天地體大假言由小而來以譬至誠非實論也二十溫故燖溫之溫溫讀如燖溫之溫正義曰案左傳哀十二年公會吳于橐臯大宰嚭請尋盟子貢對曰盟若可尋也亦可寒也賈逵注云尋溫也又有司徹云乃燅尸爼是燖為溫也云謂故學之熟矣後時習之謂之溫者謂賢人舊學已精孰在後更習之猶若溫燖故食也草一諸侯禮法從周孔子躬行雜殷案趙啇問孔子稱吾學周禮今用之吾從周檀弓云今丘也殷人也兩楹奠殯哭師之處皆所法於殷禮未必由周而云吾從周者何也鄭答曰今用之者魯與諸侯皆用周之禮法非專自施於巳在宋冠章甫之冠在魯衣逢掖之衣何必純用之吾從周者言周禮法最備其為殷周事豈一也如鄭此言諸侯禮法則從周身之所行雜用殷禮也草二質鬼神俟聖人即知天知人正義曰以經云知天知人故鄭引經總結之云知其道者以天道隂陽生成萬物今能正諸隂陽鬼神而不有疑惑是知天道也以聖人之道雖相去百丗其歸一揆今能百丗以待聖人而不有疑惑是知聖人之道也云鬼神從天地者也解所以質諸鬼神之德知天道之意引昜曰故知鬼神之情狀與天地相似者證鬼神從天地之意案昜繫辭云精氣為物遊魂為變鄭云木火之神生物金水之鬼成物以七八之神生物九六之鬼成物是鬼神以生成為功天地亦以生成為務是鬼神之狀與天地相似草三中庸末八引詩斷章取義詩曰衣錦尚絅惡其文之著也衛風碩人之篇美莊薑之詩言莊薑𥘉嫁在塗衣著錦衣為其文之大著尚著禪絅加於錦衣之上絅禪也以單縠為衣尚以覆錦衣也案詩本文云衣錦褧衣此云尚絅者斷截詩文也又俗本云衣錦褧裳又與定本不同詩曰潛雖伏矣亦孔之昭此明君子其身雖隱其德昭著所引者小雅正月之篇刺幽王之詩詩之本文以幽王無道喻賢人君子雖隱其身德亦甚明著不能免禍害猶如魚伏於水亦甚著見𬒳人探捕記者斷章取義詩云相在爾室尚不愧于屋漏此大雅抑之篇刺厲王之詩詩人意稱王朝小人不敬鬼神瞻視女在廟堂之中猶尚不愧畏於屋漏之神記者引之斷章取義言君子之人在室之中屋漏雖無人之處不敢為非猶愧懼于屋漏之神詩曰奏假無言時靡有爭此啇頌列祖之篇美成湯之詩詩本文云􅎦假無言此云奏假者與詩文異也假大也言祭成湯之時奏此大樂於宗廟之中人皆肅敬無有喧譁之言所以然者時既太平無有爭訟之事故無言也引證君子不言而民信詩曰不顯惟德百辟其刑之此周頌烈文之篇美文王之德不顯乎文王之德言其顯矣以道德顯著故天下百辟諸侯皆刑法之引之者證君子之德猶若文王其德顯明在外明衆人皆刑法之詩云豫懷明德不大聲以色此大雅皇矣之篇美文王之詩豫我也懷歸也言天謂文王曰我歸就爾之明德所以歸之者以文王不大作音聲以為嚴厲之色故歸之記者引之證君子亦不作大音聲以為嚴厲之色與文王同也詩曰德輶如毛者此大雅蒸民之篇美宣王之詩輶輕也言用德化民舉行甚易其輕如毛也上天之載無聲無臭至矣載生也言天之生物無音聲無臭氣寂然無象而物自生言聖人用德化民亦無音聲亦無臭氣而人自化是聖人之德至極與天地同此二句是大雅文王之詩美文王之德不言詩云者孔子略而不言直取詩之文爾此亦斷章為義禮記要義卷第二十七
