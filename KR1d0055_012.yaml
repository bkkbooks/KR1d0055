body:
  text: 二以明堂為辟雍為文廟為祖廟異義明堂制今禮戴説禮盛德記曰明堂自古有之凡有九室室有四户八牖三十六户七十二牖以草蓋屋上圎下方所以朝諸侯其外名曰辟雍明堂月令書説云明堂髙三丈東西九仞南北七筵上圎下方四堂十二室室四户八牖宫方三百步在近郊近郊三十里講學大夫淳于登説明堂在國之陽丙巳之地三里之外七里之內而祀之就陽位上圎下方八窗四闥布政之宫周公祀文王於明堂以配上帝上帝五精之帝太微之庭中有五帝座星其古周禮孝經説明堂文王之廟夏后氏丗室殷人重屋周人明堂東西九筵筵九尺南北七筵堂崇一筵五室凡室二筵蓋之以茅謹桉今禮古禮各以其義説説無明文以知之玄之聞也禮戴所云雖出盛德記及其下顯與本異章九室三十六户七十二牖似秦相吕不韋作春秋時説者所益非古制也四堂十二室字誤本書云九室十二堂淳于登之言取義於援神契援神契説宗祀文王於明堂以配上帝曰明堂者上圎下方八窗四闥布政之宫在國之陽帝者諦也象上可承五精之神五精之神實在太微於辰為巳是以登云然今説立明堂於巳由此為也水木用事交於東北木火用事交於東南火土用事交於中央金土用事交於西南金水用事交於西北周人明堂五室帝一室合於數如鄭此言是明堂用淳于登之説禮戴説而明堂辟雍是一古周禮孝經説以明堂為文王廟又僖五年公既視朝遂登觀臺服氏云人君入太廟視朔告朔天子曰靈臺諸侯曰觀臺在明堂之中又文二年服氏云明堂祖廟並與鄭説不同者案王制云小學在公宫南之左大學在郊又云天子曰辟雍辟雍是學也不得與明堂同為一物又天子宗廟在雉門之外孝經緯云明堂在國之陽又此云聽朔於南門之外是明堂與祖廟別處不得為一也孟子云齊宣王問曰人皆謂我毀明堂孟子對曰夫明堂者王者之堂也王欲行王政則勿毀之矣是王者有明堂諸侯以下皆有廟又知明堂非廟也以此故鄭皆不用具於鄭駮異義也三告朔朝廟三傳説不同案文六年云閏月不告月猶朝于廟公羊云不告月者何不告朔也曷為不告朔天無是月也閏月矣何以謂之天無是月是月非常月也何休云不言朔者閏月無告朔禮也榖梁之義與公羊同左氏則閏月當告朔閏以正時時以作事事以厚生生民之道於是乎在不告閏朔棄時政也許君謹案從左氏説不顯朝廟告朔之異謂朝廟而因告朔故鄭駮之文六年冬閏月不告月猶朝於廟廢其大存其細是以加猶譏之論語曰子貢欲去告朔之餼羊周禮有朝享之禮祭然則告朔與朝廟祭異亦明矣鄭必知告朔與朝廟異者案天子告朔於明堂其朝享從祖廟下至考廟故祭法云曰考廟曰王考廟皆月祭之是也又諸侯告朔在大廟而朝享自皇考至考故祭法云諸侯自皇考以下皆月祭之是告朔與朝廟不同又天子告朔以特牛諸侯告朔以羊其朝享各依四時常禮故用大牢故司尊彞朝享之祭用虎彞蜼彞大尊山尊之等是其別也四閏月居路寢當方之門鄭注大史云於文王在門謂之閏是閏月聽朔於明堂門反居路寢門皇氏云明堂有四門即路寢亦有四門閏月各居其時當方之門義或然也五左右史分職通攝及特置正義曰經云動則左史書之春秋是動作之事故以春秋當左史所書左陽陽主動故記動經云言則右史書之尚書記言誥之事故以尚書當右史所書右是隂隂主靜故也春秋雖有言因動而言其言少也尚書雖有動因言而稱動亦動為少也周禮有五史有內史外史大史小史御史無左史右史之名者熊氏云案周禮大史之職云大師抱天時與大師同車又襄二十五年傳曰大史書曰崔杼弒其君是大史記動作之事在君左廂記事則大史為左史也案周禮內史掌王之八枋其職云凡命諸侯及孤卿大夫則䇿命之僖二十八年左傳曰王命內史叔興父䇿命晉侯為侯伯是皆言誥之事是內史所掌在君之右故為右史是以酒誥云矧大史友內史友鄭注大史內史掌記言記行是內史記言大史記行也此論正法若其有闕則得交相攝代故洛誥史逸命周公伯禽服虔注文十五年傳云史佚周成王大史襄三十年鄭使大史命伯石為卿皆大史主爵命以內史闕故也以此言之若大史有闕則內史亦攝之案覲禮賜諸公奉篋服大史是右者彼亦宣行王命故居右也此論正法若春秋之時則特置左右史官故襄十四年左史謂魏莊子昭十二年楚左史倚相藝文志及六藝論云右史記事左史記言與此正反於傳記不合其義非也六御瞽幾聲以防君失御瞽幾聲之上下御者侍也以瞽人侍側故云御瞽幾聲之上下幾察也瞽人審音察樂聲上下哀樂若政和則樂聲樂政酷則樂聲哀察其哀樂防君之失七諸侯玄冕祭魯與二王後用天子禮諸侯玄端以祭注云祭先君也端亦當為冕字之誤也諸侯祭宗廟之服唯魯與天子同正義曰知祭先君者與上天子龍卷以祭其文相類故知祭先君也云端亦當為冕者以玄端賤於皮辨下文皮辨聽朔於大廟不應玄端以祭先君故知亦當為玄冕云唯魯與天子同者案明堂位云君卷冕立于阼夫人副禕立于房中是也熊氏云此謂祭文王周公之廟得用天子之禮其祭魯公以下則亦玄冕故公羊云周公白牡魯公騂犅羣公不毛是魯公以下與周公異也二王之後祭其先王亦是用以上之服二王之後不得立始封之君廟則祭微子以下亦玄冕八告朔之名有八九周享帝于洛聽朔在文廟諸侯聽朔於大廟熊氏云周之天子于洛邑立明堂唯大享帝就洛邑耳其每月聽朔當在文王廟也以文王廟為明堂制故也此聽朔於大廟榖梁傳云諸侯受于禰廟與禮乖非也凡每月以朔告神謂之告朔即論語云告朔之餼羊是也則于時聽治此月朔之事謂之聽朔此玉藻文是也聽朔又謂之視朔文十六年公四不視朔是也告朔又謂之告月文六年閏月不告月是也行此禮天子於明堂諸侯於大祖廟訖然後祭於諸廟謂之朝享司尊彞云朝享是也又謂之朝廟文六年云猶朝于廟是也又謂之朝正襄二十九年釋不朝正于廟是也又謂之月祭祭法云皆月祭之是也十玄端不得名朝服正義曰案王制云周人玄衣而養老注云玄衣素裳天子之燕服為諸侯朝服彼注云玄衣則此玄端也若以素為裳則是朝服此朝服素裳皆得謂之玄端故論語云端章甫注云端玄端諸侯朝服若上士以玄為裳中士以黃為裳下士以雜色為裳天子諸侯以朱為裳則皆謂之玄端不得名為朝服也十一至八月不雨謂建子月至建未月至于八月不雨君不舉注云為旱變也此謂建子之月不雨盡建未月也春秋之義周之春夏無雨未能成災至其秋秀實之時而無雨則雩雩而得之則書雩喜祀有益也雩而不得則書旱明災成也正義曰案僖十一年榖梁傳云得雨曰雩不得雨曰旱范寧云喜其有益也則春秋經諸書雩皆是得雨不得雨曰旱者僖二十一年夏大旱宣七年秋大旱是也然傳云至秋七月不雨不為災僖二十一年夏大旱則是周之夏也建卯建辰建巳之月而書大旱者至秋仍不雨而追書于夏故云夏大旱十二衣布搢本以下五事為凶年變年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬注云皆為凶年變也君衣布者謂若衛文公大布之衣大帛之冠是也搢本去挺荼佩士笏也士以竹為笏飾本以象關梁不租此周禮也殷則關恆譏而不征列之言遮列也雖不賦猶為之禁不得非時取也造謂作新也正義曰土功不興者謂人食不得滿二釜之歲若人食二釜則猶興土功也故均人云豐年旬用三日中年用二日無年用一日廪人云人食四釜上三釜中二釜下是無年猶有一日之役殷則關恆譏而不征者案王制云關譏而不征譏謂呵察但呵察其非不征稅王制是殷禮十三卜有體色墨坼之占史定墨者凡卜必以墨畫龜求其吉兆若卜從墨而兆廣謂之卜從周禮占人注云墨兆廣也但坼是從墨而裂其旁歧細出謂之為舋坼故占人云君占體大夫占色史占墨卜人占坼注云體兆象也色兆氣也墨兆廣也坼兆舋也是大坼稱為兆廣小坼稱為兆舋也君定體者謂五行之兆象既得兆體君定其體之吉凶尊者視大卑者視小十四史進象笏書思對命將適公所宿齊戒居外寢沐浴史進象笏書思對命注云思所思念將以告君者也對所以對君者也命所受君命也書之於笏為失忘也正義曰史進象笏者史謂大夫亦有史官也熊氏云案下大夫不得有象笏有象字者誤也熊氏又解與朋山賔同云有地大夫故用象皇氏載諸所解皆不同以此為勝故存之耳十五習容觀玉聲揖私朝登車既服習容觀玉聲者既服著朝服巳竟也服竟而私習儀容又觀容聽己佩鳴使玉聲與行步相中適玉佩玉也乃出者習儀竟而出也揖私朝輝如也者私朝大夫自家之朝也輝光儀也大夫行出至已之私朝揖其屬臣輝如也登車則有光矣者揖竟出登所乘之車有光輝也而往適君朝矣十六登席失節為躐席登席不由前為躐席者庾云失節而踐為躐席應從於下升若由前升是躐席也案卿飲酒禮賔席于户西以西頭為下主人席于阼階介席于西階皆北頭為下賔升席自西方注云升由下也十七禮飲不過三爵君子之飲酒也受一爵而色灑如也二爵而言言斯禮巳三爵而油油以退注云灑如肅敬貌灑或為察言言和敬貌斯猶耳也油油説敬貌禮飲過三爵則敬殺可以去矣十八辨齊祭異冠同冠云四命齊祭異冠者謂自祭也若助祭於君則齊祭同冠故鄭志答趙啇問云以雜記云大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於己是為三命以下齊祭異冠何但四命以上也觀注似若但施於已祭不可通之也鄭答云齊祭謂齊時一冠祭時亦一冠四命乃然大夫冕士辨而祭於君齊時服之祭時服之何以亦異如鄭此言是助祭齊祭同冠故云何以亦異若然士之助祭齊服應服爵辨而鄭注旅賁氏云王齊服服衮冕則士之齊服服玄端不服爵辨者熊氏云若士助王祭祀服爵辨若助王受朝覲齊服則服玄端義或然也十九深衣祛縫祍𬒮等制朝玄端夕深衣深衣三祛縫齊倍要祍當旁𬒮可以回肘長中繼掩尺祫二寸祛尺二寸緣廣寸半以帛裏布非禮也注云謂大夫士也三祛者謂要中之數也祛尺二寸圍之為二尺四寸三之七尺二寸縫紩也紩下齊倍要中齊丈四尺四寸縫或為逢或為豐祍謂裳幅所交裂也凡祍者或殺而下或殺而上是以小要取名焉祍屬衣則垂而放之屬裳則縱之以合前後上下相變二尺二寸之節其為長衣中衣則繼𬒮掩一尺若今褎矣深衣則緣而巳曲領也𬒮口也飾邊也中外冝相稱也冕服絲衣也中衣用素皮辨服朝服玄端麻衣也中衣用布正義曰祍謂裳幅所交裂也者裳幅下廣尺二寸上闊六寸狹頭嚮上交裂一幅而為之云凡祍者或殺而下或殺而上者皇氏云言凡祍非一之辭非獨深衣也或殺而下謂喪服之祍廣頭在上狹頭在下或殺而上謂深衣之祍寬頭在下狹頭在上云是以小要取名焉者謂深衣與喪服相對為小要兩旁皆有此祍熊氏大意與皇氏同或殺而下謂朝祭之服耳云祍屬衣則垂而放之者謂喪服及熊氏朝祭之祍云屬裳則縫之以合前後者謂深衣之祍云上下相變者上體是陽陽體舒散故垂而下下體是隂隂主收斂故縫而合之今刪定深衣之上獨得祍名不應假他餘服相對為祍何以知之深衣衣下屬幅而下裳上屬幅而上相對為祍鄭注深衣鉤邊今之曲𥚑則冝一邊而有也但此等無文言之且從先儒之義二十長衣中衣之別長中制同而名異者所施異故也裏中著之則曰中衣若露著之則曰長衣故鄭注深衣目録素紕曰長衣有表謂之中衣十一五方正色間色正義曰玄是天色故為正纁是地色赤黃之雜故為間色皇氏云正謂青赤黃白黑五方正色也不正謂五方間色也緑紅碧紫駵黃是也青是東方正緑是東方間東為木木色青木刻土土黃並以所刻為間故緑色青黃也朱是南方正紅是南方間南為火火赤刻金金白故紅色赤白也白是西方正碧是西方間西為金金白刻木木青故碧色青白也黑是北方正紫是北方間北方水水色黑水刻火火赤故紫色赤黑也黃是中央正駵黃是中央間中央為土土刻水水黑故駵黃之色黃黑也草二冬始裘以秋殺誓衆用黼裘唯君有黼裘以誓省大裘非古也注云僣天子也天子祭上帝則大裘而冕大裘羔裘也黼裘以羔與狐白雜為黼文也省當為獮獮秋田也國君有黼裘誓獮田之禮時大夫又有大裘也正義曰冬始裘而秋云裘者為秋殺始誓衆須威故秋而用黼為裘也草三黃衣為臘先祖之服狐裘黃衣以禓之注云黃衣大蠟時臘先祖之服也孔子曰黃衣狐裘正義曰案郊特牲云黃衣黃冠而祭所以息田夫者文在蠟祭之下又云既蠟而收民息巳是蠟祭之後為息民之祭也此息民謂之臘故月令孟冬云臘先祖五祀是黃衣為臘先祖之服皇氏用白虎通義草四親所不禓君所則禓文質異正義曰凡敬有二體一則父也二則君也父是天性至極以質為敬故子於父母之所不敢袒禓君非血屬以文為敬故臣於君所則禓若平敵以下則亦襲以其質略故也所襲雖同其意異也聘禮行聘致君命亦襲者彼是聘享相對聘質而享文欲文質相變故禓襲不同也草五天子以下笏制及説笏執笏之節笏天子以球玉諸侯以象大夫以魚須文竹士竹本象可也見於天子與射無説笏入大廟説笏非古也小功不説笏當事免則説之既搢必盥雖有執於朝弗有盥矣凡有指畫於君前用笏造受命於君前則書於笏笏畢用也因飾焉笏度二尺有六寸其中博三寸其殺六分而去一注云球美玉也文猶飾也大夫士飾竹以為笏不敢與君並用純物也言凡吉事無所説笏也大廟之中唯君當事説笏也免悲哀哭踊之時不在於記事也小功輕不當事可以搢笏也搢笏輒盥為必執事畢盡也殺猶杼也天子杼上終葵首諸侯不終葵首大夫士又杼其下首廣二寸半正義曰文飾也庾氏云以鮫魚須飾竹以成文士竹本象可也者士以竹為本質以象牙飾其邊緣飾之可也言可者通許之辭案釋地云西北之美者有昆崘虛之璆琳琅玕焉李巡孫炎郭璞等並云璆琳美玉此之球字則與璆同故云球是美玉也云文猶飾也謂以魚須文飾其竹盧云以魚須及文竹為笏非鄭義也云大廟之中唯君當事則説笏也者以臣見君無不執笏明大廟之中雖當事之時亦執笏也君則大廟之中當事之時則説笏時臣驕泰僣效於君當事之時亦説笏故記者明之云臣入大廟當事説笏非古禮也是當時之僣記者據時而言故鄭云唯君當事説笏也必知當事説者以下文云小功不説笏當事免則説之明君入大廟當事則亦説耳凡臣見君皆執笏笏所以記事射所以正威儀獨云見於天子者以天子尊極恐臣下畏懼不敢執笏故特言見於天子明臣下見於君皆然草六凡帶禆紐等制而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組注云而素帶終辟謂諸侯也諸侯不朱裏合素為之如今衣帶為之下天子也大夫亦如之率繂也士以下皆禪不合而繂積如今作幧頭為之也辟讀如禆冕之禆禆謂以繒采飾其側人君充之大夫禆其紐及末士禆其末而巳居士道藝處士也正義曰上下爛脫今一依鄭注以為先後天子素帶朱裏終辟而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組三寸長齊于帶紳長制士三尺有司二尺有五寸子遊曰參分帶下紳居二焉紳韠結三齊大夫大帶四寸雜帶君朱緑大夫玄華士緇辟二寸再繚四寸凡帶有率無針功此等揔論帶之義也今依而解之天子素帶朱裏者以素為帶用朱為裏終辟辟則裨也終竟帶身在要及垂皆禆故云終辟而素帶終辟者謂諸侯也以素為帶不以朱為裏亦用朱緑終禆大夫素帶辟垂者大夫亦用素為帶不終禆但以玄華禆其身之兩旁及屈垂者士練帶率下辟者士用孰帛練為帶其帶用單帛兩邊繂而巳繂謂緶緝也下禆者但士帶垂者必反屈嚮上又垂而下大夫則揔皆禆之士則用緇唯禆嚮下一垂者居士錦帶者用錦為帶尚文也弟子縞帶者用生縞為帶尚質也并紐約用組者并並也紐謂帶之交結之處以屬其紐約者謂以物穿紐約結其帶謂天子以下至弟子之等其所紐約之物並用組為之三寸者謂紐約之組闊三寸也長齊于帶者言約紐組餘長三尺與帶垂者齊紳長制士三尺有司二尺有五寸者紳謂帶之垂者紳重也謂重屈而舒申子遊曰參分帶下紳居二焉記者引子遊之言以證紳之長短人長八尺大帶之下四尺五寸分為三分紳居二分焉紳長三尺也紳韠結三齊者紳謂紳帶韠謂蔽膫結謂約紐餘組三者俱長三尺故云三齊也大夫大帶四寸謂合素為之廣四寸雜帶君朱緑大夫玄華士緇辟者雜猶飾也謂飾帶君用朱緑大夫用玄黃士用緇也士緇辟二寸再繚四寸謂用單練廣二寸繚繞也再度繞要亦四寸也凡帶有率無針功者凡帶謂有司之帶有繂謂其帶既禪亦以針緶緝其側但繂褶之而巳草七凡韠以韋必象裳色韠君朱大夫素士爵韋注云此玄端服之韠也韠之言蔽也凡韠以韋為之必象裳色裳色則天子諸侯玄端朱裳大夫素裳唯士玄裳黃裳雜裳也皮辨服皆素韠草八命婦衣服由后夫人所命君命屈狄再命禕衣一命禪衣士緣衣唯丗婦命於奠繭其他則皆從男子注云君女君也屈周禮作闕謂刻繒為翟不畫也此子男之夫人及其卿大夫士之妻命服也禕當為鞠字之誤也禮天子諸侯命其臣后夫人亦命其妻以衣服所謂夫尊於朝妻榮於室也子男之卿再命而妻鞠衣則鞠衣禪衣禒衣者諸侯之臣皆分為三等其妻以次受此服也公之臣孤為上卿大夫次之士次之侯伯子男之臣卿為上大夫次之士次之禒或作稅奠猶獻也凡丗婦巳下蠶事畢獻繭乃命之以其服天子之后夫人九嬪及諸侯之夫人夫在其位則妻得服其服矣正義曰再命禕衣者再命謂子男之卿禕當為鞠謂子男卿妻服鞠衣也一命禪衣者禪展也子男大夫一命其妻服展衣也士禒衣者謂子男之士不命其妻服禒衣鄭注云喪禮禒之言緣黑衣裳以赤緣之唯丗婦命於奠繭者丗婦謂天子二十七丗婦以下也奠獻也獻繭謂丗婦及命婦入助蠶畢獻繭也凡夫尊於朝妻貴於室皆得各服其命服今唯丗婦及卿大夫之妻並畢雖巳𬒳命猶不得即服命服必又須經入助蠶蠶畢獻繭繭多功大更須君親命之著服乃得服耳故云命於奠繭其他則皆從男子者其他謂后夫人九嬪及五等諸侯之妻也其夫得命則其妻得著命服不須奠繭之命故云皆從男子草九魯與二王後夫人亦禕衣云王者之後夫人亦禕衣者以禮記每云君衮冕夫人副禕王者之後自行正朔與天子同故祭其先王服上服也若祭先公則降焉魯祭文王周公其夫人亦禕衣故明堂位云君衮冕立于阼夫人副禕立于房中三十女君有二義正義曰以禮君命其夫后命其婦則子男之妻不得受天子之命故以為君謂女君是子男之妻受后之命或可女君謂后也命子男妻故云君命三一公諱私諱及不諱大夫所有公諱無私諱凡祭不諱廟中不諱教學臨文不諱注云公諱若言語所辟先君之名謂祝嘏之辭中有先君之名者也凡祭祭羣神廟中上不諱下為惑未知者正義曰有公諱無私諱者謂士及大夫言但諱君家不自私諱父母也崔氏云謂伯叔之諱耳若至親則不得言庾氏謂士與大夫言有音字同巳祖禰名字皆不得諱辟敬大夫故不重敬卅二門內外行趍歌樂之節正義曰路寢門內至堂謂之行於行之時則歌肆夏之樂案爾雅釋宫云室中謂之時堂上謂之行堂下謂之步門外謂之趍中庭謂之走大路謂之奔此對文耳若揔而言之門內謂之行門外謂之趍鄭注樂師云行謂於大寢之中趍謂於朝庭然則王出既服至堂而肆夏作出路門而采薺作其反入至於應門路門亦如之此謂步迎賔客王如有車出之事登車於大寢西階之前反降於阼階之前尚書傳曰天子將出撞黃鐘之鐘右五鐘皆應入則撞蕤賔之鐘左五鐘皆應是也卅三鸞在衡和在式田車則鸞在鑣正義曰鸞在衡和在式韓詩外傳文也若鄭康成之意此謂平常所乘之車也若田獵之車則鸞在馬鑣也故注秦詩云置鸞於鑣異於乘車鄭於秦詩既己明言故於毛詩傳云在軾曰和在鑣曰鸞鄭不復易毛也又於啇頌箋云鸞在鑣同毛氏卅四孔子謙不佩德佩事佩而佩象環孔子佩象環五寸而綦組綬孔子以象牙為環廣五寸以綦組為綬也所以然者失魯司寇故謙不復佩德佩及事佩示己無德事也佩象環者象牙有文理言巳有文章也而為環者示己文教所循環無窮也五寸法五行也言文教成人如五行成物也卅五童子尚華緣紳紐皆以錦錦緣錦紳并紐者謂用錦為緇布衣之緣又用錦為紳帶并約帶之紐皆用錦也錦束髮者以錦為總而束髮也皆朱錦也者言童子所用之錦皆用朱色之錦童子尚華示將成人有文德故皆用錦示一文一質之義也三六有慶非君賜不賀有慶非君賜不賀者有慶謂或宗族親戚燕飲聚會雖吉不相賀不足為榮故也唯受君之賜為榮故相拜賀三七稽首據掌君賜稽首據掌致諸地注云致首於地據掌以左手覆案右手也正義曰稽首者頭至地據掌者據案也謂郤右手而覆左手案於右手之上也三八膳有葷桃茢膳於君有葷桃茢者美食曰膳謂天子諸侯之臣獻孰食於君法也恐邪氣干犯故用辟凶邪之物覆之葷謂薑之屬也桃桃枝也茢菼帚也三九父手澤母口澤不能謂不忍父沒之後而不忍讀父之書謂其書有父平生所持手之潤澤存在焉故不忍讀也母沒之後母之杯圈不忍用之飲焉謂母平生口飲潤澤之氣在在焉故不忍用之經云不能者謂不能忍為此事四十圈豚頥霤剡剡起屨之節圈豚行者此釋上徐趨之形也圈轉也豚循也言徐趨法曳轉足循地而行也不舉足者謂足不離地齊如流者齊裳下緝也足既不舉身又俯折則裳下委地曳足如水流狀也端行頥霤如失者此一經覆上疾趨之節也端行謂直身而行也頥霤者行既疾身乃小折而頭直俯臨前頥如屋霤之垂也如矢者矢箭也身趨前進不邪如箭也辨行者辨急也既是疾趨冝急行也剡剡起屨者剡剡身起貌也急行欲速而身屨恆起也四一君子之容至燕居凡十有三君子之容舒遲見所尊者齊遬足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德色容莊坐如尸燕居告溫溫注云謙慤貌也遬猶蹙蹙也舉欲遲也髙且正也不睇視也不妄動也不噦咳也不傾顧也似不息也如有豫也勃如戰色尸居神位敬愼也告謂教使也詩云溫溫恭人四二盛氣揚休揚陽同盛氣顚實揚休注云顚讀為闐揚讀為陽聲之誤也盛身中之氣使之闐滿其息若陽氣之休物也四三豫余古今字其義同凡自稱天子曰豫一人者案曲禮下云天子曰余一人豫余不同者鄭注曲禮云余豫古今字耳蓋古稱豫今稱余其義同此云自稱曲禮注云擯者辭則天子與臣下言及遣擯者接諸侯皆稱豫一人四四大聘是卿小聘是大夫正義曰案聘禮及竟張旜周禮孤卿建旜故知大聘使卿聘禮又云小聘曰問其禮如為介案大聘大夫為上介今云如其為介故知小聘是大夫也禮記要義卷第十三
