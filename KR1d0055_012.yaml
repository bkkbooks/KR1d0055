front:
  text: 禮記要義卷第十三玉藻一鄭謂西都宫室如諸侯制諸儒疑之朝事儀云朝日東郊故東門是國城東郊之門也孝經緯云明堂在國之陽又異義淳于登説明堂在三里之外七里之內故知南門亦謂國城南門也云天子廟及路寢皆如明堂制者案考工記云夏后氏丗室鄭注云謂宗廟殷人重屋注云謂正寢也周人明堂鄭云三代各舉其一明其制同也又周書亦云宗廟路寢明堂其制同又案明堂位大廟天子明堂魯之大廟如明堂則知天子大廟亦如明堂也然大廟路寢既如明堂則路寢之制上有五室不得有房而顧命有東房西房又鄭注樂記云文王之廟為明堂制案覲禮朝諸侯在文王廟而記云凡俟于東箱者鄭答趙啇云成王崩時在西都文王遷豐鎬作靈臺辟雍而巳其餘猶諸侯制度焉故知此喪禮設衣物有夾有房也周公攝政制禮作樂乃立明堂於王城如鄭此言是成王崩時路寢猶如諸侯之制故有左右房也覲禮在文王之廟而記云凡俟于東箱者是記人之説誤耳或可文王之廟不如明堂制但有東房西房故魯之大廟如文王廟明堂經云君卷冕立于阼夫人副禕立于房中是也樂記注稱文王之廟如明堂制有制字者誤也然西都宫室既如諸侯制案詩斯于云西南其户箋云路寢制如明堂是宣王之時在鎬京而云路寢制如明堂則西都宫室如明堂也故張逸疑而致問鄭答之云周公制干土中洛誥云王入大室祼是顧命成王崩於鎬京承先王宫室耳宣王承亂又不能如周公之制如鄭此言則成王崩時因先王舊宫室至康王巳後所營依天子制度至宣王之時承亂之後所營宫室還依天子制度路寢如明堂也不復能如周公之時先王之宫室也若然宣王之後路寢制如明堂案詩王風右招我由房鄭答張逸云路寢房中所用男子而路寢又有左右房者劉氏云謂路寢下之燕寢故有房也熊氏云平王微弱路寢不得如明堂也愚按諸家皆望文為義
