  text: 禮記要義卷第二十九問喪至深衣
  hash: sha256:bbfdca74fb70375e3a6616f6775711e5c37ccf36f95a76a98a144829d155fdc2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_028-1a}
body:
  text: 一𥘉喪之節親始死鷄斯徒跣扱上祍交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里爲之麋粥以飲食之注云親父母也鷄斯當爲䈂纚聲之誤也親始死去冠二日乃去䈂纚括髮也今時始喪者邪巾貊頭䈂纚之存象也徒猶空也上祍深衣之裳前五藏者腎在下肝在中肺在上舉三者之焦傷而心脾在其中矣五家爲鄰五鄰爲里二袒踊爵踊送形迎精之節悲哀志懣氣盛故袒而踊之所以動體安心下氣也婦人不宜袒故發胸擊心爵踊殷殷田田如壞墻然悲哀痛疾之至也故曰辟踊哭泣哀以送之送形而徃迎精而反注云故袒而踊之言聖人制法故使人然也爵踊足不絶地辟拊心也哀以送之謂葬時也迎其精神而反謂反哭及日中而虞也三冠者不肉袒肉袒則著免或問曰冠者不肉袒何也曰冠至尊也不居肉袒之體也故爲之免以代之也注云怪冠衣之相爲也言身無飾者不敢冠冠爲䙝尊服肉袒則著免免狀如冠而廣一寸四童子當室則杖而免或問曰免者以何爲也曰不冠者之所服也禮曰童子不緦唯當室緦緦者其免也當室則免而杖矣注云怪本所爲施也不冠者猶未冠也當室謂無父兄而主家者也童子不杖不杖者不免當室則杖而免免冠之細別以次成人也緦者其免也言免乃有緦服也五三秊之喪旣練期旣葬差相似三年之喪旣練矣有期之喪旣葬矣則帶其故葛帶絰期之絰服其功衰有大功之喪亦如之小功無變也注云帶其故葛帶者三年旣練期旣葬差相似也絰期之葛絰三年旣練首絰除矣爲父旣練衰七升母旣葬衰八升凡齊衰旣葬衰或八升或九升服其功衰服麤衰大功之麻變三年之練葛期旣葬之葛帶小於練之葛帶又當有絰亦反服其故葛帶絰期之絰差之宜也此雖變麻服葛大小同耳亦服其功衰凡三年之喪旣練始遭齊衰大功之䘮絰帶皆麻無所變於大功齊斬之服不用輕累重也六君之母非夫人則羣臣無服君之母非夫人則羣臣無服唯近臣及僕驂乗從服唯君所服服也注云妾先君所不服也禮庶子爲後爲其母緦言唯君所服伸君也春秋之義有以小君服之者時若小君在則益不可正義曰妾先君所不服也天子諸侯爲妾無服唯大夫爲貴妾服緦故知妾先君所不服云禮庶子爲後其母緦者案喪服緦麻章云庶子爲父後者爲其母是也云言唯君所服伸君也者若其不爲後則爲母無服故喪服記云公子爲其母練冠麻衣縓縁今以爲君得著緦麻服是伸君之尊也君旣服緦是近臣得從君服也此謂禮之正法云春秋之義有以小君服之者鄭旣以正禮言之又引春秋之時不依正禮者有以爲小君之服服其妾母者是文公四年夫人風氏薨是僖公之母成風也又昭十一年夫人歸氏薨是昭公之母齊歸也皆亂丗之法非正禮也案異義云妾子立爲君得尊其母立以爲夫人否今春秋公羊旣說妾子立爲君母得稱夫人故上堂稱妾屈於適也下堂稱夫人尊於國也云子不得爵命父妾子爲君得爵命其母者以妾在奉授於尊者有所因縁故也榖梁傳曰魯僖公立妾母成風爲夫人是子爵於母以妾爲妻非禮也故春秋左氏說成風妾得立爲夫人母以子貴禮也許君謹案舜爲天子瞽瞍爲士起於士庶者子不得爵父母也至於魯僖公得尊母成風爲小君經無譏文從公羊左氏之說鄭則從榖梁之說故異義駮云父爲長子三年爲衆子期明無二適也女君卒繼攝其事耳不得復立爲夫人如鄭駮之言則此云春秋小君服之者是灼然非禮也云時若小君在則益不可者其小君無而以夫人服之巳爲不可今小君旣在而以夫人服妾母彌益不可十一外宗之女有三内宗有二熊氏云凡外宗有三案周禮外宗之女有爵通卿大夫之妻一也雜記云外宗爲君夫人猶内宗是君之姑姉妺之女舅之女從母之女皆爲諸侯服斬爲夫人服期是二也此文外宗是諸侯外宗之婦也若姑之子婦從母之子婦其夫是君之外親爲君服斬其婦亦名外宗爲君服期是三也内宗有二者案周禮云内女之有爵謂其同姓之女悉是一也雜記云内宗者是君之五屬之内女是二也引喪大記曰外宗房中南靣者證外宗之義也十二禫而飲醴酒食乾肉又期而大祥有醯醬者謂至大祥之節食醯醬則小祥食菜果之時但用鹽酪也若不能食者小祥食菜果之時得用醯醬也故喪大記云小祥食菜果以醯醬中月而禫禫而飲醴酒又云食肉者先食乾肉喪大記云祥而食肉者異人之說故不同也注先飲醴酒食乾肉者不忍發御厚味正義曰以醴酒味薄乾肉又澁所以先食之者以喪服除孝子不忍發𥘉御醇厚之味故飲醴酒食乾肉也十三有事其縷無事其布曰緦有事其縷無事其布曰緦者以三月之喪治其麻縷其細如緦故云緦麻以朝服十五升抽去其半縷細而䟽也有事其縷事謂鍜治其布纑縷也無事其布謂織布旣成不鍜治其布以哀在外故也十四冠衰升數及練以後除脫之差斬衰三升者此明父母之喪𥘉死至練冠衰升數之變并明練後除脫之差也受以成布六升者以言三升四升五升之布其縷旣麤䟽未爲成布也六升以下其縷漸細與吉布相參故稱成布也葛帶三重者謂男子也旣虞卒哭受服之節要中之帶以葛代麻帶又差小於前以五分去一唯有四分見在三重謂作四股糾之積而相重四股則三重未受服之前麻帶爲兩股相合也此直云葛帶三重則首絰雖葛不三重也猶兩股糾之也期而小祥練冠縓縁者父没爲母與父同也至小祥又以卒哭後冠受其衰而用練易其冠也又練爲中衣以縓爲領縁也又期而大祥素縞麻衣者謂二十五月大祥祭此日除脫則首服素冠以縞紕之身著朝服而爲大祥之祭祭訖之後而哀情未除更反服微凶之服首著縞冠以素紕之身著十五升麻深衣未有采縁故云大祥素縞麻衣也中月而禫者中間也大祥之後更間一月而爲禫祭二十五月大祥二十七月而禫禫而纎者禫祭之時玄冠朝服禫祭旣訖而首著纎冠身着素端黃裳以至吉祭無所不佩者吉祭之時身㝷常吉服平常所服之物無不佩也十五鄭釋至親以期斷未盡經意何以至期也曰至親以期斷注曰言三年之義如此則何以有降至於期也期者謂爲人後者父在爲母也言服之正雖在親皆期而除也正義曰鄭意以三年之䘮何以有降至於期者故云爲人後者爲夲生之父母及父在爲母期事故抑屈應降至九月十月何以必至於期以其夲至親不可降期以下故雖降屈猶至於期今檢㝷經意父母本應三年何以至期者但問其一期應除之義故答曰至親期斷是明一期可除之節故禮期而練男子除絰婦人除帶下文云加隆故至三年是經意不據爲人後及父在爲母期鄭之此釋恐未盡經意但旣祖鄭學今因而釋之十六三秊喪未知所由來故三年之喪人道之至文者也夫是之謂至隆是百王之所同古今之所壹也未有知其所由來者也注云言三年之喪喪禮之最盛也不知其所從來喻此三年之喪前丗行之乆矣正義曰案易繫辭云古之葬者厚衣之以薪葬之中野不封不樹䘮期無數尚書云百姓如䘮考妣三載此云不知所由來者但上古云䘮期無數謂無葬練祥之數其䘮父母之哀猶三年也故堯崩云如䘮考妣三載則知堯以前䘮考妣巳三年但不知定在何時其䘮服所起則黃帝堯舜之時雖有衣裳仍未有䘮服也但唐虞巳前䘮服與吉服同皆以白布爲之故郊特牲云大古冠布齊則緇之若不齊則皆用白布也鄭注䘮服其冠衰之異從三代以下由唐虞以上曰大古吉㐫皆用白布則知三代吉㐫異也十八深衣長衣中衣之別案鄭目録云名曰深衣者以其記深衣之制也深衣連衣裳而純之以采者素純曰長衣有表則謂之中衣大夫以上祭服之中衣用素詩云素衣朱襮玉藻曰以帛裏布非禮也士祭以朝服中衣以布明矣此於別録屬制度鄭云大夫以上祭服中衣用素者謂天子大夫以其四命與公之孤同爵弁自祭故中衣用素云士祭以朝服中衣以布者亦謂天子之士與諸侯大夫同案少牢諸侯大夫祭以朝服故天子之士亦祭以朝服朝服用布故中衣以布其諸侯之士自祭以玄端玄端則朝服之衣但其裳異耳中衣亦用布也案詩云素衣朱襮晉人欲薦桓叔桓叔大夫得用素衣者國人以國君之禮待之故欲薦素衣也其長衣中衣及深衣其制度同玉藻云長中繼揜尺若深衣則縁而已下云縁廣寸半凡深衣皆用諸侯大夫士夕時所着之服故玉藻云朝玄端夕深衣庶人吉服亦深衣皆著之在表也其中衣在朝服祭服䘮服之下知䘮服亦有中衣者檀弓云練衣黃裏注云練中衣以黃爲内是也但䘮服中衣不得繼揜尺也故䘮服儀云帶縁各視其冠注云縁如深衣之縁是䘮服中衣用深衣則深衣縁之以采故下云具父母大父母衣純以繢以青之屬也唯孤子深衣純以素但以縁而巳不與長衣同其吉服中衣亦以采縁其諸侯得綃黼爲領丹朱爲縁郊特牲云綃黼丹朱中衣大夫之僣禮則知大夫士不用綃黼丹朱但用采純而已矣無文以明之其長衣以素縁知者若以采縁則與吉服中衣同故知以素縁也若以布縁則曰麻衣知用布縁者以其稱麻衣故知也其䘮服之中衣其純用布視冠布之麤細至葬可以用素縁也練則用縓也其詩麻衣則與此別彼謂吉服之衣也所以此稱深衣者以餘服則上衣下裳不相連此深衣衣裳相連𬒳體深䆳故謂之深衣二四深衣應規矩繩權衡古者深衣蓋有制度以應規矩繩權衡短毋見膚長毋𬒳土續祍鉤邊要縫半下袼之髙下可以運肘𬒮之長短反詘之及肘注云言聖人制事必有法度衣取蔽形爲汙辱也續猶屬也祍在裳旁者也屬連之不殊裳前後也鉤讀如鳥啄必鉤之鉤鉤邊若今曲𥚑也續或爲𥙿三分要中減一以益下下宜寛也要或爲優肘不能不岀入袼衣𬒮當掖之縫也𬒮屬幅於衣詘而至肘當臂中爲節臂骨上下各尺二寸則𬒮肘以前尺二寸肘或爲腕二五同上𬒮圜以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平注云圜謂胡下也祫交領也古者方領如今小兒衣領繩謂裻與後幅相當之縫也踝踉也齊緝二六完且弗費善衣之次完且弗費善衣之次也注云完且弗費言可苦衣而易有也深衣者用十五升布鍜濯灰治純之以采善衣朝祭之服也自士以上深衣爲之次庶人吉服深衣而巳二七純縁之飾具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純𬒮縁純邊廣各寸半注云尊者存以多飾爲孝繢畫文也三十巳下無父稱孤純謂縁之也縁𬒮謂其口也縁緆也縁邊衣裳之側廣各寸半則表裏共三寸矣唯祫廣二寸陸云鄭注旣夕禮飾衣領𬒮口曰純裳邊側曰綼下曰緆以豉反又音錫二八釋續衽鈎邉正義曰衽當旁者凡深衣之裳十二幅皆寛頭在下狹頭在上皆似小要之衽是前後左右皆有祍也今云祍當旁者所續之祍當身之一旁非爲餘祍悉當旁也云屬連之不殊裳前後也若其䘮服其裳前三幅後四幅各自爲之不相連也今深衣裳一旁則連之相著一旁則有曲𥚑掩之與相連無異故云屬連之不殊裳前後也云鉤讀如鳥喙必鉤之鉤者案援神契云象鼻必卷長鳥喙必鉤鄭據此讀之也云若今曲𥚑也鄭以後漢之時裳有曲𥚑故以續祍鉤邊似漢時曲𥚑今時朱衣朝服從後漢明帝所爲則鄭云今曲𥚑者是今朝服之曲𥚑也其衣之衽巳於玉藻釋之二九要縫半下畔當七尺二寸要縫謂要中之縫尺寸闊狹半下畔之闊下畔一丈四尺四寸則要縫半之七尺二寸三十三分要中減一以益下正義曰此據裳之一幅分爲二幅凡布廣二尺二寸四寸爲縫一尺八寸在三分之一分爲六寸減此六寸以益於下是下二幅有二尺四寸上二幅有一尺二寸故云三分要中減一以益下下容舉足而行故宜寛也三一袼之髙下可以運肘袼之髙下可以運肘袼謂當臂之處𬒮中髙下宜寛大可以運動其肘𬒮二尺二寸肘尺二寸是容運肘也𬒮之長短反詘之及肘者袂長二尺二寸并縁寸半爲二尺三寸半除去其縫之所殺各一寸餘有二尺一寸半在從肩至手二尺四寸今二尺一寸半之袂得反詘及肘者以𬒮屬於衣幅闊二尺二寸身脊至肩但尺一寸也從肩覆臂又尺一寸是衣幅之畔覆臂將盡今又屬𬒮於衣又二尺一寸半故反詘其𬒮得及於肘也三二深衣帶下於朝祭服之帶當無骨者帶若當骨則緩急難中故當無骨之處此深衣帶下於朝祭服之帶也朝祭之帶則近上故玉藻云三分帶下紳居二焉是自帶以下四尺五寸也三三方領似漢擁咽古者方領正義曰鄭以漢時領皆嚮下交垂故云古者方領似今擁咽故云若今小兒衣領但方折之也三四負繩抱方以直其政方其義負繩抱方者以直其政方其義也負繩背之縫也抱方領之方也以直其政解負繩以方其義解抱方也言欲使人直其政教欲使政教直方其義欲使義事方正也三五直方地之性言坤二得中氣案鄭注坤之六二云直也方也地之性此爻得中氣而在地上自然之性廣生萬物故生動直而且方三六深衣士服之次庻人之吉服䘮服麻衣雖似深衣之制不必鍛濯灰治以其雜凶故也云自士以上深衣爲之次者案玉藻諸侯夕深衣祭牢肉又大夫士朝玄端夕深衣是深衣爲朝祭之次服也云庶人吉服深衣者深衣是諸侯之下自深衣以後更無餘服故知是庶人之吉服䘮服有衰裳包貴賤上下無差亦明庶人吉服乃深衣也三七縁純表裏共三寸純𬒮縁純邊廣各寸半者純𬒮者純縁也謂純其𬒮縁則𬒮口也又云縁讀爲緆謂深衣之下純也純邊者謂深衣之旁側也廣各寸半者言純𬒮口及裳下之緆井純旁邊其廣各寸半言表裏合爲三寸三八再釋純縁綼緆純𬒮則是縁其𬒮口也非是口外更有縁也故分明言之云縁緆也解經縁字讀爲緆謂深衣下畔也故旣夕禮云明衣縓綼緆鄭注云在幅曰綼在下曰緆今經云此緆則深衣之下縁也云縁邊衣裳之側解經純邊也深衣外衿之邊有縁也裳雖前後相連然外邊曲𥚑揜處其側亦有縁也禮記要義卷第二十九
