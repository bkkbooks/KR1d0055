front:
  text: 禮記要義卷第十四明堂位
  hash: sha256:e99fa11fde2f8dcc0502cc562f2d10304a29c3e71be3f92535f4e50d57f7d308
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_013-1a}
body:
  text: 一鄭氏以周公稱天子稱王昔者周公朝諸侯于明堂之位天子負斧依南鄉而立注云周公攝王位以明堂之禮儀朝諸侯也不於宗廟辟王也天子周公也負之言背也斧依為斧文屏風於户牖之間周公於前立焉正義曰以周公朝諸侯居天子位故云天子周公也故大誥云王若曰鄭云王謂周公居攝命大事則權稱王也王肅以為稱成王命故稱王與鄭異也王肅以家語之文武王萠成王年十三鄭康成用衛宏之說武王崩時成王年十歲與王肅異也二明堂更無重門但有應門正門謂之應門者以明堂更無重門非路門外之應門以爾雅釋宫云正門謂之應門李巡云宫中南嚮大門應門也應是當也以當朝正門故謂之應門但天子宫內有路寢故應門之內有路門明堂既無路寢故無路門及以外諸門但有應門耳云二佰師諸侯而入者案顧命畢公率東方諸侯入應門右召公率西方諸侯入應門左是也三孔鄭論成王之年不同周公制禮攝政孔鄭不同孔以武王崩成王年十三至明年攝政管叔等流言故金縢云武王既喪管叔及其群弟流言於國曰公將不利於孺子時成王年十四即位攝政之元年周公東征管蔡後二年克之故金縢云周公居東二年則罪人斯得除往年時成王年十六攝政之三年也故詩序云周公東征三年而歸攝政七年營洛邑封康叔而致政時成王年二十故孔注洛誥以時成王年二十是也鄭則以為武王崩成王年十歲周書以武王十二月崩至成王年十二十二月喪畢成主將即位稱巳小求攝周公將代之管蔡等流言周公懼之辭居東都故金縢云武王既喪管叔等流言周公乃告二公曰我之不辟無以告我先王既喪謂喪服除辟謂辟居東都時成王年十三明年成王盡執拘周公屬黨故金縢云周公居東二年則罪人斯得罪人謂周公屬黨也時成王年十四至明年秋大熟有雷風之異故鄭注金縢云秋大熟謂二年之後明年秋迎周公而反反則居攝之元年時成王年十五書傳所謂一年救亂明年誅武庚管蔡等書傳所謂二年克殷明年自奄而還書傳所謂三年踐奄四年封康叔書傳所謂四年建侯衛時成王年十八也故康誥云孟侯書傳云天子大子十八稱孟侯明年營洛邑故書傳云五年營成周六年制禮作樂七年致政於成王時成王年二十一明年乃即政時年二十二也禮既是鄭學故具詳焉五魯受上公之封加附庸凡方七百里是以封周公於曲阜地方七百里革車千乘注云曲阜魯地上公之封地方五百里加魯以四等之附庸方百里者二十四并五五二十五積四十九開方之得七百里革車兵車也兵車千乘成國之賦也詩魯頌曰王謂叔父建爾元子俾侯于魯大啓爾宇為周室輔乃命魯公俾侯于東錫之山川土田附庸又曰公車千乘朱英緑縢正義曰案費誓序云魯侯伯禽宅曲阜又案定四年左傳封於少皡之虛臣瓉注漢書云魯城內有曲阜逶迤長八九里云加魯以四等之附庸者魯受上公五百里之封又加四等附庸四等謂侯伯子男也案大司徒注云公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同揔為二十四同同謂百里也既受五百里之封五五二十五為二十五同又加二十四同故云積四十九開方計之得七百里云兵車千乘成國之賦也者案左傳云成國不過半天子之軍案論語千乘之賦居地方三百二十六里有畸諸侯之地三百里而下未成國也公則五百里侯四百里計地餘有千乘故謂之成國六魯郊以孟春建子之月是以魯君孟春乘大路載弧韣旗十有二旒日月之章祀帝于郊配以后稷天子之禮也注云孟春建子之月魯之始郊日以至大路殷之祭天車也弧旌旗所以張幅也其衣曰韣天子之旌旗畫日月帝謂蒼帝靈威仰也昊天上帝魯不祭七魯夫人得服王后之上服君卷冕立于阼夫人副禕立于房中注云副首飾也今之步搖是也詩云副笄六珈周禮追師掌王后之首服為副禕王后之上服唯魯及王者之後夫人服之諸侯夫人則自揄翟而下八天子之廟飾山節藻梲復廟重檐刮楹逹鄉反玷出尊崇玷康圭疏屏天子之廟飾也注云山節刻欂盧為山也藻梲畫侏儒柱為藻文也復廟重屋也重檐重承壁材也刮刮摩也鄉牖屬謂夾户窗也每室八窗為四逹反玷反爵之玷也出尊當尊南也唯兩君為好既獻反爵於其上禮君尊于兩楹之間崇髙也康讀為亢龍之亢又為髙玷亢所受圭奠于上焉屏謂之樹今浮思也刻之為雲氣蟲獸如今闕上為之矣九文丗室武丗室魯公之廟文丗室也武公之廟武丗室也注云此二廟象周有文王武王之廟也丗室者不毀之名也魯公伯禽也武公伯禽之玄孫也名敖十記魯禮者近誣是故魯王禮也天下傳之久矣君臣未嘗相弒也禮樂刑法政俗末嘗相變也天下以為有道之國是故天下資禮樂焉注云王禮天子之禮也傳傳丗也資取也此蓋盛周公之德耳春秋時魯三君弒又士之有誄由莊公始婦人髽而弔始於臺駘云君臣未嘗相弒政俗未嘗相變亦近誣矣十一魯常以春朝闕春祭正義曰云魯在東方者朝恆用春當朝之年以朝闕祭云王東巡守以春者鄭既明朝時闕春祭又明王巡守之時魯亦闕春祭巡守在於二月不於正月祭者皇氏云諸侯預前待於竟故不得正月祭也十二魯不得盡如天子之禮正義曰言廟及門如天子之制也者謂制度髙大如似天子耳不必事事皆同故前文祭天不得祭圎丘又郊特牲祭天服衮冕不服大裘是不得盡如天子記者美之云天子之禮耳是知魯之大廟不可一一似明堂也云天子五門臯庫雉應路者此經云天子皋門天子應門是天子有臯門應門顧命有畢門畢門則路門也是天子有路門此經魯有庫門雉門明天子亦有五門云魯有庫雉路則諸侯三門與者此經有庫門雉門又檀弓云魯莊公之喪既葬而絰不入庫門定二年雉門災是魯有庫雉則又有路門可知魯既有三門則餘諸侯亦有三門故云諸侯三門與但其餘諸侯有臯門應門及路門也十三蒲勺刻勺為鳬頭周以蒲勺者皇氏云蒲謂合蒲當刻勺為鳬頭其口微開如蒲草本合而末微開也十四美武丗室非實辭正義曰案成六年立武宫公羊左氏並譏之不冝立也又武公之廟立在武公卒後其廟不毀在成公之時此記所云美成王褒崇魯國而巳云武公之廟武丗室者作記之人因成王褒魯遂盛美魯家之事因武公其廟不毀遂連文而美之非實辭也故下云君臣未嘗相弒禮樂刑法政俗未嘗相變也鄭云亦近誣矣是不實也十五鄭注論語瑚璉與此異鄭注論語云夏曰瑚殷曰璉不同者皇氏云鄭注論語誤也此言兩敦四璉六瑚八簋禮記要義卷第十四
