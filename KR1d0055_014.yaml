front:
  text: 禮記要義卷第十五喪服小記
  hash: sha256:c41b328d34169c5006aab29fa2f99550d3e0b0535a08b758ed55e4f0585ecc92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_014-1a}
body:
  text: 一為父為母括髮同拜賔後則異斬衰括髮以麻為母括髮以麻免而以布齊衰惡笄以終喪注云母服輕至免可以布代麻也為母又哭而免笄所以卷髮帶所以持身也婦人質於喪所以自卷持者有除無變正義曰斬衰者主人為父之服也括髮者為父未成服之前所服也禮親始死子布深衣去冠而猶有笄縰徒跣扱上祍至將小斂去笄縱著素冠視斂斂訖投冠而括髮括髮者鄭注喪服云括髮以麻者自項以前交於額上卻繞紒如著幓頭焉為母括髮以麻者為母𥘉喪至小斂後括髮與父禮同故亦云括髮以麻也免而以布者此謂為母與父異者也亦自小斂後而括髮至尸出堂子拜賔事之時猶與為父不異至拜賔竟後子往即堂下之位時則異也若為父此時猶括髮而踊襲絰帶以至大斂而成服若母喪於此時則不復括髮乃著布免踊而襲絰帶以至成服故云免而以布也注母服至而免正義曰又哭是小斂拜賔竟後即堂下位哭踊時也故士喪禮云卒小斂主人括髮袒此是𥘉括髮哭踊之時也又云男女奉尸侇于堂訖主人降自西階東即位主人拜賔即位踊襲絰于序東復位此是又哭之節若為父於此時猶括髮若為母於此時以免代括髮故云為母又哭而免二男女冠笄免髽之制之時吉時男子首有吉冠則女首有吉笄是明男女首飾之異故云男子冠而婦人笄若親始死男去冠女則去笄若成服為父男則六升布為冠女則箭篠為笄為母男則七升布為冠女則榛木為笄故云男子冠而婦人笄也男子免而婦人髽也吉時首飾既異今遭齊衰之喪首飾亦別當襲斂之節男子著免婦人著髽故云男子免而婦人髽免者鄭注士喪禮云以布廣一寸自項中而前交於額上卻繞紒也如著幓頭矣髽者形有多種有麻有布有露紒也其形有異同謂之髽也今辨男女並何時應著此免髽之服男子之免乃有兩時而唯一種婦人之髽則有三別其麻髽之形與括髮如一其著之以對男子括髮時也前去斬衰括髮以麻則婦人于時髽亦用麻也何以知然案喪服女子子在室為父髽衰三年鄭玄云髽露紒也猶男子之括髮斬衰括髮以麻則髽亦用麻以麻者自項而前交於額上郤繞紒如著幓頭焉依如彼注既云猶男子括髮男子括髮先去冠縰用麻婦人亦去笄縰用麻故云猶也又同云用麻不辨括髮形異則知其形如一也以此證據則知有麻髽以對男括髮時也又知有布髽者案此云男子免對婦人髽男免既用布則婦人髽不容用麻也是知男子為母免時則婦人布髽也又若成服後男或對賔必踊免則婦人理自布髽對之知有露紒髽者喪服傳云布總箭笄髽衰三年明知此服並以三年三年之內男不恆免則婦人不用布髽故知恆露紒也故鄭注喪服云髽露紒也且喪服所明皆是成服後不論未成服麻布髽也何以知然喪服既不論男子之括免則不容說女服之未成義也既言髽衰三年益知恆髽是露紒也又就齊衰輕期髽無麻布何以知然案檀弓南宫縚之妻之姑之喪夫子誨之髽曰爾無總總爾爾無扈扈爾是但戒其髙大不云有麻布別物是知露紒悉名髽也又案奔喪云婦人奔喪束髽鄭云謂姑姊妹女子子也去纚大紒曰髽若如鄭旨既謂是姑姊妹女子子等還為本親父母等唯云去纚大紒不言布麻當知期以下無麻布也然露紒恆居之髽則有笄何以知之案笄以對冠男在喪恆冠婦則恆笄也故喪服婦為舅姑惡笄有首以髽鄭云言髽則髽有著笄者明矣以兼此經注又知恆居笄而露紒髽也此三髽之殊是皇氏之說今考校以為正有二髽一是斬衰麻髽二是齊衰布髽皆名露紒必知然者以喪服女子子在室為父箭笄髽衰是斬衰之髽用麻鄭注以為露紒明齊衰髽用布亦謂之露紒髽也四五服變除之節崔氏云立義既載玉服變除今要舉變除之旨凡親始死將三年者皆去冠笄纚如故十五升白布深衣扱上祍徒跣交手而哭其婦人則去纚衣與男子同不徒跣不扱祍始死以後小斂之前大夫與士皆加素冠於笄纚之上至小斂投冠括髮之後大夫加素辨士加素委貌凡括髮之後至大斂成服以來括髮不改其齊衰以下男子於主人括髮之時則著免故士喪禮小斂主人髺髮衆主人免是也而喪服變除不杖齊衰條云襲尸之時云髺髮者誤也其婦人將斬衰者於男子括髮之時則以麻為髽其大功以下無髽也其服斂畢至成服以來白布深衣不改士死後二日襲帶絰其大夫以上成服與士不同其襲帶絰之屬或與士同或與士異無文以言之其斬衰男子括髮齊衰男子免皆謂喪之大事斂殯之時若其不當斂殯則大夫以上加素辨士加素冠皆於括髮之上其葬之時大夫及士男子散帶婦人髽與未成服時同其服則如喪服既虞卒哭之時及服變服故鄭注喪服云天子諸侯卿大夫既虞士卒哭而受服其受服之時首絰要帶男子皆以葛易之齊斬之婦人則易首絰不易要帶大功小功婦人則易要帶為葛雖受變麻為葛卒哭時亦未說麻至祔乃說麻服葛斬衰至十三月練而除首絰練冠素纓中衣黃裏縓為領䄂緣布帶繩屨無絇若母三年者小祥亦然斬衰二十五月大祥朝服縞冠故雜記云祥主人之除也於夕為朝朝服又喪服小記云除成喪者其祭也朝服縞冠既祥乃服十五升布深衣領緣皆以布縞冠素紕故間傳云大祥素縞麻衣二十七月而禫服玄冠玄衣黃裳而祭祭畢朝服以黑經白緯為冠所謂纎冠而練纓吉屨踰月服吉間傳所謂禫而纎父沒為母與父同父在為母十一月而練十三月而大祥十五月而禫其服變除與父沒為母同其不杖齊衰及大功以下服畢皆𥘉服朝服素冠踰月服吉也此皆崔氏準約禮經及記而為此說五婦主必異姓婦人外成男主必使同姓婦主必使異姓注云謂為無主後者為主也異姓同宗之婦也婦人外成六丗子有廢疾立庶子故云庶子王庶子王亦如之注云丗子有廢疾不可立而庶子立其祭天立廟亦如丗子之立也春秋時衛侯元有兄縶正義曰案昭七年左傳稱長子孟縶之足不良而立次子元元即衛靈公也七正體在上謂下正猶為庶庶子不祭祖者明其宗也注云明其尊宗以為本也禰則不祭矣言不祭祖者主謂宗子庶子俱為適士得立祖禰廟者也凡正體在乎上者謂下正猶為庶也八父適祖適乃得為長子斬故禮為後者四皆期庶子不為長子斬不繼祖與禰故也注云尊先祖之正體不二其統言不繼祖禰則長子不必五丗正義曰此亦尊宗之義也然此所明與喪服中義同而語異也喪服明父是適為長子斬此明父是庶子不得為長子服斬者也是互相明也言不繼祖自足又曰與禰者庾氏云欲明死者之父不繼祖與禰非據死者之身鄭注喪服云此言為父後者然後為長子三年則是父之適子即得為長子三年此經云必為父適祖適乃得為長子斬者但禮有適子者無適孫雖已是祖正若父猶在則己未成適未成適則得重長重長必是父沒後者故云為父後者然後為長子三年也然己身雖是祖庶而是父適則應立廟立廟則已長子傳重當祭而不為斬者以是祖庶厭降故不敢服斬且死者其父見在父自供祭然禮為後者有四條皆不為斬何者有體而不正有正而不體有傳重而非正體有正體而不傳重是也體而不正庶子為後是也正而不體適孫為後是也傳重非正體庶孫為後是也正體不傳重適子有廢疾不立是也四者皆期悉不得斬也唯正體又傳重者乃極服耳九父庶不祭殤祖庶不祭無後庶子不祭殤與無後者殤與無後者從祖祔食注云不祭殤者父之庶也不祭無後者祖之庶也此二者當從祖祔食而己不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者唯適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之正義曰云不祭殤者父之庶也謂己是父之庶子及餘兄弟亦是父之庶子庶子所生之適子為殤而死者不得自祭之以其己是父庶不合立父廟故不得自祭其子殤也殤尚不祭成人無後不祭可知云不祭無後者祖之庶也者己是祖庶不合立祖廟故兄弟無後者不得祭之已若是曽祖之庶亦不得祭諸父無後者諸父無後當於曽祖之廟而祭已是曽祖庶不合立曽祖之廟故不祭之此直云祖之庶不云曽祖之庶者言祖兼曽祖也此無後者身並是庶若在殤而死則不合祭也云宗子之諸父無後者為墠祭之者宗子合祭諸父諸父當於宗子曽祖之廟宗子是士唯有祖禰二廟無曽祖廟故諸父無後者為墠祭之若宗子為大夫得立曽祖廟者則祭之於曽祖廟不於墠也若宗子有大祖者不立曽祖廟亦祭之於墠案祭法云先壇後墠今祭之墠者皇氏云以其無後賤之故於墠也十宗庶俱下士得立禰廟宗子不祭禰者明其宗也親親尊尊長長男女之有別人道之大者也注云謂宗子庶子俱為下士得立禰廟也雖庶人亦然正義曰若庶子是下士宗子是庶人此下士立廟於宗子之家庶子具牲物宗子主其禮雖庶人是有祭義若宗子為下士是宗子自祭之庶子不得祭也親親謂父母也尊尊謂祖及曽祖髙祖也長長謂兄及旁親也不言卑幼舉尊長則卑幼可知男女之有別者若為父斬為母齊衰姑姊妹在室期出嫁大功為夫斬為妻期之屬是男女之有別也人道之大者也言此親親尊尊長長男女有別人間道理最大者皇氏云親親結上以三為五尊尊結上王者禘其祖之所自出長長結上庶子不祭祖十二從服從服者案服術有六其一是徒從者徒空也與彼非親屬空從此而服彼徒中有四一是妾為女君之黨二是子從母服於母之君母三是妾子為君母之黨四是臣從君而服君之黨就此四徒之中而一徒所從雖亡則猶服如女君雖沒妾猶服女君之黨其餘三徒則所從亡則巳謂君母死則妾子不復服君母之黨及母亡則子不復服母之君母又君亡則臣不服君黨親也其中又有妾攝女君為女君黨各有義故也今上云所從亡則巳巳止也止謂徒從亡則止而不服者注謂若為君母之父母昆弟從母也屬從者所從雖沒也服此明屬從也屬者骨血連續以為親也亦有三一是子從母服母之黨二是妻從夫服夫之黨三是夫從妻服妻之黨此三從雖沒猶從之服其親也鄭特云謂若自為已之母黨者亦舉一隅也十三子不敢以己爵加父謂父士則尸服士服父為士子為天子諸侯則祭以天子諸侯其尸服以士服父為天子諸侯子為士祭以士其尸服以士服注云祭以天子諸侯飬以子道也尸服士服父本無爵子不敢以已爵加之嫌於卑之謂父以罪誅尸服以士服不成為君也天子之子當封為王者後以祀其受命之祖云為士則擇其宗之賢者若微子者不必封其子為王者後及所立為諸侯者祀其先君以禮卒者尸服天子諸侯之服如遂無所封立則尸也祭也皆如士不敢僣用尊者衣物正義曰知謂父以罪誅者以其尸服士服故也以其嘗為天子諸侯不可以庶人之禮待之士是爵之最卑故服其士服十四期冝祭不為除喪故期而祭禮也期而除喪道也祭不為除喪也注云此謂練祭也禮正月存親親亡至今而期期冝祭期天道一變哀惻之情益衰衰則冝除不相為也十五三年而後葬練祥必異月不禫三年而后葬者必再祭其祭之間不同時而除喪注云再祭練祥也間不同時者當異月也既祔明月練而祭又明月祥而祭必異月者以葬與練祥本異歲冝異時也而除喪巳祥則除不禫十六練祥之祭亦名除喪祭不為除喪也祭雖不為除喪除喪與祭同時揔而言之練祭祥祭亦名除喪也故下文云三年而后葬者必再祭其祭之間不同時而除喪也又云除成喪者朝服縞冠是練祥之祭揔名除喪十七三年而後葬練祥必再祭不禫身有事故不得及時而葬故三年而後始葬必再祭者謂練祥祭也既三年未葬尸柩尚存雖當練祥之月不可除親服故三年葬後必為此練祥其祭之間不同時者練之與祥本是別年別月今雖三年之後不可同一時而祭當前月練後月祥故云不同時於練祥之時而除喪謂練時男子除首絰婦人除要帶祥時除衰杖知再祭練祥者下云主人之喪有三年者則必為之再祭朋友虞祔而巳再祭非虞祔又雜記云三年之喪則既顈其練祥皆行故知再祭謂練祥也云既祔明月練而祭又明月祥而祭者如鄭此言則虞祔依常禮也必知虞祔依常禮者以經云必再祭恐不為練祥故特云必再祭明虞祔依常禮可知云巳祥則除不禫者以經直云必再祭故知不禫禫者本為思念情深不忍頓除故有禫也今既三年始葬哀情巳極故不禫也十八生不及見之親父稅喪已則否生不及祖父母諸父昆弟而父稅喪已則否注云謂子生於外者也父以他故居異邦而生已己不及此親存時歸見之今其死於喪服年月已過乃聞之父為之服已則否者不責非時之恩於人所不能也當其時則服稅讀如無禮則稅之稅稅喪者喪與服不相當之言正義曰案左傳僖三十三年秦師襲鄭過周北門超乘者三百人王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫今讀從之也云稅喪者喪與服不相當之言者稅是輕稅或前後不與正時相當故云稅也十九虞杖不入室祔杖不升堂虞杖不入室祔杖不升於堂注云哀益衰敬彌多也虞於寢祔於祖廟二十除喪先重易服先輕除喪者先重者易服易輕者注云謂練男子除乎首婦人除乎帶謂大喪既虞卒哭而遭小喪也其易喪服男子易乎帶婦人易乎首草一復與書銘有姓氏名伯仲之異復與書銘自天子逹於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏注云此謂殷禮也殷質不重名復則臣得名君周之禮天子崩復曰臯天子復諸侯薨復曰臯某甫復其餘及書銘則同正義曰書銘謂書亡人名字於旌旗也天子書銘於大常諸侯以下則各書於旌旗也婦人書姓與伯仲者與及也復則婦人稱字此云書姓及伯仲是書銘也姓謂如魯姬齊姜也而伯仲隨其次也此亦殷禮也周之文未必有伯仲當云夫人也如不知姓則書氏者氏如孟孫三家之屬謂書銘亦殷禮也殷無丗繫六丗而昏故婦人有不知姓者周則不然有宗伯掌定繫丗百丗昏姻不通故必知姓也若妾有不知姓者當稱氏矣草二速葬者亦三月卒哭報葬者報虞三月而后卒哭注云報謂為赴疾之赴謂不及期而葬也既葬即虞虞安神也卒哭之祭待哀殺也草三大夫不主士喪大夫不主士之喪注云士之喪雖無主不敢攝大夫以為主草四賤祔貴則易牲士祔於大夫則易牲注云不敢以卑牲祭尊也大夫少牢也正義曰士卑許進用大夫牲故曰易牲然又此下云賤不祔貴而此云士祔大夫者謂無士可祔則不得不祔於大夫猶如妾無妾祖姑易牲而祔於文君可也若有士則當祔於士故雜記云士不祔於大夫謂先祖兄弟有為士者當祔於士不得祔於大夫也草五繼父同居異居之服繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居注云録恩服深淺也見同財則期同居異財故同居今異居及繼父有子亦為異居則三月未嘗同居則不服正義曰繼父者謂母後嫁之夫也若母嫁而子不隨則此子與母繼夫固自路人無繼父之名故自無服也今此言謂夫死妻稚幼子子無大功之親隨母適後夫後夫亦無大功之親後以其貨財為此子同築宫廟四時使之祭祀同其財計如此則是繼父同居故為服期若經同居而今異居異居之道其理有三一者昔同今異二者今雖共居而財計各別三者繼父有子便為異居異居則服齊衰三月而巳今言有主後者為異居者謂繼父更有子也舉此一條餘亦可知矣然既云皆無主後為同居則有主後者為異居則此子有子亦為異居也草六貴得祔賤賤不可祔貴諸侯不得祔於天子天子諸侯大夫可以祔於士注云人莫敢卑其祖也正義曰禮孫死祔祖今祖為諸侯孫為士大夫而死則不得祔祖謂祖貴冝自卑逺之故也祔於諸祖父之為士大夫者諸祖祖之兄弟也既不得祔祖當祔祖之兄弟亦為大夫士者也其妻祔於諸祖姑者夫既不得祔祖故妻亦不得祔於祖姑而可以祔於諸祖姑也諸祖姑是夫之諸祖父兄弟為士大夫者之妻也若祖無兄弟可祔宗族之疏不為諸侯者也然上云士易牲祔於大夫而大夫不得易牲祔於諸侯者諸侯之貴絶宗故大夫士不得輕親也草七宗子適子為妻杖橝辨宗子母在為妻禫注云宗子之妻尊也正義曰宗子為百丗不遷之宗賀㻛云父在適子為妻不杖不杖則不禫若父沒母存則為妻得杖又得禫凡適子皆然嫌畏宗子尊厭其妻故特云宗子母在為妻禫宗子尚然則其餘適子母在為妻禫可知賀循云出居廬論稱杖者必廬廬者必禫此明杖章尋常之禮謂杖章之內居廬必禫若別而言之則杖有不禫禫有不杖者案小記篇云宗子母在為妻禫則其非宗子其餘適庶母在為妻並不得禫也草八慈母妾母於子祭於孫止慈母與妾母不丗祭也注云以其非正春秋傳曰於子祭於孫止正義曰此榖梁隱五年傳文草九冠笄不為殤丈夫冠而不為殤婦人笄而不為殤注云言成人也婦人許嫁而笄未許嫁與丈夫同也三十久而不葬惟主喪者不除久而不葬者唯主喪者不除其餘以麻終月數者除喪則巳注云其餘謂旁親也以麻終月數不葬者喪不變也正義曰云唯主喪者亦欲廣說子為父妻為夫臣為君孫為祖得為喪主四者悉不除也其餘以麻終月數者其餘謂期以下至緦也麻終月數者主人既未葬故諸親不得變葛仍猶服麻各至服限竟而除也除喪則巳者謂月足而除不待主人葬除也然此皆藏之至葬則反服之也故下云及其葬也反服其服是也然雖緦亦藏服以其未經葬故也盧曰其下子孫皆不除也以主喪為正耳餘親者以麻各終其月數除矣庾云謂昔主要記案服問曰君所主夫人妻大子適婦故謂此在不除之例定更思詳以尊主卑不得同以卑主尊無緣以卑之未葬而使尊者長服衰絰也且前儒說主喪不除無為下流之義是知主喪不除唯於承重之身為其祖曽若子之為父臣之為君妻之為夫此之不除也不俟言而明矣盧植云下子孫皆不除蕭望之又云獨謂子皆未善也謂庾言為是卅一大祥吉服筮尸大祥吉服而筮尸注云凡變除者必服其吉服以即祭事不以凶臨吉也間傳曰大祥素縞麻衣卅二父在適子為妻不杖庶子杖父在庶子為妻以杖即位可也者此謂庶子也父不主其妻故其子得為妻以杖即位也雜記云為妻父母在不杖亦是庶子而云不杖者亦謂同宫者也又喪服注云為其妻以杖即位謂庶子也舅主適婦則適子不得杖舅不主庶婦故庶子為妻可以杖即位謂父主妻喪故主適婦所以適子不杖也明主適婦猶於主妻故也父既不主妾喪故不主庶婦所以庶子得杖庶子得杖由於父不主妾故也若妻次子既非正嗣故亦同妾子之限也三三親質不崇敬謂葬後兄弟逺至者不免主人未除喪有兄弟自他國至則主人不免而為主注云親質不崇敬也正義曰主人未除喪者謂在國主人之喪服未除有兄弟自他國至則主人不免而為主者謂五屬之親從逺歸奔者也夫免必有時若葬後唯君來弔雖非時亦為之免崇敬欲新其事故也若五屬之親非時而奔則主人不須為之免也三四妻為大夫而卒及卒而夫為大夫牲皆從夫其妻為大夫而卒而后其夫不為大夫而祔於其妻則不易牲妻卒而后夫為大夫而祔於其妻則以大夫牲注云妻為大夫夫為大夫時卒不易牲以士牲也此謂始來仕無廟者無廟者不祔宗子去國乃以廟從正義曰此謂始來仕無廟者若其有廟則死者當祔於祖不得祔於其妻今夫死祔於其妻故知是無廟者若其宗子去他國乃以廟從則祔於祖矣卅六女成人及婦人皆杖未嫁亦稱婦人女子子在室為父母其主喪者不杖則子一人杖注云女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁及二十而笄為成人成人正杖也正義曰喪服傳云婦人何以不杖亦不能病也是為鄭學者則謂為童子婦人不能為父母杖也而難鄭者云鄭以婦人不杖唯謂童子婦人然童女未嫁何以得稱婦人又喪服傳云童子何以不杖不能病乃云婦人何以不杖亦不能病明知婦人非童子也故賀循等以為婦人不杖謂出嫁之婦人不為主則不杖其不為主而杖者唯姑在為夫杖故此記特明之鄭必以為童子婦人乃不杖者鄭以此下經云女子子在室為父母其主喪者不杖則子一人杖既云女子子在室是童子可知云主喪者不杖若主喪者杖則此童女不杖今由主喪者不杖則童女一人杖鄭據此文故知婦人謂童子之婦人也若其成人出嫁婦人為主皆杖故喪大記云三日子夫人杖五日授大夫丗婦杖喪服傳妻為夫杖小記云母為長子杖是成人婦人皆杖也童女得稱婦人者喪服小功章云為姪庶孫丈夫婦人之長殤是殤之童得稱婦人未嫁而稱婦人者以其將有適人之端故得稱婦人也卅七巳殯而奔喪之節奔父之喪括髮於堂上袒降踊襲絰于東方奔母之喪不括髮袒於堂上降踊襲免于東方絰即位成踊出門哭止三日而五哭三袒注云凡奔喪謂道逺巳殯乃來也為母不括髮以至成服一而巳貶於父也即位以下於父母同也三日五哭者始至訖夕反位哭乃出就次一哭也與明日又明日之朝夕而五哭三袒者始至袒與明日又明日之朝而三也卅八為殤後仍服本親服為殤後者以其服服之注云言為後者據承之也殤無為人父之道以本親之服服之卅九為慈母後則己妾父妾亦可命後為慈母後者為庶母可也為祖庶母可也注云謂父命之為子母者也即庶子為後此皆子也傳重而巳父先命之與適妻使為母子也緣為慈母後之義父之妾無子者亦可命己庶子為後正義曰妾之無子者妾子之無母者父命為子母而此子服此慈母三年記者觸類言之謂妾經有子而子巳死者父命他妾之子為無子之妾立後與為慈母後同又觸類言之父妾無子巳命己之妾子與父妾為後故呼己父之妾為祖庶母既為後亦服之三年如己母矣必知妾經有子者若無子則不得立後四十殤無為父之道為後大宗為殤後者以其服服之注云言為後者據承之也殤無為人父之道以本親之服服之正義曰為殤後者謂大宗子在殤中而死族人為後大宗而不得後此殤者為子也以其父無殤義故也既不後殤而宗不可絶今來為後殯者之人不以殤者之為父而依兄弟之服服此殤也既為殤者父作子則應服以兄弟之服而云以本親之服服者當在未後之前不服追服不責人以非時之恩故推此時本親兄弟亡在未服之前者亦冝終其本服之日月唯為後及所後如有母亡而猶在三年之內則冝接其餘服不可以吉居凶若出三年則不追服矣禮記要義卷第十五
