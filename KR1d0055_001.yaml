body:
  text: 一檀弓六國時人案鄭目録云名曰檀弓者以其記人善於禮故著姓名以顯之姓檀名弓今山陽有檀氏此於別録屬通論此檀弓在六國之時知者以仲梁子是六國時人此篇載仲梁子故知也二舎適孫立庶子乃殷禮公儀仲子之䘮檀弓免焉仲子舎其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子於門右曰仲子舎其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舎伯邑考而立武王微子舎其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫注云故爲非禮以非仲子也禮朋友皆在他邦乃袒免此其所立非也公儀蓋魯同姓周禮適子死立適孫爲後居讀爲姬姓之姬齊魯之間語助也前猶故也去賔位就主人兄弟之賢者而問之子服伯子蓋仲孫蔑之玄孫子服景伯蔑魯大夫伯子爲親者隱耳立子非也文王之立武王權也微子適子死立其弟衍殷禮也立孫據周禮正義曰殷禮若適子死得立弟也今伯邑考見在而立武王故云權也三孔子非全不知墓不知其墓者謂不委曲適知柩之所在不是全不知墓之去處其或岀辭入告揔望本處而拜今將欲合葬湏正知處所故云不知其墓今古不知墓處於事大有而講者諠諠競爲異說恐非經紀之旨四大過以二木夾君父爲棺椁之象正義曰案易下繫辭云古之葬者厚衣之以薪葬之中野不封不樹䘮期無數後丗聖人易之以棺椁蓋取諸大過大過者巽下兊上之卦𥘉六在巽體巽爲木上六位在巳巳當巽位巽又爲木二木在外以夾四陽四陽互體爲二乾乾爲君父二木夾君父是棺椁之象今虞氏旣造瓦棺故云始不用薪然虞氏瓦棺則未有椁也繫辭何以云後丗聖人易之以棺椁連言椁者以後丗聖人其文旣廣逺探殷周而言䘮期有虞氏則然故尚書云三載四海遏宻八音五自夏以上正朔皆三而改樂緯稽耀嘉云夏以十三月爲正息卦受泰注云物之始其色尚黒以寅爲朔殷以十二月爲正息卦受臨注云物之牙其色尚白以鷄鳴爲朔周以十一月爲正息卦受復其色尚赤以夜半爲朔又三正記云正朔三而改文質再而復以此推之自夏以上皆正朔三而改也六申生雉經雉牛鼻繩或云雉性介注旣告狐突乃雉經正義曰雉牛鼻繩也申生以牛繩自縊而死也故鄭注封人云縁著牛鼻繩所以牽牛者也今時人謂之雉或謂雉性耿介𬒳人所獲必自屈折其頭而死漢書載趙人貫髙自絶亢而死申生當亦然也傳云申生縊死晉語申生使猛足辭於狐突乃雉於新成廟七朝祥暮歌不譏琴琴以手魯人有朝祥莫歌者魯人不辨其姓名祥謂二十五月大祥歌哭不同日故仲由笑之也故鄭注笑其爲樂速然祥日得鼔素琴案䘮服四制祥之日鼔素琴不譏彈琴而譏歌者下注云琴以手笙歌以氣手在外而逺氣在内而近也八周士無謚殷大夫以上乃爲爵士之有誄自此始也注云記禮失所由來也周雖以士爲爵猶無謚也殷大夫以上爲爵九祥禫之月王鄭不同祥禫之月先儒不同王肅以二十五月大祥其月爲禫二十六月作樂所以然者以下云祥而縞是月禫徙月樂又與上文魯人朝祥而莫歌孔子云踰月則其善是皆祥之後月作樂也又閒傳云三年之䘮二十五月而畢又士虞禮中月而禫是祥月之中也與尚書文王中身享國謂身之中間同又文公二年冬公子遂如齊納幣是僖公之䘮至此二十六月左氏云納幣禮也故王肅以二十五月禫除䘮畢而鄭康成則二十五月大祥二十七月而禫二十八月而作樂復平常鄭必以爲二十七月禫者以雜記云父在爲母爲妻十三月大祥十五月禫爲母爲妻尚祥禫異月豈容三年之䘮乃祥禫同月若以父在爲母屈而不伸故延禫月其爲妻當亦不申祥禫異月乎若以中月而禫爲月之中間應云月中而禫何以言中月乎案䘮服小記云妾祔於妾祖姑亡則中一以上而祔又學記云中年考校皆以中爲間謂間隔一年故以中月爲間隔一月也下云祥而縞是月禫徙月樂是也謂大祥者縞冠是月禫謂是此禫月而禫二者各自爲義事不相干故論語云子於是日哭則不歌文無所繼亦云是日文公二年公子遂如齊納幣者鄭箴膏肓僖公母成風主㛰得權時之禮若公羊猶譏其䘮娶其魯人朝祥而莫歌及䘮服四制云祥之日鼔素琴及夫子五日彈琴不成聲十日成笙歌并此獻子禫縣之屬皆據省樂忘哀非正樂也其八音之樂工人所奏必待二十八月也即此下文是月禫徙月樂是也其朝祥莫歌非正樂歌是樂之細別亦得稱樂故鄭云笑其爲樂速也其三年問云三年之䘮二十五月而畢據䘮事終除衰去杖其餘哀未盡故更延兩月非䘮之正也王肅難鄭云若以二十七月禫其歳末遭䘮則出入四年䘮服小記何以云再期之䘮三年如王肅此難則爲母十五月而禫出入三年小記何以云期之䘮二年明小記所云據䘮之大㫁也又肅以月中而禫案曲禮䘮事先逺日則大祥當在下旬禫祭又在祥後何得云中月而禫又禫後何以容吉祭故鄭云二十七月也戴德䘮服變除禮二十五月大祥二十七月而禫故鄭依而用焉鄭以二十八月樂作䘮大記何以云禫而内無哭者樂作矣似禫後許作樂者大記所謂禫後方將作樂釋其内無哭者之意非謂即作樂大記又云禫而從御吉祭而復寢間傳何以云大祥居復寢間傳所云者去聖室復殯宫之寢大記云禫而從御謂禫後得御婦人必待吉祭然後復寢其吉祭者是禫月值四時而吉祭外而爲之其祝辭猶不稱以某妃配故士虞禮云吉祭猶未配十祥除猶外故先琴後笙歌孔子旣祥五日彈琴而不成聲十日而成笙歌注云哀未忘踰月且異旬也祥亦凶事用逺日五日彈琴十日笙歌除由外也琴以手笙歌以氣十一死不得禮者亦不弔死不得禮亦不弔故昭二十年衛齊豹欲攻孟縶宗魯事孟縶是時齊豹欲攻孟縶崇魯許齊豹攻之不告孟縶及孟縶𬒳殺而死宗魯亦死之孔子弟子琴張欲往弔之孔子止之曰齊豹之盗而孟縶之賊女何弔焉杜預云言齊豹所以爲盗孟縶所以見賊皆由宗魯是失禮者亦不弔也胡氏曰豹所畜飬之盗縶所見殺之賊十二周公子孫不反葬于周十三族葬之制周公封魯其子孫不反葬於周者以其有次子在周丗守其采地則春秋周公是也故鄭康成作詩譜云元子伯禽封魯次子君陳丗守采地下云延陵季子葬于嬴博之間者古禮也故舜葬蒼梧周則族葬故冡人云先王之葬居中以昭穆爲左右凡諸侯居左右以前卿大夫士居後各以其族是也十四伯魚期而哭岀母伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之注云伯魚孔子子也名鯉猶尚也嘻悲恨之聲正義曰此一節論過哀之事注嘻悲恨之聲者謂非責伯魚悲恨之聲也時伯魚母岀父在爲岀母亦應十三月祥十五月禫言期而猶哭則是祥後禫前祥外無哭于時伯魚在外哭故夫子怪之恨其甚也或曰爲岀母無禫期後全不合哭十五鄭謂舜征苗而死十六三妃即三夫人舜葬於蒼梧之野蓋三妃未之從也注云舜征有苗而死因留葬焉書說舜曰陟方乃死蒼梧於周南越之地今爲郡古者不合葬帝嚳而立四妃矣象后妃四星其一明者爲正妃餘三小者爲次妃帝堯因焉至舜不告而取不立正妃但三妃而巳謂之三夫人離騷所歌湘夫人舜妃也正義曰鄭案淮南子云舜征三苗而遂死蒼梧史記云舜踐帝位三十九年南廵守崩于蒼梧之野葬於九疑山是爲零陵案尚書竄三苗于三危在西裔今舜征有苗乃死於蒼梧者張逸荅焦氏問云𥘉竄西裔後分之在南野漢書地理志有蒼梧郡是今爲郡名也云但三妃而巳者案帝王丗紀云長妃娥皇無子次妃女英生啇均次妃癸比生二女霄明燭光是也云離騷所歌湘夫人者案楚辭九歌第三曰湘夫人云帝子降兮北渚目眇眇兮愁予是也王逸注離騷云娥皇女英墮湘水溺焉又秦紀云死而葬焉非溺也山海經以爲二女此云三者當以記爲正山海經不可用十七曽子矯以謙儉浴喪爨室曽子之䘮浴於爨室注云見曽元之辭易簀矯之以謙儉也禮死浴於適室十八記禮多有不定之辭大功廢業或曰大功誦可也注云許其口習故也正義曰録記之人必當明禮應事無疑使後丗作法今檢禮記多有不定之辭仲尼門徒親承聖旨子游裼裘而弔曽子襲裘而弔又小斂之奠或云東方或云西方同母異父昆弟魯人或云爲之齊衰或云大功其作記之人多云蓋多云或曰皆無指的並設疑辭者以周公制禮永丗作法時經幽厲之亂又遇齊晉之強國異家殊樂崩禮壞諸侯奢僣典法訛舛是以普天率土不閑禮教故子思聖人之後不䘮出母隨武子晉之賢相不識殽烝作記之人隨後撰録善惡兼載得失備書十九子思哭嫂或云原憲子思之哭嫂也爲位正義曰此子思哭嫂是孔子之孫以兄先死故有嫂也皇氏以爲原憲字子思若然鄭無容不注鄭旣不注皇氏非也孔氏連叢云一子相承以至九丗及史記所說亦同者不妨雖有二子相承者唯存一人或其兄早死故得有嫂且雜說不與經合非一也二十小功不稅王鄭義異曽子曰小功不稅則是逺兄弟終無服也而可乎注云據禮而言也日月巳過乃聞䘮而服曰稅大功以上然小功輕不服言相離逺者聞之恒晚以巳恩怪之正義曰曽子仁厚禮雖如此猶以爲薄故怪之此據正服小功也故䘮服小記云降而在緦小功者則稅之其餘則否鄭康成義若限内聞䘮則追全服若王肅義限内聞䘮但服殘日若限滿即止假令如王肅之義限内秖少一日乃始聞䘮若其成服服未得成即除也若其不服又何名追服進退無理王義非也卄一師友䘮服卄二王及卿大夫士吊服孔子之䘮門人疑所服子貢曰昔者夫子之䘮顔淵若䘮子而無服䘮子路亦然請䘮夫子若䘮父而無服注云無䘮師之禮無服不爲衰弔服而加麻心䘮三年正義曰知爲師弔服加麻者案䘮服朋友麻其師與朋友同故知亦加麻也必知䘮師與朋友同者案下云孔子之䘮二三子皆絰而岀群居則絰岀則否是弟子相爲與爲夫子同但絰岀與不岀有異明其服同云云弔服而加麻麻謂絰與帶也皆以麻爲之故云加麻也又䘮服緦麻章云朋友麻鄭云朋友雖無親而有同道之恩相爲服緦之絰帶是也鄭知服緦之絰帶者緦爲五服之輕又與錫衰等同爲弔服之限故知緦之絰帶也論云爲師及朋友皆旣葬除之案司服云王爲三公六卿錫衰爲諸侯緦衰爲大夫士疑衰其首服皆弁絰鄭司農云疑衰十四升康成云疑之言擬也擬於吉服謂比擬吉服十五升也鄭注文王丗子云同姓之士則緦麻異姓之士則疑衰卿大夫亦以錫衰爲弔服當事亦弁絰故鄭注䘮服云諸侯及卿大夫亦以錫衰爲弔服當事乃弁絰否則皮弁辟天子也其士之弔服則疑衰故鄭注䘮服云士以緦衰爲䘮服其弔服則疑衰也舊說以爲士弔服布上素下鄭注云此實疑衰也改其裳以素辟諸侯也當事亦弁絰故鄭注䘮服云士弁絰皮弁之時如卿大夫凡弔服唯有弁絰皆無帶也知無帶者周禮司服及服問但云弁絰不云帶故知然也其朋友之服諸侯及大夫等則皆疑衰故鄭注䘮服云朋友之相爲服則士弔服也旣特云士弔服明諸侯大夫等皆用士之弔服唯加緦之絰帶爲異耳是以䘮服朋友麻鄭注云服緦之絰帶又下文云子游襲裘帶絰而入鄭注云所弔者朋友是朋友相爲加帶凡朋友相爲者雖不當事亦弁絰故下文云群居則絰是也其庶人鄭注䘮服云庶人不爵弁則其弔服素冠委貌鄭注不顯所著之服文承疑衰素裳之下則庶人亦用疑衰或者庶人布深衣當服布深衣冠素委貌也卄三有公事之處皆謂之朝遇諸市朝不反兵而鬪注云言雖適市朝不釋兵正義曰朝在公門之内兵器不入公門身得持兵入朝者案閽人掌中門之禁但兵器不得入中門耳其大詢衆庶在臯門之内則得入也且朝文旣廣設朝或在野外或在縣鄙郷遂但有公事之處皆謂之朝兵者亦謂佩刀巳上不必要是矛㦸皇氏以爲市朝正謂市也市有行肆似朝故云市朝此辭非也卄四曽子以主人榮已爲之隱諱曽子弔於負夏主人旣祖塡池推柩而反之降婦人而后行禮從者曰禮與曽子曰夫祖者且也且胡爲其不可以反宿也從者又問諸子游曰禮與子游曰飯於牗下小斂於户内大斂於阼殯於客位祖於庭葬於墓所以即逺也故䘮事有進而無退曽子聞之曰多矣乎予出祖者注云負夏衛地祖謂移柩車去載處爲行始也填池當爲奠徹聲之誤也奠徹謂徹遣奠設祖奠反於載處榮曽子弔欲更始禮旣祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之而又降婦人蓋欲矜賔於此婦人皆非怪之且未定之辭有進無退明反柩非多矣乎者善子游言且服正義曰此是啓殯之後至柩車岀之節也曽子弔於負夏氏正當主人祖祭之明旦旣徹祖奠之後設遣奠之時而來弔主人榮曽子之來乃徹去遣奠更設祖奠又推柩少退而返之嚮北又遣婦人升堂至明旦婦人從堂更降而後乃行遣車禮從曽子者意以爲疑問曽子云此是禮與曽子旣見主人榮已不欲指其錯失爲之隱諱云夫祖者且也且是未定之辭祖是行始未是實行且去住二者皆得旣得旦住何爲不可以反宿明日乃去卄五同母異父之昆弟䘮服王鄭異公叔木有同母異父之昆弟死問於子游子游曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則爲之齊衰狄儀行齊衰今之齊衰狄儀之問也注云木當爲朱春秋作戍衛公叔文子之子定公十四年奔魯疑所服也親者屬大功是正義曰爲同母異父昆弟之服䘮服無文故子游疑之其大功乎乎是疑辭也云親者屬大功是者鄭意以爲同母兄弟母之親屬服大功是也所以是者以同父同母則服期今但同母而以母是我親生其兄弟是親者血屬故降一等而服大功案聖證論王肅難鄭禮稱親者血屬謂出母之身不謂出母之子服也若出母之子服大功則出母之父母服應更重何以爲出母之父母無服王肅云同母異父兄弟服大功者謂繼父服齊衰其子降一等故服大功馬昭難王肅云異父昆弟恩繼於母不繼於父肅以爲從繼父而服非也張融以爲繼父同居有子正服齊衰三月乃爲其子大功非服之差玄說是也卄六子思爲嫁母服嫁母有繼有親子思之母死於衛柳若謂子思曰子聖人之後也四方於子乎觀禮子蓋愼諸子思曰吾何愼哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也吾何愼哉注云子思孔子孫伯魚之子伯魚卒其妻嫁衛柳若衛人也見子思欲爲嫁母服恐其失禮戒之嫁母齊衰期謂時可行而財不足以備禮謂財足以備禮而時不得行者時所止則止時所行則行無所疑也喪之禮如子贈禭之屬不踰主人正義曰云嫁母齊衰期者嫁母之服䘮服無文案喪服杖期章云父卒繼母嫁從爲之服報則親母可知故鄭約云齊衰期也又鄭止言齊衰期不言嫡庶故譙周袁準並云父卒母嫁非父所絶嫡子雖主祭猶冝服期而䘮服爲岀母期嫁母與岀母俱是絶族故知與出母同也張逸問舊儒丗本皆以孔子後數丗皆一子禮適子爲父後爲嫁母無服檀弓說子思從於嫁母服何鄭荅云子思哭嫂爲位必非適子或者兄若早死無繼故云數丗皆一子卄七縣棺而封不待碑繂縣棺而封封即窆窆下棺内壙中也貴者則用碑繂若貧而即葬者但手縣棺而下之同於庶人不待碑繂不設碑繂不備禮卄八三斬板謂㫁其縮今一日而三斬板而巳封注云板蓋廣二尺長六尺斬板謂㫁其縮也三㫁止之旁殺蓋髙四尺其廣袤未聞也詩云縮板以載一本束板卄九夫子言四墳之異子夏以馬鬛釋斧昔者夫子言之曰吾見封之若堂者矣旣巳語燕人無觀又此歴𫐠孔子之言者欲以此語與燕人爲法封謂墳之也若如堂基四方而髙見若坊者矣坊堤也堤坊水上平而兩旁殺其南北長也言又見有築墳形如坊者也見若覆夏屋者矣殷人以來始屋四阿夏家之屋唯兩下而巳無四阿如漢之門廡又言見其封墳如覆夏屋唯兩下而殺卑而寛廣又見封如斧之形其刃嚮上長而髙也旣言四墳之異夫子之意從若斧者焉以爲刃上難登狹又易爲功力子夏旣道從若斧形恐燕人不識故舉俗稱馬鬛封之謂也以語燕人馬騣鬛之上其肉薄封形似之卅一夫子墓無馬鬛封不止三板知蓋髙四尺者以上合葬於防崇四尺今葬夫子不可過之又板廣二尺三板斜殺唯髙四尺耳其東西之廣南北之袤則未聞也孫毓難云孔子墓魯城北門外西墳四方前髙後下形似卧斧髙八九尺今無馬鬛封之形不止于三板記似誤者孫毓云據當時所見其墳或後人増益不與元葬墳同卅二薦新如朔奠又大夫以上朔望士朔有薦新如朔奠注云重新物爲之殷奠正義曰薦新謂未葬中間得新味而薦亡者如朔奠者謂未葬前月朔大奠於殯宫者大奠則牲饌豐也朔禮視大歛士則特豚三鼎今若有新物及五榖始熟薦於亡者則其禮牲物如朔之奠也大夫以上則朔望大奠若士但朔而不望卅三棺四重三重之制天子之棺四重水兕革棺𬒳之其厚三寸杝棺一梓棺二四者皆周棺束縮二衡三祍毎束一柏椁以端長六尺注云尚深䆳也諸公三重諸侯再重大夫一重士不重以水牛兕牛之革以爲棺𬒳革各厚三寸合六寸也此爲一重杝所謂椑棺也爾雅曰椵杝梓所謂屬與大棺周帀也凡棺用能濕之物衡亦當爲橫祍今小要祍或作􅃮或作髹以端題湊也其方蓋一尺卅四棺椁之制杝棺一者椵也材亦能濕故次皮也杝唯一種故云一也諸侯無革則杝親尸也所謂椑棺也即前言君即位爲椑是也杝即椵木鄭引爾雅曰椵杝一物二名名椵又名杝也梓棺二者杝棺之外又有屬棺屬棺之外又有大棺大棺與屬棺並用梓故云二也則喪大記云屬六寸大棺八寸也四者皆周者四四重也周帀也謂四重之棺上下四方悉周帀也唯椁不周下有茵上有抗席故也棺束者古棺木無釘故用皮束合之縮二者縮縱也縱束者用二行也衡三者橫束者三行也祍毎束一者祍小要也其形兩頭廣中央小也旣不用釘棺但先鑿棺邊及兩頭合際處作坎形則以小要連之令固棺並相對毎束之處以一行之祍連之若竪束之處則竪著其祍以連棺蓋及㡳之木使與棺頭尾之材相固漢時呼祍爲小要也柏椁者謂爲椁用柏也天子柏諸侯松大夫柏士雜木也鄭注方相職云天子椁柏黃腸爲裏而表以石焉三五魯哀公誄孔子魯哀公誄孔丘曰天下遺耆老莫相予位焉嗚呼哀哉尼父注云誄其行以爲謚也莫無也相佐也言孔子死無佐助我處位者尼父因其字以爲之謚正義曰此一節論哀公誄孔子之事孔子以哀公十六年夏四月巳丑日卒哀公欲爲作謚作謚冝先列其生時行狀謂之爲誄檀三六弔䘮賔位隨主人而變案賔位之法隨主人而變小歛之前主人未忍在主位有事在西階下則賔亦入門西弔於西階下故士䘮禮君使人禭主人拜送拜賔即位西階下東面鄭云未忍即主人位也小斂之後尸則岀堂廉然後有飾主人位則在阼階下西面賔弔者入門東於東階下弔也故士喪禮小斂訖故士舉男女奉尸侇於堂主人降自西階即位踊襲絰于序東鄭云即位踊東方位也則衆主人不接賔發𥘉在東耳三七旣諌可議政未諌不可言君過事君有犯而無隱注旣諌人有問其國政者可以語其得失若齊晏子爲晉叔向言之正義曰昭三年左傳云晏子謂景公曰小人近市朝夕得所求景公曰子近市何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤諌景公重刑後及其聘晉與叔向言齊國之政將歸陳氏景公厚斂焉陳氏厚施焉是旣諌得言君之過若其未諌而言君過則不可故昭三年子大叔如晉張趯與子大叔言云火星中而寒暑退此其極也能無退乎未曽諌君輒言君德之退故傳云張趯有知其猶在君子之後乎是其𬒳譏也魯昭公取同姓孔子不仕昭公旣先諌所以論語稱孔子爲昭公諱而稱丘也過者聖人含弘勸獎擥過歸已非實事也若史䇿書理則不一若其良史直筆不隱君過董孤書趙盾弑君及丹楹刻桷之屬是也若忠順臣則諱君親之惡者春秋辟諱皆是故僖元年左傳云諱國惡禮也三九明器外有用器謂明器之屬者案旣夕禮除明器之外有用器弓矢耒耜兩敦兩杆槃匜燕樂器甲胃干笮杖笠翣等四十帷荒内木材爲柳帷荒亦㹅稱柳案䘮大記注云在旁曰帷在上曰荒帷荒所以衣柳則以帷荒之内木材爲柳其實帷荒及木材等揔名曰柳故縫人云衣翣柳之材注云柳之言聚諸飾之所聚是帷荒揔稱柳也四一曽子嘗辤卿故不得寢大夫之床正義曰知齊甞聘以爲卿者韓詩外傳云曽子仕於莒得粟三秉方是之時曽子重其禄而輕其身親没之後齊迎以相楚迎以令尹晉迎以上卿方是之時曽子重其身而輕其禄旣言輕其禄是不爲也但齊以相楚以令尹晉以上卿而鄭言齊嘗聘爲卿者以三國文連含帶爲注耳且相即是上卿禮云男子不死於婦人之手婦人不死於男子之手故春秋魯僖公薨于小寢譏即安也成公薨於路寢傳曰言道也他人名己得呼爲大夫之稱而言夫子若己不爲大夫則已所爲當湏依禮不得寢大夫之床也四二或長婦爲娣弟妻爲姒不據夫年案䘮服小功章娣姒婦報傳云弟長也鄭注云娣姒婦者兄弟之妻相名也長婦謂稺婦爲娣婦娣婦謂長婦爲姒婦謂據婦年之長㓜則不據夫年之大小故成十一年左傳云聲伯之母不聘穆姜曰吾不以妾爲姒穆姜魯宣公夫人聲伯之母魯宣公弟叔盻之妻是弟妻爲姒又昭二十八年左傳云子容之母走謁諸姑曰長叔姒生男子容之母伯華之妻也長叔姒是伯華之弟叔盻之妻是亦謂弟妻爲姒也皆不繫夫身長㓜四三孔子爲大夫得有驂馬騑馬曰驂者說文云騑旁馬是在服馬之旁又詩云騏駵是中騧驪是驂驂在外也孔子得有驂馬者案王度記云天子駕六馬諸侯四大夫三士二古毛詩云天子至大夫皆駕四孔子旣身爲大夫若依王度記則有一驂馬也若依毛詩說則有二驂馬也四四孔子說驂於舊館惜車於顔囬顔囬之喪子哭之慟慟比岀涕慟則爲甚矣又舊館之恩不得比顔囬之極而說驂於舊館惜車於顔囬者但舊館情䟽厚恩待我須有贈􅉠故說驂賻之顔囬則師徒之恩親乃是常事則顔囬之死必當以物與之顔路無厭更請賣車爲椁以其不知止足故夫子抑之四五孔子夢饋食不夢凶奠言奠者以爲凶象正義曰時夫子夢見饋食不夢凶奠也但奠禮旣死之後未葬之前柩仍在地未立尸主唯奠停飲食故云奠也四六弔服隨主人而變几弔喪之禮主人未變之前弔者吉服而弔吉服謂羔裘玄冠緇衣素裳又袒去上服以露裼衣則此裼裘而弔是也主人旣變之後雖著朝服而加武以絰又掩其上服若是朋友又加帶則此襲裘帶絰而入是也案䘮大記云弔者襲裘加武帶絰注云始死弔者朝服裼裘如吉時也小斂則改襲而加武與帶絰矣武吉冠之卷也加武者明不改冠但加絰於武䘮大記所云亦據朋友故云帶絰帶旣在腰鄭注加武與帶絰似帶亦加武者其實加武唯絰連言帶耳四七吉祭後弔服無文而有弔法吉祭巳後或來弔者其服無文除䘮之後亦有弔法故春秋文九年秦人來歸僖公成風之禭是也四八賻布之餘分死者所矜請班諸兄弟之貧者注以分死者所矜也禄多則與鄰里郷黨四九從母之夫舅之妻因甥爲文從母之夫舅之妻二夫人相爲服君子未之言也注二夫人猶言此二人也時有此二人同居死相爲服者甥居外家而非之正義曰言從母及舅皆是外甥稱謂之辭故知甥也若他人之言應云妻之兄弟婦夫之姉妺夫相爲服不得云從母之夫舅之妻也五十王肅以聖人之葬人與絶句子夏曰聖人之葬人與人之葬聖人也子何觀焉注與及也正義曰王肅云聖人葬人與屬上句以言若聖人葬人與則人庶有異聞得來觀者若人之葬聖人與凡人何異而子何觀之五一練衣外除正服不可變練練衣黃裏縓縁注小祥練冠練中衣以黃爲内縓爲飾黃之色卑於纁縓纁之類明外除正義曰練小祥也小祥而著練冠練中衣故曰練也練衣者練爲中衣黃裏者黃爲中衣裏也正服不可變中衣非正服但承衰而巳故小祥而爲之黃祫裏也縓縁者縓爲淺絳色也縁謂中衣領及裒縁也裏用黃而領縁用縓者領縁外也明其外除故飾見外也案此文小祥外衰内有練中衣中衣内有裼衣裼衣内有鹿裘鹿裘内自有常着襦衣五二有禮有財無時弗行子思曰有其禮有其財無其時君子弗行也正義曰謂若嫁母之家主人貧乏斂手足形還葬己雖有財不得過於主人故下注䘮之禮如子贈禭之屬不踰主人同治乙丑六月獨山莫友芝借讀過禮記要義卷三終
