body:
  text: 一檀弓六國時人案鄭目録云名曰檀弓者以其記人善於禮故著姓名以顯之姓檀名弓今山陽有檀氏此於別録屬通論此檀弓在六國之時知者以仲梁子是六國時人此篇載仲梁子故知也二舍適孫立庶子乃殷禮公儀仲子之喪檀弓免焉仲子舍其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子於門右曰仲子舍其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫注云故為非禮以非仲子也禮朋友皆在他邦乃袒免此其所立非也公儀蓋魯同姓周禮適子死立適孫為後居讀為姬姓之姬齊魯之間語助也前猶故也去賔位就主人兄弟之賢者而問之子服伯子蓋仲孫蔑之玄孫子服景伯蔑魯大夫伯子為親者隱耳立子非也文王之立武王權也微子適子死立其弟衍殷禮也立孫據周禮正義曰殷禮若適子死得立弟也今伯邑考見在而立武王故云權也三孔子非全不知墓不知其墓者謂不委曲適知柩之所在不是全不知墓之去處其或出辭入告揔望本處而拜今將欲合葬須正知處所故云不知其墓今古不知墓處於事大有而講者喧喧競為異說恐非經紀之旨四大過以二木夾君父為棺椁之象正義曰案易下繫辭云古之葬者厚衣之以薪葬之中野不封不樹喪期無數後丗聖人易之以棺椁蓋取諸大過大過者巽下兊上之卦𥘉六在巽體巽為木上六位在巳巳當巽位巽又為木二木在外以夾四陽四陽互體為二乾乾為君父二木夾君父是棺椁之象今虞氏既造瓦棺故云始不用薪然虞氏瓦棺則未有椁也繫辭何以云後丗聖人易之以棺椁連言椁者以後丗聖人其文既廣逺探殷周而言喪期有虞氏則然故尚書云三載四海遏密八音五自夏以上正朔皆三而改樂緯稽耀嘉云夏以十三月為正息卦受泰注云物之始其色尚黑以寅為朔殷以十二月為正息卦受臨注云物之牙其色尚白以雞鳴為朔周以十一月為正息卦受復其色尚赤以夜半為朔又三正記云正朔三而改文質再而復以此推之自夏以上皆正朔三而改也六申生雉經雉牛鼻繩或云雉性介注既告狐突乃雉經正義曰雉牛鼻繩也申生以牛繩自縊而死也故鄭注封人云緣著牛鼻繩所以牽牛者也今時人謂之雉或謂雉性耿介𬒳人所獲必自屈折其頭而死漢書載趙人貫髙自絶亢而死申生當亦然也傳云申生縊死晉語申生使猛足辭於狐突乃雉於新成廟七朝祥暮歌不譏琴琴以手魯人有朝祥莫歌者魯人不辨其姓名祥謂二十五月大祥歌哭不同日故仲由笑之也故鄭注笑其為樂速然祥日得鼓素琴案喪服四制祥之日鼓素琴不譏彈琴而譏歌者下注云琴以手笙歌以氣手在外而逺氣在內而近也八周士無諡殷大夫以上乃為爵士之有誄自此始也注云記禮失所由來也周雖以士為爵猶無諡也殷大夫以上為爵九祥禫之月王鄭不同祥禫之月先儒不同王肅以二十五月大祥其月為禫二十六月作樂所以然者以下云祥而縞是月禫徙月樂又與上文魯人朝祥而莫歌孔子云踰月則其善是皆祥之後月作樂也又閒傳云三年之喪二十五月而畢又士虞禮中月而禫是祥月之中也與尚書文王中身享國謂身之中間同又文公二年冬公子遂如齊納幣是僖公之喪至此二十六月左氏云納幣禮也故王肅以二十五月禫除喪畢而鄭康成則二十五月大祥二十七月而禫二十八月而作樂復平常鄭必以為二十七月禫者以雜記云父在為母為妻十三月大祥十五月禫為母為妻尚祥禫異月豈容三年之喪乃祥禫同月若以父在為母屈而不伸故延禫月其為妻當亦不申祥禫異月乎若以中月而禫為月之中間應云月中而禫何以言中月乎案喪服小記云妾祔於妾祖姑亡則中一以上而祔又學記云中年考校皆以中為間謂間隔一年故以中月為間隔一月也下云祥而縞是月禫徙月樂是也謂大祥者縞冠是月禫謂是此禫月而禫二者各自為義事不相干故論語云子於是日哭則不歌文無所繼亦云是日文公二年公子遂如齊納幣者鄭針膏肓僖公母成風主㛰得權時之禮若公羊猶譏其喪娶其魯人朝祥而莫歌及喪服四制云祥之日鼓素琴及夫子五日彈琴不成聲十日成笙歌并此獻子禫縣之屬皆據省樂忘哀非正樂也其八音之樂工人所奏必待二十八月也即此下文是月禫徙月樂是也其朝祥莫歌非正樂歌是樂之細別亦得稱樂故鄭云笑其為樂速也其三年問云三年之喪二十五月而畢據喪事終除衰去杖其餘哀未盡故更延兩月非喪之正也王肅難鄭云若以二十七月禫其歲末遭喪則出入四年喪服小記何以云再期之喪三年如王肅此難則為母十五月而禫出入三年小記何以云期之喪二年明小記所云據喪之大斷也又肅以月中而禫案曲禮喪事先逺日則大祥當在下旬禫祭又在祥後何得云中月而禫又禫後何以容吉祭故鄭云二十七月也戴德喪服變除禮二十五月大祥二十七月而禫故鄭依而用焉鄭以二十八月樂作喪大記何以云禫而內無哭者樂作矣似禫後許作樂者大記所謂禫後方將作樂釋其內無哭者之意非謂即作樂大記又云禫而從御吉祭而復寢間傳何以云大祥居復寢間傳所云者去聖室復殯宫之寢大記云禫而從御謂禫後得御婦人必待吉祭然後復寢其吉祭者是禫月值四時而吉祭外而為之其祝辭猶不稱以某妃配故士虞禮云吉祭猶未配十祥除猶外故先琴後笙歌孔子既祥五日彈琴而不成聲十日而成笙歌注云哀未忘踰月且異旬也祥亦凶事用逺日五日彈琴十日笙歌除由外也琴以手笙歌以氣十一死不得禮者亦不弔死不得禮亦不弔故昭二十年衛齊豹欲攻孟縶宗魯事孟縶是時齊豹欲攻孟縶崇魯許齊豹攻之不告孟縶及孟縶𬒳殺而死宗魯亦死之孔子弟子琴張欲往弔之孔子止之曰齊豹之盜而孟縶之賊女何弔焉杜預云言齊豹所以為盜孟縶所以見賊皆由宗魯是失禮者亦不弔也胡氏曰豹所畜飬之盜縶所見殺之賊十二周公子孫不反葬于周十三族葬之制周公封魯其子孫不反葬於周者以其有次子在周丗守其采地則春秋周公是也故鄭康成作詩譜云元子伯禽封魯次子君陳丗守采地下云延陵季子葬于嬴博之間者古禮也故舜葬蒼梧周則族葬故冡人云先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族是也十四伯魚期而哭出母伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之注云伯魚孔子子也名鯉猶尚也嘻悲恨之聲正義曰此一節論過哀之事注嘻悲恨之聲者謂非責伯魚悲恨之聲也時伯魚母出父在為出母亦應十三月祥十五月禫言期而猶哭則是祥後禫前祥外無哭于時伯魚在外哭故夫子怪之恨其甚也或曰為出母無禫期後全不合哭十五鄭謂舜征苗而死十六三妃即三夫人舜葬於蒼梧之野蓋三妃未之從也注云舜征有苗而死因留葬焉書說舜曰陟方乃死蒼梧於周南越之地今為郡古者不合葬帝嚳而立四妃矣象后妃四星其一明者為正妃餘三小者為次妃帝堯因焉至舜不告而取不立正妃但三妃而巳謂之三夫人離騷所歌湘夫人舜妃也正義曰鄭案淮南子云舜征三苗而遂死蒼梧史記云舜踐帝位三十九年南巡守崩于蒼梧之野葬於九疑山是為零陵案尚書竄三苗于三危在西裔今舜征有苗乃死於蒼梧者張逸答焦氏問云𥘉竄西裔後分之在南野漢書地理志有蒼梧郡是今為郡名也云但三妃而巳者案帝王丗紀云長妃娥皇無子次妃女英生啇均次妃癸比生二女霄明燭光是也云離騷所歌湘夫人者案楚辭九歌第三曰湘夫人云帝子降兮北渚目眇眇兮愁豫是也王逸注離騷云娥皇女英墮湘水溺焉又秦紀云死而葬焉非溺也山海經以為二女此云三者當以記為正山海經不可用十七曽子矯以謙儉浴喪爨室曽子之喪浴於爨室注云見曽元之辭易簀矯之以謙儉也禮死浴於適室十八記禮多有不定之辭大功廢業或曰大功誦可也注云許其口習故也正義曰録記之人必當明禮應事無疑使後丗作法今檢禮記多有不定之辭仲尼門徒親承聖旨子游裼裘而弔曽子襲裘而弔又小斂之奠或云東方或云西方同母異父昆弟魯人或云為之齊衰或云大功其作記之人多云蓋多云或曰皆無指的並設疑辭者以周公制禮永丗作法時經幽厲之亂又遇齊晉之強國異家殊樂崩禮壞諸侯奢僣典法訛舛是以普天率土不間禮教故子思聖人之後不喪出母隨武子晉之賢相不識殽蒸作記之人隨後撰録善惡兼載得失備書十九子思哭嫂或云原憲子思之哭嫂也為位正義曰此子思哭嫂是孔子之孫以兄先死故有嫂也皇氏以為原憲字子思若然鄭無容不注鄭既不注皇氏非也孔氏連叢云一子相承以至九丗及史記所說亦同者不妨雖有二子相承者唯存一人或其兄早死故得有嫂且雜說不與經合非一也二十小功不稅王鄭義異曽子曰小功不稅則是逺兄弟終無服也而可乎注云據禮而言也日月巳過乃聞喪而服曰稅大功以上然小功輕不服言相離逺者聞之恆晚以巳恩怪之正義曰曽子仁厚禮雖如此猶以為薄故怪之此據正服小功也故喪服小記云降而在緦小功者則稅之其餘則否鄭康成義若限內聞喪則追全服若王肅義限內聞喪但服殘日若限滿即止假令如王肅之義限內秖少一日乃始聞喪若其成服服未得成即除也若其不服又何名追服進退無理王義非也草一師友喪服草二王及卿大夫士吊服孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服注云無喪師之禮無服不為衰弔服而加麻心喪三年正義曰知為師弔服加麻者案喪服朋友麻其師與朋友同故知亦加麻也必知喪師與朋友同者案下云孔子之喪二三子皆絰而出群居則絰出則否是弟子相為與為夫子同但絰出與不出有異明其服同云云弔服而加麻麻謂絰與帶也皆以麻為之故云加麻也又喪服緦麻章云朋友麻鄭云朋友雖無親而有同道之恩相為服緦之絰帶是也鄭知服緦之絰帶者緦為五服之輕又與錫衰等同為弔服之限故知緦之絰帶也論云為師及朋友皆既葬除之案司服云王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆辨絰鄭司農云疑衰十四升康成云疑之言擬也擬於吉服謂比擬吉服十五升也鄭注文王丗子云同姓之士則緦麻異姓之士則疑衰卿大夫亦以錫衰為弔服當事亦辨絰故鄭注喪服云諸侯及卿大夫亦以錫衰為弔服當事乃辨絰否則皮辨辟天子也其士之弔服則疑衰故鄭注喪服云士以緦衰為喪服其弔服則疑衰也舊說以為士弔服布上素下鄭注云此實疑衰也改其裳以素辟諸侯也當事亦辨絰故鄭注喪服云士辨絰皮辨之時如卿大夫凡弔服唯有辨絰皆無帶也知無帶者周禮司服及服問但云辨絰不云帶故知然也其朋友之服諸侯及大夫等則皆疑衰故鄭注喪服云朋友之相為服則士弔服也既特云士弔服明諸侯大夫等皆用士之弔服唯加緦之絰帶為異耳是以喪服朋友麻鄭注云服緦之絰帶又下文云子游襲裘帶絰而入鄭注云所弔者朋友是朋友相為加帶凡朋友相為者雖不當事亦辨絰故下文云群居則絰是也其庶人鄭注喪服云庶人不爵辨則其弔服素冠委貌鄭注不顯所著之服文承疑衰素裳之下則庶人亦用疑衰或者庶人布深衣當服布深衣冠素委貌也草三有公事之處皆謂之朝遇諸市朝不反兵而鬪注云言雖適市朝不釋兵正義曰朝在公門之內兵器不入公門身得持兵入朝者案閽人掌中門之禁但兵器不得入中門耳其大詢衆庶在臯門之內則得入也且朝文既廣設朝或在野外或在縣鄙鄉遂但有公事之處皆謂之朝兵者亦謂佩刀巳上不必要是矛㦸皇氏以為市朝正謂市也市有行肆似朝故云市朝此辭非也草四曽子以主人榮已為之隱諱曽子弔於負夏主人既祖填池推柩而反之降婦人而后行禮從者曰禮與曽子曰夫祖者且也且胡為其不可以反宿也從者又問諸子游曰禮與子游曰飯於牗下小斂於户內大斂於阼殯於客位祖於庭葬於墓所以即逺也故喪事有進而無退曽子聞之曰多矣乎豫出祖者注云負夏衛地祖謂移柩車去載處為行始也填池當為奠徹聲之誤也奠徹謂徹遣奠設祖奠反於載處榮曽子弔欲更始禮既祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之而又降婦人蓋欲矜賔於此婦人皆非怪之且未定之辭有進無退明反柩非多矣乎者善子游言且服正義曰此是啓殯之後至柩車出之節也曽子弔於負夏氏正當主人祖祭之明旦既徹祖奠之後設遣奠之時而來弔主人榮曽子之來乃徹去遣奠更設祖奠又推柩少退而返之嚮北又遣婦人升堂至明旦婦人從堂更降而後乃行遣車禮從曽子者意以為疑問曽子云此是禮與曽子既見主人榮已不欲指其錯失為之隱諱云夫祖者且也且是未定之辭祖是行始未是實行且去住二者皆得既得旦住何為不可以反宿明日乃去草五同母異父之昆弟喪服王鄭異公叔木有同母異父之昆弟死問於子游子游曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也注云木當為朱春秋作戍衛公叔文子之子定公十四年奔魯疑所服也親者屬大功是正義曰為同母異父昆弟之服喪服無文故子游疑之其大功乎乎是疑辭也云親者屬大功是者鄭意以為同母兄弟母之親屬服大功是也所以是者以同父同母則服期今但同母而以母是我親生其兄弟是親者血屬故降一等而服大功案聖證論王肅難鄭禮稱親者血屬謂出母之身不謂出母之子服也若出母之子服大功則出母之父母服應更重何以為出母之父母無服王肅云同母異父兄弟服大功者謂繼父服齊衰其子降一等故服大功馬昭難王肅云異父昆弟恩繼於母不繼於父肅以為從繼父而服非也張融以為繼父同居有子正服齊衰三月乃為其子大功非服之差玄說是也草六子思為嫁母服嫁母有繼有親子思之母死於衛柳若謂子思曰子聖人之後也四方於子乎觀禮子蓋愼諸子思曰吾何愼哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也吾何愼哉注云子思孔子孫伯魚之子伯魚卒其妻嫁衛柳若衛人也見子思欲為嫁母服恐其失禮戒之嫁母齊衰期謂時可行而財不足以備禮謂財足以備禮而時不得行者時所止則止時所行則行無所疑也喪之禮如子贈禭之屬不踰主人正義曰云嫁母齊衰期者嫁母之服喪服無文案喪服杖期章云父卒繼母嫁從為之服報則親母可知故鄭約云齊衰期也又鄭止言齊衰期不言嫡庶故譙周袁準並云父卒母嫁非父所絶嫡子雖主祭猶冝服期而喪服為出母期嫁母與出母俱是絶族故知與出母同也張逸問舊儒丗本皆以孔子後數丗皆一子禮適子為父後為嫁母無服檀弓說子思從於嫁母服何鄭答云子思哭嫂為位必非適子或者兄若早死無繼故云數丗皆一子草七縣棺而封不待碑繂縣棺而封封即窆窆下棺內壙中也貴者則用碑繂若貧而即葬者但手縣棺而下之同於庶人不待碑繂不設碑繂不備禮草八三斬板謂斷其縮今一日而三斬板而巳封注云板蓋廣二尺長六尺斬板謂斷其縮也三斷止之旁殺蓋髙四尺其廣袤未聞也詩云縮板以載一本束板草九夫子言四墳之異子夏以馬鬛釋斧昔者夫子言之曰吾見封之若堂者矣既巳語燕人無觀又此歷𫐠孔子之言者欲以此語與燕人為法封謂墳之也若如堂基四方而髙見若坊者矣坊堤也堤坊水上平而兩旁殺其南北長也言又見有築墳形如坊者也見若覆夏屋者矣殷人以來始屋四阿夏家之屋唯兩下而巳無四阿如漢之門廡又言見其封墳如覆夏屋唯兩下而殺卑而寬廣又見封如斧之形其刃嚮上長而髙也既言四墳之異夫子之意從若斧者焉以為刃上難登狹又易為功力子夏既道從若斧形恐燕人不識故舉俗稱馬鬛封之謂也以語燕人馬騣鬛之上其肉薄封形似之卅一夫子墓無馬鬛封不止三板知蓋髙四尺者以上合葬於防崇四尺今葬夫子不可過之又板廣二尺三板斜殺唯髙四尺耳其東西之廣南北之袤則未聞也孫育難云孔子墓魯城北門外西墳四方前髙後下形似卧斧髙八九尺今無馬鬛封之形不止于三板記似誤者孫育云據當時所見其墳或後人增益不與元葬墳同卅二薦新如朔奠又大夫以上朔望士朔有薦新如朔奠注云重新物為之殷奠正義曰薦新謂未葬中間得新味而薦亡者如朔奠者謂未葬前月朔大奠於殯宫者大奠則牲饌豐也朔禮視大斂士則特豚三鼎今若有新物及五榖始熟薦於亡者則其禮牲物如朔之奠也大夫以上則朔望大奠若士但朔而不望卅三棺四重三重之制天子之棺四重水兕革棺𬒳之其厚三寸杝棺一梓棺二四者皆周棺束縮二衡三祍每束一柏椁以端長六尺注云尚深邃也諸公三重諸侯再重大夫一重士不重以水牛兕牛之革以為棺𬒳革各厚三寸合六寸也此為一重杝所謂椑棺也爾雅曰椵杝梓所謂屬與大棺周匝也凡棺用能濕之物衡亦當為橫祍今小要祍或作􅃮或作髹以端題湊也其方蓋一尺卅四棺椁之制杝棺一者椵也材亦能濕故次皮也杝唯一種故云一也諸侯無革則杝親尸也所謂椑棺也即前言君即位為椑是也杝即椵木鄭引爾雅曰椵杝一物二名名椵又名杝也梓棺二者杝棺之外又有屬棺屬棺之外又有大棺大棺與屬棺並用梓故云二也則喪大記云屬六寸大棺八寸也四者皆周者四四重也周匝也謂四重之棺上下四方悉周匝也唯椁不周下有茵上有抗席故也棺束者古棺木無釘故用皮束合之縮二者縮縱也縱束者用二行也衡三者橫束者三行也祍每束一者祍小要也其形兩頭廣中央小也既不用釘棺但先鑿棺邊及兩頭合際處作坎形則以小要連之令固棺並相對每束之處以一行之祍連之若竪束之處則竪著其祍以連棺蓋及底之木使與棺頭尾之材相固漢時呼祍為小要也柏椁者謂為椁用柏也天子柏諸侯松大夫柏士雜木也鄭注方相職云天子椁柏黃腸為裏而表以石焉三五魯哀公誄孔子魯哀公誄孔丘曰天下遺耆老莫相豫位焉嗚呼哀哉尼父注云誄其行以為諡也莫無也相佐也言孔子死無佐助我處位者尼父因其字以為之諡正義曰此一節論哀公誄孔子之事孔子以哀公十六年夏四月巳丑日卒哀公欲為作諡作諡冝先列其生時行狀謂之為誄檀三六弔喪賔位隨主人而變案賔位之法隨主人而變小斂之前主人未忍在主位有事在西階下則賔亦入門西弔於西階下故士喪禮君使人禭主人拜送拜賔即位西階下東面鄭云未忍即主人位也小斂之後尸則出堂廉然後有飾主人位則在阼階下西面賔弔者入門東於東階下弔也故士喪禮小斂訖故士舉男女奉尸侇於堂主人降自西階即位踊襲絰于序東鄭云即位踊東方位也則衆主人不接賔發𥘉在東耳三七既諌可議政未諌不可言君過事君有犯而無隱注既諌人有問其國政者可以語其得失若齊晏子為晉叔向言之正義曰昭三年左傳云晏子謂景公曰小人近市朝夕得所求景公曰子近市何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤諌景公重刑後及其聘晉與叔向言齊國之政將歸陳氏景公厚斂焉陳氏厚施焉是既諌得言君之過若其未諌而言君過則不可故昭三年子大叔如晉張躍與子大叔言云火星中而寒暑退此其極也能無退乎未曽諌君輒言君德之退故傳云張躍有知其猶在君子之後乎是其𬒳譏也魯昭公取同姓孔子不仕昭公既先諌所以論語稱孔子為昭公諱而稱丘也過者聖人含弘勸獎攬過歸已非實事也若史䇿書理則不一若其良史直筆不隱君過董孤書趙盾弒君及丹楹刻桷之屬是也若忠順臣則諱君親之惡者春秋辟諱皆是故僖元年左傳云諱國惡禮也三九明器外有用器謂明器之屬者案既夕禮除明器之外有用器弓矢耒耜兩敦兩杆槃匜燕樂器甲胃干笮杖笠翣等四十帷荒內木材為柳帷荒亦㹅稱柳案喪大記注云在旁曰帷在上曰荒帷荒所以衣柳則以帷荒之內木材為柳其實帷荒及木材等揔名曰柳故縫人云衣翣柳之材注云柳之言聚諸飾之所聚是帷荒揔稱柳也四一曽子嘗辭卿故不得寢大夫之床正義曰知齊嘗聘以為卿者韓詩外傳云曽子仕於莒得粟三秉方是之時曽子重其祿而輕其身親沒之後齊迎以相楚迎以令尹晉迎以上卿方是之時曽子重其身而輕其祿既言輕其祿是不為也但齊以相楚以令尹晉以上卿而鄭言齊嘗聘為卿者以三國文連含帶為注耳且相即是上卿禮云男子不死於婦人之手婦人不死於男子之手故春秋魯僖公薨于小寢譏即安也成公薨於路寢傳曰言道也他人名己得呼為大夫之稱而言夫子若己不為大夫則已所為當須依禮不得寢大夫之床也四二或長婦為娣弟妻為姒不據夫年案喪服小功章娣姒婦報傳云弟長也鄭注云娣姒婦者兄弟之妻相名也長婦謂稚婦為娣婦娣婦謂長婦為姒婦謂據婦年之長幼則不據夫年之大小故成十一年左傳云聲伯之母不聘穆姜曰吾不以妾為姒穆姜魯宣公夫人聲伯之母魯宣公弟叔盻之妻是弟妻為姒又昭二十八年左傳云子容之母走謁諸姑曰長叔姒生男子容之母伯華之妻也長叔姒是伯華之弟叔盻之妻是亦謂弟妻為姒也皆不繫夫身長幼四三孔子為大夫得有驂馬騑馬曰驂者說文云騑旁馬是在服馬之旁又詩云騏駵是中騧驪是驂驂在外也孔子得有驂馬者案王度記云天子駕六馬諸侯四大夫三士二古毛詩云天子至大夫皆駕四孔子既身為大夫若依王度記則有一驂馬也若依毛詩說則有二驂馬也四四孔子說驂於舊館惜車於顔回顔回之喪子哭之慟慟比出涕慟則為甚矣又舊館之恩不得比顔回之極而說驂於舊館惜車於顔回者但舊館情疏厚恩待我須有贈􅉠故說驂賻之顔回則師徒之恩親乃是常事則顔回之死必當以物與之顔路無厭更請賣車為椁以其不知止足故夫子抑之四五孔子夢饋食不夢凶奠言奠者以為凶象正義曰時夫子夢見饋食不夢凶奠也但奠禮既死之後未葬之前柩仍在地未立尸主唯奠停飲食故云奠也四六弔服隨主人而變几弔喪之禮主人未變之前弔者吉服而弔吉服謂羔裘玄冠緇衣素裳又袒去上服以露裼衣則此裼裘而弔是也主人既變之後雖著朝服而加武以絰又掩其上服若是朋友又加帶則此襲裘帶絰而入是也案喪大記云弔者襲裘加武帶絰注云始死弔者朝服裼裘如吉時也小斂則改襲而加武與帶絰矣武吉冠之卷也加武者明不改冠但加絰於武喪大記所云亦據朋友故云帶絰帶既在腰鄭注加武與帶絰似帶亦加武者其實加武唯絰連言帶耳四七吉祭後弔服無文而有弔法吉祭巳後或來弔者其服無文除喪之後亦有弔法故春秋文九年秦人來歸僖公成風之禭是也四八賻布之餘分死者所矜請班諸兄弟之貧者注以分死者所矜也祿多則與鄰里鄉黨四九從母之夫舅之妻因甥為文從母之夫舅之妻二夫人相為服君子未之言也注二夫人猶言此二人也時有此二人同居死相為服者甥居外家而非之正義曰言從母及舅皆是外甥稱謂之辭故知甥也若他人之言應云妻之兄弟婦夫之姊妹夫相為服不得云從母之夫舅之妻也五十王肅以聖人之葬人與絶句子夏曰聖人之葬人與人之葬聖人也子何觀焉注與及也正義曰王肅云聖人葬人與屬上句以言若聖人葬人與則人庶有異聞得來觀者若人之葬聖人與凡人何異而子何觀之五一練衣外除正服不可變練練衣黃裏縓緣注小祥練冠練中衣以黃為內縓為飾黃之色卑於纁縓纁之類明外除正義曰練小祥也小祥而著練冠練中衣故曰練也練衣者練為中衣黃裏者黃為中衣裏也正服不可變中衣非正服但承衰而巳故小祥而為之黃祫裏也縓緣者縓為淺絳色也緣謂中衣領及裒緣也裏用黃而領緣用縓者領緣外也明其外除故飾見外也案此文小祥外衰內有練中衣中衣內有裼衣裼衣內有鹿裘鹿裘內自有常著襦衣五二有禮有財無時弗行子思曰有其禮有其財無其時君子弗行也正義曰謂若嫁母之家主人貧乏斂手足形還葬己雖有財不得過於主人故下注喪之禮如子贈禭之屬不踰主人同治乙丑六月獨山莫友芝借讀過禮記要義卷三終
