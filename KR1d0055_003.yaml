front:
  text: 禮記要義卷第五王制上
  hash: sha256:bd0557e91f312b59a29dab3dfd8a378d27c235057ca8fef1be5adad05b030ca8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_003-1a}
body:
  text: 一王制是秦漢時作案鄭目録云名曰王制者以其記先王班爵授祿祭祀養老之法度此於別録制度王制之作蓋在秦漢之際知者案下文云有正聽之鄭云漢有正平承秦所置又有古者以周尺之言今以周尺之語則知是周亡之後也秦昭王亡周故鄭答臨碩云孟子當赧王之際王制之作復在其後盧植云漢孝文皇帝令博士諸生作此王制之書二君臣象五行剛柔王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等注云二五象五行剛柔十日祿所受食爵秩次也上大夫曰卿正義曰南面之君五者法五行之剛日北面之臣五者法五行之柔日不以王朝之臣而以諸侯臣者王朝之臣本是事王今王制統天下故不自在其數謂制統天下之君及天下之臣取君臣自相對故不取王臣也三釋公卿大夫士名義亦可互稱上大夫卿者見下文云下大夫倍上士卿四大夫祿是下大夫之上則有卿故知上大夫即卿也此上大夫卿外唯有下大夫所以下文除卿之外更有上大夫下大夫者謂就下大夫之中更分為上下耳卿者白虎通云卿之言嚮也為人所歸嚮大夫者逹人謂扶逹於人士者事也皇氏熊氏皆為任職事其大夫之稱亦得兼三公故詩云三事大夫謂三公也上夫夫卿亦兼孤也故春秋陽處父為太傅經云晉殺其大夫陽處父是也孤亦稱公故鄉飲酒禮云公三重是孤也卿亦得稱公故春秋襄三十年傳云鄭伯有之臣稱伯有曰吾公在壑谷士既命同而分為三等者言士職卑德薄義取漸進故細分為三卿與大夫德髙位顯各有別命不復細分其諸侯以下及三公至士總而言之皆謂之官官者管也以管領為名若指其所主則謂之職四畿內外之官增地與否云唯天子畿內不增以祿羣臣不主為治民者解畿外之地公侯伯子男皆增其地今畿內公卿大夫采地不增益之者本以祿賜羣臣不須增益其地以其不主為治民故也外土諸侯本為治民須便民利國故須增益其封周之畿內有百里之國有五十里之國有二十五里之國鄭注小司徒云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸故崔氏云畿內有百里之國有五十里之國有二十五里之國五上農夫食九人尚書禹貢注云一井上上出九夫稅上中出八夫稅上下出七夫稅中上出六夫稅中中出五夫稅中下出四夫稅下上出三夫稅下中出二夫稅下下出一夫稅所以又有此九等者以禹貢九州有上中下九等出沒不同故以井田計之以一州當一井假令冀州上上出九百萬夫之稅兖州下下出一百萬夫之稅是九州大較相比如此非謂冀州之民皆出上上兖州之民皆出下下與周禮九等又不同也所以上農夫得食九人者以史記云上地畒一鐘鐘六斛四斗百畒百鐘則六百四十斛案食貨志又云上孰其收自四斛則百畒四百斛也案廩人中歲人食三釜其九人之內老幼相通不皆人食三釜故食九人也其民之常稅不過什一又庶民喪祭費用又少且年有豐儉不恆上孰崔氏以為畒皆一鐘人恆食四釜又為什二而稅又云祭用數之仂者苟欲計算使合其義非也六九州封國附庸之數凡四海之內九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸間四八州州二百一十國注云建立也立大國三十十三公也立次國六十十六卿也立小國百二十十二小卿也名山大澤不以封者與民同財不得障管亦賦稅之而巳此大界方三千里三三而九方千里者九也其一為縣內餘八各立一州此殷制也周公制禮九州大界方七千里七七四十九方千里者四十有九也其一為畿內餘四十八八州各有方千里者六設法一州封地方五百里者不過四謂之大國又封方四百里者不過六又封方三百里者不過十一謂之次國又封方二百里者不過二十五及餘方百里者謂之小國盈上四等之數并四十六一州二百一十國則餘方百里者百六十四也凡處地方千里者五方百里者五十九其餘方百里者四十一附庸地也疏設法假設為法非實封也七致仕副邑八王子弟封邑九公卿之子丗祿天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以祿士以為間田注云縣內夏時天子所居州界名也殷曰畿詩殷頌曰邦畿千里維民所止周亦曰畿畿內大國九者三公之田三為有致仕者副之為六也其餘三待封王之子弟次國二十一者卿之田六亦為有致仕者副之為十二又三為三孤之田其餘六亦待封王之子弟小國六十三大夫之田二十七亦為有致仕者副之為五十四其餘九亦以待封王之子弟三孤之田不副者以其無職佐公論道耳雖其致仕猶可即而謀焉朌讀為班正義曰以九十三國以封公卿大夫故特云以祿士其實公卿之子父死之後既不丗爵得食父祿故下文云大夫不丗爵未賜爵視天子之元士以君其國是九十三國之外既云視元士則此祿士包之也其不封與祿士為間田即公邑也十畿內四百國非實法鄭云四百國在畿內者以大略據子男為言非實法也趙商不達鄭旨而問鄭云以王制論之畿內之國有百里有七十里有五十里今率以下等計之又有王城關遂郊郭卿大夫之采地數不在中今就四百似頗不合鄭答之云三代異物王制之法唐虞或不盡然堯舜之德守在四疆鄉遂有無無以言也公卿大夫有田祿者其四百國非采地為何王城之大郊關之處幾何而子責急也此鄭亦隨問而答非事實也必知非實者以地形不可平如圗又有山澤不封之地何有同積棊無空闕之處故知略計地為四百國耳十一名山大川財物入玉府云名山大澤不以封者與民同財者若封諸侯則諸侯為主民不得取其財物故不封諸侯使民共取故山虞職云令萬民時斬材有期日是也云不得障管亦賦稅之而巳者既不封諸侯其諸侯不得障塞管領禁民取物民既取物隨其所取賦稅而巳故山澤虞云使其地之人守其財物以時入之于玉府是也十二附庸非國國皆有又積纍而滿同案鄭注大司徒云侯附庸九同伯附庸七同子附庸五同男附三同今一州唯有方百里者四十一得備侯伯子男二百一十國附庸者鄭注司徒云凡諸侯為牧正帥長及有德者乃有附庸非國國皆有且此云州別二百一十國及侯附庸九同皆設法而言非實事也注侯附庸九同者諸侯有功可進為公為四百里之上加九同得進為五百里也伯於三百里之上加七同得為四百里進為侯也子於二百里之上加五同得為三百里進為伯也男於百里之上加三同得為二百里進為子也言同者謂積纍衆附庸而滿同也非謂一附庸居一同也鄭注司徒云公無附庸以其尊極故又鄭云魯以周公之故得兼四等加二十四附庸方七百里也十三公卿亦有無地者此云祿士謂無地之士給之以地而當其祿不得為采邑耳其實春秋之時公卿亦有無地者故春秋經劉子單子是有地者稱爵王子虎卒是無地者不稱爵也十四三公致仕副邑十五王子弟三等十六三孤在朝在家一等云為有致仕者副之者以三公在朝既有正田今身既致仕不可仍食三公采邑身又見存不可全無其地故公卿大夫皆有正職之田又有致仕副邑云其餘三待封王之子弟者禮運云天子有田以處其子孫又周禮有都宗人家宗人祭祀皆致福於王是有封王之子弟也但王之子弟有同母異母有親疏之異親寵者封之與三公同平常者與六卿同疏逺者與大夫同故有三等之差也云三孤之田不副者自上差之三公之外其餘有三卿之外其餘有六大夫之外其餘有九皆以次相三若三孤有致仕之副則卿與公同其餘三非差次也云以其無職佐公論道耳雖其致仕猶可即而謀焉者案周禮三公雖無正職猶列於官參六卿之事故司徒云鄉老二鄉則公一人三孤則不列於官故云無職但佐公論道在朝在家其事一等雖退致仕猶可就而謀事不須致仕之後朝上更別立官故知不有致仕之副十七易塗山為會稽明守土之祀哀七年左傳文時魯欲伐邾孟孫不欲諸大夫答孟孫云禹會諸侯於塗山執玉帛者萬國今其存者無數十焉又襄二十五年傳云若無侵小何以至焉杜預云塗山在壽春東北與會稽別也若鄭康成之意塗山則會稽也故注尚書云禹朝羣臣於會稽執玉帛者萬國是以張逸疑而問鄭案左傳禹會諸侯於塗山執玉帛者萬國外傳云禹朝羣臣於會稽防風氏後至不與注相應何鄭答云欲明諸侯守土之祀故兼用外傳內傳語者鄭意以塗山會稽為一以諸侯為守土之祀故云禹朝羣臣羣臣則諸侯也鄭云兼用外傳內傳語者禹朝羣臣於會稽是外傳語執玉帛者萬國是內傳左氏語十八萬國之數十九州立十二人為諸侯師案萬國之數鄭注臯陶謨堯𥘉制五服更五百里禹所弼每服五百里故始有百里之封焉猶用要服之內為九州州立十二人為諸侯師蓋百國一師則州十有二師則每州千二百國也八州九千六百國其餘四百國在畿內二十鄭氏解易繫一君二民易下繫云一君二民君子之道二君一民小人之道鄭注一君二民謂黃帝堯舜謂地方萬里為方千里者百中國之民居七千里七七四十九方千里者四十九夷狄之民居千里者五十一是中國夷狄二民共事一君二君一民謂三代之末以地方五千里一君有五千里之土五五二十五更足以一君二十五始滿千里之方五十乃當堯舜一民之地故云二君一民實無此二君一民假之以地廣狹為優劣也草一共官為御天子百里之內以共官千里之內以為御注云謂此地之田稅所給也官謂其文書財用也御謂衣食草二伯之賢者可進為牧草三牧下有伯草四畿內不置伯草五二王後不為牧千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯注云屬連卒州猶聚也伯帥正亦長也凡長皆因賢侯為之殷之州長曰伯虞夏及周皆曰牧正義曰凡長皆因賢侯為之者既長諸侯非賢不可故知賢侯為之言因者因其州內賢侯非州外別取州牧則知以賢侯為之故下曲禮以侯為牧周制牧下有二伯則侯伯皆得為之故詩旄丘責衛伯也衛是侯爵而為州伯張逸疑而問鄭鄭答云侯德適任之謂衛侯之德適可任州伯也然則伯之賢者亦可進為牧故周禮宗伯八命作牧注云謂侯伯有功德者加命得專征伐是伯得為牧也鄭必知州牧之下更有二伯者以左傳云五侯九伯服杜皆為五等諸侯九州之伯鄭答志云若征五等諸侯九州之伯何夾輔之有大公為王官伯分主自陜以東不可分為四侯半故稱五侯四州有八伯畿內有一伯故為九伯也案鄭志注尚書為八伯張逸問云九州而八伯者何鄭答云畿內之州不置伯有鄉遂之吏主之伯即牧也故周禮大宰云施典于邦國建其牧立其監是畿外邦國有牧畿內不置也畿內既不置牧則應無牧下之伯而立五侯九伯畿內有一伯者但比擬畿外應有而言之其實無也州長既用賢侯為之則卒正連帥屬長節級用伯子男賢者而為之鄭注曲禮云二王之後不為牧則殷亦當然草六虞夏周曰牧云虞夏及周皆曰牧者案尚書舜典云覲四嶽羣牧又云咨十有二牧是虞稱牧也虞雖稱牧亦稱伯故書傳云唯元祀巡此四嶽八伯案左傳宣三年云夏之方有德也貢金九牧是夏稱牧也太宰云建其牧是周稱牧也草七采謂取美物以當榖稅千里之內曰甸千里之外曰采注云服治田出榖稅九州之內地取其美物以當榖稅正義曰經云千里之外曰采謂規方千里之外若於王城五百里之外以殷制言之中國方三千里而面別去王城千五百里今五百里以為畿內千里之外唯千里耳采取美物故言曰采周則王畿之外面別三千里采取美物則大行人侯服其貢祀物甸服其貢器物采服其貢服物衛服其貢材物要服其貢貨物是也草八三監佐方伯領諸侯天子使其大夫為三監監於方伯之國國三人注云使佐方伯領諸侯正義曰崔氏云此謂殷之方伯皆有三人以輔之佐其伯謂監所領之諸侯也周則於牧下置二伯亦或因殷使大夫為三監故燕禮云設諸公之坐鄭云公孤也大國孤公一人而云諸公者容牧有三監然則天子於州牧之國別置三大夫以輔之其尊卑之差則下文其祿視諸侯之卿其爵視次國之君其祿視諸侯之卿者謂公之孤也故燕禮謂之諸公與公孤同也尚書使管叔蔡叔霍叔為三監者為武庚也與此別也草九大國三卿命於天子大國三卿皆命於天子注云如今詔書除吏正義曰春秋左傳云季孫為司徒叔孫為司馬孟孫為司空故知諸侯不立冡宰宗伯司寇崔云大夫以下其君自命三十畿內公卿大夫之子食父祿畿外諸侯丗子未爵視元士天子之縣內諸侯祿也注云選賢置之於位其國之祿如諸侯不得丗正義曰此一經論天子縣內食采邑諸侯得祿不得繼丗之事此言縣內則夏法也言諸侯祿者得采國為祿而不繼丗故云祿也故下云大夫不丗爵是也此謂畿內公卿大夫之子父死之後得食父之故國采邑之地不得繼父為公卿大夫也故經直云祿也則子孫恆得食之有罪乃奪之此云諸侯下云大夫不丗爵則諸侯總據大夫以上而司裘諸侯則共熊侯豹侯鄭注云諸侯謂三公及王子弟鄭唯據三公及王子弟者以下別云卿大夫則共麋侯故諸侯唯止三公及王子弟而巳此父死子祿者不在九十三國之數此雖論夏法殷周亦然畿內諸侯父死視元士若有賢德乃復父位若畿外諸侯父死未賜爵亦視元士除服則得襲父故位故下文云未賜爵視天子元士以君其國注云列國及縣內之國也必知列國未賜爵亦視元士者以詩云韎韐有奭以作六師是諸侯丗子未爵命服士之韎韐之服是也卅一丗祿不丗位外諸侯嗣也注云有功乃封之使之丗也冠禮記曰繼丗以立諸侯象賢也正義曰案公羊榖梁説云卿大夫丗則權并一姓妨塞賢路經譏尹氏崔氏是也古春秋左氏説卿大夫得丗祿不丗位父為大夫死子得食其故采地如有賢才則復父故位許愼謹案易爻位三為三公食舊德謂食父故祿尚書云丗選爾勞論語云興滅國繼絶丗詩云凡周之士不顯亦丗孟子云文王之治歧也仕者丗祿知周丗祿也從左氏義鄭氏無駮與許同殷之大夫亦丗祿故祭義云殷人貴冨而尚齒注云臣能丗祿曰冨是也其諸侯之大夫則下文云不丗爵祿謂殷禮也若周制諸侯之大夫有功者亦得丗祿故隱公八年無駭卒左傳云官有丗功則有官族論語云管氏奪伯氏駢邑三百以無功而奪之若有功則不奪也卅二天子衣服之制法隂陽周有登降衣服之制歷代不同案易繫辭云黃帝堯舜垂衣裳而天下治蓋取諸乾坤玄衣法天黃裳法地故易坤六五黃裳元吉是也衣裳從黃帝以來而有也虞氏以來其裳用纁故下文歷陳虞夏殷周注云其服皆玄上纁下裳用纁者鄭注易下繫辭云土託位南方南方色赤黃而兼赤故為纁也案禮祭地牲玉用黃以放地色裳既法地而用纁者凡衣服著其身有章采文物以黃色太質故用纁也衣為天色玄禮天牲玉用蒼者以天色晝則蒼夜則玄衣不用蒼亦以其大質故也然祭天亦有牲用玄者尚書及論語云敢用玄牡敢昭告于皇皇后帝是也虞夏之制天子祭服自日月而下十有二章故尚書臯陶云豫欲觀古人之象日月星辰山龍華蟲作會宗彞藻火粉米黼黻絺繡是也日一也月二也星辰三也山四也龍五也華蟲六也此六者皆畫於衣故言作會以法於天其數六者法天之陽氣之六律也宗彞七也藻八也火九也粉米十也黼十一也黻十二也此六者皆繡於裳故云絺繡絺紩也謂紩刺以為繡文以法地之隂氣六吕也案鄭注司服云至周登龍於山登火於宗彞尊其神明也龍取其神火取其明然則諸物各有所象故説日月星辰取其明山者安靜養物畫山者必兼畫山物故考工記云山以章龍者取其神化龍是水物畫龍必兼畫水故考工記云水以龍華蟲者謂雉也取其文采又性能耿介必知華蟲是雉者以周禮差之而當鷩冕故為雉也雉是鳥類其頸毛及尾似蛇兼有細毛似獸故考工記云鳥獸蛇此六者以髙逺在上故畫於衣宗彞者謂宗廟彞尊之飾有虎蜼二獸虎有猛蜼能辟害故象之不言虎蜼而謂之宗彞者取其美名案周禮有六彞有雞彞鳥彞斚彞黃彞虎彞蜼彞此直云宗彞知非雞彞鳥斚黃必為虎蜼者案明堂位云夏后氏雞彞殷以斚周以黃目又周禮陳六尊六彞皆逺代者在後故六尊之次犧象著壷大山大是虞氏之尊山是夏后之尊六彞之次亦虎彞蜼彞在後故知虎蜼虞夏巳飾於尊但舜時已稱宗彞不得有雞斚之等以周禮差之而當毳冕故知虎蜼有毛之物也虎蜼淺毛細毳故也藻者取其潔清有文火者取其明照烹飪粉米取其潔白生養黼謂斧也取其決斷之義黻謂兩己相背取其善惡分辨大意取象如此而皇氏乃繁文曲説橫生義例恐非本旨此是天豫之服其諸侯以下未得而聞卅三魯禮衮冕有日月周之衣服既無日月而郊特牲云衮冕日月之章者謂魯禮也魯以周公之故衮冕亦日月之章卅四殯葬或數來月日或數往月日案左傳大夫言三月士言踰月此總云大夫士三月而葬者此記者皆以降二為差故總云三月左傳細言其別故云大夫三月士踰月其實大夫三月者除死月為三月士三月者數死月為三月正是踰越一月故言踰月耳案膏肓休以為士禮三月而葬今左氏云踰月於義左氏為短玄針之曰禮人君之喪殯葬皆數來月來日士殯葬皆數死月死日尊卑相下之差數故大夫士俱三月其實不同士之三月及大夫之踰月也鄭針膏肓以正禮而言故云人君殯葬數來月來日若春秋之時天子諸侯之葬皆數死月故文八年八月天王崩九年二月葬襄王又成十八年八月公薨十二月葬傳云書順也是皆數死月也故鄭又云人君殯數來日葬數往月據春秋為説卅五諸侯奔喪會葬諸説不同諸侯奔喪案異義公羊説天王喪赴者至諸侯哭雖有父母之喪越紼而行事葬畢乃還左氏説王喪赴者至諸侯既哭問故遂服斬衰使上卿弔上卿會葬經書叔孫得臣如京師葬襄王以為得禮許慎謹案易下邳傳甘容説諸侯在千里內皆奔喪千里外不奔喪若同姓千里外猶奔喪親親也容説為近禮鄭駮之云天子於諸侯無服諸侯為天子斬衰三年尊卑有差案魯夫人成風薨王使榮叔歸含且賵召伯來會葬傳曰禮也襄王崩叔孫得臣如周葬襄王天子於魯既含且賵又會葬為得禮則是魯於天子一大夫會為不得禮可知又左傳云鄭遊吉云靈王之喪我先君簡公在楚我先大夫印假實往敝邑之少卿也王吏不討恤所無也豈非左氏諸侯奔天子之喪及會葬之明文説左氏者云諸侯不得棄其所守奔喪自違其傳同姓雖千里外猶奔喪又與禮乖鄭之所駮從公羊之義又以左氏傳諸侯亦奔喪但説左氏者自違其傳云不奔喪又難許愼云千里外同姓猶奔喪與禮乖也此是鄭氏之意其諸侯自相奔喪禮案公羊説遣大夫弔君會其葬左氏説諸侯之喪士弔大夫會葬文襄之霸令大夫弔卿共葬事許愼謹案周禮無諸侯會葬義知不相會葬從左氏義鄭氏無駮與許同卅六五服五章與孝經注不同案臯陶謨云五服五章哉鄭注云五服十二也九也七也五也三也如鄭之意九者謂公侯之服自山而下七者是伯之服自華而下五者謂子男之服自藻而下三者卿大夫之服自粉米而下與孝經注不同者孝經舉其大綱或云孝經非鄭注以上所云虞舜之制而夏殷注云未聞至周則日月星辰畫於旌旗又登龍於山登火於宗彞故注司服云王者相變至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也而冕服九章𥘉一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞皆畫以為繢六曰藻次七曰粉米次八曰黼次九曰黻皆希以為繡則衮之衣五章裳四章凡九也鷩之衣三章裳四章凡七也毳之衣三章裳二章凡五也希之衣一章裳二章凡三也玄者衣無文裳刺黻而巳是以謂玄焉鄭必知日月星辰畫於旌旗者以司服王自衮冕而下則衮服最尊尚無日月星辰故知日月星辰不在衣服畫於旌旗也知登龍於山者依舊山在龍上若不登龍則衮冕不為最尊故知登龍於山也知登火於宗彞者若不登火則五章之服自藻而下不得稱為毳冕若登火於宗彞之上則五章自宗彞而下與毳冕相當然宗彞之下有藻火兩章知不登藻而必登火者火有光明之盛春秋傳曰火龍黼黻禮記殷火周龍章是火貴於藻也故知登火不登藻自九章而下以次相差故知衮之衣五章鷩衣毳衣皆三章絺衣一章衣法天故章數竒裳法地故章數偶以下其數漸少則裳上之章漸勝於衣事勢須然非有義意皇氏每事曲為其説恐理非也衣章並畫絺冕之衣獨繡者以粉米地物養人服之以祭社稷又地秖並是隂類故衣章亦繡也四一六服而五冕蓋大裘之冕無旒其衣服首飾大裘之冕其冕無旒故注辨師云冕服有六而言五冕者大裘之冕蓋無旒不聮數也凡冕之制皆玄上纁下故注辨師云皆玄覆朱裏師説以木版為中以三十升玄布衣之於上謂之延也以朱為裏但不知用布繒耳當應以繒為之以其前後旒用絲故也案漢禮器制度廣八寸長尺六寸也又董巴輿服志云廣七寸長尺二寸皇氏謂此為諸侯之冕應劭漢官儀廣七寸長八寸皇氏以為卿大夫之冕服也若如皇氏言豈董巴專記諸侯應劭專記卿大夫蓋冕隨代變異大小不同今依漢禮器制度為定也今天子五冕之旒皆用五采之絲為旒垂五采之玉故辨師云掌王之五冕五采繅十有二就皆五采玉有十二鄭注云每就間蓋一寸旒別有五采玉十有二衮冕故前後各十二旒用玉二百八十八鷩冕九旒用玉二百一十六毳冕七旒用玉一百六十八絺冕五旒用玉百二十玄冕三旒用玉七十二皮辨縫中亦五采玉十二故辨師云玉之皮辨會五采玉璂鄭注云會縫中也縫中每貫結五采玉十二以為飾韋辨亦然故辨師云諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之則知天子韋辨與皮辨同也其冠辨亦與皮辨同故注辨師云不言冠辨冠辨兼於韋辨皮辨矣自此以前皆王者之服祭服則以衣名冕象上古先有衣後有冕皮辨以下則以辨名衣餘服既輕舉首為重故也其諸侯以下則司服云公之服自衮冕而下侯伯之服自鷩冕而下子男之服自毳冕而下孤之服自希冕而下卿大夫之服自玄冕而下士之服自皮辨而下四五上公諸侯卿大夫助祭及自祭之冕服公之衮冕章數與王同其就數則異故鄭注覲禮云上公衮無升龍其旒則九不十二也其三公司服無文案射人三公執璧與子男同則服毳冕也凡此諸侯所著之服皆為助祭於王若助王祭天地及祭先王大祀之等皆服巳上之服若其從王祭祀小祀雖有應著上服皆逐王所著之服不得踰王也自在國祭其先君則皆玄冕故玉藻云諸侯玄端以祭鄭云端當為冕其二王之後祭受命之王各服巳上之服其自祭餘廟與諸侯同有孤之國其孤則絺冕卿大夫玄冕士爵辨此皆謂助君祭服也無孤之國卿絺冕大夫玄冕以注玉藻云諸侯之臣皆分為三等其夫卿也則服鞠衣其夫大夫則服禪衣其夫士則服禒衣以此言之卿絺冕大夫玄冕士爵辨也此服皆謂助祭君也四六諸侯之孤卿大夫士自祭冕服其自祭則皆降焉諸侯士則玄端大夫則朝服故儀禮特牲士祭玄端少牢上大夫祭朝服公之孤爵辨以自祭故雜記云大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己鄭注云爵辨而祭於巳唯孤爾其天子卿大夫則無文諸侯當玄冕以祭其孤卿之等當爵辨也大夫則皮辨知者以諸侯大夫朝服自祭故知天子大夫亦用朝服自祭朝服則皮辨故鄭注玉藻云四命以上齊祭異冠四七八命九命專征七命以下屬於專征賜弓矢者謂八命作牧者若不作牧則不得賜弓矢故宗伯云八命作牧注云謂侯伯有功德者加命得專征伐此謂征伐當州之內若九命為二伯則得專征一方五侯九伯也若七命以下不得弓矢賜者尚書大傳云以兵屬於得專征伐者四八賜圭瓉未賜圭瓉及薰鬯之別賜圭瓉者亦謂上公九命者若未賜圭瓉者則用璋瓉故周禮小宗伯注云天子圭瓉諸侯璋瓉既不得鬯則用薰故王度記云天子以鬯諸侯以薰圭瓉之制案玉人職大璋中璋之下云黃金勺青金外朱中鼻寸衡四寸鄭注云鼻勺流也凡流皆為龍口也三璋之勺形如圭瓉又典瑞注瓉槃大五升口徑八寸下有槃口徑一尺又明堂位注云以大圭為柄玉人注又云有流前注此是圭瓉之形也鬯者釀秬黍為酒和以鬱金之草晉文侯雖以州牧之禮命之所賜者皆九賜之物但無鈇鉞之賜春秋之時見鄰國篡逆亦得專征伐若鄰國無罪而輒征之則不可故哀公八年魯伐邾吳子討之五十殷制大學在郊天子命之教然後為學小學在公宫南之左大學在郊注學所以學士之宫尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊此小學大學殷之制天子曰辟雍諸侯曰頖宫尊卑學異名辟明也雍和也所以明和天下頖之言班也所以班正教也正義曰所引書傳者伏生多士傳文假令百里之國國城居中面有五十里二十里置郊郊外仍有三十里七十里之國國城居中面有三十五里九里置郊郊外仍有二十六里五十里之國國城居中面有二十五里三里置郊郊外仍有二十二里此皆以四里為差此經小學在公宫南之左大學在郊既是殷制故引書傳郊之所在以明之若周制則司馬法云百里郊天子畿內方千里百里為郊則諸侯之郊皆計竟大小故聘禮注云逺郊上公五十里侯伯三十里子男十里也近郊各半之鄭必知近郊半逺郊者案書序云命君陳分正東郊成周注云東郊周之近郊也蓋五十里今河南洛陽相去則然以天子近郊半逺郊則知諸侯近郊皆半逺郊也以經文承上諸侯之下故直云天子命之教不云命諸侯從可知云此小學大學殷之制者以下文云殷人養國老於右學養庶老於左學則左學小右學大此經云小學在公宫南之左故知殷制也周則大學在國小學在西郊下文具也禮記要義卷第五
