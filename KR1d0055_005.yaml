body:
  text: 四星辰亦隨地升降星辰亦隨地升降故鄭注考靈耀云夏日道上與四表平下去東井十二度爲三萬里則是夏至之日上極萬五千里星辰下極萬五千里故夏至之日下至東井三萬里地五日與星辰四遊相反相去三萬里立春星辰西遊日則東遊春分星辰西遊之極日東遊之極日與星辰相去三萬里夏則星辰北遊日則南遊夏至星辰北遊之極日南遊之極日與星辰相去三萬里以此推之秋冬於此可知計夏至之日日在井星正當嵩髙之上以其南遊之極故在嵩髙之南萬五千里所以夏至有尺五寸之景也於時日又上極星辰下極故日下去東井三萬里也然鄭四遊之極元出周髀之文但日與星辰四遊相反春分日在婁則婁星極西日體在婁星之東去婁三萬里以度言之十二度也則日没之時去昬中之星近校十度旦時日極於東去旦中之星遠校十度若秋分日在角則角星極東日體在角星之西去角三萬里則日没之時去昬中之星遠校十度旦時日極於西去旦中之星近校十度此皆與曆乖違於數不合鄭無指解其事有疑但禮是鄭學故具言之耳賢者裁焉但二十八宿從東而左行日從西而右行一度逆㳂二十八宿案漢書律歷志云冬至之時日在牽牛𥘉度春分之時日在婁四度夏至之時日在東井三十一度秋分之時日在角十度若日在東井則晝極長八尺之表尺五寸之景若春分在婁秋分在角晝夜等八尺之表七尺五寸之景冬至日在斗則晝極短八尺之表一丈三尺之景一丈三尺之中去其一尺五寸則餘有一丈一尺五寸之景是冬夏徃來之景也凡於地千里而差一寸則夏至去冬至體漸南漸下相去一十萬五千里又考靈耀云正月假上八萬里假下一十萬四千里十月行有遲速諸星皆周天外行一度凡二十八宿及諸星皆循天左行一日一夜一周天一周天之外更行一度計一年三百六十五周天四分度之一日月五星則右行日一日一度月一日一十三度十九分度之七此相通之數也今曆家之說則月一日至於四日行最疾日行十四度餘自五日至八日行次疾日行十三度餘自九日至十九日行則遲日行十二度餘自二十日至二十三日又小疾日行十三度餘自二十四日至於晦行又最疾日行一十四度餘此是月行之大率也二十七日月行一周天至二十九日強半月及於日與日相㑹乃爲一月故考靈耀云九百四十分爲一日二十九日與四百九十九分爲月是一月二十九日之外至第三十日分至四百九十九分月及於日計九百四十分則四百七十爲半今四百九十九分是過半二十九分也十一月與星辰日照乃有光月是隂精日爲陽精故周髀云日猶火月猶水火則外光水則含景故月光生於日所照魄生於日所蔽當日則光盈就日則明盡京房云月與星辰隂者也有形無光可照之乃有光先師以爲日似彈丸月似鏡體或以爲月亦似彈丸日照處則明不照處則闇十二因日月之㑹分爲大數日月之行一歳十二㑹聖王因其㑹而分之以爲大數焉勸斗所建命其四時此云孟春者日月㑹於娵訾而斗建寅之辰也凡記昏明中星者爲人君南面而聽天下視時候以授民事十三孟不必爲庶長公子慶父庶長稱仲見莊二季䟽正義曰禮緯爲庶長稱孟故云孟長也若於人言之庶爲孟若於物言之直爲長也不取庶長之義先儒以孟春亦爲之庶長案尚書康誥云孟侯書傳天子之子十八稱孟侯並皆稱孟豈亦庶長乎十四日月十二㑹之大數聖王因其日月自然之㑹而分爲十二分以爲大略之數焉所以爲大略之數者以二十九日過半月及於日日不可分兩月各有二十九日又兩月各強半之日合兩半而成一日是一月有三十日一月二十九日一大一小之外仍有餘分一年十二月六大六小緫有三百五十四日是歳十二㑹之實數也仍少十一日四分日之一未得周天聖王緫以三百六十五日四分日之一爲十二㑹之大數一㑹即一辰也十五甲乙爲日名不爲月名其日甲乙注云乙之言軋也日之行春東從青道發生萬物月爲之佐時萬物皆解孚甲自抽軋而岀因以爲日名焉乙不爲月名者君統臣功也注於月名上去甲字未諭十六陽律隂律候氣之法正義曰案司農注周禮云陽律以竹爲管隂律以銅爲管鄭康成則以皆用銅爲之知者案律曆志量者龠合升斗斛本起黃鐘之龠而五量加之其法皆用銅聲中黃鐘以此準之故知用銅也司農云陽律以竹隂律以銅非也云應謂吹灰也者蔡邕云以法爲室三重户閉塗舋必周密布緹縵室中以木爲案毎律各一案内􅋻外髙從其方位加律其上以葭灰實其端其月氣至則灰飛而管通如蔡所云則是爲十二月律則布室内十二辰若其月氣至則其辰之管灰飛而管空也然則十二律各當其辰邪埋地下入地處􅋻出地處髙故云内􅋻外髙黃鐘之管埋於子位上頭嚮南以外諸管推之可悉知又律云以河内葭莩爲灰冝陽金門山竹爲管熊氏云案吹灰者謂作十二律管於室中四時位上埋之地蘆莩燒之作灰而實之律管中以羅縠覆之氣至則吹灰動縠矣小動爲氣和大動爲君弱臣強專政之應不動縠爲君嚴猛之應云凡律空圍九分者以黃鐘爲諸律之首諸律雖長短有差其圍皆以九分爲限十七七八生物九六成物生物者謂木火七八之數也成物者謂金水九六之數也則春夏生物也秋冬成物也故易繫辭云精氣爲物遊魂爲變也注云精氣謂七八遊魂謂九六則是七八生物九六終物是也十八五臟配五行有二說異義云今文尚書歐陽說肝木也心火也脾土也肺金也腎水也古尚書說脾木也肺火也心土也肝金也腎水也許慎謹案月令春祭脾夏祭肺季夏祭心秋祭肝冬祭腎與古尚書同鄭駮之云月令祭四時之位及其五藏之上下次之耳冬位在後而腎在下夏位在前而肺在上春位小前故祭先脾秋位小却故祭先肝腎也脾也俱在鬲下肺也心也肝也俱在鬲上祭者必三故有先後焉不得同五行之氣今醫病之法以肝爲木心爲火脾爲土肺爲金腎爲水則有瘳也若反其術不死爲劇如鄭此言五行所主則從今文尚書之說不同許慎之義十九漢始亦以驚蟄爲正月中漢始亦以驚蟄爲正月中者以漢之時立春爲正月節驚蟄爲正月中氣雨水爲二月節春分爲二月中氣至前漢之末以雨水爲正月中驚蟄爲二月節故律曆志云正月立春節雨水中二月驚蟄節春分中是前漢之末劉歆作三統曆改驚蟄爲二月節鄭以舊曆正月啓蟄即驚也故云漢始亦以驚蟄爲正月中但蟄蟲正月始驚二月大驚故在後移驚蟄爲二月節雨水爲正月中凡二十四氣云云二十三統曆三月節榖雨清明中案通卦驗及今曆以清明爲三月節榖雨爲三月中餘皆與律曆志並同案三統曆則三月節榖雨清明中二一月令車馬衣服非周制凡此車馬衣服皆所取於殷時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時爲異又玉藻曰天子龍衮以祭玄端而朝日皮弁以日視朝與此皆殊二二六畜取象多塗羊火畜也者案尚書五行傳曰貌之不恭則有雞禍注雞畜之有冠翼者屬貌言之不從則有犬禍注犬畜之以口吠守者屬言視之不明則有羊禍注羊畜之遠視者屬視聽之不聦則有豕禍注豕畜之居閑衛而聽者屬聽思之不睿則有牛禍注地厚德載物牛畜之任重者屬思皇之不極則有馬禍注天行健馬畜之疾行者屬皇極是雞爲木畜羊爲火畜牛馬土畜犬爲金畜豕爲水畜但隂陽取象多塗故午爲馬酉爲雞不可一定也廿三中數曰歳朔數曰年掌正歳年以序事者太史職文鄭注大中數曰歳朔數曰年中數者謂十二月中氣一周緫三百六十五日四分日之一謂之一歳朔數者朔十二月之朔一周謂三百五十四日謂之爲年此是歳年相對故有朔數中數之別若散而言之歳亦年也故爾雅釋天云唐虞曰載夏曰歳商曰祀周曰年是也廿四辰隨天左行日月星右行天文及日月星辰之行天則左還一日一度一年三百六十五度四分度之一又至周一度日月五星並逆行天右行各有多少辰有二十八宿亦隨天左行廿五郊用元日耕用元辰是月也天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推注云謂以上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕上帝大微之帝也元辰蓋郊後吉亥也正義曰甲乙丙丁等謂之日郊之用辛上云元日子丑寅夘之等謂之爲辰耕用亥日故云元辰盧植蔡邕並云郊天是陽故用日耕藉是隂故用辰元者善也郊雖用日亦有辰但日爲吉主耕之用辰亦有日但辰爲主皇氏云正月建寅日月㑹辰在亥故耕用亥也未知然否廿六十月天氣上騰其實反歸地下正月爲泰泰通也天地交通七月爲否否塞也言天地隔塞所以十月云地氣下降天氣上騰者以十月之時純隂用事地體凝凍寒氣逼物地又在下故云地氣下降於時六陽從上退盡無復用事天體在上不近於物似若陽歸於天故云天氣上騰其實十月天氣反歸地下若審察於此不足可疑而劉洽汜閣皇侃之徒旣不審知其理又不能定其旨趣諠諠撓撓亦無取焉未見三家之說廿七犠牲用牝下用牝命祀山林川澤犠性母用牝注云爲傷妊生之類若天地宗廟大祭之時雖非正月皆不用牝廿八伐木有禁有不禁禁止伐木者禁謂禁其欲伐止謂止其巳伐者此伐木在山中或在禁障之處十月許人採取至正月之時禁令止息故王制云草木零落然後入山林詩魚麗傳云草木不折不操斧斤不入山林是也若國家隨時所須以爲材用者雖非冬月亦得取之故山虞有仲冬斬陽木仲夏斬隂木又云邦工入山林而掄材不禁是也其非是所禁之處春秋亦得取之故周禮云春秋之斬木不入禁鄭注斬四野之木可若於正月皆禁之廿九火訛以巳乗寅以巳來乗寅巳爲火故火來也寅爲天漢之津火雖欲來而畏水終竟不來但訛言道火相恐動也三十箕畢尚妻之所好案鄭注洪範中央土氣爲風東方木氣爲雨箕屬東方木木剋土土爲妃尚妃之所好故箕星好風也西方金氣爲隂剋東方木木爲妃畢屬西方尚妻之所好故好雨也今申氣乗寅兩相衝破申來逆寅寅爲風風之𬒳逆故爲焱風寅徃破申申爲雨雨之𬒳逆故爲暴雨也卅一井斗度寛故舉弧建日月㑹于降婁言物降落而収斂而斗建卯之辰者斗星隨天而轉一日一夜過轉一周而行一度故正月建寅二月建卯也云弧在輿鬼南建星在斗上者熊氏說云石氏星經文弧與建星非二十八宿而昬明舉之者由弧星近井建星近斗井有三十三度斗有二十六度其度旣寛若舉井斗不知何日的至井斗之中故舉弧星建星也卅二尚書月令舉星不同此仲春之月昬弧中案尚書云日中星鳥不同者如鄭康成之意南方七宿緫爲鳥星井鬼則鳥星之分故云星鳥與此同也案仲夏昬亢中尚書云日永星火不同者案鄭答孫顥云星火非謂心星也卯之三十度緫爲大火其曰大火之次有星者月令舉其月𥘉尚書緫舉一月故不同也案仲秋之月昬牽牛中尚書云宵中星虚其仲冬之月云東壁中尚書云日短星昴不同者亦是月令舉其𥘉朔尚書緫舉一月之中理亦不異孔安國注尚書與此則別尚書所舉星者自取畢見之義不謂南方之中卅三日夜分馬蔡鄭不同正義曰日夜分謂晝夜漏刻馬融云晝有五十刻夜有五十刻據日出日入爲限蔡邕以爲星見爲夜日入後三刻日岀前三刻皆屬晝晝有五十六刻夜有四十四刻鄭康成注尚書云日中星以爲日見之漏五十五刻不見之漏四十五刻與蔡校一刻也大略亦同卅四雷乃發聲始電雷乃發聲者雷是陽氣之聲將上與隂相衝蔡邕云季冬雷在地下則雉應而雊孟春動於地之上則蟄蟲應而振出至此升而動於天之下其聲發揚也以雷岀有漸故言乃云始電者電是陽光陽微則光不見此月陽氣漸盛以擊於隂其光乃見故云始電卅五廟寢之制凡廟前曰廟後曰寢者廟是接神之處其處尊故在前寢衣冠所藏之處對廟爲卑故在後但廟制有東西廂有序牆寢制唯室而巳故釋宫云室有東西廂曰廟無東西廂有室曰寢是也卅六虹是隂陽交㑹之氣云螮蝀謂之虹者爾雅釋天文郭氏云雄者曰虹雌者曰蜺雄謂明盛者雌謂闇微者虹是隂陽交㑹之氣純隂純陽則虹不見若雲薄漏日日照雨滴則虹生卅七辨變化有漸改有忽改凡云化者若䑕化爲鴽鴽還化爲䑕皇氏云反歸舊形謂之化案易云乾道變化謂先有舊形漸漸改者謂之變雖有舊形忽改者謂之化及本無舊形非類而改亦謂之化故鄭注周禮云能生非類曰化也卅八九門田獵置罘羅罔畢翳餧獸之藥母岀九門注云天子九門者路門也應門也雉門也庫門也臯門也城門也近郊門也遠郊門也關門也卅九二月浴𧖟種三月浴𧖟仲春旣帥命婦躬桑浴種至季春又更躬桑浴蠶也故熊氏云案馬質注云蠶爲龍精月直大火則浴其種是二月浴種也祭義云大昕之朝奉種浴于川注云大昕季春朔日是三月又浴蠶也四十外内子女命婦女外内子女者解經中女字外子女謂王外姓甥之女者王之同姓子女則周禮之外宗内宗皆以嫁有爵者故内宰云帥外内命婦言内命婦則未岀嫁者不在焉鄭注周禮士妻亦爲命婦則士妻亦在四一季春難隂氣命國難九門磔攘以畢春氣注云此難難隂氣也隂寒至此不止害將及人所以及人者隂氣右行此月之中日行歷昴昴有大陵積尸之氣氣佚則厲鬼隨而岀行命方相氏帥百隷索室歐疫以逐之又磔牲以攘於四方之神所以畢止其災也王居明堂禮曰季春岀疫于郊以攘春氣正義曰隂氣右行此月之中日行曆昴昴有大陵積尸之氣者天氣左轉故斗建左行謂之陽氣日月右行日月比天爲隂故云隂氣右行以此月之𥘉日在於胃此月之中從胃歷昴云有大陵積尸者元命包云大陵主尸熊氏引石氏星經大陵八星在胃北主死䘮四二祀竈之禮其祀竈祭先肺注云夏陽氣盛熱於外祀之於竈從熱類也祀之先祭肺者陽位在上肺亦在上肺爲尊也竈在廟門外之東祀竈之禮先席於門之奥東靣設主于竈陘乃制肺及心肝爲爼奠于主西又設盛于爼南亦祭黍三祭肺心肝各一祭醴三亦旣祭徹之更陳鼎爼設饌于筵前迎尸如祀戸之禮四三孟夏封諸侯違古不言帥諸侯而云封諸侯諸侯時或無在京師者空其文也祭統曰古者於禘也發爵賜服順陽義也於嘗也岀田邑發秋政順隂義也今此行賞可也而封諸侯則違於古封諸侯岀土地之事於時未可似失之四四太尉秦官知月令非周公作命大尉贊桀俊遂賢良舉長大注云助長氣也贊猶岀也桀俊能者也遂猶進也三王之官有司馬無大尉秦官則有大尉今俗人皆云周公作月令未通於古正義曰云三王之官有司馬無太尉者案書傳有司馬公司徒公司空公領三卿此夏制也案曲禮下云司徒司馬司空司士司宼此殷制也周禮則有夏官司馬是三王有司馬無大尉案中候握河紀云舜爲大尉此堯時置之三王不置也云秦官則有大尉者案漢書百官表云大尉秦官是也云今俗人皆云周公作月令未通於古者俗人謂賈逵馬融之徒皆云月令周公所作故王肅用焉此等未通識於古古謂秦以前不知三王無大尉是未通於古四五純陽之月非㫁刑決罪時靡草死麥秋至㫁薄刑決小罪注云舊說云靡草薺亭歷之屬祭統曰草艾則墨謂立秋後也刑無輕於墨者今以純陽之月㫁刑決罪與母有壞墮自相違似非四六収繭稅蠶事畢后妃獻繭乃収繭稅以桑爲均貴賤長㓜如一以給郊廟之服注云后妃獻繭者内命婦獻繭於后妃収繭稅者収於外命婦外命婦雖就公桑蠶室而𧖟其夫亦當有祭服以助祭収以近郊之稅耳貴賤長㓜如一國服同䟽見卷末四七隂生爲主陽謝爲賔律中蕤賔注云蕤賔者應鍾之所生三分益一律長六寸八十一分寸之二十六仲夏氣至則蕤賔之律應周語曰蕤賔所以安靜神人獻酬交酢正義曰何胤云乾九四是月陽反於下爲復隂生陽中爲姤各應其時所以安靜是安靜神人也隂生爲主陽謝爲賔賔主之象獻酬之禮獻酢又酬之隂陽代謝之義也四八搏勞即伯勞蝦蟇非反舌云搏勞者詩云七月鳴鵙箋云伯勞鳴將寒之候五月則鳴豳地晚寒鳥物之候從其氣焉云百舌鳥者蔡云蟲名鼃也今謂之蝦蟇其舌本前著口側而末嚮内故謂之反舌通卦驗曰搏勞鳴蝦蟇無聲又靡信云昔於長安中與書生數十共徃城北水中取蝦蟇屠割視之其舌反嚮後如此鄭君得不通乎蟜夙問曰誠如緯與子言爲蝦蟇五月中始得水適當聒人耳何反無聲此者著時候今猶昔也是以知蝦蟇非反舌反舌鳥春始鳴至五月稍止其聲數轉故名反舌時候言之今人識之故不從緯與俗儒也或蝦蟇舌性自然不必爲反舌也四九雩之正以四月又有因旱而雩命有司爲民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈榖實注云陽氣盛而常旱山川百源能興雲雨者也衆水始所岀爲百源必先祭其本乃雩雩吁嗟求雨之祭也雩帝謂爲壇南郊之旁雩五精之帝配以先帝也自鞀鞞至祝敔皆作曰盛樂凡他雩用歌舞而巳百辟卿士古者上公若句龍后稷之類也春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦脩雩禮以求雨因著正雩此月失之矣天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩五十有雩有禱雩之與禱所以異者考異郵說云天子禱九州山川諸侯禱封内大夫禱所食邑又僖公三時不雨帥羣臣禱山川以過自譲凡雩必先禱故此經云乃命百縣祈祀山川百源始大雩帝是也禱者不雩僖公二年冬十月及三年春正月夏四月直爲禱祭不爲雩以非雩月故不雩五一夏至八能之七正義曰案易緯通卦驗云夏至人主從八能之士或調黃鍾或調六律或調五音或調五聲或調五行或調律曆或調隂陽或調正德所行注從八能之士謂選於天下人衆之中取其習曉者而使之五二臺榭之別闍者謂之臺有木者謂之榭正義曰案釋宫云闍謂之臺李廵云積土爲之所以觀望郭景純云積土四方又云無室曰榭李廵云但有大殿無室名曰榭郭景純云榭今之堂堭五三季夏取甲物似誤當是秋命漁師伐蛟取鼉登龜取黿注云四者甲類秋乃堅成周禮曰秋獻龜魚又曰凡取龜用秋時是夏時之秋也作月令者以爲此秋據周之時也周之八月夏之六月因書於此似誤也蛟言伐者以其有兵衛也龜言登者尊之也鼉黿言取羞物賤也鼉皮又可以冒鼔今月令漁師爲榜人榜必孟反五五蟋蟀正義曰蟋蟀居壁者此物生在於土中至季夏羽翼稍成未能遠飛但居其壁至七月則能逺飛在野案爾雅釋蟲云蟋蟀蛬也孫炎曰蜻蛚也梁國謂蛬郭景純云今促織蔡以爲蟋蟀斯螽非也五六周秦染物之時不同命婦官染采黼黻文章必以法故無或差貸黒黃倉赤莫不質良母敢詐僞注云婦官染人也采五色質正也良善也所用染者當得其采正善也正義曰必以此月染之者以其盛暑濕染帛爲宜此是秦法也若周則於夏豫浸治染纁玄之石至秋乃緫染五色故染人云夏纁玄秋染夏是也蓋從夏至秋皆得染物周秦各用一時也五七動民心則害土神之氣土用事於未月不可以興土功不可以合諸侯不可以起兵動衆母舉大事以摇養氣母發令而待以妨神農之事也水潦盛昌神農將持功舉大事則有天殃注云土將用事氣欲靜大事興繇役以有爲發令而待謂岀繇役之令以預驚民也民驚則心動是害土神之氣土神稱曰神農者以其主於稼穡言土以受天雨澤安靜養物爲功動之則致害也孝經說曰地順受澤謙虚開張含泉任萌滋物歸中正義曰土雖寄王於四季但南方火生中央土土生西方金金火之間位當建未之月故云土將用事氣欲靜也五八四時之季日合黃道正義曰案考靈耀春則星辰西遊謂星辰在黃道之西遊也日依常行在黃道之東至季春之月星辰入黃道復其正處日依黃道而行是春夏之間日從黃道夏則星辰北遊謂星辰在黃道之北遊也日依常行在黃道之南至季夏星辰入黃道復正位日依常行黃道至夏秋之間日從黃道也秋則星辰東遊謂星辰在黃道東遊日依常行在黃道之西至季秋星辰入黃道還復正位日依黃道而行至秋冬之間日從黃道也冬則星辰南遊謂星辰在黃道南遊日依常行在黃道之北至季冬星辰入黃道還正位日依常行黃道至冬春之間日從黃道也鄭注洪範云四時之間合於黃道也五九土王之律獨取聲應正義曰黃鍾之宫於諸宫爲長季夏土王其聲最重謂土之聲氣應此黃鍾之官聲非黃鍾一聲也故特云律中者黃鍾之宫也黃鍾候氣之管本位在子此是黃鍾宫聲與中央土聲相應但土無候氣之法取黃鍾宫聲以應土耳四時之律皆取氣應而土王之律獨取聲應者一者欲與四行爲互二者爲無別候土氣之管故也土無候氣之管者以寄王四季之末故從四時之管而不別候也唯以四行末十八日爲土之氣也六十五聲濁尊清卑凡五聲濁者尊清者卑爲商聲之濁次於宫宫旣爲君商則爲臣故云以其濁次宫臣之象也六一孟秋禁封侯割地失其義是月也毋以封諸侯立大官毋以割地行大使出大幣注云古者於嘗岀田邑此其月也而禁封諸侯割地失其義六二凡鳥隨隂陽者不居中國盲風至鴻鴈來玄鳥歸羣鳥養羞注云皆記時候也盲風疾風也玄鳥燕也歸謂去蟄也凡鳥隨隂陽者不以中國爲居羞謂所食也夏小正曰九月丹鳥羞白鳥說曰丹鳥也者謂丹良也白鳥也者謂閩蚋也其謂之鳥者重其養者也有翼爲鳥養也者不盡食也二者文異羣鳥丹良未聞孰是正義曰皇氏以爲丹良是熒火今案爾雅釋蟲郭氏等諸釋皆不云熒火是丹良未聞皇氏何所依據六四仲秋難陽氣天子乃難以逹秋氣注云此難難陽氣也陽暑至此不衰害亦將及人所以及人者陽氣左行此月宿直昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行於是亦命方相氏帥百隷而難之王居明堂禮曰仲秋九門磔攘以發陳氣禦止疾疫六五榖以麥爲重乃勸種麥母或失時其有失時行罪無疑注云麥者接絶續乏之榖尤重之六六天根見而水涸是月也日夜分雷始収聲蟄蟲坏户殺氣浸盛陽氣日衰水始涸注云又記時候也雷始収聲在地中動内物也坏益也蟄蟲益户謂稍小之也涸竭也此甫八月中雨氣未止而云水竭非也周語曰辰角見而雨畢天根見而水涸又曰雨畢而除道水涸而成梁辰角見九月本也天根見九月末也王居明堂禮曰季秋除道致梁以利農也六七陽氣𥘉胎於酉蔡氏云陽氣𥘉胎於酉故八月薺麥應時而生也六八辰角見九月本天根見九月末云辰角見九月本天根見九月末此鄭之言也九月本謂九月之𥘉也案律暦志角十二度亢九度天根在亢之後辰角與天根相去二十一度餘日校一度則九月本與九月末相去二十一日有餘也而韋昭注國語辰角見雨畢之後五日天根見不同者蓋辰角見後雨以漸而畢畢後五日始天根見中間亦校二十餘日也非謂辰角見後五日則天根見也六九息民之祭與蜡異蜡亦曰臘臘先祖五祀者臘獵也謂獵取禽獸以祭先祖五祀也此等之祭緫謂之蜡若細別言之天宗公社門閭謂之蜡其祭則皮弁素服葛帶榛杖其臘先祖五祀謂之息民之祭其服則黃衣黃冠鄭注郊特牲云息民與蜡異案雜記子貢觀蜡云一國之人皆若狂者案郷飲酒𥘉立賔行禮至禮終說屨升堂而燕行無筭爵然則𥘉時正齒位後則皆狂蜡祭蔡邑云夏曰清祀殷曰嘉平周曰蜡秦曰臘案左傳云虞不臘矣是周亦有臘名也七十冬至日在斗牛度數正義曰案律曆志云仲冬之𥘉日在斗十二度故云日在斗也三統曆大雪日在斗十二度昬壁五度中去日八十四度旦角三度中冬至日在牛𥘉度昬奎十度中去日八十二度旦亢七度中元嘉曆云大雪日在箕十度昬氐九度中旦軫八度中冬至日在斗十四度昬東壁八度中晝漏四十五刻旦角七度中七一天地之房地氣沮泄是謂發天地之房者約束有司若其不固汝所閉之事令地沮泄謂泄漏地之陽氣是發徹天地之房房是人次舎之處擁蔽於此之時天地亦擁蔽萬物不使宣露與房舎相似七二芸荔蚯蚓隨陽而動正義曰芸始生荔挺岀者皇氏云以其俱香草故應陽氣而岀而蚯蚓結者蔡云結猶屈也蚯蚓在穴屈首下嚮陽氣氣動則宛而上首故其結而屈也麋角解者說者多家皆無明據熊氏云鹿是山獸夏至得隂氣而解角麋是澤獸故冬至得陽氣而解角今以麋爲隂獸情滛而遊澤冬至隂方退故解角從隂退之象鹿是陽獸情滛而遊山夏至得隂而解角從陽退之象旣無明據故略論焉若節氣早則麋角十一月解故夏小正云十一月麋角隕墮是也若節氣晚則十二月麋角解故小正云十二月隕麋角七四天子之相六國以後之相命相布德和令行慶施惠下及兆民注云相謂三公相王之事正義曰案公羊隱五年傳云三公者何天子之相也自陜而東者周公主之自陜而西者召公主之一相處乎内是三公相王之事也至六國時一人知事者特謂之相故史記稱穰侯范睢蔡澤皆爲秦相後又爲丞相也七五十月乃云天騰地降正義曰若以易卦言之七月三陽在上則天氣上騰三隂在下則地氣下降也今十月乃云天氣上騰地氣下降者易含萬象言非一槩周流六虚事無定體若以爻象言之則七月爲天氣上騰地氣下降若氣應言之則從五月地氣上騰至十月地氣六隂俱升天氣六陽並謝天體在上陽歸於虚无故云上騰地氣六隂用事地體在下隂氣下連於地故云地氣下降各取其義不相妨也七六征鳥厲疾征鳥厲疾注云殺氣當極也征鳥題肩也齊人謂之擊征或名曰鷹仲春化爲鳩七七節氣有早晚故諸書各異正義曰鴈北郷有早有晚早者則此月北郷晚者二月乃北郷故易說云云二月驚蟄候鴈北郷鵲始巢者此據晚者若早者十一月始巢故詩緯推度災云復之日鵲始巢是也雉雊雞乳者易通卦驗云雉雊雞乳在立春節與此同以立春在此月也通卦驗又云小寒虎始交豺祭獸此季冬不言者文不具也若節氣晚則季冬虎交若節氣早則在仲冬七八岀土牛正義曰岀土牛以送寒氣者岀猶作也此時強隂旣盛年歳巳終隂若不去凶邪恐來歳更爲人害其時月建丑又土能刻水持水之隂氣故特作土牛以畢送寒氣也注云岀猶作也丑爲牛牛可牽止也送猶畢也七九孟月祭宗此季冬祭佐正義曰案上孟冬祈來年于天宗大割祠於公社臘先祖五祀是謂蜡祭則百神皆祭則一變而致羽物山林之祇再變而致鱗物川澤之祇是蜡祭並祭山川也是嶽瀆及衆山川也孟冬不見者文不具孟冬祭嶽瀆因及衆山川至此又更祭衆山川山川少於嶽瀆是孟月祭其宗此月祭其佐前孟冬是祭先嗇神農并祭五帝但孟冬其文不具則五帝爲宗大臣句芒等爲佐是孟月祭其宗此月祭其佐也孟冬祭司中等是孟月祭宗此月祭佐則天神人鬼山川等皆有宗有佐也八十諸侯卿大夫至民賦犧牲同姓共芻豢乃命大史次諸侯之列賦之犠牲以共皇天上帝社稷之饗乃命同姓之邦共寢廟之芻豢命宰歷卿大夫至于庶民土田之數而賦犧牲以共山林名川之祀凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀注云此所與諸侯共者也列國有大小也賦之犠牲大者岀多小者岀少饗獻也此所以與同姓共也芻豢猶犠牲此所與卿大夫庶民共者也歷猶次也卿大夫采地亦有大小其非采地以其邑之民多少賦之民非神之福不生雖有其邦國采地此賦要由民岀正義曰來歳方祭祀須犠牲犠牲岀諸侯之國國有大小故命大史書列之以共賦也諸侯同王南面專王之土故命之岀牲以與王共事天地也旣漫言諸侯則異姓同姓俱然也賦之犠牲者賦稅岀也言芻乃是牛羊而又云豢則是犬豕也天地不用犬豕社稷大牢乃有豕而不用犬故没其芻豢而徒云天地犠牲也宗廟備六牲故云芻豢也宰小宰也歷亦次也卿大夫謂畿内有采地者歳終又小宰列次畿内之地大小并至於庶民受田准土田多少之數賦之犠牲以共山林名川之祀不云士者上舉卿大夫下舉庶民則士在其中省文耳注云此所與卿大夫庶民共之則各賦稅之卿大夫出其采地賦稅無采地出其邑之賦稅庶人無邑出其賦稅以與邑宰邑宰以共上是庶人亦岀賦也故下云凡在天下九州之人無不咸獻其力是也八一佩玉之制佩玉之制案韓詩外傳云佩玉上有䓤衡下有雙璜牙蠙珠以納其間則古之佩玉上以䓤爲衡橫置於上以貫珠之繩三條懸於衡上垂之而下以雙璜懸於兩畔繩之下端又以牙懸於中繩下端使前後觸璜以爲聲衡之下璜之上皆貫蠙珠故云蠙珠以納其間謂納於衡璜之間也此以下𥙷遺追書篇首注䟽八二古今文尚書尚書有古有今壁裏所得膠東庸生所傳者謂之古文尚書晁錯所受伏生二十九篇夏侯歐陽所傳者謂之今文尚書鄭據而引之故云今尚書八三外命婦繭稅少以夫當有祭服皇氏云外命婦旣就公家之桑而養蠶則繭當悉輸於公所以唯皆稅其繭餘得自入者以其夫當有祭服以助王祭故令繭得自入以供造也今謂夫助祭之服當公家所爲故禮再命受服言外命婦雖就公桑𧖟室而𧖟旣是官家之桑繭不應全入於己所以有稅者以其夫亦當有祭服官家所給故輸繭稅以供造之但稅寡少故云収以近郊稅耳知収以近郊稅者載師云近郊十一公桑在國北近郊故知収以近郊云貴賤長㓜如一國服同者案泉府云凡賖者以國服爲之息國服謂國家貢賦服事在上各有等限謂之國服言貴賤長㓜岀繭稅俱以十一等限齊同故云國服同其受桑則貴賤異也貴者桑多賤者桑少爲皆計繭爲稅十一之也八四隂中時有陽陽中時有隂正義曰云祀之先祭肝者秋爲隂中於藏值肝者以隂氣始於五月終於十月其七月八月爲隂之中故云秋爲隂中其陽氣始於十一月終於四月正月二月爲陽中故正月云春爲陽中然隂中之時兼有陽陽中之時兼有隂亦是隂陽之中也今五藏肺最在前心次之肝次之脾次之腎爲後肝在心肺之下脾腎之上故云於藏值肝然脾在肺心肝之下腎之上則是上有肺心肝下唯有腎不當其中而云春爲陽中於藏值脾者但五行相次水則次木故春繼於冬腎後則次脾其火後則次土土後乃次金故秋不得繼夏由隔於土由此脾不得繼肺隔於心也爲此肝之上有肺有心脾之下唯有腎俱得爲藏之中也八五二十八宿之度歳星之次案律曆志云二十八宿之度角一十二度亢九氐十五房五心五尾十八箕十一東方七十五度斗二十六牛八女十二虚十危十七營室十六壁九北方九十八度奎十六婁十二胃十四昴十一畢十六觜二參九西方八十度井三十三鬼四栁十五星七張十八翼十八軫十七南方一百一十二度丑爲星紀𥘉斗十二度終婺女七度子爲玄枵𥘉婺女八度終於危十五度亥爲娵觜𥘉危十六度終於奎四度戍爲降婁𥘉奎五度終於胃六度酉爲大梁𥘉胃七度終於畢十一度申爲實沈𥘉畢十二度終於井十五度未爲鶉首𥘉井十六度終於栁八度午爲鶉火𥘉栁九度終於張十六度巳爲鶉尾𥘉張十七度終於軫十一度辰爲壽星𥘉軫十二度終於氐四度卯爲大火𥘉氐五度終於尾九度寅爲析木𥘉尾十度終於斗十一度五星者東方歳星南方熒惑西方太白北方辰星中央鎮星其行之遲速俱在律曆志獨不載零四分度之一八六吕令周禮俱用夏正吕不韋在於秦丗秦以十月爲歳首不用秦正而用夏時也以夏數得天正故用之也周禮雖以建子爲正其祭祀田獵亦用夏正也八七月令昬明中星不與曆正同日在營室者案三統曆立春日在危十六度正月中曰在室十四度元嘉曆立春日在危三度正月中日在室一度昬參中者案三統曆立春昬畢十度中去日八十九度正月中昬井二度中去日九十三受元嘉曆立春昬昴九度中月半昬觜觽一受中皆不昬參中者月令昬明中星皆大略而言不與曆正同但有一月之内有中者即得載之計正月昬參中依三統曆在立春之後六日參星𥘉度昬得中也但二十八宿其星體有廣狹相去遠近或月令月中之日昬明之時前星以過於午後星未至正南又星有明暗見有早晚明者昬早見而旦晚没暗者則昬晚見而旦早没所以昬明之星不可正依曆法但舉大略耳餘月昬明從此可知禮記要義卷第六
