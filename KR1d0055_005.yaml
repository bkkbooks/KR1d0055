front:
  text: 禮記要義卷第六月令一月令不合周法亦疑非吕不韋案吕不韋集諸儒士著爲十二月紀合十餘萬言名爲吕氏春秋篇首皆有月令與此文同是一證也又周無大尉唯秦官有大尉而此月令云乃命大尉此是官名不合周法二證也又秦以十月建亥爲歳首而月令云爲來歳授朔日即是九月爲歳終十月爲授朔此是時不合周法三證也又周有六冕郊天迎氣則用大裘乗玉輅建大常日月之章而月令服飾車旗並依時色此是事不合周法四證也故鄭云其中官名時事多不合周法然案秦始皇十二年吕不韋死二十六年并天下然後以十月爲歳首歳首用十月時不韋巳死十五年而不韋不得以十月爲正又云周書先有月令何得云不韋所造又秦并天下立郡何得云諸侯又秦以好兵殺害毒𬒳天下何能布德施惠春不興兵二周天里度之數指諸星以爲天案鄭注考靈耀云天者純陽清明無形聖人則之制璸璣玉衡以度其象如鄭此言則天是大虚本無形體但指諸星運轉以爲天耳但諸星之轉從東而西必三百六十五日四分日之一星復舊處星旣左轉日則右行亦三百六十五日四分日之一至舊星之處即以一日之行而爲一度計二十八宿一周天凡三百六十五度四分度之一是天之一周之數也天如彈丸圍圜三百六十五度四分度之一案考靈耀云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里者是天圎周之里數也以圍三徑一言之則直徑三十五萬七千里此爲二十八宿周廽直徑之數也然二十八宿之外上下東西各有萬五千里是爲四遊之極謂之四表據四表之内并星宿内緫有三十八萬七千里然則天之中央上下正半之處則一十九萬三千五百里地在於中是地去天之數也三地與星辰俱有四遊升降鄭注考靈耀云地蓋厚三萬里春分之時地正當中自此地漸漸而下至夏至之時地下遊萬五千里地之上畔與天中平夏至之後地漸漸向上至秋分地正當天之中央自此地漸漸而上至冬至上遊萬五千里地之下畔與天中平自冬至後地漸漸而下此是地之升降於三萬里之中但渾天之體雖繞於地地則中央正平天則北髙南下北極髙於地三十六度南極下於地三十六度然則北極之下三十六度常見不没南極之上三十六度常没不見南極去北極一百二十一度餘若逐曲計之則一百八十一度餘若以南北中半言之謂之赤道去南極九十一度餘去北極亦九十一度餘此是春秋分之日道也赤道之北二十四度爲夏至之日道去北極六十七度也赤道之南二十四度爲冬至之日道去南極亦六十七度地有升降星辰有四遊又鄭注考靈耀云天旁行四表之中冬南夏北春西秋東皆薄四表而止地亦升降於天之中冬至而下夏至而上二至上下蓋極地厚也地與星辰俱有四遊升降四遊者自立春地與星辰西遊春分西遊之極地雖西極升降正中從此漸漸而東至春末復正自立夏之後北遊夏至北遊之極地則升降極下至夏季復正立秋之後東遊秋分東遊之極地則升降正中至秋季復正立冬之後南遊冬至南遊之極地則升降極上冬季復正此是地及星辰四遊之義也
