front:
  text: 禮記要義卷第三十一大學冠義昬義
  hash: sha256:b790d8a10f06223f24426839c7c356b02277332e625c362553e37e4f6357f6da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_030-1a}
body:
  text: 一釋淇奥之詩如切如磋者道學也如琢如磨者自脩也瑟兮僴兮者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛德至善民之不能忘也注云此心廣體胖之詩也澳隈崖也菉竹猗猗喻美盛斐有文章貌也諠忘也道猶言也恂字或作峻讀如嚴峻之峻言其容貌嚴栗也民不能忘以其意誠而德著也正義曰記者引爾雅而釋之如切如磋者道學也者論道其學矣如琢如磨者自脩也者謂自脩飾矣言𥘉習謂之學重習謂之脩亦謂詩本文互而相通也瑟兮僴兮者恂慄也者恂讀爲峻言顔色嚴峻戰慄也道盛德至善民之不能忘也謂善稱也有斐君子終不可喧兮論道武公盛德至極美善人之愛念不能忘也二畜馬乗伐冰百乗之家孟獻子曰畜馬乗不察於雞豚伐冰之家不畜牛羊百乗之家不畜聚斂之臣與其有聚斂之臣寧有盗臣此謂國不以利爲利以義爲利也注云孟獻子魯大夫仲孫蔑也畜馬乗謂以士𥘉試爲大夫也伐冰之家卿大夫以上喪祭用冰百乗之家有采地者也雞豚牛羊民之所畜養以爲財利者也國家利義不利財盗臣損財耳聚斂之臣乃損義論語曰季氏富於周公而求也爲之聚斂非吾徒也小子鳴鼓而攻之可也三莫知子惡莫知苗碩故諺有之曰人莫知其子之惡莫知其苗之碩者碩猶大也言人之愛子其意至甚子雖有惡不自覺知猶好而不知其惡也農夫種田恒欲其盛苗雖碩大猶嫌其惡以貪心過甚故不知其苗之碩若能以已子而方他子已苗而匹他苗則好惡可知皆以已而待他物也四釋畜馬乗伐冰之家云畜馬乗謂以士𥘉試爲大夫者案書傳士飾車駢馬詩云四牡騑騑大夫以上乃得乗四馬今下云伐冰之家百乗之家是卿大夫今別云畜馬乗者不察雞豚故知士𥘉試爲大夫也云伐冰之家卿大夫也案昭四年左傳云大夫命婦䘮浴用冰䘮大記注云士不用冰故知卿大夫也士若恩賜及食不得用亦有冰也但非其常故士䘮禮賜冰則夷槃可也左傳又云食肉之禄冰皆與焉是也五天子諸侯大夫士冠之秊案鄭目録云名曰冠義者以其記冠禮成人之義此於別録屬吉事但冠禮起早晚書傳旣無正文案略說稱周公對成王云古人冒而句領注云古人謂三皇時以冒覆頭句領繞頸至黃帝時則有冕也故丗夲云黃帝造火食旃冕是冕起於黄帝也但黃帝以前則以羽皮爲之冠黃帝以後乃用布帛其冠之年即天子諸侯十二而冠故襄九年左傳云國君十五而生子冠而生子禮也又云一星終也是十二年歳星一終案文王十五而生武王尚有兄伯邑考金縢云王與大夫盡弁時成王十五而著弁則成王巳冠矣是天子十二而冠與諸侯同又祭法云王下祭殤五若不早冠何因下祭五等之殤大夫冠之年㡬無文案喪服大夫爲昆弟之長殤大夫旣爲昆弟長殤則不二十始冠也其士則二十而冠也曲禮云二十曰弱冠是也其天子之子亦早冠所以祭殤有五其諸侯之子皆二十冠也故下檀弓云君之適長殤及大夫之適長殤是也六三始備乃可求三行凡人之所以爲人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而后禮義備以正君臣親父子和長㓜君臣正父子親長㓜和而后禮義立故冠而后服備服備而后容體正顔色齊辭令順注云言人爲禮以此三者爲始言三始旣備乃可求以三行也立猶成也言服未備者未可求以三始也童子之服采衣紒七適子冠於阼醮用酒三加故冠於阼以著代也醮於客位三加彌尊加有成也注云阼謂主人之北也適子冠於阼若不醴則醮用酒於客位敬而成之也戸西爲客位庶子冠於房戸外又因醮焉不代父也冠者𥘉加緇布冠次加皮弁次加爵弁每加益尊所以益成也正義曰周禮之法適子則以醴禮之庶子則以酒醮之若先代之禮雖適子皆以酒醮之其於周時或有舊俗行先代之禮雖適子亦用酒醮則因而行不必改也故鄭注士冠禮云若不醴謂國有舊俗可行聖人用焉不改是也醮者醮盡之義故鄭注士冠禮云酌而無酬酢曰醮是也云庶子冠於房戸外又因醮焉者皆士冠禮文也但此記之作是記儀禮士冠禮之事士禮故三加也若大夫亦同士冠禮云無大夫冠禮古者五十而后爵何大夫冠禮之有是大夫雖冠用士禮若諸侯則有冠禮故左傳云公冠用祼享之禮行之金石之樂節之其加則四加而有玄冕也故大戴禮公冠四加也諸侯尚四加則天子亦當五加衮冕也十二士冠於禰廟諸侯於先祧冠者爲治之本故先王重之行之於廟士行之於禰廟故士冠禮注廟謂禰廟旣在禰廟此云尊先祖者尊禰即尊先祖之義且下士祖禰共廟其諸侯則冠於太祖之廟故左傳云先君之祧處之聘禮云不腆先君之祧鄭注以爲始祖之廟則天子當冠於始祖廟也服䖍注左傳先君之祧處之以爲曽祖廟者以左傳魯襄公冠於衞成公之廟衞成公則當今衞君獻公曽祖服䖍望時解之故以祧爲曽祖非鄭義也十三壻曰昬妻曰姻正義曰案鄭目録云名曰昬義者以其記娶妻之義内教之所由成也此於別録屬吉事也謂之昬者案鄭昬禮目録云娶妻之禮以昬爲期因名焉必以昬者取其陽徃隂來之義日入後二刻半爲昬以定稱之壻曰昬妻曰姻故經解注云壻曰昬妻曰姻是也謂壻以昬時而來妻則因之而去也若壻之與妻之屬名壻之親屬名之曰姻女之親屬名之爲昬故鄭注昬禮云女氏稱昬壻氏稱姻爾雅壻之父爲姻婦之父爲㛰又云壻之黨爲姻兄弟婦之黨爲㛰兄弟是也十四自天子至庶人昬嫁之秊案異義大戴說男三十女二十有昬娶合爲五十應大衍之數自天子逹於庶人同一也故春秋左氏說國君十五而生子禮也二十而嫁三十而娶庶人禮也禮夫爲婦之長殤長殤十九至十六知夫年十四十五見士昬禮也許君謹案舜年三十不娶謂之鰥文王十五而生武王尚有兄伯邑考知人君早昬娶不可以年三十非重昬嗣也若鄭意依正禮士及大夫皆三十而後娶及禮云夫爲婦長殤者關異代也或有早娶者非正法矣天子諸侯昬禮則早矣如左氏所釋毛詩所用家語之說以男二十而冠女十五而笄自此以後可以嫁娶至男三十女二十是正昬姻之時與家語異也十五納采問名納吉納徴請期納采者謂采擇之禮故昬禮云下逹納采用鴈也必用鴈者白虎通云鴈取其隨時而南北不失節也又是隨陽之鳥妻從夫之義也問名者問其女之所生母之姓名故昬禮云爲誰氏言女之母何姓氏也此二禮一使而兼行之納吉者謂男家旣卜得吉與女氏也納徴者納聘財也徴成也先納聘財而后昬成春秋則謂之納幣其庶人則緇帛五兩卿大夫則玄纁玄三纁二加以儷皮及諸侯加以大璋天子加以榖圭皆具於周禮經注也請期者謂男家使人請女家以昬時之期由男家告於女家何必請者男家不敢自專執謙敬之辭故云請也女氏終聽男家之命乃告之納吉納徴請期毎一事則使者一人行惟納徴無鴈以有幣故其餘皆用鴈十六醴與醮俱無酬酢醴尚質正義曰以郷飲酒禮燕禮之屬皆爲賔主相酬酢故不稱其醮醮則但受爵者飲而盡之又不反相酬酢直醮盡而巳故稱醮也然醴亦無酬酢不云醮者以醴尚質不爲飲也故不稱醮但禮敬之而巳云醮之禮如冠醮與其異者於寢耳者以父之醮子令其親迎與醮子冠而成人其事相似故云如冠醮與但冠禮醮子在廟此醮子在寢故云其異者在寢耳十八子受氣性純則孝孝則忠男女有別而后夫婦有義夫婦有義而后父子有親父子有親而后君臣有正故曰昏禮者禮之夲也注云言子受氣性純則孝孝則忠也十九和於室人謂女妐女叔諸婦婦順者順於舅姑和於室人而后當於夫以成絲麻布帛之事以審守委積蓋藏注云室人謂女妐女叔諸婦也當猶稱也後言稱夫者不順舅姑不和室人雖有善者猶不爲稱夫也正義曰以審守委積蓋藏者言旣當夫氏又成婦事以此詳審保守家之所有委積掩蓋藏聚之物也室人是在室之人非男子也女妐謂壻之姊也女叔謂壻之妹諸婦謂娣姒之屬二十婦人教于公宫宗室是以古者婦人先嫁三月祖廟未毀教于公宫祖廟旣毀教于宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也注云謂與天子諸侯同姓者也嫁女者必就尊者教成之教之者女師也祖廟女所出之祖也公君也宗室宗子之家也婦德貞順也婦言辭令也婦容婉娩也婦功絲麻也祭之祭其所岀之祖也魚蘋藻皆水物隂類也魚爲俎實蘋藻爲羮菜祭無牲牢告事耳非正祭也其齊盛用黍云君使有司告之宗子之家若其祖廟巳毀則爲壇而告焉正義曰公宫謂公之宫也若天子公邑官家之宫耳非謂諸侯公宫也此昏義雖記士昏禮之事自此以下廣明天子以下教女及夫婦之義故此經教女舉貴者言云嫁女者必就尊者教成之者案内則女子十年不岀使姆教成之明巳前恒教但嫁前三月特就公宫之教欲尊之也云教之者女師也者即詩周南云言告師氏則昏禮注云姆婦人五十無子出者也云祖廟女所岀之祖也者謂女父與君所分出之祖或與君共髙祖而分出以下皆然與諸侯共髙祖廟未毀所岀之女皆自公宫教之天子雖七廟親廟上自髙祖以下也云公君也者鄭恐唯謂諸侯之公故解公爲君天子諸侯皆稱君云宗室宗子之家也者鄭旣不云大宗小宗則大宗小宗之家悉得教之與大宗近者於大宗教之與大宗逺者於小宗教之此記謂君之同姓若君之異姓異姓始祖在者其後亦有大宗小宗其族人嫁女各於其家也二三日食有爲災不爲災案左傳昭三十一年十二月辛亥朔日有食之庚午之日始有謫謫謂日之將食之氣氣見於上所以責人君也故詩云十月之交朔月辛卯日有食之亦孔之醜又云此日而食于何不臧是君之不善而日食凡日食若壬午朔日有食之左傳云公問於梓愼禍福何爲對曰二至二分日有食之不爲災也日月之行也分同道也至相過也其他月則爲災陽不克也故常爲水也然詩之十月則夏之八月秋分日食而爲災者以辛卯之日卯徃侵辛由反克金故爲災昭七年夏四月甲辰朔日有食之而大咎衞君上卿四月夏之二月爲災者以其甲辰之日甲爲木辰爲土木當克土今日食土反克木故爲災也昭二十一年秋七月壬午朔而日食壬爲水午爲火水應克火而日食火反克水不爲災者以秋七月夏之五月是午之時得有克壬之理故不得爲災杜預以爲假日食之異以戒懼人君其言若信若不信不可定以爲驗也禮記要義卷第三十一
