  text: 禮記要義卷第二十雜記上
  hash: sha256:ab3b2ce315a7951cfbaf14e8d31915dc04ed7862685a548ff732eb93bd3a97df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_019-1a}
body:
  text: 一諸侯行而死其復之制諸侯行而死於館則其復如於其國如於道則升其乘車之左轂以其綏復注云館主國所致舍復招魂復魄也如於其國主國館賔與使有之得升屋招用褎衣也如於道道上廬宿也升車左轂象升屋東榮綏當為緌讀如蕤賔之𬎼字之誤也緌謂旌旗之旄也去其旒而用之異於生也二輤裧之制其輤有裧緇布裳帷素錦以為屋而行注云輤載柩將殯之車飾也輤取名於襯與蒨讀如蒨斾之蒨櫬棺也蒨染赤色者也將葬載柩之車飾曰栁裧謂鱉甲邊緣緇布裳帷圍棺者也裳帷用緇則輤用赤矣輤象宫室屋其中小帳櫬覆棺者若未大斂其載尸而歸車飾皆如之三殯宫稱廟及柩入尸入不同升階至於廟門不毀牆遂入適所殯唯輤為說於廟門外注云廟所殯宫牆裳帷也適所殯謂兩楹之間去輤乃入廟門以其入自有宫室也毀或為徹凡柩自外來者正棺於兩楹之間尸亦侇之於此皆因殯焉異者柩入自闕升自西階尸入自門升自阼階其殯必於兩楹之間者以其死不於室而自外來留之於中不忍逺也正義曰廟所殯宫者以殯之所在故謂為廟云牆裳帷也者鄭恐是宫牆之嫌故云牆裳帷也以飾棺之物稱牆也知非宫墻者以曾子問云柩入自闕今云至於廟門是入自門也四蜃車輲車龍輴輁軸之制大夫以布為輤而行至於家而說輤載以輲車入自門至於阼階下而說車舉自阼階升適所殯注云大夫輤言用布白布不染也言輤者逹名也不言裳帷俱用布無所別也至門亦說輤乃入言載以輲車入自門明車不易也輲讀為輇或作搏許氏說文解字曰有輻曰輪無輻曰輇周禮又有蜃車天子以載柩蜃輇聲相近其制同乎輇崇蓋半乘車之輪諸侯言不毀牆大夫士言不易車互相明也不易者不易以輴也廟中有載柩以輴之禮此不耳正義曰云不易者不易以輴也者謂大夫士在路載以輲車至家說載亦載以輲車是不易以輴也若天子諸侯載柩以蜃車至門亦以蜃車其殯時則易之以輴也云廟中有載柩以輴車之禮此不耳者謂天子諸侯殯時用輴又天子諸侯及大夫朝廟之時有用輴車載柩之禮此喪從外來大夫士不合用輴其蜃車之形鄭注既夕禮云其車之輿狀如牀中央有轅前後出設輅輿輅輿上有四周下則前後有軸以輇為輪許叔重說有輻曰輪無輻曰輲鄭又注周禮遂師云四輪迫地而行有似於蜃因取名焉此是蜃之制也上下通用在路載柩也輲車之制亦與蜃車同但不用輻為輪天子諸侯殯皆用之故檀弓云天子菆塗龍輴謂畫轅為龍諸侯殯亦用輴車不畫轅為龍故喪大記云君殯用輴注云君諸侯也輴不畫龍大夫殯不用輴故鄭注喪大記大夫之殯廢輴是大夫不用輴士掘肂見祍是亦廢輴也其朝廟大夫以上皆用輴士朝廟用輁軸故既夕禮云遷於祖用軸鄭注云大夫諸侯以上有四周謂之輴天子畫之以龍是也輴與輁軸所以異者輴有四周輁軸則無故鄭注既夕禮云軸狀如轉轔刻兩頭為軹輁狀如長牀穿桯前後著金而關軸焉是也五士輤葦席屋蒲席裳帷士輤葦席以為屋蒲席以為裳帷注云言以葦席為屋則無素錦為帳正義曰案諸侯與大夫上有輤旁有裳帷內有素錦屋今士唯云葦席以為屋蒲席以為裳帷不云屋上所有之物據文言之葦席為屋則當覆上輤處將蒲席為裳帷接屋之四邊以鄣棺六大夫士為君喪廬堊之制大夫次於公館以終喪士練而歸士次於公館大夫居廬士居堊室注云公館公宫之舍也練而歸之士謂邑宰也練而猶處公館朝廷之士也唯大夫三年無歸也謂未練時也士居堊室亦謂邑宰也朝廷之士亦廬正義曰公館君之舍也大夫恩深祿重故為君喪居廬終喪畢乃還家也士練而歸者謂邑宰之士也士卑恩輕故至小祥而反其所治邑也士次於公館者此謂朝廷之士也雖輕而無邑事故亦留次公館三年也大夫居廬者以位尊恩重故居廬士居堊室者士位卑恩輕故居堊室七大夫雖尊不以其服服父母兄弟大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服注云大夫雖尊不以其服服父母兄弟嫌若踰之也士謂大夫庶子為士者也已卑又不敢服尊者之服今大夫喪禮逸與士異者未得而備聞也春秋傳曰齊晏桓子卒晏嬰粗衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫此平仲之謙也言已非大夫故為父服士服耳粗衰斬者其縷在齊斬之間謂縷如三升半而三升不緝也斬衰以三升為正微細焉則屬於粗也然則士與大夫為父服異者有粗衰斬枕草矣其為母五升縷而四升為兄弟六升縷而五升乎唯大夫以上乃能備儀盡飾士以下則以臣服君之斬衰為其父以臣從君而服之齊衰為其母與兄弟亦以勉人為髙行也大功以下大夫士服同正義曰晏嬰家臣見晏嬰服士服故其老言所服云非大夫之喪禮也云曰唯卿為大夫者此晏嬰對家老之言若身為卿得著大夫之服若身為大夫唯得服士服云粗衰斬者其縷在齊斬之間者案喪服𥘉章斬衰次章疏衰疏即粗也今言粗衰斬者是下響粗上響兼斬有粗故云粗衰斬者其縷在齊斬之間齊即粗也言其布縷在齊斬之間斬衰三升粗衰四升其布在三升四升之間故云縷如三升半言粗如三升半而計縷唯三升故云縷如三升半而三升不緝也但縷如三升半是粗衰不緝是斬而成布三升為父之服也云斬衰以三升為正微細焉則屬於粗也者解晏子實斬衰而兼言粗也云然則士與大夫為父服異者有粗衰斬枕草矣者鄭既約左傳晏嬰之事始明大夫與士不同故云然則士與大夫為父異粗衰枕草矣則大夫以上斬衰枕􅒘士則疏衰枕草案既夕禮士禮而云枕塊者記者廣說非辭也云其為母五升縷而四升為兄弟六升縷而五升乎者鄭既約士之父服縷細降一等經文有母及兄弟故此約母與兄弟之服也喪服為母四升此云為母五升縷謂粗細似五升之縷成布四升喪服為兄弟五升此云為兄弟六升縷謂粗細如六升之縷成布五升皆謂縷細成布升數少也云唯大夫以上乃能備儀盡飾者大夫以上則兼天子諸侯德髙能備儀服無降殺是盡飾云士以下則以臣服君之斬衰為其父以臣從君而服之齊衰為其母與兄弟者以喪服義服皆降正服一等今為父母兄弟降從義服是卑屈也云以臣從君而服之齊衰為其母與兄弟者案喪服臣從君義服齊衰六升今士為兄弟縷如六升成布五升得與臣為君義服齊衰同其士為母父卒縷如五升成布四升與臣為君義服齊衰全異而云為其母與臣為君義服齊衰同者前注所云因粗衰降斬衰一等即連言父卒為母云縷如五升成布四升據父卒為母言之也此注以士為兄弟與臣為君義服齊衰同則父在為母與兄弟服亦同縷如六升而成布五升據父在為母言之為此前後注異云亦以勉人為髙行也者居喪之禮以服重為申以服輕為屈今大夫為父母兄弟之未為大夫者服士服是勉勵其父母兄弟使為髙行作大夫之禮士為其父母兄弟之為大夫者服士服亦是勉勵士身使為髙行作大夫也云大功以下大夫士服同者以經唯云父母兄弟士與大夫之里不云大功以下有殊是大功以下與大夫士同所以然者以重服情深故使士有抑屈使之勉勵大功以下輕服情殺故上下俱申也八王肅難鄭說謂喪禮無等聖證論王肅云喪禮自天子以下無等故曽子云哭泣之哀齊斬之情饘粥之食自天子逹且大國之卿與天子上士俱三命故曰一也晉士起大國上卿當天子之士也平仲之言唯卿為大夫謂諸侯之卿當天子之大夫非謙辭也春秋之時尊者尚輕簡喪服禮制遂壞羣卿專政晏子惡之故服粗衰枕草於當時為重是以平仲云唯卿為大夫遜辭以辟害也又孟子云諸侯之禮三年之喪齊疏之服飦粥之食自天子逹於庶人三代共之又此記云端衰喪車皆無等又家語云孔子曰平仲可為能逺於害矣不以己之是駮人之非遜辭以辟咎也王肅謂大夫與士異者大夫以上在喪斂時辨絰士冠素委貌馬昭答王肅同雜記云大夫為其父母兄弟之未為大夫者之喪服如士服是大夫與士喪服不同者而肅云無等則是背經說也鄭與言禮張融評云士與大夫異者皆是亂丗尚輕凉非王者之逹禮小功輕重不逹於禮鄭言謙者不異於逺害融意以王肅與鄭其義略同如融之說是周公制禮之時則上下同當喪制無等至後丗以來士與大夫有異故記者載之鄭因而解之禮是鄭學今申鄭義云端衰喪車無等者端正也正為衰之制度上下無等其服精粗卿與大夫有異也又曾子云齊斬之情據其情為一等無妨服有殊異耳若王肅之意大夫以上辨絰士唯素冠此亦得施於父母此經云為昆弟豈亦辨絰素冠之異乎此是肅之不通也杜元凱注左傳說與王肅同服䖍注左傳與端衰喪車無等其老之問晏子之答皆為非禮並與鄭違今所不用也九大夫適子服大夫服皇鄭異義大夫之適子服大夫之服注云仕至大夫賢著而德成適子得服其服亦尊其適象賢正義曰非但尊此大夫之身亦當尊其適子使服大夫之服能象似其父之賢者皇氏云大夫適子若為士為其父唯服士服注云仕至大夫謂此子若仕官至大夫始得服大夫服以其賢德著成如皇氏之意解此仕至大夫為大夫之子案前經注云士謂大夫庶子為士者明大夫適子未仕官及為士皆得服大夫之服皇氏之言違文背注不解鄭意十士之子為大夫其父母弗能主子主之士之子為大夫則其父母弗能主也使其子主之無子則為之置後注云大夫之子得用大夫之禮而士不得也置猶立也正義曰其父母弗能主也者士子身為大夫若死則父母不能為喪主也以身是士故不可為大夫喪主使其子主之者謂使此死者之子為主以其子是大夫適子故得為大夫之主以其服大夫服故也無子則為之置後者若死者無子則為死者別置其後所置之後即大夫適子同得行大夫之禮此所置之後謂暫為喪主假用大夫之禮若其大宗子則直為之立後自然用大夫禮也十一大夫有司占者卜宅卜日之衣冠大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮辨注云有司卜人也麻衣白布深衣而著衰焉及布帶緇布冠此服非純吉亦非純凶也皮辨則純吉之尤者也占者尊於有司卜求吉其服彌吉大夫士朔服皮辨正義曰大夫卜宅與葬日者宅謂葬地大夫尊故得卜宅并葬日有司麻衣布衰布帶因喪屨者有司謂卜人麻衣謂白布深衣布衰謂粗衰也皇氏云以三升半布為衰長六寸廣四寸綴於深衣前當胸上後又有負版長一尺六寸廣四寸布帶以布為帶因喪屨謂因喪之繩屨十二無地大夫及士其筮史占者所服如筮則史練冠長衣以筮占者朝服注云筮者筮宅也謂下大夫若士也筮史筮人也長衣深衣之純以素也長衣練冠純凶服也朝服純吉服也大夫士日朝服以朝也正義曰如筮者謂下大夫及士不合用卜故知用筮也則史練冠長衣者此謂無地大夫筮葬禮也唯筮宅卜日耳卜時緇布冠麻衣布衰雜以吉凶之服如筮則練冠長衣以筮輕故用純凶服也占者朝服者卜重故占者皮辨筮輕故占者朝服案士虞禮注云士之屬吏為其長弔服加麻此史練冠長衣者此經文含大夫其臣為大夫以布帶繩屨故史練冠長衣若士之卜史當從弔服不得練冠長衣也十三薦馬者哭踊薦馬有三時案士喪禮下篇云薦馬之節凡有三時一者柩𥘉出至祖廟設奠為遷祖之奠訖乃薦馬是其一也至日側祖奠之時又薦馬是其二也明日將行設遣奠之時又薦馬是其三也主人見薦馬送行物而哭踊故云薦馬者哭踊也所以馬進而主人哭踊者馬是牽車為行之物今見進馬是行期巳至故孝子感之而哭踊十四夫人招魂狄稅素沙夫人稅衣揄狄狄稅素沙注云言其招魂用稅衣上至揄狄也狄稅素沙言皆以白紗縠為裏十五池飾有振容銅魚大夫不揄絞屬於池下注云謂池飾也揄揄翟也采青黃之間曰絞屬猶繫也人君之栁其池繫絞繒於下而畫翟雉焉名曰振容又有銅魚在其間大夫云振容士去魚正義曰案喪大記云君三池振容是人君之栁有振容振容者其池繫揄繒於下而畫翟雉焉名曰振容云又有銅魚在其間者上有池下有振容池與振容之間而有魚故云在其間云大夫去振容士去魚者以喪大記大夫不振容士不云魚躍拂池故也大夫不振容者謂不以揄絞屬於池下為振容十六大夫祔於士士不祔於大夫大夫附於士士不附於大夫附於大夫之昆弟無昆弟則從其昭穆雖王父母在亦然注云附讀皆為祔大夫祔於士不敢以已尊自殊於其祖也士不祔於大夫自卑別於尊者也大夫之昆弟謂為士者也從其昭穆中一以上祖又祖而巳祔者祔於先死者正義曰自此以下至附於公子廣明祔祭之義各依文解之大夫祔於士者謂祖為士孫為大夫若死可以祔祭於祖之為士者也士不附於大夫者謂先祖為大夫孫為士不可祔祭於大夫唯得祔於大夫之兄弟為士者無昆弟則從其昭穆者謂祖為大夫無昆弟為士則從其昭穆謂柎於髙祖為士者若髙祖為大夫則祔於髙祖昆弟為士者雖王父母在亦然者謂孫死之後應合祔於王父王父見在無可祔然猶如是也亦如是祔於髙祖也祔者祔祭於神當從示旁為之十七男子祔於王父則配女子所祔則否男子附於王父則配女子附於王母則不配注云配謂并祭王母不配則不祭王父也有事於尊者可以及卑有事於卑者不敢援尊配與不配祭饌如一祝辭異不言以某妃配某氏耳女子謂未嫁者也嫁未三月而死猶歸葬於女氏之黨正義曰男子附於王父則配者謂祭王父并祭所配王母女子附於王母則不配者謂在室之女及已嫁未三月而死祔祭於王母則不祭所配之王父十八齊斬練皆功衰有父母之喪尚功衰而附兄弟之殤則練冠附於殤稱陽童某甫不名神也注云此兄弟之殤謂大功親以下之殤也斬衰齊衰之喪練皆受以大功之衰此謂之功衰以是時而祔大功親以下之殤大功親以下之殤輕不易服冠而兄為殤謂同年者也兄十九而死巳明年因喪而冠陽童謂庶殤也宗子則曰隂童童未成人之稱也某甫且字也尊神不名為之造字正義曰曽子問庶子之殤祭於室白故曰陽童宗子殤死祭於室奧則曰隂童云某甫且字也者檀弓云五十以伯仲是正字二十之時曰某甫是且字言且為之立字云尊神不名為之造字者以字者冠時所有此兄去年巳死未得有字雖云某甫是死後祔時為之造字必造字者以神道事之不可觸名故也二十君不撫僕妾妾雖攝女君猶下正適主妾之喪則自附至於練祥皆使其子主之其殯祭不於正室君不撫僕妾注云祔自為之者以其祭於祖廟不撫略於賤也正義曰妾既卑賤得主之者崔氏云謂女君死攝女君也其殯祭不於正室者雖攝女君猶下正適故殯之與祭不得在正室庾蔚云妾祖姑無廟為壇祭之鄭云於廟者崔氏云於廟中為壇祭之此謂攝女君若不攝女君之妾則不得為主則別為壇不在祖廟中而子自主之也草一喪禮未畢不以殺禮待新弔者凡喪服未畢有弔者則為位而哭拜踊注云客始來主人不可以殺禮待之正義曰凡喪服未畢者是喪服將終但未畢了猶有餘日未滿其禮巳殺若有人始來弔當為位哭踊不以殺禮而待新弔之賔也言凡者五服悉然草二不以私喪之末臨兄弟大夫有私喪之葛則於其兄弟之輕喪則辨絰注云私喪妻子之喪也輕喪緦麻也大夫降焉弔服而往不以私喪之末臨兄弟正義曰私喪之葛者謂妻子之喪至卒哭以葛代麻之後是私喪之葛則於其兄弟之輕喪則辨絰者於此之時遭兄弟之輕喪緦麻亦著弔服辨絰而往不以私喪之末臨兄弟也若成服之後則錫衰未成服之前身著素裳而首服辨絰也草三父為長子杖孫避尊者不以杖即位為長子杖則其子不以杖即位注云辟尊者正義曰父為長子杖則其子不以杖即位者其子長子之子祖在不厭孫其孫得杖但與祖同處不得以杖即位辟尊者草四父母存在為妻不杖不稽顙為妻父母在不杖不稽顙注云尊者在不敢盡禮於私喪也正義曰此謂適子為妻父母見存不敢為妻杖又不可為妻稽顙故云不杖不稽顙案喪服云大夫為適婦為喪主父為己婦之主故父在不敢為婦杖若父沒母在不為適婦之主所以母在不杖者以父母尊同因父而連言母父沒母存為妻雖得杖而不得稽顙以杖與稽顙文連不杖屬於父在不稽顙文屬母在故云父母在不杖不稽顙而禮論范宣子中六有二義一者生存為在二者旁側為在此云母在謂在母之側為妻不杖故問喪云則父在不敢杖矣尊者在故也鄭云父在不杖謂為母案為母則削杖而云父在不杖謂為母也是父在謂在側之在若論語云君在踧踖如也此范氏之釋其義可通但父母在之文相連為一而父為存在之在母為在側之在又小記云父在庶子為妻以杖即位然庶子豈得父見在則庶子為妻得以杖即位乎是范義未安也今且具載之草五有為舊君不反服違諸侯之大夫不反服違大夫之諸侯不反服注云其君尊卑異也違猶去也去諸侯仕諸侯去大夫仕大夫乃得為舊君服正義曰違去也去諸侯謂不便其居及辟仇也草六喪冠條屬吉冠纓武異材喪冠條屬以別吉凶三年之練冠亦條屬右縫小功以下左緦冠繅纓注云别吉凶者吉冠下條屬也條屬者通屈一條繩若布為武垂下為纓屬之冠象大古喪事略也言冠則纓武異材焉右縫者右辟而縫之左辟象吉輕也繅當為澡麻帶絰之澡聲之誤也謂有事其布以為纓草七卒哭以後祭稱孝子孫以前則稱哀祭稱孝子孝孫喪稱哀子哀孫注云各以其義稱正義曰祭吉祭也謂自卒哭以後之祭也吉則申孝子心故祝辭云孝也或子或孫隨其人也喪稱哀子哀孫者凶祭謂自虞以前祭也喪則痛慕未申故稱哀也故士虞禮稱哀子而卒哭乃稱孝子也草八端衰喪車無等孝子之情一端衰喪車皆無等注云喪車惡車也喪者衣衰及所乘之車貴賤同孝子於親一也衣衰言端者玄端吉時常服喪之衣衰當如之正義曰端衰謂喪服上衣以其綴六寸之衰於心前故衣亦曰衰端正也吉時玄端服身與𬒮同以二尺二寸為正而喪衣亦如之而今用衰綴心前故曰端衰也喪車者孝子所乘惡車也惡車喪車也等等差也言喪之衣衰及惡車天子至士制度同無貴賤等差之别也以孝子於其親情如一也喪車凡五等見中車草九祭服依班序昏則攝盛大夫冕而祭於公辨而祭於巳士辨而祭於公冠而祭於己士辨而親迎然則士辨而祭於已可也注云辨爵辨也冠玄冠也祭於公助君祭也大夫爵辨而祭於己唯孤爾緣類欲許之也親迎雖亦已之事攝盛服爾非常也正義曰親迎攝盛服者以親迎配偶一時之極故許其攝盛服祭祀常所供養故須依其班序三十襲事成於帶變之異於生率帶諸侯大夫皆五采士二采注云此謂襲尸之大帶率繂也繂之不加針功大夫以上更飾以五采士以朱緑襲事成於帶變之所以異於生正義曰此謂尸襲竟而著此帶也率謂為帶也但攝帛邊而尉殺之不加針功異於生也以五采飾之亦異於生也大夫與諸侯同而士二采並異於生而尊者可同也然此士天子之士也諸侯之士則緇帶故士喪禮緇帶吉時大帶唯有朱緑玄華無五采此上連枇畢用桑之下則知此亦喪之大帶小斂大斂衣數既多有絞不可加帶故知襲尸之大帶也襲衣與生同唯帶與生異凡襲事著衣畢加帶乃成故云襲事成於帶變之異於生也卅一藏器於見外椁內而后折入醴者稻醴也甕甒筲衡實見間而后折入注云此謂葬時藏物也衡當為桁所以庪甕甒之屬聲之誤也實見間藏於見外椁內也折承席也正義曰云實見間藏於見外椁內也者案既夕禮乃窆藏器於旁加見注云器用器役器也見棺飾也先言藏器乃云加見者器在見內也既夕禮又六藏苞筲於旁注云於旁者在見外也不言罋甒饌相次可知知是藏於見外椁內者則見內是用器役器見外是明器也此是士禮略實明器耳大夫以上則兼有人器明器也人器實明器虛云折承席也者案既夕禮注云折猶庪也方鑿連木為之蓋如牀而縮者三橫者五無簀窆事畢加之壙上以承抗席是也卅三埋重於祖廟門外之東重既虞而埋之注云就所倚處埋之正義曰案既夕禮𥘉喪朝禰廟重止于門外之西不入重不入者謂將嚮祖廟若過之然故不入明日自禰廟隨至祖廟庭厥明將出之時重出自道道左倚之鄭注云道左主人位此注就所倚之處埋之謂於祖廟門外之東也卅四朝夕哭褰帷既出則施其㧁朝夕哭不帷無柩者不帷注云緣孝子心欲見殯肂也既出則施其㧁鬼神尚幽暗也謂既葬也棺柩巳去鬼神在室堂無事焉遂去帷正義曰孝子心欲見殯故當朝夕進入廟門內哭位之時除去殯宫帷也哭竟則帷之注既出則施其㧁正義曰案士喪禮君使人弔徹帷鄭云徹帷㧁之事畢則下之鄭此注㑹儀禮注也則㧁是褰舉之名𥘉哭則褰舉事畢則施下之卅五禮以冠名服子羔之襲也繭衣裳與稅衣纁袡為一素端一皮辨一爵辨一玄冕一曾子曰不襲婦服注云繭衣裳者若今大䙱也纊為繭緼為𫀆表之以稅衣乃為一稱爾稅衣若玄端而連衣裳者也大夫而以纁為之緣非也唯婦人纁袡禮以冠名服此襲其服非襲其冠曹子譏襲婦服而巳玄冕又大夫服未聞子羔曷為襲之玄冕或為玄冠或為玄端卅七𥘉喪哭踊無數今云七五三者為之節公諸侯去死日五日而殯則合死日六日也凡為七踊也大夫五者大夫三日殯合死日為四日士三者士二日殯合死日數也婦人皆居間者謂婦人與丈夫更踊也男子先踊踊畢而婦人踊踊畢賔乃踊然親始死及動尸舉柩哭踊無數令云七五三者謂為禮有節之踊每踊輒三者三為九而謂為一也卅八魯人贈幣失禮魯人之贈也三玄三纁廣尺長終幅注云言失之也士喪禮下篇曰贈用制幣玄纁束正義曰記魯失也贈謂以物送亡人於椁中也贈別用玄纁束帛三玄二纁故既夕禮曰贈用制幣玄纁束今魯人雖三玄二纁而用廣尺長終幅不復丈八尺則失禮也卅九春秋有歸含賵緩而無譏者云春秋有既葬歸含賵禭無譏焉皆受之於殯宫者案左傳隱元年天王使宰咺來歸惠公仲子之賵歸惠公賵緩也公羊亦云其言來何不及事也是左氏公羊皆譏其緩云無譏者取榖梁之義故文五年榖梁云王使榮叔歸含且賵不言來不周事之用也明宰咺言來得周事也是宰咺歸賵榖梁不譏是既葬既歸含且賵無譏也榖梁所以不譏宰咺者釋廢疾云平王新有幽王之亂遷于成周欲崇禮於諸侯原情免之若無事而晚者去來以譏之榮叔是也文九年秦人來歸僖公成風之禭最晚不譏者釋廢疾云以其殽敗兵無休時君子原情不責晚也四十居喪以吉服接鄰國宰夫朝服即喪屨者宰謂上卿也言夫衍字朝服者吉服也必用吉服者以鄰國執玉而來執玉不麻故著朝服以仍在喪不可純吉故即喪屨也此遭喪巳久故嗣子親受禮宰著朝服若新始遭喪則主人不親受使大夫受於殯宫故聘禮云聘遭喪入竟則遂也鄭云遭喪主國君薨也聘禮又云不筵几鄭云致命不於廟就尸柩於殯宫聘禮又云遭喪將命于大夫主人長衣練冠以受必用吉服以待鄰國者以己國遭喪他國是吉不可以喪禮待於他國故以吉禮待之四一禭賵􅉠奠散文亦通隱元年公羊傳云賵者蓋以馬以乘馬束帛車馬曰賵貨財曰􅉠衣𬒳曰禭榖梁云乘馬曰賵衣衾曰禭貝玉曰含錢財曰􅉠案既夕禮云賵馬而無車者士卑不合有車何休云周制謂士無車非也此禮記陳乘黃大路則周制有車榖梁直云乘馬曰賵無車者文不備也散而言之車馬亦曰禭故前文云諸侯相禭以後路是也此無􅉠􅉠是加厚非常故也故宰夫注云其間加恩厚則有􅉠焉雖有貨亦有馬故少儀云􅉠馬不入廟門是也既夕有贈者贈施於死必及葬節此未必一當葬時賵既夕有奠此無奠者以奠主於親者故既夕禮云兄弟賵奠所知則賵而不奠此諸侯相於既疏故無奠四二上客臨辭上客臨曰寡君有宗廟之事不得承事使一介老某相執綍注云上客弔者也臨視也言欲入視喪所不足而給助之謙也其實為哭耳四三士喪與天子同者三士喪有與天子同者三其終夜燎及乘人專道而行注云乘人謂使人執引也專道人辟之正義曰言士喪與天子三事同也其終夜燎一也及乘人二也專道而行三也終夜燎謂柩遷之夜須光明故竟夜燎也乘人謂人引車不用馬也既夕禮云屬引古者人引柩專道行謂喪在路不辟人也三事為重故云與天子同也禮記要義卷第二十
