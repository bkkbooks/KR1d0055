front:
  text: 禮記要義卷第五下王制下
  hash: sha256:2fde3d33adf903bea724a754655589e29eb405e9638dd6837c9e81de7a5590ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_004-1a}
body:
  text: 一殷爵人於朝周於祖廟諸侯於嘗祭爵人於朝謂殷法也周則天子特假祖廟而拜授之故洛誥云蒸祭歲文王騂牛一武王騂牛一時册命周公故特祭文武若諸侯爵人因嘗祭之日故祭統云祭之日一獻君降立于阼階之南南鄉所命北面是也當云命周公後二歷代諸侯朝聘之制諸侯之於天子也比年一小聘三年一大聘五年一朝天子五年一巡守注云比年每歲也小聘使大夫大聘使卿朝則君自行然此大聘與朝晉文霸時所制也虞夏之制諸侯歲朝周之制侯甸男采衛要服六者各以其服數來朝天子以海內為家時一巡省之五年者虞夏之制也周則十二歲一巡守三王巡守祀方明見諸侯之禮歲二月東巡守至于岱宗柴而望祀山川覲諸侯問百年者就見之命大師陳詩以觀民風注云岱宗東嶽柴祭天告至也覲見也就見老人陳詩謂采其詩而視之正義曰案覲禮云諸侯覲於天子為宫方三百步四門壇十有二尋深四尺鄭注云王巡守至于方嶽之下諸侯會之亦為此宫以見之是也覲禮又云天子乘龍載大旗拜日於東門之外反祀方明鄭注引朝事儀曰天子冕而執鎮圭尺有二寸云帥諸侯而朝日於東郊所以教尊尊也退而朝諸侯由此二者言之巳祀方明乃以會同之禮見諸侯也凡會同者不協而盟盟時設方明於壇上乃以載辭告焉如覲禮及鄭注所云既告至之後為宮加方明於壇天子出宮東門外拜日反祀方明祀方明之後乃徹去方明故鄭云由此二者言之巳祀方明乃以會同之禮見諸侯云二者謂覲禮經文朝日東門反祀方明朝事儀云朝日東郊退而朝諸侯故云由此二者言之巳祀方明乃以會同之禮見諸侯也今於覲禮未祀方明之前未有見諸侯之事皇氏以為未祀方明之前巳見諸侯非也其祀方明之後見諸侯之時王升立於壇上南靣諸公中階之前北靣諸侯東階之東西靣諸伯西階之西東靣諸子門東北面諸男門西北面王降階南面而見之三揖既升壇使諸侯升公拜於上等侯伯於中等子男於下等見諸侯訖若有不協更加方明於壇上諸侯等俱北靣戎右傳敦血以授歃者司盟主其職故司盟云掌其盟約之載及其禮儀北面詔明神於時王立無文不可與諸侯同北面當於阼階上西面此是見諸侯之禮祀方明之時祭天則燔柴也天謂日也與此岱宗柴所用事别覲禮云祭天燔柴謂天子之盟也祭地瘞謂王官之伯盟也祭山丘陵升及祭川沈者是諸侯之盟也此是巡守及諸侯之盟祭也故注云升沈必就祭者也就祭則是謂王巡守及諸侯之盟祭也祭天柴謂祭日也祭地瘞者祭月也王巡守之盟其神主日四三十年之蓄舉全數喪用仂乃什一冢宰制國用必於歲之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出祭用數之仂喪三年不祭唯祭天地社稷為越紼而行事喪用三年之仂喪祭用不足曰暴有餘曰浩祭豐年不奢凶年不儉國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂注云制國用如今度支經用杪末也小國大國豐凶之年各以歲之收入制其用多少多不過禮少有所殺通三十年之率當有九年之蓄出謂所當給為算今年一歲經用之數用其什一祭不敢以卑廢尊越猶躐也紼輴車索喪大事用三歲之什一暴猶耗也浩猶饒也常用數之仂菜色食菜之色民無食菜之飢色天子乃日舉樂以食正義曰以三十年之通制國用量入以為出者言欲制國用之時先以三十年通融之法留九年蓄外計見在之物以制國用假令一年有四萬斛以一萬斛擬三十年通融積聚為九年之蓄以見在三萬斛制國之來歲一年之用量其今年入之多少以為來年出用之數每年之率入物分為四分一分擬為儲積三分為當年所用二年又留一分三年又留一分是三年總得三分為一年之蓄三十年之率當有十年之蓄此云當有九年之蓄者崔氏云三十年之間大略有閠月十二足為一年故唯有九年之蓄也王肅以為二十七年有九年之蓄而言三十者舉全數兩義皆通知用今年一歲經用者以下文云喪用三年之仂此直云數之仂故知是一歲之仂也又知仂為什一者以仂是分散之名故考工記云石有時以泐考工記又云以其圍之阞捎其藪彼注阞謂三分之一此云什一者以民稅一歲之十一則國祭所用亦什一也此謂當年經用之內用其什一非是通計擬三年儲積之蓄也五喪惟祭天地社稷五祀其宗廟常祭皆廢正義曰私喪者是其卑天地社稷是其尊今雖遭私喪既殯巳後若有天地社稷之祭即行之故云不敢以卑廢尊也越是踐躐之義故云越猶躐也但未葬之前屬紼於輴以備火災今既祭天地社稷須越躐此紼而往祭所故云越紼云紼輴車索者以停住之時指其繩體則謂之紼若在塗人挽而行之則謂之引故鄭注雜記云廟中曰紼在塗曰引天地社稷故有越紼之禮六宗及山川之等卑於天地社稷待喪終乃祭故鄭志答田瓊云天地郊社至尊不可廢故越紼祭之六宗山川之神則否其宫中五祀在喪內則亦祭之故曾子問云君薨五祀之祭不行既殯而祭之自啓至於反哭五祀之祭不行既葬而祭之但祭時須人既少衆官不皆使盡去不須越紼故鄭答田瓊云五祀宫中之神喪時朝夕出入所祭不為越紼也天地社稷之祭豫卜時日今忽有喪故既殯越紼行事若遭喪之後當天地郊社常祭之日其啓殯至於反哭則避此郊社祭日而為之案禮卒哭而祔練而禘於廟此等為新死者而為之則非常祭也其常祭法必待三年喪畢也其春秋之時未至三年而為吉祭者皆非禮也若杜預之意以為既祔以後宗廟得四時常祭三年大禘乃同於吉故僖公三十三年凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟杜注云新主既特祀於寢則宗廟四時常祀三年禮畢又大禘乃皆同於吉如杜之意與三年不祭違者案釋例云禮記後儒所作不正與春秋同是杜不盡用禮記也七百六陽九之運凡水旱之歲歷運有常案律曆志云十九歲為一章四章為一部三十部為一統三統為一元則一元有四千五百六十歲𥘉入元一百六歲有陽九謂旱九年次三百七十四歲隂九謂水九年以一百六歲并三百七十四歲為四百八十歲注云六乘八之數云云八祭先代無主後者天子諸侯祭因國之在其地而無主後者注云謂所因之國先王先公有功德宜享丗祀今絶無後為之祭主者昔夏后氏郊鯀至𣏌為夏後而更郊禹晉侯薨黃熊入國而祀夏郊此其禮也正義曰此一節論天子置都之所及諸侯所封之內皆因古昔先王先公所居之地今其地子孫絶滅而無主後者則天子諸侯祭此先王先公故云祭因國之在其地而無主後者若天子因先公之後亦祭先公若諸侯因先王之後亦祭先王先王先公皆謂有德宜丗祀者九祫禘之辨天子犆礿祫禘祫嘗祫蒸注云犆猶一也祫合也天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常天子先祫而後時祭諸侯先時祭而後祫凡祫之歲春一礿而已不祫以物無成者不殷祭周改夏祭曰礿以禘為殷祭也魯禮三年喪畢而祫於大祖明年春禘於羣廟自爾之後五年而再殷祭一祫一禘十諸侯立五廟魯有八廟祖天子凡始封之君謂王之子弟封為諸侯為後丗之大祖當此君之身不得立出王之廟則全無廟也故諸侯不敢祖天子若有大功德王特命立之則可若魯有文王之廟鄭祖厲王是也魯非但得立文王之廟又立薑嫄之廟及魯公武公之廟并周公及親廟除文王廟外猶八廟也此皆有功德特賜非禮之正此始封君之子得立一廟始封六丗之孫始五廟備也若異姓始封如大公之屬𥘉封則得立五廟從諸侯禮也天子七廟疏十一七祀五祀三祀之等知五祀是司命中霤門行厲者案祭法云王立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈諸侯五祀無户竈自外與天子同明大夫五祀與諸侯同明知是司命中霤門行厲也云此祭謂大夫有地者以其祭五祀與諸侯同故知大夫有采地者云其無地祭三耳者以祭法云大夫立三祀曰族厲曰門曰行也十二一謂禘大祫小一謂祫即禘禘祫大小鄭以公羊傳云大事者何大祫也毀廟之主陳于大祖未毀廟之主皆升合食于大相故為大事若王肅張融孔朝皆以禘為大祫為小故王肅論引賈逵説吉禘於莊公禘者遞也審諦昭穆遷主遞位孫居王父之處又引禘於大廟逸禮其昭尸穆尸其祝辭總稱孝子孝孫則是父子並列逸禮又云皆升合於大祖所以劉歆賈逵鄭衆馬融等皆以為然鄭不從者以公羊傳為正逸禮不可用也又曽子問云七廟五廟無虛主虛主者唯天子崩與祫祭祝取羣廟之主明禘祭不取羣廟之主可知爾雅云禘大祭也謂比四時為大也故孫炎等注爾雅云皆以禘為五年一大祭若左氏説及杜元凱皆以禘為三年一大祭在大祖之廟傳無祫文然則祫即禘也取其序昭穆謂之禘取其合集羣祖謂之祫十三五方皆有性地氣使然中國戎夷五方之民皆有性也下可推移注云地氣使之然正義曰性謂稟性自然故孝經説云性者生之質若木性則仁金性則義火性則禮水性則信土性則知中庸云天命之謂性是賦命自然情者既有識知心有好惡當逐物而遷故有喜怒哀樂好惡此經云剛柔輕重遲速天生自然是性也而連言情者情是性之小別因性連言情者耳若指而言之則上文異俗是情也故注云謂其所好惡今經有剛柔輕重遲速六事而注唯云緩急者細別則有六大總唯二剛輕速總是急也柔重遲總是緩也此大略而言人性不同亦有柔而躁者剛而遲者故尚書云臯陶行有九德是也十四越俗斷髮文身臥則僢正義曰案漢書地理志文越俗斷髮文身以辟蛟龍之害故刻其肌以丹青涅之以東方南方皆近於海故俱文身云浴則同川臥則僢者言首在外而足相鄉內故典瑞注云僢而同邸正本直云臥則僢無同字俗本有同字誤也十五王太子以下入學之禮之年之時樂正崇四術立四教順先生詩書禮樂以造士春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉凡入學以齒注云樂正樂官之長掌國子之教虞書曰夔命汝典樂教胄子崇髙也髙尚其術以作教也幼者教之於小學長者教之於大學尚書傳曰年十五始入小學十八入大學順此四術而教以成是士也春夏陽也詩樂者聲聲亦陽也秋冬隂也書禮者事事亦隂也互言之者皆以其術相成皆以四術成之王子王之庶子也羣后公及諸侯皆以長幼受學不用尊卑十六遂學應與鄉同案司馬法曰百里郊二百里野遂人云掌邦之野既二百里為野遂之所居故知遠郊之外云遂大夫掌之者謂遂大夫掌所職二百里中也且此不帥教者移之在遂不應鄉大夫臨之故亦遂大夫掌之遂大夫亦帥國之俊選於遂學而行禮也但六鄉州學主射黨學主正齒位遂則縣與州同鄙與黨同未知縣正主射鄙師主正齒位以否亦應與鄉不異但周禮不備耳但縣鄙皆屬於遂雖各立學總曰遂學或遂之所居縣鄙不立縣鄙之學有事則在遂學與鄉同十七身在鄉學名升司徒大司徒之官命鄉大夫論量考校此鄉學之人有秀異之士者升於司徒先名惟在鄉今移名於司徒謂録名進在司徒其身猶在鄉學十八舉者中年考校進士三年一舉案鄉大夫云三年則大比考其德行道藝而興賢者能者謂鄉人有能有賢者以鄉飲酒之禮興之獻賢能之書於王名則升於天時身則任以官爵則下文云大樂正論造士之秀者以告於王而升諸司馬曰進士彼據鄉人故三年一舉此據學者故中年考試殷周同也熊氏以為此中年舉者為殷禮鄉大夫三年舉者周法其義非也十九二十而冠升大學正義曰案內則云二十而冠始學禮此升於大學曰俊士之人年以二十故可使習禮云學大學者案尚書周傳云王子公卿大夫元士之適子十三入小學二十入大學又書傳略説餘子十五入小學十八入大學其鄉人當與餘子同故知二十習禮之時在大學也此升於學者謂身升於大學非唯升名而已二十南北太遠故不屏士於南北案漢書地理志云南北萬三千里東西九千里又帝王丗紀南北萬三千三百六十八里東西九千三百二里漢地既然則古亦應爾皆南北長東西短故鄭此注云不屏士於南北為其太遠草一饗有四種皇氏云饗有四種一是諸侯來朝天子饗之則周禮大行人職云上公之禮其饗禮九獻是也其牲則體薦體薦則房蒸故春秋宣十六年左傳云饗有體薦又國語云王公立飫則有房蒸其所云飫即謂饗也立而成禮謂之為飫也其禮亦有飯食故舂人云凡饗食共其食米鄭云饗有食米則饗禮兼燕與食是也二是王親戚及諸侯之臣來聘王饗之禮亦有飯食及酒者親戚及賤臣不須禮隆但示慈惠故並得飲食之也其酌數亦當依命其牲折爼亦曰殽蒸也故國語云親戚宴饗則有肴蒸謂以燕禮而饗則有之也又左傳宣十六年云饗有體薦宴有折爼公當饗卿當宴王室之禮也時定王饗士會而用折爼以國語及左傳故知王親戚及諸侯之大夫來聘皆折爼饗也其饗朝廷之臣亦當然也三是戎狄之君使來王饗之其禮則委饗也其來聘賤故王不親饗之但以牲全體委與之也故國語云戎翟貪而不讓坐諸門外而體委與之是也此謂戎狄使臣賤之故委饗若夷狄君來則當與中國子男同故小行人職掌小賔小客所陳牲牢當不異也四是饗宿衛及耆老孤子則以醉為度故酒正云凡饗士庶子饗耆老孤子皆共其酒無酌數鄭云要以醉為度草二食禮有二種食禮者有飯有殽雖設酒而不飲其禮以飯為主故曰食也其禮有二種一是禮食故大行人云諸公三食之禮有九舉及公食大夫禮之屬是也二是燕食者謂臣下自與賔客旦夕共食是也案鄭注曲禮酒漿處右云此大夫士與賔客燕食之禮草三燕禮有二種燕禮者凡正饗食在廟燕則於寢燕以示慈惠故在於寢也燕禮則折爼有酒而無飯也其牲用狗謂為燕者詩毛傳云燕安也其禮最輕升堂行一獻禮畢而説屨升堂坐飲以至醉也儀禮猶有諸侯燕禮一篇也然凡燕禮亦有一種一是燕同姓二是燕異姓若燕同姓夜則飲之其於異姓讓之而止故詩湛露天子燕諸侯篇鄭箋云夜飲之禮同姓則成之其庶姓讓之則止草四殷制小學在國中大學在郊云小學在國中大學在郊此殷制明矣者以上文云小學在公宫南之左大學在郊下文云殷人養國老於右學養庶老於左學貴右而賤左小學在國中左也大學在郊右也與殷同也故云此殷制明矣以此篇從上以來雖解為殷制無正據可馮因此小學大學是殷制不疑故云明矣草五五十而爵亦有幼為大夫者正義曰經直云五十而爵鄭知非命為士而云大夫者以王制殷法殷則士無爵此經云而爵故知是大夫也此謂凡常之人有賢德故五十始為大夫若其有德不必五十則喪服小功章云大夫為昆弟之長殤是幼為大夫為兄之長殤草六疾者各以其器食之瘖聾跛躃斷者侏儒百工各以其器食之正義曰瘖謂口不能言聾謂耳不聞聲跛躃謂足不能行斷者謂支節解絶侏儒謂容貌短小百工謂有雜技藝此等既非老無告不可特與常餼既有疾病不可不養以其病尚輕不可虛費官物故各以其器食之器能也因其各有所能供官役使以廩餼食之案晉語云文公問八疾胥臣對云戚施植鏄注云使擊鐘蘧蒢蒙璆注云璆是玉磬使擊之侏儒扶廬注云扶持也廬戟柄也矇瞍循聲注云歌詠琴瑟聾聵司火注云使主然火其童昏嚚瘖僬僥官師所不材宜於掌土是各以器食之外傳不云跛躃此不云蘧蒢戚施設文不具外傳瘖與僬僥置於掌土此瘖與侏儒其器食之者今古法異也草七祭器不假謂有地大夫大夫祭器不假祭器未成不造燕器注云造為也正義曰皇氏云此謂有地大夫故祭器不假若無地大夫則當假之故禮運云大夫祭器不假聲樂皆具非禮也謂無地大夫也草八大夫不丗爵草九諸侯有入為公卿三十公卿總稱大夫大夫不丗爵使以德爵以功注云謂縣內及列國諸侯為天子大夫者不丗爵而丗祿辟賢也正義曰知此大夫是天子大夫者以下云諸侯之大夫不丗爵祿此直云大夫不丗爵與諸侯大夫文異故知是天子大夫也知是縣內及列國諸侯入為天子大夫者案禮運云天子有田以處其子孫則周召畢原之等是縣內諸侯也詩衛武公入相於周又尚書顧命齊侯為虎賁衛侯為司寇是列國諸侯也並入為天子大夫案司裘諸侯則共熊侯豹侯是畿內亦曰諸侯此不云諸侯而云大夫者辟上諸侯丗子之文故云大夫然畿內諸侯有為三公則周召是也列國諸侯入為六卿則鄭武公是也今總為云天子大夫者若言公卿大夫於文為煩故總言大夫以包之詩云三事大夫謂三公也春秋諸侯殺大夫謂卿也是大夫為總號卅一畿內外諸侯之子未賜爵視元士未賜爵視天子之元士以君其國者未賜爵謂列國諸侯及縣內諸侯其身既死其子未得爵賜其衣服禮制視天子元士若畿外者君其本國畿內者亦君畿內之國故鄭注云列國及縣內之國鄭必知兼畿外列國者以詩小雅韎韐有奭諸侯丗子未遇爵命服士服而來此云視天子之元士以君其國故知兼列國也其畿內諸侯有大功德元子出封畿外則王命次子守其采邑若其賢才則丗為公卿則春秋周公召伯之屬是也卅二周以十寸為尺或言周尺八寸古者以周尺八尺為步今以周尺六尺四寸為步古者百畒當今東田百四十六畒三十步古者百里當今百二十一里六十步四尺二寸二分注周尺之數未詳聞也案禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畒當今百五十六畒二十五步古者百里當今百二十五里正義曰古者八寸為尺今以周尺八尺為步則一步有六尺四寸今以周尺六尺四寸為步則一步有五十二寸是今步比古步每步剩出一十二寸以此計之則古者百畒當今東田百五十二畒七十一步有餘與此百四十六畒三十步不相應也又今步每步剩古步十二寸以此計之則古之百里當今百二十三里一百一十五步二十寸與此經百二十一里六十步四尺二寸三分又不相應玉人職云鎮圭尺有二寸又云桓圭九寸是周猶以十寸為尺也今經云以周尺六尺四寸為步乃是六十四寸則謂周八寸為尺也故云蓋六國時多變亂法度或言周尺八寸也鄭即以古周尺十寸為尺八尺為步則步八十寸鄭又以今周尺八寸為尺八尺為步則今步皆少於古步一十六寸也是今步別剩十六寸古之四十步為今之五十步古之八十步為今之一百步計古之一畒之田長百步得為今田一百二十五步是今田每一畒之上剩出二十五步卅三畿外國數多畿內餘地多畿外千里封國之外所餘地少畿內千里所餘地多以畿外本擬封建諸侯畿內本供天子又有郊關鄉遂準擬公卿王子弟采邑故建國少餘地多卅四造乎禰亦告祖廟載主歸亦告造乎禰者造至也謂至父祖之廟也然此出歷至七廟知者前歸假既云祖禰明出亦告祖禰也今唯云禰者白虎通云獨見禰何辭從卑不敢留尊者之命至禰不嫌不至祖也皇氏申之云行必有主無則主命載于齊車書云用命賞于祖是也今出辭別先從卑起最後至祖仍取遷主則行也若前至祖後至禰是留尊者之命為不敬也故曲禮曰巳受命君言不宿於家亦其類也若還則先祖後禰如前所言也所以然者先應反行主祖廟故也然出告天地及廟還唯告廟不告天地者白虎通云還不復告天者天道無外內故不復告也諸侯將出者謂朝王及自相朝盟會征伐之事也冝乎社者不得告天故從社始也亦載社主也造乎禰者亦告祖及載主也唯言出告則歸亦告也曽子問曰出反必親告于祖禰是也天子用特牲諸侯卑則否也曽子問注云皆奠幣以告之是也卅五殷周大小學天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫注云學所以學士之宫尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊此小學大學殷之制尊卑學異名辟明也雍和也所以明和天下頖之言班也所以班政教也正義曰云此小學大學殷之制者以下文云殷人養國老於右學養庶老於左學則左學小右學大此經云小學在公宫南之左故知殷制也周則大學在國小學在西郊下文具也三六辨類禡二字案釋天云是類是禡師祭也故知禡為師祭也謂之禡者案肆師注云貉讀如十百之百為師祭造軍法者禱氣勢之增倍也其神蓋蚩蛔或曰黃帝鄭既云祭造軍法者則是不祭地熊氏以禡為祭地非師祭皆稱類爾雅類既為師祭所以上文云天子將出巡守類乎上帝及舜之攝位亦類乎上帝並非師祭皆稱類者但爾雅所釋多為釋詩以皇矣云是類是禡止釋皇矣類禡為師祭不謂餘文類皆為師祭但類者以事類告天若以攝位事類告天亦謂之為類若以巡守事類告天亦謂之為類故異義夏侯歐陽説以類祭天者以事類祭之古尚書説非時祭天謂之類許愼謹案周禮郊天無言類者知類非常祭從古尚書説鄭氏無駮與許同也然今尚書及古尚書二説其文雖異其意同也以事類告祭則是非常故孔注尚書亦云以攝位事類告天鄭又以類雖非常祭亦比類正禮而為之故小宗伯注云類者依其正禮而為之是也卅八辨釋菜釋奠之制正義曰案大胥職云春入學舍采合舞文王丗子亦云釋菜鄭注云釋菜禮輕也則釋菜唯釋蘋藻而巳無牲牢無幣帛文王丗子又云始立學者既興器用幣注云禮樂之器成則釁之又用幣告先聖先師以器成此則徒用幣而無菜亦無牲牢也文王丗子又云凡始立學者必釋奠於先聖先師及行事必以幣是釋奠有牲牢又有幣帛無用菜之文熊氏以此為釋菜奠幣者謂釋奠之禮以獻俘馘故云釋菜奠幣言釋奠之時既有牲牢菜幣兩有今案注云釋菜解經中釋字奠幣解經中奠字又云禮先師不云祭先師則似訊馘告之時但有菜幣而巳未必為釋奠有牲牢也於事有疑未知孰是故備存焉然則釋菜奠幣皆告先聖先師此直云先師文不具耳卅九孔子隂書讖緯以待後王正義曰夏不田蓋夏時也者以夏是生養之時夏禹以仁讓得天下又觸其夏名故夏不田鄭之此注取春秋緯運斗樞之文故以為夏不田若何休稍異於此案榖梁傳桓四年公狩于郎傳曰春曰田夏曰苗秋曰搜冬曰狩何休云運斗樞曰夏不田榖梁有夏田於義為短鄭玄釋之云四時皆田夏殷之禮詩云之子于苗選徒囂囂夏田明矣孔子雖有聖德不敢顯然改先王之法以教授於丗若其所欲改其隂書於緯藏之以傳後王榖梁四時田者近孔子故也公羊正當六國之亡讖緯見讀而傳為三時田作傳有先後雖異不足以斷榖梁也如鄭此言三時之田不敢顯露隂書於緯四時之田顯然在春秋之經榖梁為傳之時去孔子既近不見所藏之緯唯覩春秋見經故外為四時田也公羊當六國之時去孔子既逺緯書見行於丗公羊既見緯文故以為三時田又鄭釋廢疾云歲三田謂以三事為田即上一曰乾豆之等是深塞何休之言當以此注為正四十喪從死者祭從生者自天子逹於庶人喪從死者祭從生者支子不祭注云從死者謂衣衾棺椁從生者謂奠祭之牲器正義曰盧植解云從生者謂除服之後吉祭之時以子孫官祿祭其父祖故云從生者若喪中之祭虞祔練祥仍從死者之爵故小記云士祔於大夫則易牲又云其妻為大夫而卒而后其夫不為大夫而祔於其妻則不易牲又雜記云上大夫之虞也少牢卒哭成事祔皆太牢下大夫之虞也犆牲卒哭成事祔皆少牢是喪中之祭仍從死者之禮而鄭云謂奠祭之牲器云奠則是喪中之祭得從生者之爵與小記雜記違者小記雜記據死者子孫身無官爵生者又無可祭享故喪中之祭皆用死者之禮若其生者有爵則祭從生者之法喪祭尚爾喪後吉祭可知奠謂葬前祭謂葬後包喪終吉祭也鄭必知祭兼喪祭與盧植別者以此云祭從生者喪從死者相對又中庸云父為大夫子為士葬以大夫祭以士又云父為士子為大夫葬以士祭以大夫祭又與葬相對皆祭與喪葬連文是一時之事故祭中兼為喪奠也或云在喪中祭尚從死者爵至吉祭乃用生者祿耳故知盧解鄭言奠者自吉祭之奠及非時祭耳四一歷代廟祧之數王鄭異天子七廟三昭三穆與大祖之廟而七諸侯五廟二昭二穆與大祖之廟而五大夫三廟一昭一穆與大祖之廟而三士一廟庶人祭於寢注云此周制七者大祖及文王武王之祧與親廟四大祖后稷殷則六廟契及湯與二昭二穆夏則五廟無大祖禹與二昭二穆而巳大祖始封之君王者之後不為始封之君廟大祖別子始爵者大傳曰別子為祖謂此雖非別子始爵者亦然謂諸侯之中士下士名曰官師者上士二廟寢適寢也正義曰鄭氏之意天子立七廟唯謂周也鄭必知然者案禮緯稽命徴云唐虞五廟親四廟始祖廟一夏四廟至子孫五殷五廟至子孫六鉤命決云唐堯五廟親廟四與始祖五禹四廟至子孫五殷五廟至子孫六周六廟至子孫七鄭據此為説故謂七廟周制也周所以七者以文王武王受命其廟不毀以為二祧并始祖后稷及髙祖以下親廟四故為七也若王肅則以為天子七廟者謂髙祖之父及髙祖之祖廟為二祧并始祖及親廟四為七故聖證論肅難鄭云周之文武受命之王不遷之廟權禮所施非常廟之數殷之三宗宗其德而存其廟亦不以為數凡七廟者皆不稱周室禮器云有以多為貴者天子七廟孫卿云有天下者事七丗又云自上以下降殺以兩今使天子諸侯立廟並親廟四而止則君臣同制尊不別禮名位不同禮亦異數况其君臣乎又祭法云王下祭殤五及五丗來孫則下及無親之孫而祭上不及無親之祖不亦詭哉榖梁傳云天子七廟諸侯五家語云子羔問尊卑立廟制孔子云禮天子立七廟諸侯立五廟大夫立三廟又云逺廟為祧有二祧焉又儒者難鄭云祭法逺廟為祧鄭注周禮云遷主所藏曰祧違經正文鄭文云先公之遷主藏於后稷之廟先王之遷主藏於文武之廟便有三祧何得祭法云有二祧難鄭之義凡有數條大略如此不能具載鄭必為天子七廟唯周制者馬昭難王義云案喪服小記王者立四廟又引禮緯夏無大祖宗禹而巳則五廟殷人祖契而宗湯則六廟周尊后稷宗文王武王則七廟自夏及周少不減五多不過七禮器云周旅酬六尸一人發爵則周七尸七廟明矣今使文武不在七數既不同祭又不享嘗豈禮也哉故漢侍中盧植説云二祧謂文武曽子問當七廟無虛主禮器天子七廟堂九尺王制七廟盧植云皆據周言也榖梁傳天子七廟尹更始説天子七廟據周言也漢書韋玄成四十八人議皆云周以后稷始封文武受命石渠論白虎通云周以后稷文武特七廟又張融謹案周禮守祧職奄八人女祧每廟二人自大祖以下與文武及親廟四用七人薑嫄用一人適盡若除文武則奄少二人曾子問子説周事而云七廟無虛主若王肅數髙祖之父髙祖之祖廟與文武而九主當有九孔子何云七廟無虛主乎故云以周禮孔子之言為本榖梁説及小記為枝葉韋玄成石渠論白虎通為證驗七廟斥言玄説為長是融申鄭之意且天子七廟者有其人則七無其人則五若諸侯廟制雖有其人不得過五則此天子諸侯七五之異也王肅云君臣同制尊卑不別其義非也又王下祭殤五者非是別立殤廟七廟外親盡之祖禘祫猶當祀之而王肅云下祭無親之孫上不及無親之祖又非通論且家語云先儒以為肅之所作未足可依案周禮唯存后稷之廟不毀案昭七年傳云余敢忘髙圉亞圉注云周人不毀其廟報祭之似髙圉亞圉廟亦不毀者此是不合鄭説故馬融説云周人所報而不立廟禮記要義卷第五下
