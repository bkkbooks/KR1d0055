front:
  text: 禮記要義卷第十禮器
  hash: sha256:1b72aea5700f7ab2b216ac6a5822df6b4efc9aa5a00bc6fbf5f6dd6709180e0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_009-1a}
body:
  text: 一禮器名篇鄭目録云名爲禮器所以記禮使人成器之義此於別録屬制度二禮有本有文先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行正義曰忠者内盡於心也信者外不欺於物也由盡於心故與物無怨外不欺物故與物相諧也義理禮之文也禮雖用忠信爲本而又湏義理爲文飾也得理合冝是其文也三竹箭松栢居天下之大端其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉注云箭篠也端本也四物於天下最得氣之本或柔刃於外或和澤於内用此不變傷也人之得禮亦猶然也正義曰其在人也如竹箭之有筠也禮道旣深此爲設譬也竹大竹也箭篠也言人情備德由於有禮譬如竹箭四時䓤翠由於外有筠也筠是竹外青皮顧命云敷重筍席鄭云筍析竹青皮也禮記曰如竹箭之有筠案鄭引禮記之筠以爲青皮是知呼筍爲筠如松栢之有心也者又設譬也人經夷險不變其德由禮使然譬如松栢陵寒而鬱茂由其内心貞和故也二者居天下之大端矣者二者竹松也端猶本也松竹居於天下比於衆物最得氣之本也故貫四時不改柯易葉貫經也旣得氣之本故經四時柯葉無凋改也改易互言也四禮順於鬼神合於人心順於鬼神者鬼神助天地爲化之鬼神也祀之必順不濫逆也合於人心者中趣人事也雖合天㑹地順於鬼神又湏與人心符合其禮乃行也是以書云謀及卿士謀及庶人謀及卜筮是也五天時地理人官物曲是故天時有生也者言天四時自然各有所生若春薦韭夘夏薦麥魚是也地理有理也者地之分理自然各有所冝若髙田冝黍稷下田冝稻麥是也人官有能也者人居其官各有所能若司徒奉牛司馬奉羊及庖人治庖祝治尊爼是也物曲有利也者謂萬物委曲各有所利若麴蘖利爲酒醴絲竹利爲琴笙皆自然有其性各異也皇氏云有聖人制禮得冝故致天時有生地理有冝之等非其義也六鄭氏詩箋與釋此記自爲不同詩云匪革其猶聿追來孝此大雅文王有聲之篇革急也猶道也聿述也言文王改作豐邑非是急行己之道能述追先祖之業來行孝道於此豐邑時使之然不得不爾釋時之義也今詩本革作棘猶作欲聿作遹字不同者鄭荅炅摸云爲記注之時依循舊本此文是也後得毛詩傳而爲詩注更從毛本故與記不同革棘聿遹字異義同詩注來勤也言作豐邑非急成己之之欲乃追述王季勤行孝之道也七古者貨貝及王莾貨貝之品正義曰言古者貨貝以貝爲貨若今之用錢爲貨也貝有五種案食貨志王莾作金銀龜貝錢布之品名曰寳貨大貝四寸八分以上二枚爲一朋直二百一十六文壯貝三寸六分以上二枚爲一朋直五十文么貝二寸四分以上二枚爲一朋直三十文也小貝一寸二分以上二枚爲一朋直十文也不盈寸二分漏度不得爲朋率枚直錢三文是爲貨貝五品又以龜爲寳故云古者貨貝寳龜八龜蔡之名及龜貝十朋之義龜岀於蔡故得以爲名也臣瓉注漢書云蔡龜名非也臧氏又有僂句故左氏昭二十五年傳云僂句不余欺是也食貨志云元龜尺二寸直二千一百六十爲大貝十朋公龜九寸以上直五百爲壯貝十朋侯龜七寸以上直三百爲么貝十朋子龜五寸以上直百爲小貝十朋此等皆謂一貝有十朋與十朋之龜義同也九天子葬五重天子葬五重者謂抗木與茵也者明五重之義云葬者抗木在上茵在下者古者爲椁累木於其四邊上下不周致茵於椁下所以藉棺從上下棺之後又置抗木於椁之上所以抗載於土引士䘮禮下篇陳器曰抗木橫三縮二加抗席三加茵用䟽布緇翦有幅亦縮二橫三此士之禮一重者引之者證此經葬五重三重之義也皇氏云下棺之後先加折於墉上以承抗席折猶庪也方鑿連木爲之蓋如牀縮者三橫者五無簀於上加抗木抗木之上加抗席三此爲一重如是者五則爲五重茵者藉棺外下縟用淺色緇布爲之毎將一幅輙合縫爲囊將茅秀及香草著其中如今有絮縟也而縮二橫三每爲一重也十筵之例自一重席至五重筵之例旣是禮之通義今略載焉熊氏云天子祫祭席五重此文是也禘則冝四重也時祭三重司几筵職是也受神酢席亦然大朝覲大饗食封國命諸侯皆然知者司几筵職文其平常朝覲及燕蓋亦三重席知者以諸侯燕禮有加席故也其卧席則亦下莞上簟則詩斯干所云是也天子待諸侯則莞筵紛純加練席畫純待諸侯之孤亦然故公食大夫禮注云孤爲賔則莞筵紛純加練席畫純是也待諸侯之卿大夫則公食云上下大夫蒲筵常緇布純加萑席尋玄帛純注云謂三命大夫是也公食大夫雖是諸侯之法然天子待之亦然也天子於己臣子孤卿以下蓋亦然若其燕此上等之人皆單席故燕禮賔無加席注云燕私禮臣屈也然天子燕臣亦然也祭天則蒲越槀鞂郊特牲云是也自天地以外日月山川五祀則郊特牲鬼神之祭單席是也及司几筵云甸役則設熊席注表貉所設席亦是也顧命席鄭注不用生時席新鬼神之事故也諸侯則司几筵云祭祀席蒲筵繢純加莞席酢席紛純加繅席是祭祀二重也諸侯相朝亦二重也相饗此經三重及郊特牲云大饗君三重席而酢焉於燕則兩重以介爲賔或可賔亦單席也待聘卿大夫諸侯自坐蓋亦兩重也其聘者身則禮時及饗食孤則莞筵藻席卿大夫則蒲筵萑席故聘禮之賔改筵注引公食大夫禮曰蒲筵萑席公燕則以介爲賔故郊特牲云三獻之介君專席而酢焉此降尊以就卑是也於己臣子則燕禮賔無加席卿辭重席則司宫徹之諸公亦無加席大射則賔有加席以射辨尊畢故也然則饗食己卿大夫亦重席其祭社禝山川亦單席大夫士祭祀止一席也故特牲少牢無異席也其卿大夫依法再重席燕禮賔及卿一席屈也聘賔爲苟敬席屈大射賔雖加席餘卿一席亦屈也然則孤卿大夫再重正也故郷射注大夫再重席正也然則郷飲酒諸公三重席者郷人特尊之也故諸公升如賔禮辝一席使人去之注謙自同於大夫是也大夫再重有諸公則辝加席委于席端主人不徹無諸公則大夫辭加席主人對不去加席注云大夫席再重也卿大夫爲主人正一重席者以賔郷人之賢者故下之也公食賔坐遂卷加席公不辝者注云賛者以告公公聽之重來優賔也凡儀禮之例一種席皆稱重故燕禮注云重席重蒲筵是也所以郷射大夫辝加席亦是一種稱加者以上巳云公三重大夫再重破變云加耳若餘經雖異席亦稱重則此經是也凡席有兩則稱二重有一則稱一重與棺重别也十一瓦大注尊酒簋貳用缶案禮圗瓦大受五斗口徑尺頸髙二寸徑尺大中身銳下平瓦甒與瓦大同引易曰尊酒簋貳用缶易坎卦六四爻辭案六四尊酒簋貳用缶納約自牖終無咎鄭云六四上承九五又互體在震上天子大臣以王命岀㑹諸侯尊於簋副設玄酒而用缶也十二德産之致精微故君子謹其獨禮之以少爲貴者以其内心者也德産之致也精微觀天下之物無可以稱其德者如此則得不以少爲貴乎是故君子慎其獨也注云内心用心於内其德在内致致密也萬物皆天所生孰可奉薦以稱也少其牲物致誠慤正義曰德産之致也精微者此以下解心在内義也德天地之德也産生也致宻也言天地之德生於萬物深宻唯精唯微無所遺忘者也盧云天地之德所生至精至微也觀天下之物無可以稱其德者觀猶覽視也言視天下萬物皆是天地所生若持彼所生以報於彼終非報義故云無可以稱其德者也如此則得不以少爲貴乎者旣無物可稱則宜少外多内也是其外迹豈得不貴少乎王云欲徧取萬物以祭天終不能稱其德報其功故以特犢貴誠慤之義也是故君子慎其獨也者獨少也旣外迹應少故君子用少而極敬慎也前云故此云是故者慎之情深故加是也十三以光輝祀先人爲樂外之爲樂者解外心接物湏廣大故外極繁富而其事可樂也隱義云樂多其外見者謂衣服萬物悉外見物也已有功德故得使有此物以光輝祀先人爲樂也十四匹士大牢而祭謂之攘匹士大牢而祭謂之攘者匹士士也攘盗也士常祭持豚遣奠卒哭祔加一等少牢若用大牢則是盗竊用君子之禮也然不直言士而言匹士者庾云士言其微賤不得特使爲介乃行故謂之匹也白虎通云庶人稱匹夫者匹偶也與其妻偶隂陽相成之義也故論語云匹夫匹婦十五豚肩不揜豆其實在爼豚肩不揜豆者晏平仲齊大夫也大夫祭用少牢士用特豚而平仲今用豚豚又過小併豚兩肩不揜豆也必言肩者周人貴肩也肩在爼今云豆喻其小假豆言之其實在爼不在豆也十六我戰則克非孔子自我孔子曰我戰則克祭則受福蓋得其道矣注云我我知禮者也克勝也正義曰知非孔子自我者君子務在謙光不應自言祭祀受福之事故知述知禮者而言我也十七冠昬有爲而然非善之而設祭不善嘉事注云嘉事之祭致夫人是也禮冝告見於先祖耳不善之而祭正義曰不善嘉事者嘉事冠昬也人年二十成人自冝冠三十嗣丗自冝昬若無親者昬三月祭以告廟冠畢埽地而祭禰並是有爲而然非謂善之而設祭案桓三年齊侯使仲年來聘致夫人于時公取文姜三月廟見故仲年來致夫人于時無祭而云嘉事之祭者當致夫人之時必告廟也故曽子問卿大夫取妻三月有廟見之禮十八祀祝融與祭奥祭爨不同䟽皇氏云弗綦旣以逆祀爲是又以燔柴祭爨爲是云祭火神乃燔柴者熊氏云宗伯以實柴祀日月星辰有大火之次故祭火神乃燔柴案異義竈神今禮戴說引此燔柴盆瓶之事古周禮說顓頊氏有子曰黎爲祝融祀以爲竈神許君謹案同周禮鄭駮之云祝融乃古火官之長猶后稷爲堯司馬其尊如是王者祭之但就竈陘一何陋也祝融乃是五祀之神祀於四郊而祭火神於竈陘於禮乖也如鄭此言則祝融是五祀之神祀於郊奥者正是竈之神常祀在夏以老婦配之有爼及籩豆設於竈陘又延尸入奥爨者宗廟祭後直祭先炊老婦之神在於爨竈此祝融并奥及爨三者所以不同也十九禮有九君子之於禮也有直而行也有曲而殺也有經而等也有順而討也有摲而播也有推而進也有放而文也有放而不致也有順而摭也注云謂若始死哭踊無節也謂若父在爲母期也謂若天子以下至士庶人爲父母三年討猶去也謂若天子以十二公以九侯伯以七子男以五爲節也摲之言芟也謂有所與也若祭者貴賤皆有所得不使虚也謂若王者之後得用天子之禮謂若天子之服象日月以至黼黻謂若諸侯自山龍以下謂若君沐梁大夫沐稷士沐梁二十旅酬六尸毀廟無尸但有主旅酬六尸謂祫祭時聚羣廟之主於大祖后稷廟中后禝在室西壁東嚮爲發爵之主尊不與子孫爲酬酢餘自文武二尸就親廟尸凡六在后稷之東南北對爲昭穆更相次序以酬也殷但坐尸未有旅酬之禮而周益之也然大祫多主而唯云六尸者先儒與王肅並云毀廟無尸但有主也二一血腥爓孰遠近以尊卑遞降孔子曰禮之近人情者非其至者也郊血大饗腥三獻爓一獻孰注云近人情者䙝而遠之者敬郊祭天也大饗祫祭先王也三獻祭社稷五祀一獻祭羣小祀也爓沈肉於湯也血腥爓孰逺近備古今也尊者先逺差降而下至小祀孰而巳正義曰云血腥爓孰逺近備古今也者血爲逺腥次之爓稍近孰最近逺者爲古近者爲今一祭之中兼有此事郊天與大饗三獻並有血腥爓孰今所以各言者皇氏云此據設之先後郊則先設血也後設腥與爓孰雖以郊爲主其祭天皆然也大饗之時血與腥同時俱薦當朝事迎尸於户外薦血腥也雖以大饗爲主其宗廟之祭皆然也其三獻之祭血腥與爓一時同薦凡薦爓之時皆在薦腥之後但社稷五祀𥘉祭降神之時已埋血宗伯之文是也至正祭薦爓之時又薦血此文是也若羣小祀之屬唯有薦孰無血腥爓也以其神卑故耳先薦者設之在前後進者設之居後皆皇氏之說義當然也又曰血於人食㗖最逺天神尊嚴不可近同人情爓漸近廿二魯郊祀與周同先告后稷故魯人將有事於上帝必先有事於頖宫注云上帝周所郊祀之帝謂蒼帝靈威仰也魯以周公之故得郊祀上帝與周同先有事於頖宫告后稷也告之者將以配天先仁也頖宫郊之學也詩所謂頖宫也字或爲郊宫二三凶事不詔朝事以樂禮也者反本脩古不忘其𥘉者也故凶事不詔朝事以樂注云二者反本也哭泣由中非由人也朝廷養賢以樂樂之也䟽曰入門縣興還其樂朝廷之本心二四無節於内者觀物弗之察矣君子曰無節於内者觀物弗之察矣欲察物而不由禮弗之得矣故作事不以禮弗之敬矣岀言不以禮弗之信矣故曰禮也者物之致也注云節猶驗也致之言至也極也正義曰無節於内者觀物弗之察矣者節猶驗也内猶心也物萬物也察猶分辯也言若欲外觀察萬物必先内有識驗之明若心内無明則外不能分辯也故曰禮也者物之致也者引舊語結察物必湏禮也致猶至極也無禮旣不爲民物敬信故禮所爲萬物之至極也二五逹亹亹所以與天地合德是故天時雨澤君子逹亹亹焉注云逹猶皆也亹亹勉勉也君子愛物見天雨澤皆勉勉勸樂正義曰天子以愛物爲用故天地感祭而降雨澤天子皆愛物生而勉勉勸樂所以與天地合德也二六設祭爲祊不知神之所在設祭于堂爲祊乎外故曰於彼乎於此乎注云設祭之饌於堂人君禮然祊祭明日之繹祭也謂之祊者於廟門之旁因名焉其祭之禮旣設祭於室而事尸於堂孝子求神非一處也周禮曰夏后氏丗室門堂三之二室三之一詩頌絲衣曰自堂徂基不知神之所在也二七社稷尊於四望山川而獻與衣服卑一獻質三獻文五獻察七獻神注云謂祭羣小祀也謂祭社稷五祀察明也謂祭四望山川也謂祭先公正義曰鄭知然者案周禮司服職玄冕一章祭羣小祀故知一獻當祭羣小祀絺冕三章祭社稷五祀故知三獻祭社稷五祀也毳冕五章祀四望山川故知五獻祭四望山川也鷩冕七章享先公故知七獻祭先公也案此社稷三獻卑於四望山川而大宗伯職云以血祭社稷五嶽又大司樂祭社稷奏大蔟祀四望奏姑洗又禮緯云社稷牛角握五嶽四瀆角尺以此言之則社稷尊於四望山川而獻與衣服卑者熊氏云獻與衣服從神之尊卑其餘處尊者以其有功與地同類故進之在上從國中之神莫貴於社稷之類直以功見尊其實卑也以是地別神故不爲尊也二八大旅有故而祭大旅具矣不足以饗帝者大旅雖揔祭五帝是有故而祭其禮簡略不如饗帝正祭之備故云大旅具矣不堪足以正饗天帝謂郊祭天也二九室事交户堂事交階室事交乎户者室事謂正祭之時事户在室故云室事交平户外人將饌至户内人於户受饌設於尸前相交承接在於户也堂事交乎階者謂正祭之後儐尸之時事尸於堂故云堂事交乎階謂在下之人送饌至階堂上之人於階受取是交乎階三十宗廟祭有血熊氏云宗廟之祭無血鄭注論語云宗廟之祭自血腥始謂肉有血詩小雅論宗廟之祭云取其血膋則是有用血之明文也熊義非前大饗腥䟽禮記要義卷第十
