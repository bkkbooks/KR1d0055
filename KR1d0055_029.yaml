front:
  text: 禮記要義卷第三十投壷儒行一奉矢奉中執壷之節投壷之禮主人奉矢司射奉中使人執壷注云矢所以投者也中士則鹿中也射人奉之者投壷射之類也其奉之西階上北靣正義曰士則鹿中案射記云大夫兕中士鹿中此篇投壷是大夫士之禮故云士則鹿中不云兕中者略之也知此投壷是大夫士禮者以經云主人請賔是平敵之辭與鄉飲酒鄉射同故知是大夫士也若諸侯則燕禮大射每事云請於公不得云主人請賔也此既非諸侯之禮而經云奏貍首者別取燕飲之義非謂尊卑之詩其諸侯相燕亦有投壷故左傳云晉侯與齊侯燕投壷然則天子亦有之但古禮亡無以知也其中之形刻木為之狀如兕鹿而伏背上立圎圈以盛算云奉之西階上北靣者案鄉射禮將射之時司射升自西階階上北靣告於賔故知此司射奉中在西階上北靣其執壷之人賤於司射故在司射之西以凡行禮統於主人雖俱在西階而當尊東故燕禮大射宰夫代公為主人與賔俱升西階而主人在東也五受矢揖賔即席之節巳拜受矢進即兩楹間退反位揖賔就筵注云主人既拜送矢又自受矢進即兩楹間者言將有事於此也退乃揖賔即席欲與偕進明為偶也賔席主人席皆南鄉間相去如射物正義曰云退乃揖賔者解經退反位揖賔也所以揖之者欲與賔俱即席相對為偶而共投壷云賔席主人席皆南鄉間相去如射物者以壷在於南故知投壷南鄉也投壷是射之類故知席相去如射物也物謂射者所立之處物長三尺闊一尺二寸兩物東西相去容一弓故鄉射記云物長如笴其間容弓距隨長武注云笴長三尺距隨者物橫畫也六司射度壷設中司射進度壷間以二矢半反位設中東面執八算興注云度壷度其所設之處也壷去坐二矢半則堂上去賔席主人席邪行各七尺也反位西階上位也設中東靣既設中亦實八算於中橫委其餘於中西執算而立以請賔俟投正義曰間以二矢半者投壷有三處室中堂上及庭中也日中則於室日晚則於堂大晚則於庭是各隨光明故也矢有長短亦隨地廣狹室中狹矢長五扶堂上稍廣矢長七扶庭中大廣矢長九扶四指曰扶扶廣四寸五扶者則二尺也七扶者則二尺八寸也九扶者則三尺六寸也雖矢有長短而度壷皆使去賔主之席各二矢半也室中去席五尺堂上則去席七尺庭中則去席九尺
