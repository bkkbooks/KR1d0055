body:
  text: 八司射告賔主以投壷之法行爵立馬請賔曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之注云請猶告也順投矢夲入也比投不拾也勝飲不勝言以能養不能也正爵所以正禮之爵也或以罰或以慶馬勝算也謂之馬者若云投藝如此任為將帥乘馬也射投壷皆所以習武因為樂正義曰此一經明司射告賔主以投壷之法順投為入者司射執八算起而告賔黨為投壷之法也順夲也言矢有本末投矢於壷以矢夲入者乃名為入則為之釋算也若矢以末入則不名為入亦不為之釋算也比投不釋者比頻也又賔主投壷法要更遞而投不得以前既入喜恱不待後人投之而已頻頻投雖入亦不為之釋算也一馬從二馬者每一勝輒立一馬禮以三馬為成若專三馬則為一成但勝偶未必專頻得三若勝偶得二劣偶得一既劣於二故徹取劣偶之一以足勝偶之二為三故云一馬從二馬然定夲無此一句三馬既立請慶多馬者若頻得三成或取彼足為三馬是其勝已成又酌酒慶賀於多馬之偶也九弦者奏貍首與鄉射小異命弦者曰請奏貍首間若一大師曰諾注云弦鼓瑟者也貍首詩篇名也今逸射義所云詩曰曽孫侯氏是也間若一者投壷當以為志取節焉正義曰案鄉射三畨𥘉一畨耦射不釋算第二畨釋算未作樂第三畨乃用樂此投壷發𥘉則用樂者以投壷禮輕主於歡樂故也十司射釋獲如數射算卒投司射執算曰左右卒投請數二算為純一純以取一算為竒遂以竒算告曰某賢於某若干純竒則曰竒鈞則曰左右鈞注云卒巳也賔主之黨畢巳投司射又請數其所釋左右算如數射算一純以取實於左手十純則縮而委之每委異之有餘則橫諸純下一算為竒竒則縮諸純下兼斂左算實於左手一純以委十則異之其他如右獲畢則司射執竒算以告於賔與主人也若告云某賢於某者未斥主黨勝與賔黨勝與以勝為賢尚枝藝也鈞猶等也等則左右手各執一算以告正義曰云如數射算者以投壷之類故知此數投壷之算如數射算云一純以取至其他如右獲此皆鄉射之禮文也一純以取實於左手謂就地上之算以右手每一純別而取實於左手云十純則縮而委之每委異之者滿十純則從而委之於地司射東靣則東西為縮每十雙則東西縮為一委每有十雙更别委之故云每委異之云有餘則橫諸純下者有餘謂不滿十雙或八雙九雙以下則橫於純下謂橫在十純之西南北置之云一算為竒竒則縮諸純下者若唯有一算則縮之零純之下在零純之西東西置之此謂數右算之法若數左算則異於右算謂揔斂地之算實於左手之中每一純取以委地滿十則異之謂滿十純揔為一委云其他如右獲者謂所縱所橫如右獲也十一酌者飲者之節命酌曰請行觴酌者曰諾當飲者皆跪而奉觴曰賜灌勝者跪曰敬養注曰司射又請於賔與主人以行正爵酌者勝黨之弟子酌者亦酌奠於豐上不勝者坐取乃退而跪飲之灌猶飲也言賜灌者服而為尊敬辭也周禮曰以灌賔客賜灌敬養各與其偶於西階上如飲射爵十二投壷立三馬與鄉射立耦小異正爵既行請立馬馬各直其算一馬從二馬以慶慶禮曰三馬既備請慶多馬賔主皆曰諾注云飲不勝者畢司射又請為勝者立馬當其所釋算之前三立馬者投壷如射亦三而止也三者一黨不必三勝其一勝者并其馬於再勝者以慶之明一勝不得慶也飲慶爵者偶親酌不使弟子無豐正義曰一馬從二馬者投壷與射禮同亦三畨而止每畨勝者則立一馬假令賔黨三畨俱勝則立三馬或賔黨兩勝而立二馬主黨一勝但立一馬即以主黨從就賔黨二馬以少足益於多以助勝者為榮案鄉射禮𥘉畨三耦射但唱獲而巳未釋算亦未飲不勝者第二畨耦射畢賔主之黨皆射畢乃數算飲不勝者第三畨三耦及賔主等皆射中鼓節乃爵算飲罰爵今投壷𥘉則不立三耦唯賔主三畨而止十三矢長短壷廣狹席逺近籌室中五扶堂上七扶庭中九扶算長尺二寸壷頸修七寸腹修五寸口徑二寸半容斗五升壷中實小豆焉為其矢之躍而出也壷去席二矢半矢以柘若棘毋去其皮注曰籌矢也鋪四指曰扶一指案寸春秋傳曰膚寸而合投壷者或於室或於堂或於庭其禮䙝隨晏早之宜無常處其節三扶可也或曰算長尺有握握素也修長也腹容斗五升三分益一則為二斗得圜囷之象積三百二十四寸也以腹修五寸約之所得求其圜周圜周二尺七寸有竒是為腹徑九寸有餘也實以小豆取其滑且堅以柘棘取其堅且重也舊說云矢大七分或言去其皮節正義曰今檢鄭之文注之意以二斗整數計之不取經文斗五升之義故云圜周二尺七寸有竒今算者以其二尺七寸之圍必受斗五升之物數不相㑹也云壷體腹之上下各漸減殺苟欲望合恐非鄭意十四魯薛令弟子辭魯令弟子辭曰毋幠毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子辭曰毋幠毋敖毋偝立毋踰言若是者浮注云弟子賔黨主黨年稚者也為其立堂下相䙝慢司射戒令之記魯薛者禮衰乖異不知孰是也幠敖慢也偝立不正鄉前也踰言逺談語也常爵常所以罰人之爵也浮亦謂是也晏子春秋曰酌者奉觴而進曰君令浮晏子時以罰梁丘據浮或作匏或作符踰或為淫十五魯薛投壷射禮鼓節取半以下為投壷禮盡用之為射禮注云此魯薛擊鼓之節也圜者擊鼙方者擊鼓古者舉事鼓各有節聞其節則知其事矣投壷之鼓半射節者投壷射之細也射謂燕射十六投壷有賔主黨司射庭長及冠士立者皆屬賔黨樂人及使者童子皆屬主黨注云庭長司正也使者主人所使薦羞者樂人國子能為樂者此皆與於投壷正義曰庭長司正也冠士者謂外人來觀投壷成人加冠之士尊之故令屬賔黨若童子賤則屬主黨也云樂人國子能為樂者以國子習樂故云國子能為樂者欲明此樂人非瞽矇視瞭之徒以其能與主人之黨而觀禮故知非作樂瞽人也案國子是王子公卿大夫元士之子今來觀樂士大夫投壷者以國之俊選皆在學習樂共士子來觀投壷十七衣少所居服冠長所居冠丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服注云逢猶大也大掖之衣大𬒮禪衣也此君子有道藝者所衣也孔子生魯長而之宋而冠焉宋其祖所出也衣少所居之服冠長所居之冠是之謂鄉言不知儒服非哀公意不在於儒乃今問其服庶人禪衣袂二尺二寸祛尺二寸正義曰庶人禪衣𬒮二尺二寸者庶人無朝祭之事故知禪衣𬒮二尺二寸云祛尺二寸者玉藻文言深衣之制如此今夫子著禪衣與庶人同其𬒮大與庶人異故謂衣為逢掖也則此大𬒮深衣也長居宋冠章甫之冠言夫子生於魯長於宋魯有大𬒮禪衣宋有章甫之冠故知大𬒮之衣是少所居之服也章甫之冠是長所居之冠案曲禮云去國三丗唯興之日從新國之法孔子曽祖防叔防叔生木金木金生伯夏伯夏生良紇良紇生孔子防叔奔魯至孔子五丗應從魯冠而猶著殷章甫冠者以丘為制法之主故有異於人所行之事多用殷禮不與尋常同也且曲禮從新國之法秪謂禮儀法用未必衣服盡從也禮臣朝於君應著朝服而著常服者時孔子自衛新還哀公館之非是常朝故衣冠異也十八粗而翹之又不急為陳言而伏靜而正之上弗知也粗而翹之又不急為也注云粗猶疏也微也君不知己有善言正行則觀色緣事而微翹發其意使知之又必舒而脫脫焉巳為之疾則君納之速君納之速怪妬所由生也十九孔子作儒行自衛反魯時今衆人之命儒也妄常以儒相詬病孔子至舍哀公館之聞此言也言加信行加義終沒吾丗不敢以儒為戲注云妄之言無也言今丗名儒無有常人遭人名為儒而以儒靳故相戲此哀公輕儒之所由也詬病猶恥辱也儒行之作蓋孔子自衛𥘉反魯時也孔子歸至其舍哀公就而以禮館之問儒服而遂問儒行乃始覺焉言沒丗不敢以儒為戲當時服二十歷叙孔子不遇案史記孔子丗家云在魯哀公不用在齊犂鉏所毁入楚子西所譛適晉趙鞅欲害伐樹於宋削跡於衛畏匡厄陳則身𬒳辱纍多矣鄭以其如此故釋云不以慁纍閔病而違道云孔子自謂也禮記要義卷第三十
