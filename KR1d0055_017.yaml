front:
  text: 禮記要義卷第十八學記
  hash: sha256:4b5a359ddb0a8f4cb59232c253dc526d96fa2212749948d76bf2039c69d08dca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_017-1a}
body:
  text: 一鄭氏不見説命兊命曰念終始典于學其此之謂乎注云典經也言學之不舍業也兊當為説字之誤也髙宗夢傳説求而得之作説命三篇在尚書今亡正義曰其事具尚書篇見在鄭云今亡者鄭不見古文尚書故也二古者立學之制入學之序古之教者家有孰黨有庠術有序國有學比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通逹強立而不反謂之大成注云術當為遂聲之誤也古者仕焉而巳者歸教於閭里朝夕坐於門門側之堂謂之孰周禮五百家為黨萬二千五百家為遂黨屬於鄉遂在逺郊之外學者每歲來入也中猶間也鄉遂大夫間歲則考學者之德行道藝周禮三年大比乃考焉離經斷句絶也辨志謂別其心意所趣鄉也知類知事義之比也強立臨事不惑也不反不違失師道三家孰黨庠術序國學之制家有孰者此明學之所在周禮百里之內二十五家為閭同共一巷巷首有門門邊有孰謂民在家之時朝夕出入恆受教於孰故云家有孰白虎通云古之教民百里皆有師里中之老有道德者為里右師其次為左師教里中之子弟以道藝孝悌仁義也黨有庠者黨謂周禮五百家也庠學名也於黨中立學教閭中所升者也術有序者術遂之周禮萬二千五百家為遂遂有序亦學名於遂中立學教黨學所升者也國有學者國謂天子所都及諸侯國中也周禮天子立四代學以教丗子羣后之子及鄉中俊選所升之士也而尊魯亦立四代學餘諸侯於國但立時王之學故云國有學也四父師少師教于左右孰案書傳説云大夫七十而致仕而退老歸其鄉里大夫為父師士為少師新榖巳入餘子皆入學距冬至四十三日始出學上老平明坐於右孰庶老坐於左孰餘子畢出然後皆歸夕亦如之五黨學曰序此經曰庠案周禮遂人掌野之官百里之外故知遂在逺郊之外鄭注州長職云序州黨之學則黨學曰序此云黨有庠者鄉學曰庠故鄉飲酒之義云主人拜迎賔于庠門之外注云庠鄉學也州黨曰序此云黨有庠者是鄉之所居黨為鄉學之庠不别立序凡六鄉之內州學以下皆為庠六遂之內縣學以下皆為序也皇氏云遂學曰庠與此文違其義非也庾氏云黨有庠謂夏殷禮非周法義或然也六中年考校應入大學者自國家考校之耳其未入大學者鄉遂大夫考校也七大胥以鼓徴學士入學鼓篋孫其業也入學謂學士入學之時大胥之官先擊鼓以召之學者既至發其筐篋以出其書故云鼓篋也所以然者欲使學者孫其業謂恭順其所持經業故大胥云用樂者以鼓徴學士文王丗子云大昕鼓徴所以警衆也文王丗子云謂天子視學之時擊鼓警衆也若是凡常入學用樂及為祭祀用樂者以鼓徴學士是也天子卜禘及大禮皆視學云天子諸侯既祭乃視學者謂於夏祭之時既為禘祭之後乃視學考校當禘祭之年故云未卜禘不視學若不當禘祭之年待時祭之後乃視學也此視學謂考試學者經業或君親往或使有司為之非天子大禮視學也若大禮視學在仲春仲秋及季春故文王丗子云凡大合樂必遂養老注云大合樂謂春入學舍菜合舞秋頒學合聲於是時也天子則視學焉月令季春大合樂天子率三公九卿而視學焉與此别也視學既在夏祭之後則天子春秋視學亦應在春秋時祭之後此舉未卜禘不視學則餘可知也藏修息遊於學藏焉修焉息焉遊焉注云藏謂懷抱之修習也息謂作勞休止於之息遊謂間暇無事於之遊離師輔而不反是以雖離師輔而不反也者輔即友也友主切磋是輔己之道深逺也離猶違也已道深明不復虛妄心自信之若假令違離師友獨在一處而講説不違反於師友昔日之意旨此則強立不反也呻其占畢多其訊今之教者呻其占畢多其訊注云呻吟也占視也簡謂之畢訊猶問也言今之師自不曉經之義但吟誦其所視簡之文多其難間也呻或為慕訊或為訾和易以思可謂善喻故君子之教諭也道而弗牽強而弗抑開而弗逹道而弗牽則和強而弗抑則易開而弗逹則思和易以思可謂善喻矣注云道示之以道塗也抑猶推也開為發頭角思而得之則深正義曰若人苟不曉而牽逼之則彼心必生忿恚師與弟子不復和親今若但示正道寬柔教之則彼心和而意乃覺悟也強而弗抑則易者賀氏以為師但勸強其神識而不抑之令曉則受者和易和易亦易成也開而弗逹則思者但開發義理而不為通逹使學者用意思念思則必深語而不知舍之以須其後力不能問然後語之語之而不知雖舍之可也注云舍之須後正義曰若受業者才力苟不能見問待憤憤悱悱之間則師然後乃示語之矣語之而不知雖舍之可也者弟子既不能問因而語之語之不能知且舍住待後別更語之可也始駕馬者反之車在馬前始駕馬者反之車在馬前者此第三譬明新習者也始駕者謂馬子始學駕車之時反之者駕馬之法大馬本駕在車前今將馬子繫隨車後而行故云反之車在馬前所以然者此駒既未曽駕車若忽駕之必當驚奔今以大馬牽車於前而繫駒於後使此駒日日見車之行其駒慣習而後駕之不復驚也五服非師不親師無當於五服五服弗得不親者師教之師也五服斬衰也齊衰也大功也小功也緦麻也師於弟子不當五服之一也而弟子之家若無師教誨則五服之情不相和親也大時不齊四時草木各有生死大時不齊者大時謂天時也齊謂一時同也天生殺不共在一時猶春夏華卉自生薺麥自死秋冬草木自死而薺麥自生故云不齊也三王祭河而後祭海三主祭百川之時皆先祭河而後祭海也或先祭其源或後祭其委河為海本源為委本皆曰川也皇氏以為河海之外源之與委也今依用焉或解云源則河也委則海也申明先河而後海義亦通矣其始一勺也後至不測也猶言學𥘉為積漸後成賢聖也禮記要義卷第十八
