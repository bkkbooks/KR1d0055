body:
  text: 三復魄則虞人狄人設階復有林麓則虞人設階無林麓則狄人設階注云復招魄復魄也階所乘以升屋者虞人主林麓之官也狄人樂吏之賤者階梯也簨虡之類四六冕以衣名冠爵辨以冠名衣士以爵辨者士亦用助祭上服以招魂六冕則以衣名冠諸侯爵辨則以冠名衣今言爵辨者但用其衣不用其辨也公館復注五東榮與東霤之異云升東榮者謂卿大夫士也者以鄉飲酒鄉射是大夫士之禮云設洗當東榮此云東榮故知是卿大夫士禮今之兩下屋云天子諸侯言東霤者霤謂東西兩頭為屋簷霤下案燕禮云設洗當東霤人君殿屋四注燕禮是諸侯禮明天子亦然六子坐東方丗子尊既正尸子坐于東方者子謂丗子丗子尊故坐于東方謂室內尸東故士喪禮云主人入坐于牀東是也卿大夫父兄子姓立于東方者案士喪禮衆主人在其後又云親者在室鄭云謂大功以上依準士禮父兄子姓大功以上正立于室內東方今此經總云卿大夫父兄子姓立于東方以士禮言之當在室內但諸侯以上位尊不可不正定丗子之位故顧命康王之入翼室恤宅宗不冝與卿大夫父兄子姓俱在室內也卿大夫等或當在戶外之東方遙繼主人之後七外宗姑姊妹之女云外宗姑姊妹之女者但姑姊妹必嫁於外族其女是異姓所生故稱外宗案周禮外宗外女之有爵者若其有爵則為外命婦此别云外宗容無爵者女之女亦是異姓所生而不云者則上文所謂子姓是也周禮有內宗內女之有爵者此不言者則前文姑姊妹是也但姑姊妹巳嫁國中則為命婦别云姑姊妹者容在室女未嫁及嫁於他國或雖嫁國中從本親之位故别云姑姊妹也不云舅之女及從之女也外宗中兼之略可知也八𥘉喪非所尊不出君之喪未小斂為寄公國賔出大夫之喪未小斂為君命出士之喪於大夫不當斂則出注云父母始死悲哀非所尊不出也出者或至庭或至門國賔聘大夫不當斂其來非斂時九男子髺髮婦人髽及東西房之制小斂主人即位于戶內主婦東面乃斂卒斂主人馮之踊主婦亦如之主人袒説髦括髮以麻婦人髽帶麻于房中注云士既殯説髮此云小斂蓋諸侯禮也士之既殯諸侯之小斂於死者俱三日也婦人之髽帶麻於房中則西房也天子諸侯有左右房正義曰士之既殯諸侯之小斂於死者俱三日也者謂數往日也云婦人之髽帶麻於房中則西房也者案士喪禮主人髺髮袒衆主人免于房鄭注云釋髺髮冝於隱者是主人等髺髮在東房士喪禮又云婦人髽於室以男子在房故婦人髽於室大夫士唯有東房故也此經兼明諸侯之禮有東西房男子既髺髮於東房故知婦人髽及帶麻于西房云天子諸侯有左右房者欲明經中房是西房也天子路寢制如明堂熊氏云左房則東南火室也右房則西南金室也諸侯路寢室在於中房在室之東西也弔者襲裘加武帶絰拾踊弔者襲裘加武帶絰與主人拾踊注云始死弔者朝服禓裘如吉時也小斂則改襲而加武與帶絰矣武吉冠之卷也加武者明不改冠亦不免也檀弓曰主人既小斂子遊趨而出襲裘帶絰而入正義曰謂小斂之後來弔者掩襲裘之禓衣若未小斂之前來弔者裘上有禓衣禓衣上有朝服開朝服露禓衣今小斂之後弔者以上朝服掩襲裘上禓衣加武者賀氏云武謂吉冠之卷主人既素冠素辨故弔者加素辨於武帶絰者帶謂要帶絰謂首絰緦之絰帶以朋友之恩故加帶與絰也若無朋友之恩則無帶唯絰而巳與主人拾踊者拾更也謂主人先踊婦人踊弔者踊三者三是與主人更踊懸壷代哭冬則以木爨鼎君喪虞人出木角狄人出壷雍人出鼎司馬縣之乃官代哭注云代更也未殯哭不絶聲為其罷倦既小斂可以為漏刻分時而更哭也木給爨竈角以為㪺水斗壷漏水之器也冬漏以火爨鼎沸而後沃之此挈壷氏所掌也屬司馬司馬涖縣其器正義曰君喪虞人出木角者虞人主山澤之官故出木與角狄人出壷者狄人樂吏主挈壷漏水之器故出壷雍人出鼎者雍人主亨飪故出鼎也所以用鼎及木者冬月恐水凍則鼎漏遲遲更無凖則故鼎暖水用虞人木爨鼎煮之故取鼎及木也司馬縣之者司馬夏官卿也其屬有挈壷氏掌知漏事故司馬自臨視縣漏器之時節故挈壷氏云凡喪縣壷以代哭者十二授杖輯杖去杖之節君之喪三日子夫人杖五日既殯授大夫丗婦杖子大夫寢門之外杖寢門之內輯之夫人丗婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聽卜有事於尸則去杖大夫於君所則輯杖於大夫所則杖注云三日者死之後三日也為君杖不同日人君禮大可以見親疏也輯斂也斂者謂舉之不以柱地也夫人丗婦次於房中即位堂上堂上近尸殯使人執柱不敢自持也子於國君之命輯杖下成君不敢敵之也卜卜葬卜日也凡喪祭虞而有尸大夫於君所輯杖謂與之俱即寢門外位也獨焉則杖君謂子也於大夫所杖俱為君杖不相下也十三大夫士之子哭殯杖天子諸侯子杖不入殯廟門士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫丗婦之命如大夫子皆杖不以即位大夫士哭殯則杖哭柩則輯杖注云士二日而殯者下大夫也士之禮死與往日生與來日此二日於死者亦得三日也婦人皆杖謂主婦容妾為君女子子在室者子謂凡庶子也不以即位與去杖同哭殯謂既塗也哭柩謂啓後也大夫士之子於父父也尊近哭殯可以杖天子諸侯之子於父父也君也尊逺杖不入廟門正義曰謂殯宫之門十四必遷當牖南首以平生寢臥處始死遷尸于牀幠用斂衾去死衣注云牀謂所設牀第當牗者也士喪禮曰士死於適室幠用斂衾去死衣病時所加新衣及復衣也去之以俟沐浴正義曰笫牀簀也𥘉廢牀時牀在北壁當户至復魄後遷之在牀而當牗南首所以死後必遷當牗南首者以平生寢臥之處故士昏禮同牢在奧又云御祍于奧媵祍良席在東北止又曲禮云為人子者居不主奧是尊者常居之處若晝日常居則當戶故玉藻云君子之居恆當户若病時亦當戶在北牗下取鄉明之義也故鄭前注病者恆居北牗下明不病不恆居北牗下也十五浴挋爪足抗衾管人汲不説繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如它日小臣爪足浴餘水棄于坎其母之喪則內御者抗衾而浴注云抗衾者蔽上重形也挋拭也爪足斷足爪也正義曰此一經明浴時也管人主館舍者故鄭注士喪禮管人有司主館舍者汲謂汲水不説繘屈之者繘汲水瓶索也遽促於事故不説去井索但縈屈執之於手中一盡階不升堂者以水從西階而升盡不上堂知西階者以士喪禮云為垼于西牆下故知從西階而升也浴水用盆者用盆盛於浴水也沃水用枓者用枓酌盆水沃尸熊氏云用盤於牀下承浴水浴用絺布者絺是細葛除垢為易故用之也士喪禮云浴巾二皆用綌熊氏云此蓋人君與大夫禮或可大夫上絺下綌故玉藻云浴用二巾上絺下綌是也栕用浴衣者挋拭也用生時浴衣拭尸肉令燥也賀氏云以布作之生時有此也士喪禮云浴衣於篋注云浴衣巳浴所衣之衣以布為之其制如仐通裁是也如它日者它日謂平生尋常之日也小臣爪足者尸浴竟而小臣翦尸足之爪也浴餘水棄于坎者浴盆餘汁棄之於坎中坎者是甸人所掘於階間取土為竈之坎甸人主郊野之官其母之喪則內御者抗衾而浴者內外冝別故用內御舉衾也內御婦人亦管人汲事事亦同前唯浴用人不同耳十六浙飯米取潘為沐謂之差沐御者差沐于堂上注云差淅也浙飯米取其潘以為沐也正義曰差是差摩故云浙詩云釋之叟叟是釋浙米也十七甸人為垼竈甸人為垼于西牆下者謂將沐之時甸人之官為垼于西牆下土垼塹竈甸人具此為垼竈以煮沐之十八取所徹廟䨾以然竈廟即正寢甸人取所徹廟之西北䨾薪用爨之者爨然也甸人為竈竟又取復魄人所徹正寢西北䨾以然竈煮沐汁也謂正寢為廟神之也然舊云䨾是屋簷也謂抽取屋西北簷也熊氏云䨾謂西北隅䨾隱之處徹取屋外當䨾隱處薪義亦通也何取此薪而用者示主人已死此堂無復用故取之也十九挋用巾挋用巾者用巾拭髮及面也士喪禮云沐巾一又云挋用巾注云挋晞也清也二十如他日如它日者事事亦如平生也二一爪手翦須濡濯棄于坎小臣爪手翦須者沐竟而翦手爪又治須象平生也濡濯棄于坎者皇氏云濡謂煩撋其髮濯謂不淨之汁也言所濡濯汁棄於坎中鄭注士喪禮云巾櫛浴衣亦并棄之草二稻梁卑於黍稷又四者各有貴賤云士喪禮沐稻此云士沐梁蓋天子之士也者若士喪禮云是諸侯之士而沐稻今此云士沐梁故疑天子之士也云以差率而上之天子沐黍與者案公食大夫禮黍稷為正饌稻粱為加是稻粱卑於黍稷就稻粱之內粱貴而稻賤是稻人所常種粱是穀中之美故下曲禮云歲凶大夫不食粱故諸侯之士用稻天子之士用粱黍稷相對稷雖為重其味短故大夫用之黍則味美而貴故特往少牢爾黍于席以其味美故也詩頌云其餉伊黍鄭注豐年之時雖賤者猶食黍是黍貴也故天子用之無正文故疑而云與也草三士與婦人皆疏食水飲士疏食水飲者疏粗也食飰也士賤病輕故疏食粗米為飯亦水為飲夫人丗婦諸妻皆疏食水飲者婦人質弱恐食粥傷性故言疏食水飲也草四食榖而言納財正義曰財謂榖也故太宰云以九賦斂財賄也注云財謂泉榖是榖為財但米由榖出經巳稱米故鄭云食榖必言納財者以一日之中或粥或飯雖作之無時不過朝夕二溢之米當須豫納其米故云納財也草五士襲用𫀆繭斂用正服公皆不用𫀆繭𫀆必有表不禪衣必有裳謂之一稱注云𫀆褻衣必有以表之乃成稱也雜記曰子羔之襲繭衣裳與稅衣纁袡為一是也論語曰當暑袗絺綌必表而出之亦為其褻也正義曰𫀆必有表不禪也𫀆是褻衣必須在上有衣以表之不使禪露乃成稱也注𫀆褻至褻也正義曰引雜記者證子羔之襲有𫀆繭衣上加稅衣為表乃成稱引論語者證衣上加表死則冬夏並用𫀆上並加表熊氏云褻衣所用尊卑不同士襲而用褻衣故士喪禮陳襲事爵辨服皮辨服禒衣注云禒所以表𫀆者是襲有𫀆士喪禮小斂云祭服次散衣次注云禒衣以下𫀆繭之屬是小斂有𫀆士喪禮又大斂散衣是亦有𫀆若大夫襲亦有𫀆案雜記云子羔之襲繭衣裳是也斂則必用正服不用褻衣故檀弓云季康子之母死陳褻衣注云將以斂敬薑曰將有四方之賔來褻衣何為陳於斯命徹之若公則襲及大小斂皆不用褻衣知者案雜記云公襲無𫀆繭襲輕尚無則大小斂無可知也草六商祝習商禮士喪禮啇祝主斂明諸祝主斂也故引此文以證之啇祝者案士喪禮注云啇祝祝習啇禮者商人教之以敬於接神宜也草七大小斂服左袵不紐小斂大斂祭服不倒皆左祍結絞不紐注云左祍祍鄉左反生時也正義曰鄉右左手解抽帶便鄉左示不解草八序端堂廉子辨絰即位于序端者序謂東序端謂序之南頭也卿大夫即位于堂廉楹西者卿大夫謂羣臣也堂廉謂堂基南畔廉稜之上楹謂南近堂廉者子位既在東序端故羣臣列於基上東楹之西也案隱義云堂廉即堂上近南􅋼為廉也草九馮尸先後凡馮尸者父母先妻子後者凡主人也父母妻子謂尸之父母妻子也父母尊故馮尸在先妻子卑故馮尸在後三十喪廬或宫或袒不塗父母之喪居倚廬不塗寢苫枕􅤓非喪事不言君為廬宮之大夫士禪之注云宫謂圍障之也禪袒也謂不障卅一同前居倚廬者謂於中門之外東牆下倚木為廬故云居倚廬不塗者但以草夾障不以泥塗之也寢苫枕􅤓者謂孝子居於廬中寢臥於苫頭枕於􅤓非喪事不言者志在悲哀若非喪事口不言説君為廬宫之者謂廬外以帷障之如宮牆大夫士禪之者禪祖也其廬袒露不帷障也案既夕禮注云倚木為廬在中門外東方北戶卅二既葬柱楣塗廬皆宮既葬柱楣塗廬不於顯者君大夫士皆宮之注云不於顯者不塗見面正義曰既葬柱楣者既葬情殺故柱楣稍舉以納日光又以泥塗辟風寒不於顯者言塗廬不塗廬外顯處君大夫士皆宫之者以大夫士既葬故得皆宫之卅三既葬若國家有事從權禮君既葬王政入於國既卒哭而服王事大夫士既葬公政入於家既卒哭辨絰帶金革之事無辟也注云此權禮也辨絰帶者變喪服而弔服輕可以即事也正義曰此一經是權禮也若值國家有事孝子不得遵恆禮故從權事此云既葬謂葬竟未卒哭也王政入於國者謂王政令之事入於已國也既卒哭而服王事者謂身出為王服金革之事也庾云謂此言君既葬王政便入國俟卒哭乃身服王事前云君言王事謂言答所訪逮而巳王政未入於國也大夫士既葬公政入於家者亦權事也謂國之政令入大夫家也既卒哭辨絰帶金革之事無辟也者此謂服國事也辨絰帶者弔服也言卒哭則有弔服今有事不得服巳變服而服弔服以從金革之事無所辟也變服重弔服輕故從戎便也此與君互也此言服辨絰則國君亦辨絰國君言服王事則此亦服國事也但君尊不言奪服耳然此云辨絰帶辨絰謂弔服帶謂喪服要絰明雖弔服而有要絰異凡弔也三四鄭注禫踰月而可作樂疏禫字恐非既練居堊室不與人居君謀國政大夫士謀冢事既祥􅉳堊祥而外無哭者禫而內無哭者樂作矣故也注云􅉳堊堊室之飾也地謂之􅉳牆謂之堊外無哭者於門外不哭也內無哭者入門不哭也禫踰月而可作樂樂作無哭者􅉳堊或為要期禫或皆作道正義曰云樂作無哭者以其樂作故無哭如鄭此注之意以祥踰月作樂故禫時無哭矣則經云樂作之文但釋禫時無哭之意不釋祥之無哭皇氏以為祥之日鼓素琴樂作之文釋二處兩時無哭與鄭注違皇説非也定本禫踰月而可作樂禫字作祥字禫之踰月自然從吉樂作可知恐禫字非也三五婦人父母喪既練歸夫家一説卒哭可歸婦人不居廬不寢苫喪父母既練而歸期九月者既葬而歸注云歸謂歸夫家也正義曰女子出嫁為祖父母及兄弟為父後者皆期九月謂本是期而降在大功者案喪服女子為父母卒哭折笄首玄謂卒哭喪之大事畢可以歸於夫家此云既練歸不同者熊氏云喪服注云卒哭可以歸是可以歸之節其實歸時在練也三六庶子居喪歸家之節大夫士父母之喪既練而歸朔月忌日則歸哭于宗室諸父兄弟之喪既卒哭而歸注云歸謂歸其宫也忌日死日也宗室宗子之家謂殯宫也禮命士以上父子異宫正義曰此一經明庶子遭喪歸家之節大夫士謂庶子為大夫士也禮命士以上父子異宮故大夫士有父母之喪至小祥各歸其宫也隱義曰大夫士父母之喪既小祥而歸庶子為大夫士者也適子終喪在殯宫也朔月忌日則歸哭于宗室者朔月朔望也忌日死日也宗室適子家殯宫也雖練各歸至忌日及朔望則歸殯宫也卅七叔弓卒去樂卒事而往昭十五年有事于武宫籥入叔弓卒去樂卒事公羊云君聞大夫之喪去樂卒事而往可也故鄭云去樂卒事而往未襲也是卿未襲而往案栁莊非卿衛君即弔急弔賢也卅八孝子拜賔無答拜之理正義曰案曲禮凡非弔喪非見國君無不答拜然則喪法孝子拜賔無答拜之理今者君出孝子雖拜君無答理而云拜近則為君之答巳者以尋常禮敵孝子雖拜賔無答理今君來臨臣臣既拜迎尊卑禮隔意恐君之答已故不敢拜迎案僖二十四年左傳宋先代之後於周為客有喪拜焉者謂其餘諸侯來弔國喪以其卑主不拜之若宋來弔王用敵禮拜謝之亦是主人拜賔之義也卅九凡殯櫕之制君殯用輴櫕至于上畢塗屋大夫殯以幬櫕置于西序塗不暨于棺士殯見祍塗上帷之注云櫕猶菆也屋殯上覆如屋者也幬覆也暨及也此記參差以檀弓參之天子之殯居棺以龍輴櫕木題湊象椁上四注如屋以覆之盡塗之諸侯輴不畫龍櫕不題湊象椁其他亦如之大夫之殯廢輴置棺西牆下就牆櫕其三面塗之不及棺者言櫕中狹小裁取容棺然則天子諸侯差寬大矣士不櫕掘地下棺見小要耳帷之鬼神尚幽暗也士達於天子皆然幬或作錞或作埻四十帷荒池栁魚榆齊蕤戴翣飾棺者以華道路及壙中不欲衆惡其親也荒蒙也在旁曰帷在上曰荒皆所以衣栁也士布帷布荒者白布也君大夫加文章焉黼荒緣邊為黼文畫荒緣邊為雲氣火黼為列於其中耳偽當為帷或作于聲之誤也大夫以上有禇以襯覆棺乃加帷荒於其上紐所以結連帷荒者也池以竹為之如小車笭衣以青布栁象宫室縣池於荒之爪端若承􅋼然云君大夫以銅為魚縣於池下揄揄翟也青質五色畫之於絞繒而垂之以為振容象水草之動搖行則又魚上拂池雜記曰大夫不揄絞屬於池下是不振容也士則去魚齊象車蓋蕤縫合雜采為之形如爪分然綴貝落其上及旁戴之言值也所以連繫棺束與栁材使相值因而結前後披也漢禮翣以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫者畫雲氣其餘各如其象柄長五尺車行使人持之而從既窆樹於壙中檀弓曰周人牆置翣是也綏當為緌讀如冠㽔之蕤蓋五采羽注於翣首也四一輇車國車碑綍羽葆功布君葬用輴者諸侯載柩在路而用輴當用輇車用輴非也四綍二碑者綍有四條碑有二所此諸侯也天子則六綍四碑御棺用羽葆者雜記云諸侯用匠人執羽葆以鳥羽注於柄木如蓋而御者執之居前以指麾為節度也大夫葬用輴者言輴非亦當為用輇也二綍二碑者碑各一孔樹於壙之前後綍各穿之也士葬用國車者國亦當為輇也二綍無碑者手縣下之比出宫御棺用功布者比出宫謂柩在宫牆內也功布大功布也士用大功布為御也大夫用茅自廟至墓士卑御自廟至大門牆內而止出路便否至墓不復御也隱義云羽葆功布等其象皆如麾四二龍輴蜃車輁軸窆時下棺天子則更載以龍輴故遂師注云蜃車柩路也行至壙乃説更復載以龍輴是天子殯用龍輴至壙去蜃車載以龍輴以此約之則諸侯殯以輴葬則用輇明矣若大夫唯朝廟用輴殯則不用輴葬時亦無輴也士則殯不用輴朝廟得用輁軸若天子元士葬亦用輁軸與大夫異禮有損之而益之也四三豐碑桓楹碑桓楹也者下檀弓云三家視桓楹是僣也則天子用大木為碑謂之豐碑諸侯則樹兩大木為碑謂之桓楹此經君稱二綍二碑故云桓楹也謂每一碑樹兩楹四四棺入坎亦為斂封周禮作窆窆下棺也此封或皆作斂檀弓曰公輸若方小斂般請以機封謂此斂也然則棺之入坎為斂與斂尸相似記時同之耳四五君封以衡大夫士以咸凡封用綍去碑負引者封當為窆窆謂下棺下棺之時將綍一頭以繫棺緘又將一頭繞碑間鹿盧所引之人在碑外皆碑而立負引者漸漸應鼓聲而下故云用綍去碑負引也君封以衡者諸侯禮大物多棺重恐柩不正下棺之時別以大木為衡貫穿棺束之緘平持而下備傾頓也大夫士以咸者大夫士無衡使人以綍直繫棺束之緘而下於君也四六唯天子葬有隧云禮唯天子葬有隧者案僖二十五年左傳云晉侯請隧王弗許曰王章也是隧為天子典章諸侯請故知天子有隧也杜元凱注左傳闕地通路曰隧諸侯皆縣柩而下路則輴也故遂師注云至壙説載除飾更復載以龍輴是載以輴入隧道皇氏云棺從而下遂以納明器其説兼路也四七君以松黃腸為椁大夫柏君松椁者君諸侯也諸侯用松為椁材也廬云以松黃腸為椁庾云黃腸松心也大夫柏椁者以柏為椁不用黃腸下天子也禮記要義卷第二十二
