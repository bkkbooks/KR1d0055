front:
  text: 諸侯大夫大夫妻及士之妻卒皆於夫之正寢解此丗婦以君下寢之上為適寢者夫人卒於君之正寢丗婦卒於君之下寢之上者與皇氏異雖卒夫寢皆婦人供視之是亦婦人不死男子之手也案服虔注左傳義與皇氏同夫人之卒在於夫人路寢比君路寢為小寢故僖八年夫人不薨于寢則不殯于廟服虔注云寢謂小寢也皇氏熊氏其説各異未知孰是故兩存焉知死正寢者案春秋成公薨於路寢道也僖公薨於小寢譏即安謂就夫人寢也隱公薨不書地失其所文公薨于臺下襄公薨于楚宫定公薨于髙寢皆非禮也案莊三十二年公羊傳何休注云天子諸侯皆有三寢一曰髙寢二曰路寢三曰小寢孫從王父之寢案周禮掌王之六寢之修何休云天子三寢與周禮違不可用
