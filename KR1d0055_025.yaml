front:
  text: 禮記要義卷第二十六經解至方記一辨昏姻二字正義曰案爾雅釋親云壻之父為姻婦之父為婚此云壻曰昏妻曰姻者爾雅據男女父母此據男子之身壻則昏時而迎婦則因而隨之故云壻曰昏妻曰姻二疏以差若豪氂為易繫文易曰君子慎始差若豪氂繆以千里此之謂也正義曰易曰君子慎始差若豪氂繆以千里此之謂也者此易繫辭文也言君子謹慎事之𥘉始差錯若豪氂之小至後廣大錯繆以至千里之大引之者證禮之防人在於未形者之前
