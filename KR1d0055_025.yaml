body:
  text: 三公羊鄭氏天子親迎左氏説叔孫通反之正義曰昏禮迎婦二傳不同春秋公羊説天子至庶人皆親迎左氏説天子至尊無敵故無親迎之禮諸侯有故若疾病則使上卿逆上公臨之許氏謹案髙祖時皇太子納妃叔孫通制禮以為天子無親迎從左氏義玄駮之云大姒之家在渭之涘文王親迎於渭即天子親迎明文也引禮記冕而親迎繼先聖之後以為天地宗廟社稷之主非天子則誰乎如鄭此言從公羊義也又詩説云文王親迎於渭紂尚南靣文王猶為西伯耳以左氏義為長鄭駮未定四人君身子妃百姓之象身以及身子以及子妃以及妃者此言百姓之象能愛己身則以及百姓之身能愛已子則以及百姓之子能愛己妃則以及百姓之妃是身與妻子還是百姓身與妻子故云百姓之象也前泛言故云妻此論人君治國政故云妃五敬身成親安土樂天君子也者人之成名也者言凡謂之君子者人之成就美名王肅云君上位子下民百姓歸之名謂之君子之子者言巳若能敬身則百姓歸已善名謂己為君子所生之子是已之修身使其親有君子之名是修身成其親也不能有其身不能安土者既不能泛愛於人人則害之故不能保有其身避其禍害流移失業是不能安土不能樂天者身既失業不知已過所招乃更怨天是不能愛樂於天也不能成其身者既不能樂天不自知其罪將謂天之濫罰罪惡之事無所不為是不能成其身六言十一得以明治國如指掌是故宮室得其度量鼎得其象味得其時樂得其節車得其式鬼神得其饗喪紀得其哀辨説得其黨官得其體政事得其施加於身而錯於前凡衆之動得其冝注云治國指諸掌言易知也郊社嘗禘尊卑之事有治國之象焉辨別也三族父子孫也凡言得者得法於禮也量豆區斗斛也味酸苦之屬也四時有所多及獻所冝也式謂載也所載有尊卑辨禮之説謂禮之官教學者黨類也體尊卑異而合同七大饗之節無物而不在禮猶有九焉大饗有四焉茍知此矣雖在畎畒之中事之聖人巳兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而后君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示德也下而管象示事也是故古之君子不必親相與言也以禮樂相示而巳注云猶有九焉吾所欲語女餘有九也但大饗有四大饗謂饗諸侯來朝者也四者謂金再作升歌清廟下管象也事之謂立置於位也聖人巳者是聖人也縣興金作也金再作者獻主君又作也下謂堂下也象武武舞也夏籥文舞也序更也堂下吹管舞文武之樂更起也知仁焉知禮樂所存也采齊雍振羽皆樂章也振羽振鷺及雍金作示情也賔主人各以情相示也金性內明象人情也示德者相示以德也清廟頌文王之德示事也相示以事也武象武王之大事也八三族有二説正義曰云三族父子孫也者族屬也從己而言父子孫於己最近唯父子孫耳案昏禮三族之不虞鄭注云三族謂父昆弟己昆弟子昆弟與此不同者彼為請期恐有期喪廢昏故云三族冝據期喪者故與此不同九大饗九盧王鄭説異同盧解大饗有九者揖讓而入門一也入門而縣興二也揖讓而升堂三也升堂而樂闋四也下管象武五也夏籥序興六也陳其薦俎七也序其禮樂八也備其百官九也王肅以為大饗九者其下五事與鄭同又以揖讓而入門入門而縣興揖讓而升堂為一也升堂而樂闋二也下管象武夏籥序興三也陳其薦俎序其禮樂備其百官為四也添下五事為九也十古人皆知禮樂子曰禮也者理也樂也者節也君子無理不動無節不作不能詩於禮繆不能樂於禮素薄於德於禮虛注云繆誤也素猶質也歌詩所以通禮意也作樂所以同成禮文也崇德所以實禮行也王制曰樂正案四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉則古之人皆知諸侯之禮樂十一伯夷遜夔是夔知禮夔非是不能行禮但不特通逹非謂全不知於禮為窮困也故虞書舜命伯夷典朕三禮伯夷讓夔是夔知禮也而皇氏以逹為掌言夔掌樂不掌禮逹訓為掌於義無文又與鄭注意乖十二室席車行立皆有法目巧之室則有奧阼者言但用目準視巧思存意雖不由法度猶有奧阼賔主之處不可不有也席則有上下者言布席之時不可無上下車則有左右者言乘車之時不可無左右行則有隨者謂少者在後相隨立則有序者謂並立則有次序十三為民父母知四方有敗四方有敗必先知之若為民父母者當須豫知禍害使民免離於禍故為民之父母然四方有福亦先知之必云四方有敗者此主為民除害為本故舉敗言之十四無聲之樂無體之禮無服之喪孔子曰夙夜其命宥密無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匍匐救之無服之喪也注云詩讀其為基聲之誤也基謀也密靜也言君夙夜謀為政教以安民則民樂之此非有鐘鼓之聲也逮逮安和之貌也言君之威儀安和逮逮然則民效之此非有升降揖讓之禮也救之賙恤之言君於民有喪有以賙恤之則民俲之此非有衰絰之服十五樂禮喪三事皆從輕至重無聲之樂氣志不違者此以下五節從輕以漸至於重𥘉言不違民但不違君之志氣二云志氣既得言君之志氣得於下三云既從民所從也四云日聞四方及於逺也五云既起是既發起也是從微至著威儀遲遲者𥘉時但舒遲而巳二則威儀翼翼而恭敬三則上下和同無不從也四則日就月將漸興進也五則施及四海所及逺也內恕孔悲者𥘉則親族之內悲哀其處近也二則施及四國所𬒳逺也三則以畜萬邦皆為孝也四則純德孔明益甚也五則施于子孫垂後丗也十六記引帝命不違與詩注不同其在詩曰帝命不違至于湯齊者此詩啇頌長發之篇美成湯之辭言天帝命此殷家丗丗行之不違至於成湯乃與天心齊也湯降不遲者降下也言湯降下賢士不遲緩甚能速疾聖敬日齊者言其聖敬之德日日升進昭假遲遲者昭明也假暇也言湯以昭明寬暇天下之士心遲遲然甚舒緩上帝是祗者上帝天也祗敬也言天於是敬愛之帝命式于九圍者式用也九圍九州之界也言天命湯之用事於九州為天子也詩之本注如此今此記注意言殷之先君施其政教奉行天命不敢違也至于湯齊者齊躋躋升也言至於成湯升為國君湯降下政教不遲緩其聖敬之德日日齊莊昭明也假至也言湯之明德下至於民遲遲然安和不急疾此與詩注稍殊大略同十七神氣風霆天地共有春秋云天有六氣此經云天有風雨不偏屬於地今屬於地者其實神氣風霆天地共有春秋冬夏是天之神氣既稱春秋冬夏故於地變言神氣但氣從地出又風著於土雷出於地故神氣風雷偏繫於地十八鄭注禮時未得毛詩傳正義曰案詩嵩髙之篇甫侯及申伯甫侯謂吕侯也穆王之時訓夏贖刑謂吕侯與申伯俱出伯夷之後掌四嶽之祀又詩蒸民稱仲山甫之賢與嵩髙生甫及申全別此云仲山甫者案鄭志注禮在先未得毛詩傳然則此注在前故以甫為仲山甫在後箋詩乃得毛傳知甫侯申伯同出伯夷之後故與禮別也十九滿千乘為成國正義曰古者方十里其中六十四井出兵車一乘此兵賦之法也案司馬法云成方十里出革車一乘司馬法又云甸方八里出長轂一乘鄭注小司徒云若通溝洫之地則為十里若除溝洫之地則為八里故云六十四井出車一乘云成國之賦千乘者襄十四年㔫傳成國不過半天子之軍謂滿千乘則為成國是公侯之封也案千乘之賦地方三百一十六里有畸案周禮公五百里侯四百里則是過千乘云不過千乘者其地雖過其兵賦唯千乘故論語注云雖大國之賦亦不是過焉二十六鄉兵賦及鄉遂公邑出軍法兵賦之法王畿之內六鄉之法家出一人萬二千五百家為鄉大司馬云五師為軍則萬二千五百家為軍是一鄉出一軍又云天子六軍是出於六鄉凡軍制大司馬云五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍此師之制也凡出軍之法鄉為正遂為副則遂之出軍與鄉同故鄭注小司徒云鄉之田制與遂同則知遂之軍法與鄉同其公邑出軍亦與鄉同故鄭注匠人云采地制井田異於鄉遂及公邑則知公邑地制與鄉遂同草一采地出軍之制其公鄉大夫采地既為井田殊於鄉遂則出軍亦異於鄉遂也故鄭注小司徒井十為通士一人徒二人通十為成革車一乘士十人徒二十人十成為終革車十乘士百人徒二百人十終為同革車百乘士千人徒二千人此謂公卿大夫采地出軍之制也草二諸侯有郊遂計地出軍其王畿之外謂諸侯大國三軍次國二軍小國一軍皆出鄉遂故費誓云三郊三遂是諸侯有遂也其諸侯計地出軍則司馬法云九夫為井四井為邑四邑為丘馬一匹牛三頭四丘為甸出長轂一乘甲士三人步卒七十二人馬四匹牛十二頭故成元年作丘甲杜服俱引此文以釋之又論語云道千乘之國鄭注引司馬法成出革車一乘但十里八里不同於上巳釋此皆謂天子諸侯兵賦也草三國界鄉遂出軍其車馬兵甲國家給異義云天子萬乘諸侯千乘大夫百乘此大判言之尊卑相十之義其間委曲鄉遂公邑細別不同也故魯頌云公車千乘謂大總計地出軍也公徒三萬謂鄉遂兵數也是國界計地與鄉遂數不同諸侯成方十里出賦之時雖革車一乘甲士三人步卒七十二人其臨敵對戰之時則同鄉法五人為伍五伍為兩之屬也故左傳云邲之戰楚廣有一卒卒偏之兩又云兩之一卒適吳是臨軍對陳同鄉法也牧誓云武王戎車三百兩孔注云一車步卒七十二人則出軍法也經云千夫長百夫長謂對敵時也據司馬法之文諸侯車甲牛馬皆計地令民自出若鄉遂之衆七十五人則遣出革車一乘甲士三人馬四匹牛十二頭恐非力之所能皆是國家所給故周禮巾車職毀折入齎于職弊又周禮質人云凡受馬於有司者書其齒毛與其賈馬死則旬日內更又司兵職云及授兵從司馬之法以頒之及其受兵輸亦如之是國家所給也草四都城百雉之説杜鄭異髙一丈長三丈為雉者異義古春秋左氏説云百雉為長三百丈方五百步者六尺為步五六三十故三百丈為五百步云子男之城方五里者周禮典命云子男五命其國家宫室以五為節國家謂城方也是子男城方五里也云百雉者此謂大都三國之一者言子男五里積千五百步左傳云大都參分國之一子男大都三分國城而居其一是大都五百步為百雉也但國城之制凡有二義鄭之此注子男五里則侯伯七里公九里天子十二里案鄭駮異義又云天子城九里公城七里侯伯之城五里子男之城三里此云百雉者謂侯伯之大都杜預同焉與鄭此注異也見考工疏草五天子諸侯之公卿大夫采地家冨不過百乘者諸侯之卿采地也故左傳云唯卿備百邑地方百里也直云唯卿百邑未知天子諸侯公卿大夫采地大小案鄭注小司徒云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸又云采地食者皆四之一説者據此以為公食百里卿食五十里大夫食二十五里其諸侯之卿大夫傳云卿備百邑論語云百乘之家此據諸侯臣之采地則公之孤侯伯之卿與天子三公同俱方百里公之卿與侯伯之大夫俱方五十里公之大夫與侯伯之不大夫俱方二十五里其子男之地唯方二百里以下其卿之采地不得復方百里案易訟卦注云小國之下大夫采地方一成其定稅三百家唯有此文其子男中都大都無以言之草六同姓異姓車服之制子云君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弒其君注云同姓者謂先王先公子孫有繼及之道者也其非此則無嫌也僕右恆朝服君則各以時事唯在軍同服爾草七大夫稱君及凡稱主臣下自稱已大夫之君但得言主不得稱君若他人泛例言之大夫有采地者亦得稱君故喪服云為其君布帶繩屨傳云君謂有采地者也若通而言之諸侯亦稱主下曲禮云執主器謂君也大夫自相命亦稱主也故左傳晉士丐謂荀偃為主云事吳敢不如事主是也稱大夫之妻亦得曰主者案魯語云季孫問於公文伯之母曰主者亦有以御服乎是也草八鄭説燕燕詩與毛異以未得毛傳詩云先君之思以畜寡人注云此衛夫人定薑之詩也定薑無子立庶子衎是為獻公畜孝也獻公無禮於定薑定薑作詩言獻公當思先君定公以孝於寡人正義曰云衛夫人定薑之詩獻公無禮於定薑者案襄十四年左傳云衛獻公出奔使告宗廟以無罪夫人定薑曰余以巾櫛事先君而暴妾使余若何無罪是無禮之事與詩注不同者案鄭志答朝模云注記時就盧君後得毛傳乃改之凡注與詩不同皆倣此草九疑君陳是周公之子君陳蓋周公之子伯禽弟也正義曰知君陳蓋周公子者以書序云周公既沒命君陳分正東郊成周似若蔡仲之命書序云蔡叔既卒王命蔡仲踐諸侯位相似皆是父卒命子故疑周公子以伯禽周公元子既封於魯命君陳令居東郊故知伯禽弟也三十鄭引逸書不見古文尚書今泰誓無此章則其篇散亡正義曰鄭不見古文尚書漢時別有尚書逸篇四月太子發上祭於畢以下三篇之事鄭謂篇中有此經之語但其事散亡卅一尸與主示民有事有所事也子云祭祀之有尸也宗廟之有主也示民有事也注云有事有所尊事也一本作有所尊事三二用祭器燕器子云敬則用祭器注云祭器籩豆簋鉶之屬也有敬事於賔客則用之謂饗食也盤盂之屬為燕器三三鄭此注東鄰西鄰坎離義與易異易曰東鄰殺牛不如西鄰之禴祭實受其福注云東鄰謂紂國中也西鄰謂文王國中也此辭在既濟既濟離下坎上離為牛坎為豕西鄰禴祭則用豕與言殺牛而凶不如殺豕受福喻奢而慢不如儉而敬也春秋傳曰黍稷非馨明德惟馨信矣正義曰鄭注易九五曰互體為坎又互體為離離為日坎為月日出東方東鄰象月出西方西鄰象也此注坎為豕西鄰禴祭則用豕與此文異又注云離為牛是東鄰之祭殺牛也則鄭之易注九五一爻有坎有離此注總論既濟之卦下體為離上體為坎與易注不同者但易含萬象俱得明義也此據一國風俗奢儉故舉豕牛以言之不得以天子諸侯俱用大牢為妨三四賔進以讓喪加以逺子云賔禮每進以讓喪禮每加以逺浴於中􅋼飰於牗下小斂於户內大斂於阼殯於客位祖於庭葬於墓所以示逺也注云逺之所以崇敬也阼或為堂三五既葬不由阼不忍即父位子云升自客階受弔於賔位教民追孝也注云謂反哭時也既葬矣猶不由阼階不忍即父位也三六身及財皆當統於父母父母在不敢有其身不敢私其財示民有上下也注云身及財皆當統於父母也有猶專也三七不耕穫不災畬凶易曰不耕穫不災畬凶注曰言必先種之乃得穫若先災乃得畬也安有無事而取利者乎田一歲曰災二歲曰畬三歲曰新田正義曰此易無妄六二爻辭無妄震下乾上六二既在震卦居中得位冝合仕者謂合事九五𬒳三六所隔不得往仕是道之不行雖食其祿猶不耕穫刈不災畬田無功得物是其凶引之者證貪財之事三八男女交以媒幣故男女無媒不交無幣不相見恐男女之無別也注云重男女之會所以逺別之於禽獸也有幣者必有媒有媒者不必有幣仲春之月會男女之時不必待幣未必然三九魯春秋去夫人之姓曰吳魯春秋猶去夫人之姓曰吳者依春秋之例如夫人齊女即云薑氏至自齊以例言之此吳女亦當云夫人姬氏至自吳魯則諱其姬姓而不稱夫人姬氏至自吳是去夫人之姓曰吳也但春秋經文不載其事其春秋簡牘記則有之故論語云謂之吳孟子是當時之言有稱吳也其死曰孟子卒者哀十二年稱孟子卒若其不諱當云夫人姬氏薨以諱取同姓而云孟子卒孟子是夫人之且字沒其氏書其且字又沒其薨而略言卒而已皆為同姓諱之鄭與何休皆以諱取同姓而書卒左氏則以不成喪故稱卒與鄭何異也若既笄而字當云伯叔季若伯姬季姬今云孟子故知且字也四十同姓后夫人親獻異姓攝獻案王饗諸侯及諸侯自相饗同姓則后夫人親獻異姓則使人攝獻則繆侯所饗蓋同姓也且王於同姓雖為侯伯車服與上公同上公既再祼后與王俱祼則上公相於與王同也其同上公則后與夫人親祼獻拜送也若異姓上公使人攝祼故宗伯職云大賔客則攝而載祼謂異姓也內宰職云凡賔客之祼獻瑶爵皆贊注云謂王同姓及二王之後來朝覲王以鬱鬯禮之后以瑶爵亞獻謂同姓也自陽侯殺繆侯後其后夫人獻禮遂廢並使人攝也四一諸侯不漁色於國中諸侯不下漁色注云謂不內取於國中也內取國中為下漁色昏禮始納采謂采擇其可者也國君而內取象捕魚然中網取之是無所擇四二壻見外舅姑子云昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也注云舅姑妻之父母也妻之父為外舅妻之母為外姑父戒女曰夙夜母違命母戒女曰母違宫事禮記要義卷第二十六
