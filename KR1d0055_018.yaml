front:
  text: 禮記要義卷第十九樂記
  hash: sha256:757f9e8c5988c1c41a90f2da1b937c1a470f9631cf561ae40ca386c52c666732
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_018-1a}
body:
  text: 一樂記分合源流案鄭目録云名曰樂記者以其記樂之義此於別録屬樂記蓋十一篇合為一篇謂有樂本有樂論有樂施有樂言有樂禮有樂情有樂化有樂象有賔牟賈有師乙有魏文侯今雖合此略有分焉案藝文志云黃帝以下至三代各有當代之樂名孔子曰移風易俗莫善於樂周衰禮壞其樂尤微以音律為節又為鄭衛所亂故無遺法矣漢興制氏以雅樂聲律丗為樂官頗能記其鏗鎗鼓舞而巳不能言其義理武帝時河間獻王始博古與生等共采周官及諸子云樂事者以作樂記事也其內史丞王度傳之以授常山王禹成帝時為謁者數言其義獻二十四卷樂記劉向校書得樂記二十三篇與禹不同其道浸以益微故劉向所校二十三篇著於别録今樂記所斷取十一篇餘有十二篇其名猶在二十四卷記無所録也二聲音變方樂舞之別凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂樂者音之所由生也其本在人心之感於物也注云宫啇角徴羽雜比曰音單出曰聲形猶見也樂之器彈其宫則衆宫應然不足樂是以變之使雜也易曰同聲相應同氣相求春秋傳曰若以水濟水誰能食之若琴瑟之專一誰能聽之方猶文章也干盾也戚斧也武舞所執也羽翟羽也旄旄牛尾也文舞所執周禮舞師樂師掌教舞有兵舞有干舞有羽舞有旄舞詩曰左手執籥右手秉翟三朱弦疏越大羮元酒清廟之瑟朱弦而疏越一倡而三歎有遺音者矣大饗之禮尚玄酒而爼腥魚大羮不和有遺味者矣注云清廟謂作樂歌清廟也朱絃練朱絃練則聲濁越瑟砥孔也畫疏之使聲逹也倡發歌句也三歎三人從歎之耳大饗祫祭先王以腥魚為爼實不臑孰之大羮肉湆不調以鹽菜遺猶餘也四哀樂喜怒敬愛之感非性也六者非性也感於物而后動者結外感物也人生而靜天之性也性本靜寂無此六事六事之生由應感外物而動故云非性也所以知非性者今設取一人以此六事觸之言此人必隨觸而動故知非本性也庾云隨其所感而應之是知非性也此聲皆據人心感於物而口為聲知是人聲也故鄭注云言人聲在所見五五音為君臣民事物宫為君者宫則主君所以然者鄭注月令云宫屬土土居中央揔四方君之象也又土爰稼穡猶君能滋生萬民也又五音以絲多聲重者為尊宫絃最大用八十一絲故宫為君崔氏云五音之次以宫最濁自宫以下則稍清矣君臣民事物亦有尊卑故以次配之啇為臣者啇所以為臣者何以鄭注月令云啇屬金以其濁次宫臣之象也解者云宫八十一絲啇七十二絲次宫如臣之得次君之貴重也崔氏云啇是金金以决斷為義臣事君亦以義斷為賢矣角為民所以為民者鄭注月令云角屬木以其清濁中民之象也解者云宫濁而羽清角六十四絲聲居宫羽之中半清半濁故云以其清濁中也民比君臣為劣比事物為優故云角清濁中民之象矣崔氏云角屬春春時物生衆皆有區別亦象萬民衆多而有區別也徴為事所以為事者鄭注月令云徴屬火以其徴清事之象也解者云羽最清徴次之故用五十四絲是徴清徴清所以為事之象也夫事是造為造為由民故先事後乃有物也是事勝於物而劣於民故次民居物之前所以徴為事之象也崔氏云徴屬夏夏時生長萬物皆成形體事亦有體故以徴配事也羽為物羽所以為物者鄭注月令云羽屬水者以其最清物之象也解云羽者最清用四十八絲而為物劣於事故最處末所以羽為物也崔氏云羽屬冬冬物聚則成財用冬則物皆藏聚與財相類也五音不亂則無怗懘之音矣者怗敝也懘敗也敝敗謂不和之貌也若君臣民事物五者各得其所用不相壞亂則五音之響無敝敗矣宫亂則荒其君驕者前明音聲與政通若五事皆正則音不敝敗是聲與政通故此以下明聲與政通也若五音之敝敗則政亂各有所由也荒猶散也若宫音之亂則其聲放散是知由其君驕溢故也崔氏云宫聲所以散者由君驕也若君驕則萬物荒散也啇亂則陂其官壞者陂不平正也若啇音之亂則其聲欹邪而不正也是知由其臣不治於官官壞故也崔氏云啇聲所以傾邪者由臣官壞也官若壞則物皆傾邪也云云六五音之義之聲之和之動案樂緯動聲儀云宫為君君者當寬大容衆故聲弘以舒其和情以柔動脾也啇為臣臣者以發明君之號令其聲散以明其和溫以斷動肺也角為民民者當約儉不奢僣差故其聲防以約其和清以靜動肝也徴為事事者君子之功既當急就之其事當久流亡故其聲貶以疾其和平以功動心也羽為物物者不有委聚故其聲散以虛其和斷以散動腎也動聲儀又云若宫唱而啇和是謂善大平之樂注云君臣相和又云角從宫是謂哀衰國之樂注云象人有怨訴又云羽從宫往而不反是謂悲亡國之樂也七朱弦疏越三歎正義曰朱弦練朱弦者案虞書傳云古者帝王升歌清廟之樂大琴練絃此云朱絃者明練之可知也云練則聲濁者不練則體徑而聲清練則絲孰而絃濁云越瑟砥孔畫疏之使聲遲也者熊氏云瑟兩頭有孔畫疏之疏通也使兩頭孔相連而通孔小則聲急孔大則聲遲故云使聲遲也云三歎三人從歎之耳者三歎謂擊瑟贊歎美者但有三人歎之耳言歎者少也八性情之別正義曰言人𥘉生未有情欲是其靜稟於自然是天性也感於物而動性之欲也者其心本雖靜感於外物而心遂動是性之所貪欲也自然謂之性貪欲謂之情是情性別也九鄭氏以聖賢精氣為神鬼疏謂鬼神有三大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神注云言順天地之氣與其數不失其性成物有功報焉教人者助天地成物者也易曰是故知鬼神之情狀與天地相似五帝德說黃帝德也死而民畏其神者百年春秋傳曰若敖氏之鬼然則聖人之精氣謂之神賢知之精氣謂之鬼正義曰天地與隂陽生養為氣樂有六律六吕調和生養是順天地之氣解經同和也云與其數謂天有日月星辰地有山川髙下其數不同故云與其數解經同節也易上繫辭云精氣為物遊魂為變是故知鬼神之情狀與天地相似注云精氣謂七八遊魂謂九六遊魂謂之鬼物終所歸精氣謂之神物生所信也言木火之神生物東南金水之鬼終物西北二者之情其狀與春夏生物秋冬終物相似云五帝德說黃帝德曰死而民畏其神者百年案大戴禮五帝德篇云春秋傳曰若敖氏之鬼引春秋者宣四年左傳又鄭注祭法七祀謂鬼神司察小過引此幽則有鬼神然則有天地自然之鬼神有聖人賢人之鬼神有七祀之鬼神十舞行綴逺與短其治民勞者其舞行綴逺其治民逸者其舞行綴短注云民勞則德薄相去逺舞人少也民逸則德盛鄼相去近舞人多也正義曰鄼謂鄼聚舞人行位之處立表鄼以識之十一樂感人深本從民心而來其感人深者言樂本從民心而來乃成於樂故感動人深也其移風易俗者風謂水土之風氣謂舒疾剛柔俗謂君上之情欲十二饗禮依命數春秋有不然正義曰凡饗禮案大行人云上公九獻侯伯七獻子男五獻並依命數其臣介則孤同子男鄉大夫略為一節俱三獻則天子諸侯之士同一獻故昭六年季孫宿如晉晉侯享之有加籩武子退使行人告曰得貺不過三獻是其事也但春秋亂丗之法或有大夫五獻者故昭元年鄭伯享趙孟具五獻之籩豆於幕下是亂丗之法也或者鄭以公孤之禮享趙孟故五獻也言百拜喻多者案今鄉飲酒之禮是一獻也無百拜今云百拜故喻多也十三君德形於樂音而民之憂樂從之夫樂聲善惡本由民心而生所感善事則善聲應所感惡事則惡聲起樂之善惡𥘉則從民心而興後乃合成為樂樂又下感於人善樂感人則人化之為善惡樂感人則人隨之為惡是樂出於人而還感人猶如雨出於山而還雨山火出於木而還燔木故此篇之首論人能興樂此章之意論樂能感人也夫民有血氣心知之性者人由血氣而有心知故血氣心知連言之其性雖一所感不恆故云而無哀樂喜怒之常也應感起物而動者言內心應感起於外物謂物感己心遂應之念慮興動故云應感起物而動然後心術形焉者術謂所由道路也形見也以其感物所動故然後心之所由道路而形見也心術見者即下文是也是故志微噍殺之音作而民思憂者志微謂人君志意微細噍殺謂樂聲噍蹙殺小如此音作而民感之則悲思憂愁也嘽諧慢易繁文簡節之音作而民康樂者嘽寬也諧和也慢疏也繁多也簡節易少也康安也言君若道德嘽和疏易則樂音多文采而節奏簡略則下民所以安樂也粗厲猛起奮末廣賁之音作而民剛毅者粗厲謂人君性氣粗疏威厲猛起謂武猛發起奮末謂奮動手足廣賁謂樂聲廣大憤氣充滿如此音作而民感之則性氣剛毅也廉直徑正莊誠之音作而民肅敬者君若廉直徑正則樂音矜莊嚴栗而誠信故民應之而肅敬也寬𥙿肉好順成和動之音作而民慈愛者肉謂厚重者也君上如寬𥙿厚重則樂音順序而和諧動作故民皆應之而慈愛也流辟邪散狄成滌濫之音作而民淫亂者流辟謂君志流移不靜邪散謂違辟不正放邪散亂狄成滌濫皆謂往來速疾謂樂之曲折速疾而成速疾而止僣濫謂樂聲急速如此音作民感之淫亂也此六事所云音者皆據君德及樂音相雜也君德好而樂音亦好君德惡而樂音亦惡皆上句論君德下句論樂音十四樂師宗祝啇祝知末節故位處卑樂師辨乎聲詩故北面而弦者此明知禮樂末者其位處卑即樂師以辨曉聲詩但知樂之末節故北面而鼓弦言其位處卑也宗祝辨乎宗廟之禮故後尸者宗謂宗人祝謂大祝但辨曉於宗廟詔相之禮故在尸後也啇祝辨乎喪禮故後主人者啇祝謂習啇禮而為祝者但辨曉死喪擯相之禮故後主人謂在主人之後言此宗祝啇祝但知禮之末節故在尸與主人後言其位處卑賤也十五魏文侯畢萬後僣諸侯云魏文侯畢萬之後僣諸侯者也者案春秋閔元年晉獻公滅魏以魏賜畢萬案丗本云萬生芒芒生季季生武仲州州生莊子降降生獻子荼荼生簡子取取生襄子多多生桓子駒駒生文侯斯是畢萬之後也十六新樂之發獶雜如漢人有獼猴舞今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也注云俯猶曲也言不齊一也濫濫竊也溺而不止聲淫亂無以治之獶獼猴也言舞者如獼猴戲也亂男女之尊卑獶或為優正義曰案詩小雅云母教猱升木毛傳云猱猿屬也是獶獼猴也漢書檀長卿為獼猴舞是狀如獼猴十七樂與音不同夫樂者與音相近而不同注云言文侯好音而不知樂也鏗鎗之類皆為音應律乃為樂十八鄭宋衛齊溺音祭祀弗用子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆淫於色而害於德是以祭祀弗用也注云言四國皆出此溺音濫濫竊姦聲也燕安也春秋傳曰懷與安實敗名趨數讀為促速聲之誤也煩勞也祭祀者不用淫樂十九敬以和何事不行詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行注云言古樂敬且和故無事而不用溺音無所施二十未及下車與周紀義反未及下車者言速封諸侯未遑暇及下車即封黃帝堯舜之後下車而封夏殷之後者以二王之後以其禮大故待下車而封之案周本紀云武王以與戰伐紂兵皆崩畔武王入至紂死之所周公把大鉞畢公把小鉞以夾武王武王既入立社南召公奭貢兵師尚父牽牲尹逸祝曰殷之末孫季紂殄廢先王明德又云乃封紂子祿父使其弟管叔蔡叔相祿父命召公釋箕子之囚命畢公釋百姓之囚表啇容之閭命南宫適散鹿臺之財發巨橋之粟命閎夭封比于之墓武王追思先聖乃褒封神農之後於焦及封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳大禹與此同然如武王追思先聖乃封之與此未及下車義反當以禮記為正此不云封神農者舉三恪二代也草一文王之廟如明堂制祀乎明堂而民知孝注云文王之廟為明堂制正義曰於時未有明堂而云明堂者文王廟如明堂之制周公攝政六年始朝諸侯於明堂當武王伐紂之時未有明堂今云祀乎明堂故知是文王之廟制耳非正明堂也草二油然美好貌利欲少則情性和樂致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神注云油然新生好貌也善心生則寡於利欲寡於利欲則樂矣志明行成不言而見信如天也不怒而見畏如神也正義曰書傳箕子歌云禾黍之油油潤澤好之貌然善心內生其貌美好油然也云善心生則寡於利欲者凡利欲之發由貪鄙而來心若思利欲則神勞形苦今善心既生則貪欲寡少利欲既少則情性和樂云志明行成者不貪不利用是志意清明神和性樂是善行得成矣草三德輝謂顔色理謂容貌之進止故德輝動於內而民莫不承聽理發諸外而民莫不承順注云德輝顔色潤澤也理容貌之進止也正義曰德輝顔色潤澤也由內心和順故和順之德輝然發見於顔色是德輝由動於內而來也云理容貌之進止也者以經云理發諸外凡道理從內心而生今云理發諸外非道理之理止謂容貌進止之理鄭恐有道理之嫌故云容貌之進止也草四邵公蓋黃帝後或謂文王之庶子封黃帝之後於薊音計今涿郡薊縣是即燕國之都也孔安國司馬遷及鄭皆云燕國郡邵公與周同姓案黃帝姓姬君奭蓋其後也或黃帝之後封薊者滅絶而更封燕郡乎疑不能明也而皇甫謐以邵公為文王之庶子記傳更無所出又左傳冨辰之言亦無燕也陸釋禮記要義卷第十九
