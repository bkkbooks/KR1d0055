body:
  text: 鄉飲酒凡四事正義曰案鄭目録云名曰鄉飲酒義者以其記鄉大夫飲賔于庠序之禮尊賢養老之義此於別録屬吉事儀禮有其事此記釋其義也但此篇前後凡有四事一則三年賔賢能二則鄉大夫飲國中賢者三則州長習射飲酒也四則黨正蠟祭飲酒揔而言之皆謂之鄉飲酒知此篇合有四事者以鄭注鄉人鄉大夫又云士州長黨正鄭又云飲國中賢者亦用此禮也鄭必知此篇鄉大夫賔賢能及飲國中賢者并州長黨正者以此經云鄉人即鄉大夫士則州長黨正又云君子謂鄉大夫飲國中賢者下又云六十者坐五十者立侍亦是黨正飲酒之事下又云合諸鄉射是亦州長習射之禮鄭以此參之故知此篇兼有四事鄉則三年一飲州則一年再飲黨則一年一飲也所以然者天子六鄉諸侯三鄉卿二鄉大夫一鄉各有鄉大夫而鄉有鄉學取致仕在鄉之中大夫為父師致仕之士為少師在於學中名為鄉先生教於鄉中之人謂鄉學每年入學三年業成必升於君若天子鄉則升學士於天子若諸侯之鄉則升學士於諸侯凡升之必用正月也將用升之先為飲酒之禮鄉大夫與鄉先生謀事學生最賢使為賔次者為介又次者為衆賔此鄉大夫為主人與之飲酒而後升之故周禮鄉大夫職云三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之鄭云賢者有德行者能者有道藝者故鄭云古者年七十而致仕老於鄉里大夫名曰父師士名少師而教學焉恆知鄉人之賢者是以大夫就而謀之賢者以為賔其次以為介又其次為衆賔而與之飲酒是亦將獻之以禮禮賔之也若州一年再飲者是春秋習射因而飲之以州長為主人也若黨一年一飲者是歲十二月國於大蠟祭而黨中於學飲酒子貢觀蠟是也亦黨正為主人也此鄉飲酒之義説儀禮鄉飲酒也六曰聖曰禮曰德仁義接賔主有事爼豆有數曰聖聖立而將之以敬曰禮禮以體長幼曰德德也者得於身也故曰古之學術道者將以得身也是故聖人務焉注云聖通也所以通賔主之意也將猶奉也術猶藝也得身者謂成已令名免於刑罰也言學術道則此説賔賢能之禮正義曰聖立而將之以敬曰禮者謂通賔主之事其道已立能將行之以恭敬乃謂之禮也禮以體長幼曰德德者得也既能有禮以體成長幼於事得宜故曰德也德也者得於身也者重釋稱德之義是得善行於其身謂身之所行皆得於理也古之學術道者將以得身也者術者藝也言古之人學此才藝之道也將以得身也謂使身得成也此謂賔賢之人有術道今以賔敬接待之事其尊敬學習術道身得成就而有令名七祭薦祭酒嚌肺在席中啐在席末言是席之正非專為飲食也者若此席專為飲食應於席中啐酒今乃席末啐酒此席之設夲不為飲食是主人敬重於賔故設席耳祭薦祭酒嚌肺在席中者敬主人之物故在席中啐酒入於己故在席末也八飲酒之節能安燕而不亂降説屨升坐修爵無數飲酒之節朝不廢朝莫不廢夕賔出主人拜送節文終遂焉知其能安燕而不亂也注云朝夕朝莫聽事也不廢之者既朝乃飲先夕則罷其正也終遂猶充備也正義曰此一經明飲酒之禮雖爵行無數猶能節文自終不至於亂也降説屨升坐者此謂無算爵之𥘉也以前皆立而行禮未徹爼故未説屨至此徹爼之後乃説屨升堂坐也修爵無數者謂無算爵也熊氏云謂行爵無數矣朝不廢朝者朝後乃行飲酒之禮是朝不廢朝也莫不廢夕者謂飲酒禮畢乃治私家之事是莫不廢夕此謂鄉飲酒之禮若黨正飲酒一國若狂無不醉也九經以天地紀以日月參以三光經之以天地紀之以日月參之以三光政教之本也注云日出於東僎所在也月生於西介所在也三光三大辰也天之政教出於大辰焉正義曰案昭十七年有星孛于大辰公羊云大辰者何大火也伐為大辰北辰亦為大辰故爾雅云大辰房心尾也大火謂之大辰北極謂之北辰是三大辰也何休云大火與伐天所以示民時早晚天下取以為正故謂之大辰辰時也是天之政教出於大辰十一月三日則成魄月者三日則成魄者謂月盡之後三日乃成魄魄謂明生傍有微光也此謂月明盡之後而生魄非必月三日也所以前月大則月二日生魄前月小則三日乃生魄朱文公於義禮破此説謂三日非魄乃生明也十二燕𥘉立行禮似饗其餘則燕古者諸侯之射也必先行燕禮者案儀禮大射在未旅之前燕𥘉似饗即是先行饗禮而云先行燕禮者燕𥘉似饗正謂立行禮似饗其餘則燕故禮其牲狗及設折爼行一獻此等皆燕之法也故云先行燕禮也十三諸侯歲獻書物三歲而貢士是故古者天子之制諸侯歲獻貢士於天子天子試之於射宮注云歲獻獻國事之書及計偕物也三歲而貢士舊説云大國三人次國二人小國一人正義曰以經云歲獻貢士於天子恐歲獻之文只是貢獻於士故云歲獻獻國事之書云及計偕物也者漢時謂郡國送文書之使謂之為計吏其貢獻之物與計吏俱來故謂之計偕物也偕俱也非但獻國事之書又俱獻貢物故云及計偕物知歲獻國事之書者小行人云令諸侯春入貢秋獻功注云貢六服所貢也功考績之功也秋獻之若今計文書斷於九月其舊法也云三歲而貢士者以經貢士之文繫歲獻之下恐每歲貢士故云三歲而貢士也又知三歲者案書傳云古者諸侯之於天子也三年一貢士一適謂之好德再適謂之賢賢三適謂之有功有功者天子賜以衣服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸侯不云益地者文不具矣書傳又云貢士一不適謂之過注云謂三年時也再不適謂之敖注云謂六年時也三不適謂之誣注云謂九年時也一絀以爵再絀以地三絀而地畢注云凡十五年鄭以此故知三歲而貢士也十五曽孫之詩是貍首樂作而後射正義曰以諸侯射以貍首之篇謂今詩文無貍首之篇今射義有載曽孫之詩故知是貍首也云正爵四行獻賔獻公獻卿獻大夫者大射禮文云乃後樂作而射也者案大射禮獻大夫之後乃後工入樂作而後射此謂大射也若燕射則説屨升堂坐之後乃射矣故燕禮説屨升堂獻士畢若射則大射正為司射如鄉射之禮是也十七與為人後與猶竒也使子路執弓矢出延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半入者半注云先行飲酒禮將射乃以司正為司馬子路執弓矢出延射則為司射也延進也出進觀者欲射者也賁讀為僨僨猶覆敗也亡國亡君之國者也與猶竒也後人者一人而巳既有為者而往竒之是貪財也子路陳此三者而觀者畏其義則或去也延或為誓正義曰云與猶竒也者謂他人無後已有人後之相為合配今已更往後之是配合之外更有竒隻故云後人者一人而已既有為者而往竒之十八天子諸侯卿大夫射有三士二凡天子諸侯及卿大夫禮射有三一為大射是將祭擇士之射二為賔射諸侯來朝天子入而與之射也或諸侯相朝而與之射也三為燕射謂息燕而與之射其天子諸侯大夫三射皆具其士無大射故司裘職云大射唯明王及諸侯卿大夫不及於士故鄭注云士不大射士無臣祭無所擇是也其賔射燕射士皆有之故射人云士射犴侯二正是士有賔射也又鄉射記云士布侯畫以鹿豕是士有燕射矣十九畿內諸侯張二侯畿外三侯其侯天子大射則射皮侯故考工記云張皮侯而棲鵠則春以功又司裘職云王大射則共虎侯熊侯豹侯設其鵠鄭注考工記皮侯謂此侯也畿內諸侯大射則張熊侯豹侯故司裘職云諸侯則共熊侯豹侯設其鵠是也若畿外諸侯大射亦張三侯鄭注云逺尊得伸故亦張三侯一曰大侯鄭注云則天子熊侯謂以熊皮飾之二曰糝侯鄭注云糝雜也豹鵠而麋飾三曰犴侯鄭注云犴胡大皮飾侯若畿內卿大夫射麋侯故司裘云卿大夫則共麋侯是也其畿外卿大夫射侯無丈於諸侯既得三侯其卿大夫蓋降君一等則糝侯犴侯其大射之侯皆有鵠也二十鵠二分侯中而居其一其鵠則二分侯中而居其一故考工記云梓人為侯廣與崇方參分其廣而鵠居一焉凡皮侯者各以其飾侯之側又方制其皮以為鵠故鄭注司裘云以虎熊豹麋之皮飾其側又方制之以為􅙯謂之鵠謂之鵠者取名於鳱鵠小鳥而難中是以中之為雋亦取鵠之言較較者直也射所以直己志則是但取其名非是實鳥也草一凡賔射侯正之制此侯道鄭注司裘云虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十參七十干五十逺尊得伸可同耳其天子以下賔射則射人云王射三侯五正諸侯射二侯三正卿大夫射一侯二正士射犴侯二正鄭云謂五正三正二正之侯五正者中朱次白次蒼次黃玄居外三正損玄黃二正畫以朱緑鄭又云二侯者三正二正之侯也一侯者二正而巳此皆與賔射於朝之禮也考工記梓人職云張五采之侯則逺國屬凡賔射之侯謂之正鄭注大射云正者正也亦鳥名齊魯之間名題肩為正然則天子賔射用五正三正二正之侯畿內諸侯賔射用三正之侯卿大夫用二正之侯士亦用二正之侯又飾以犴畿外諸侯以下賔射其侯無文約大射諸侯既同天子張三侯則賔射亦同天子用五正三正二正之侯其卿大夫射亦三正二正之侯士射二正之侯若五正者同虎侯九十弓三正者同熊侯七十弓二正者同豹侯五十弓凡中央之赤皆方二尺以外之色皆分布之其外又畫以雲氣天子以下燕射則尊卑皆用一侯故鄉射記云天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕鄭注云白質赤質皆謂采其地不采者白布也熊麋虎豹鹿豕皆正靣畫其頭象於正鵠之處耳君畫一臣畫二陽竒隂偶之數也燕射射熊虎豹不忘上下相犯射麋鹿豕志在君臣相養也梓人云張獸侯則王以息燕謂此也鄉射記既不列畿內畿外之異則諸侯以下外內同也鄉射記列天子以下各一侯下文云侯道五十弓弓二寸以為侯中則天子以下皆五十弓侯中同方一丈也降尊以就卑言燕主歡心故也而皇氏沈氏乃云天子熊侯或云九十弓或云七十弓乃同三侯上下之差文無準據其義非也草三侯中及上下躬上下舌用布數其侯用布之數案鄉射記鄉侯五十弓則侯道五十步也以弓之下制長六尺以射用弓故稱弓一弓取二寸以為中則侯中方一丈也鄉射記又云倍中以為躬注云躬身也謂中之上下幅也用布各二丈鄉射記又云倍躬以為左右舌舌謂躬之上下橫一幅布張於躬外左右而出謂之舌考工記謂舌為個躬既二丈上舌倍躬則用布四丈也鄉射記又云下舌半上舌注云半者半其出於躬者也上舌出射各一丈則下舌出弓各五尺然則下舌用布三丈揔而計之侯中方一丈凡五幅用布五丈上下二躬用布四丈上舌復用布四丈下舌用布三丈故鄭注鄉射記云鄉射侯用布十六丈也以此計之侯道七十弓則侯中方丈四凡七幅幅別丈四是用布九丈八尺上下二躬各倍中用布五丈六尺上舌倍躬亦用布五丈六尺上舌出躬各丈四尺下舌半上舌則左右各減七尺則下舌用布四丈二尺故鄭注鄉射記云七十步之侯用布二十五丈二尺其九十弓之侯用布三十六丈其張三侯之體同道位之近者最下逺者漸髙故大射云大侯之崇見鵠於參參見鵠於干干不及地武二五自王至士射耦之數其耦射人云王以六耦諸侯以四耦卿大夫士以三耦又射人云諸侯以下謂畿內也若畿外諸侯以下則皆三耦故大射及鄉射并左傳襄二十九年晉士鞅來聘射皆三耦是也二六大射在廟賔射朝燕射寢其射宫所在天子大射必先習於澤宫而後射於射宫則此射義文也其射宫天子則在廟也故司服云享先公饗射則鷩冕司几筵云大朝覲大饗射依前南鄉是也其服鷩冕天子賔射則在朝故射人云諸侯在朝則皆北靣是也其服皮辨服矣天子燕射則在寢以諸侯燕於小寢天子路寢之朝謂之燕朝者故知天子諸侯燕射在寢故鄉射記云君國中射則皮樹中鄭注云謂燕射也其服則玄冕緇衣素裳也諸侯以為朝服燕禮云燕朝服於寢是其諸侯大射不顯畿內畿外之異案儀禮大射云公入鷔射畢而云入謂從郊入國也謂射在郊學也故鄉射記云於郊則閭中鄭注云大射於大學儀禮所陳多據畿外諸侯即畿內諸侯或亦然也其服無文故用皮辨以射在學宫學記云皮辨祭菜故也其諸侯賔射若在國則亦在朝與天子同若在國外相會則在竟故鄉射記云於竟則虎中鄭注云謂與鄰國君射也其服亦皮辨服也以聘禮君受聘皮辨故也其卿大夫以下射之所在及所服之衣無明文也此三射之外又有鄉射謂鄉大夫貢賢能之後行鄉射之禮而詢衆庶故鄉大夫職云獻賢能之書于王退而以鄉射之禮五物詢衆庶是也又有州長射于州序之禮其侯並同賔射之法故鄭注云鄉侯二正草七主皮之射有二又有習武之射凡主皮之射有二一是卿大夫從君田獵班餘獲而射書傳云凡祭取餘獲陳於澤然後卿大夫相與射也鄭注鄉射云主皮者無侯張獸皮而射之主於獲也二是庶人亦主皮之射故鄭注周禮云庶人無侯張皮而射之是也又有習武之射故司弓矢云弧弓以授射甲革椹質者是也草八習射於澤射椹質試武天子將祭必先習射於澤澤者所以澤士也者澤是宫名於此宫中射而擇士故謂此宫為澤澤所在無文蓋於寬間之處近水澤而為之也非唯祭而擇士餘射亦在其中故書傳論主皮射云嚮之取也於囿中勇力之取也今之取也於澤宫揖讓之取也是主皮之射亦近於澤也選士於澤不射侯也但試武而巳故司弓矢云澤共射椹質之弓矢鄭司農引此射義之文以釋之是知於澤中射椹質而巳又鄭注司弓矢云樹椹以為射正射甲與椹試弓習武也其主皮之射則張皮亦揖讓也草九桑弧蓬矢用六禮射唯四矢故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也飯食之謂也注云男子生則設弧於門左三日負之人為之射乃卜食子也正義曰此一經明男子重射之義以男子生三日射人以桑弧蓬矢者則有為射之志故長大重之桑弧蓬矢者取其質也所以用六者射天地四方也所以禮射唯四矢者示事有不用也四矢者象禦四方之亂三十射時飲爵時皆有升降揖遜孔子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子注云必也射乎言君子至於射則有爭也下降也飲射爵者亦揖讓而升降勝者袒決遂執張弓不勝者襲説決拾郤左手右加弛弓於其上而升飲君子恥之是以射則爭中正義曰此飲射爵者亦揖讓而升降者此解經揖讓而升下經稱揖讓謂飲射爵時揖讓非射時揖讓也故云飲射爵者亦揖讓而升降亦者亦如射時揖讓飲今亦揖讓故儀禮大射云耦進上射在左並行當階北靣揖及階揖升堂揖皆當其物北靣揖及物揖射畢北靣揖揖如升射是射時升降揖讓也大射又云飲射爵之時勝者皆袒決遂執張弓不勝者皆襲説決拾郤左手右加弛弓于其上遂以執付揖如始升射及階勝者先升升堂少右不勝者進北靣坐取豐上之觶立卒觶坐奠於豐下興揖不勝者先降是飲射爵之時揖讓升降也禮記要義卷第三十二
