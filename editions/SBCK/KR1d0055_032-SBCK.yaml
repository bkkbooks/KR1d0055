front:
  text: 禮記要義第三十三燕義聘義䘮服四制
  hash: sha256:d82734f344fc2810130fc25fa10b798008fb337357236767b01a44c4ab9156e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_032-1a}
body:
  text: 一燕義記君臣燕飲正義曰案鄭目録云名曰燕義者以其記君臣燕飲之禮上下相尊之義此於別録屬吉事案儀禮目録云諸侯無事􅀂卿大夫有勤勞之功與群臣燕飲以樂之勤勞謂征伐聘問詩曰吉甫燕喜是也臣有王事之勞亦燕之故燕禮云􅀂有王事是也二諸子庶子之官同周天子之官有庶子官者此明庶子之義也謂作記之人在於周末追述周􅀄之事故云古者言周之天子其下立官有庶子之官天子謂之諸子諸侯謂之庶子其所職掌諸子庶子同也故此記雖明諸侯庶子職掌其所載之事皆諸子職文也庶子官職諸侯卿大夫士之庶子之倅者言此官職主諸侯及卿大夫士衆庶之子副倅於父之事所以官名庶子掌其戒令者此等衆子湏有戒法政令而庶子官掌之與其教治者與猶及也教謂教學治謂治身言非但掌戒令而巳及其教治亦皆掌之別其等者謂分別其貴賤之等正其位者正其朝廷所立之位也此記云諸侯卿大夫士之庶子之卒周禮諸子職則云掌國子之倅唯此爲別但諸子職揔謂之國子此云諸侯卿大夫士之庶子者是其適子也謂之庶者庶衆也以其適子衆多故揔謂之庶子非適子庶弟而稱庶子也必知適子者以其云倅是副貳於父之言故鄭注諸子職云國子者是公卿大夫士之副貳又引王制云王大子王子羣后之大子卿大夫元士之適子是也四宰夫爲獻主大夫爲賔設賔主飲酒之禮也使宰夫爲獻主臣莫敢與君亢禮也不以公卿爲賔而以大夫爲賔爲疑也明嫌之義也賔入中庭君降一等而揖之禮之也注云設賔主者飲酒致歡也宰夫主膳食之官也天子使膳宰爲主人公􅀌也疑自下上至之辭也公卿尊矣復以爲賔則尊與君大相近五受君酬賜皆降拜升成拜皆降再拜稽首升成拜者謂賔受君之酬及臣受君賜爵皆降自西階再拜稽首以受君恩又􅂛堂更再拜稽首以成拜也故燕禮云公酬賔賔降西階下再拜稽首公命小臣辭賔􅂛成拜鄭云􅂛成拜復再拜稽首也至禮殺之後賔下堂是欲拜君則辭之賔未拜也賔乃􅂛堂再拜稽首鄭注云不言成拜者以其下堂未拜故也燕禮云公卒觶賔下拜小臣辭賔升再拜稽首鄭注云不言成拜者爲拜故下實未拜也下不敢輙拜禮殺也六燕禮凡臣拜無不答禮無不答言上之不虚取於下也者以燕禮凡臣之拜君無不答拜之示爲上之道不虚取於下也上必湏報之也七獻君獻卿大夫士旅酬之等獻君君舉旅行酬者案燕禮宰夫爲主人酌以獻賔賔飲畢酌以酢主人主人飲畢酌以獻君君飲畢酌以酢主人更爵以受酢于阼階下飲卒爵主人又洗觚酬主人先飲卒爵酌以酬賔賔受觚坐奠于薦東訖小臣請媵爵者二人媵爵阼階下皆北靣媵爵于公媵爵者先自飲畢媵爵者洗象觶酌奠于公席之前公坐取所媵之觶以酬賔賔於時下再拜稽首公命小臣辭賔􅂛成拜公立卒觶賔乃受公虚爵酌之酬大夫于西階上衆大夫相酬畢奠虚觶于篚此是獻君君舉旅行酬也而后獻卿卿舉旅行酬者案燕禮主人洗􅂛實散獻卿于西階上獻卿畢小臣又請媵爵者公使二人媵爵奠于公前公又行一爵􅀂賔􅀂長唯公所酬以旅于西階上大夫辯而止此是爲卿旅酬也燕禮直云卿不云大卿小卿之異則小卿大卿俱同獻也而后獻大夫大夫舉旅行酬者案燕禮主人洗獻大夫于西階上大夫辯受獻乃納工獻衆工畢公又舉奠觶唯公所賜以旅于西階上此是獻大夫爲大夫而旅酬也而后獻士士舉旅行酬者案燕禮􅀃屨􅂛堂坐之後主人獻士于西階上獻士辯又獻旅食賔媵觚于公公坐取賔所媵觶興唯公所賜乃就席坐行之終於大夫終受者興以酬士士舉旅于西階上此是獻士爲旅酬也而后獻庶子者庶子卑不爲之舉旅但無筭爵之節執爵者酌而旅之爼豆牲體薦羞皆有等差者公及卿大夫士等牲體薦羞之節皆有等差但燕禮不載無以言也九卿出聘之介數聘禮上公七介侯伯五介子男三介所以明貴賤也注云此皆使卿岀聘之介數也大行人職曰凡諸侯之卿其禮各下其君二等十賔入廟門三遜三揖之節三譲而后傳命三譲而后入廟門三揖而后至階三譲而后􅂛所以致尊譲也注云此揖譲主謂賔也三譲而後傳命賔至廟門主人請事時也賔見主人陳擯以大客禮當己則三譲之不得命乃傳其君之聘命也三讓而後入廟門譲主人廟受也小行人職曰凡四方之使者大客則擯小客則受其幣聽其辭十一君請事于賔及郊勞廟受君使士迎於竟謂王君使士迎客於竟故聘禮賔及竟張旜君使士請事遂以入是也大夫郊勞聘禮云賔至于近郊君使下大夫請行君又使卿朝服用束帛勞此大夫郊勞者即卿也君親拜迎于大門之内而廟受案聘禮賔入門左公再拜是君迎於大門之内聘禮又云及廟門公揖入納賔賔入門左賔􅂛西楹西東靣是廟受也十二上擯承擯紹擯之節正義曰主國之卿爲上擯接迎於賔大夫爲承擯者承副上擯也士爲紹擯者紹繼也謂繼續承擯案聘禮注其位相承繼又聘禮注云主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人其待聘客及朝賔其擯數皆然十三私靣私覿私獻之別賔私靣私覿者私靣謂私以已禮靣見主國之卿大夫也私覿者私以己禮覿主國之君以其非公聘正禮故謂之私案聘禮私靣在後此先云私靣者記者便文無義例也靣亦見也以其於臣禮質故以靣言之故聘禮注云靣亦見也其謂之靣威儀質也此於臣謂之靣而司儀云諸公之臣相爲國客私靣私獻注云私靣私覿也又以私靣爲私覿者以司儀之文但云私靣私獻不云私覿故以私靣爲私覿也昭六年左傳楚公子棄疾見鄭伯以其乗馬八匹私靣於君而稱靣者因行過鄭而靣鄭伯非正禮故雖君亦稱靣也十四生曰餼死曰餼腥曰餼致饔餼者謂行聘之日主君使卿致饔餼之禮於賔舘案聘禮君使卿韋弁歸饔餼五牢注云牲殺曰饔生曰餼又曰飪一牢鼎九設于西階前腥二牢鼎七設于阼階前餼二牢陳于門西北靣東上是也案聘禮餼旣爲生而左傳僖三十三年云餼牽竭矣服䖍云死曰餼者以餼與牽相對牽旣爲生餼則爲死故詩瓠葉篇云牲牢饔餼鄭注云腥曰餼者以牲牢饔餼相對以牲牢旣爲生饔又爲熟故以餼爲腥也十五還玉旣畢以賄贈之還圭璋者謂賔將去時君使卿就賔舘還其所聘之圭璋故聘禮云君使卿皮弁還玉于館是也賄贈者因其還玉之時主人之卿并以賄而徃還玉旣畢以賄贈之故聘禮還圭璋畢大夫賄用束紡是也十六饗食皆在廟燕在寢饗食燕者謂主君設大禮以饗賔設食禮以食賔皆在廟也又設燕以燕之燕在寢也故聘禮云公於賔壹食再饗燕與羞俶獻無常數是也十七殷相聘殷爲盛爲中正義曰案大行人云諸侯之􅀖交歳相問也案聘禮記云小聘曰問故知此比年小聘是歳相問也大行人又云殷相聘也殷中也謂三年之時中而無事故稱殷也案昭九年左氏傳云孟僖子如齊殷聘禮也服䖍注云自襄二十年叔老聘於齊至今積二十年故脩盛聘之禮鄭引之以解大行人殷相聘也鄭以殷爲中惟取殷聘之文以解殷相聘之義正取殷文是同其年數則異故以此三年之聘爲殷聘也此經所云謂諸侯自相聘也而王制云諸侯之於天子比年一小聘三年一大聘五年一朝與此不同者此經諸侯相聘是周公制禮之正法王制所云謂文襄之法故不同也未必然十九還圭璋輕財重禮之義以圭璋聘重禮也巳聘而還圭璋此輕財而重禮之義也諸侯相厲以輕財重禮則民作讓矣注云圭瑞也尊圭璋之􅀋也用之還之皆爲重禮禮必親之不可以己之有遥復之也財謂璧琮享幣也受之爲輕財者財可遥復重賄反幣是也正義曰謂旣聘之後賔將歸時致此圭璋付與聘使而還其聘君也凡行聘禮之後享君用璧享夫人用琮圭璋玉之質惟玉而巳璧琮則重其華美加於束帛聘使旣了還以圭璋之玉重其禮故還之留其璧琮之財是輕其財故留之重者難可報覆故用夲物還之輕者易可酬償故更以它物贈之王國之君旣不親徃彼國則不以己國所有寳玉遥復償它國所來圭璋故還歸之也故云不可以己之有遥復之也復償也云財謂璧琮享幣也受之爲輕財者案聘禮享君以璧享夫人以琮享獻也謂所獻之幣主人受而不還是謂輕財也云財可遥復者解受璧琮之意璧琮是財輕可得以已物遥而復償於彼國賫來者己得受之二十圭璋璧琮聘享之義聘禮圭璋與璧琮相對故圭璋爲聘璧琮爲享􅀂諸侯之朝天子圭璋與璧琮皆爲享也皆爲財故小行人合六幣圭以馬璋以皮二王之後享天子用圭享后用璋則雖圭璋亦受之不歸也云重賄反幣是也者案聘禮云無行則重賄反幣注云無行謂獨來復無所之也廿一待客岀入皆三積主國待客出入三積者此謂上公之臣故岀入三積􅀂侯伯以下之臣則不致積也三積出亦三積故司儀云遂行如入之積是去之積如來時積也廿二餼客於舎陳五牢米禾等餼客於舎五牢之具陳於内者案聘禮致客有饔有餼今直云餼客者略言之於舎謂於賔舘也五牢之具謂飪一牢在賔舘西階也腥二牢在賔舘東階也餼二牢在賔舘門内之西是皆陳於内也米三十車禾三十車芻薪倍禾皆陳於外者案聘禮米三十車設于門東東陳禾三十車設於門西西陳薪芻倍禾也鄭注薪從米芻從禾乗禽日五􅀟者謂乗行羣匹之禽鴈鶩之屬聘卿則毎日致五􅀟也羣介皆有餼牢廿三凡待客文具掌客義見聘禮天子待諸侯之禮及諸侯相待之法賔主玉帛之節饔餼飱積之差米禾薪芻多少饗食牲牢隆殺皆文具掌客義見聘禮廿四酒清肉乾不敢飲食酒清人渴不敢飲也者此謂射禮也言欲射之時先行燕禮唯以禮獻酬不敢恣意醉飽但行禮而巳非謂全不得飲之聘禮行聘之時但酌醴禮賔無酒肴之事故知此唯據射也肉乾人飢而不敢食也者亦言不敢全食而令飽也日莫人倦齊莊正齊者謂日莫晚人斯懈倦猶齊莊而自整齊也而不敢解惰以成禮節者所以日莫猶自整齊者以不敢懈倦成就禮之節制此亦謂射禮也廿五君子比德於玉故貴之夫昔者君子比德於玉焉温潤而澤仁也縝宻以栗知也廉而不劌義也垂之如隊禮也叩之其聲清越以長其終詘然樂也瑕不揜瑜瑜不揜瑕忠也孚尹旁逹信也氣如白虹天也精神見于山川地也圭璋特逹德也天下莫不貴者道也詩云言念君子温其如玉故君子貴之也注云色柔温潤似仁也潤或爲濡縝緻也栗堅貌劌傷也義者不苟傷人也禮尚謙卑樂作則有聲止則無也越猶􅀭也詘絶止貌也樂記曰止如槀木瑕玉之病也瑜其中間美者玉之性善惡不相揜似忠也孚讀爲浮尹讀如竹箭之筠浮筠謂玉采色也采色旁逹不有隱翳似信也孚或作姇或爲扶精神亦謂精氣也虹天氣也山川地所以通氣也特逹謂以朝聘也璧琮則有幣惟有德者無所不逹不有湏而成也道者人無不由之言我也貴玉者以其似君子也廿六䘮服四制非記儀禮案鄭目録云名曰䘮服四制者以其記䘮服之制取於仁義禮知也此於別録舊􅀃屬䘮服鄭云舊􅀃案別録無䘮服四制之文唯舊􅀃稱此䘮服之篇屬䘮服然以上諸篇毎篇言義此不云䘮義而云䘮服四制者但以上諸篇皆記儀禮常篇之義故毎篇言義也此則記者別記䘮服之四制非記儀禮䘮服之篇廿七恩揜義義断恩門内之治恩揜義者以門内之親恩情旣多揜藏公義言得行私恩不行公義􅀂公羊傳云有三年之䘮君不呼其門是也門外之治義断恩者門外謂朝廷之間旣仕公朝當以公義断絶私恩若曽子問父母之䘮旣卒哭金革之事無辟是也廿八虞後沐浴祥鼓素琴正義曰沐謂將虞􅀕時也士虞記曰沐而不櫛故知沐謂將虞􅀕時虞後有事得沐浴也故雜記云非虞附練祥無沐浴云鼓素琴始存樂也於此祥日而鼓素琴始存省此樂縣而作樂在旣禫之後廿九杖爲爵者設杖者何也爵也者權制之中所以先明杖者以下有不應杖而杖又有應杖而不杖皆是權冝故先舉正杖於上言爵也者杖之所設本爲扶病而以爵者有德其恩必深其病必重故杖爲爵者而設故云爵也三日授子杖五日授大夫杖七日授士杖者上云杖者爵也遂歴叙其有爵之人故云三日授子杖五日授大夫杖七日授士杖三十梁闇不言闇謂廬書曰髙宗諒闇三年不言善之也注云諒古作梁楣謂之梁闇讀如鶉䳺之䳺闇謂廬也廬有梁者所謂柱楣也正義曰諒讀曰梁闇讀曰䳺謂廬也謂旣虞之後施梁而柱楣故云梁闇之中三年不言政事善之者言是古人載之於書美善之故也釋音孔安國讀爲諒隂信也也三一君居䘮不言臣言不文三年之䘮君不言者是記者引古禮三年之䘮君則不言國事書云髙宗諒闇三年不言此之謂也者此記者引書髙宗所行中節是君不言之事故云此之謂也然而曰言不文者謂臣下也者是記者旣稱古禮君不言故又云言不文故記者復解云言不文者謂臣下也禮記要義卷第三十三終
