body:
  text: 八司射告賔主以投壷之法行爵立馬請賔曰順投爲入比投不釋勝飲不勝者正爵旣行請爲勝者立馬一馬從二馬三馬旣立請慶多馬請主人亦如之注云請猶告也順投矢夲入也比投不拾也勝飲不勝言以能養不能也正爵所以正禮之爵也或以罰或以慶馬勝筭也謂之馬者􅀂云投藝如此任爲將帥乗馬也射投壷皆所以習武因爲樂正義曰此一經明司射告賔主以投壷之法順投爲入者司射執八筭起而告賔黨爲投壷之法也順夲也言矢有本末投矢於壷以矢夲入者乃名爲入則爲之釋筭也􅀂矢以末入則不名爲入亦不爲之釋筭也比投不釋者比頻也又賔主投壷法要更遞而投不得以前旣入喜恱不待後人投之而已頻頻投雖入亦不爲之釋筭也一馬從二馬者毎一勝輙立一馬禮以三馬爲成􅀂專三馬則爲一成但勝偶未必專頻得三􅀂勝偶得二劣偶得一旣劣於二故徹取劣偶之一以足勝偶之二爲三故云一馬從二馬然定夲無此一句三馬旣立請慶多馬者􅀂頻得三成或取彼足爲三馬是其勝已成又酌酒慶賀於多馬之偶也九弦者奏貍首與郷射小異命弦者曰請奏貍首間􅀂一大師曰諾注云弦鼓瑟者也貍首詩篇名也今逸射義所云詩曰曽孫侯氏是也間􅀂一者投壷當以爲志取節焉正義曰案郷射三畨􅀄一畨耦射不釋筭第二畨釋筭未作樂第三畨乃用樂此投壷發􅀄則用樂者以投壷禮輕主於歡樂故也十司射釋獲如數射筭卒投司射執筭曰左右卒投請數二筭爲純一純以取一筭爲竒遂以竒筭告曰某賢於某􅀂干純竒則曰竒鈞則曰左右鈞注云卒巳也賔主之黨畢巳投司射又請數其所釋左右筭如數射筭一純以取實於左手十純則縮而委之毎委異之有餘則横諸純下一筭爲竒竒則縮諸純下兼斂左筭實於左手一純以委十則異之其他如右獲畢則司射執竒筭以告於賔與主人也􅀂告云某賢於某者未斥主黨勝與賔黨勝與以勝爲賢尚枝藝也鈞猶等也等則左右手各執一筭以告正義曰云如數射筭者以投壷之􅀋故知此數投壷之筭如數射筭云一純以取至其他如右獲此皆郷射之禮文也一純以取實於左手謂就地上之筭以右手毎一純別而取實於左手云十純則縮而委之每委異之者滿十純則從而委之於地司射東靣則東西爲縮每十雙則東西縮爲一委毎有十雙更别委之故云每委異之云有餘則横諸純下者有餘謂不滿十雙或八雙九雙以下則横於純下謂横在十純之西南北置之云一筭爲竒竒則縮諸純下者􅀂唯有一筭則縮之零純之下在零純之西東西置之此謂數右筭之法􅀂數左筭則異於右筭謂揔歛地之筭實於左手之中毎一純取以委地滿十則異之謂滿十純揔爲一委云其他如右獲者謂所縱所横如右獲也十一酌者飲者之節命酌曰請行觴酌者曰諾當飲者皆跪而奉觴曰賜灌勝者跪曰敬養注曰司射又請於賔與主人以行正爵酌者勝黨之弟子酌者亦酌奠於豐上不勝者坐取乃退而跪飲之灌猶飲也言賜灌者服而爲尊敬辭也周禮曰以灌賔客賜灌敬養各與其偶於西階上如飲射爵十二投壷立三馬與郷射立耦小異正爵旣行請立馬馬各直其筭一馬從二馬以慶慶禮曰三馬旣備請慶多馬賔主皆曰諾注云飲不勝者畢司射又請爲勝者立馬當其所釋筭之前三立馬者投壷如射亦三而止也三者一黨不必三勝其一勝者并其馬於再勝者以慶之明一勝不得慶也飲慶爵者偶親酌不使弟子無豐正義曰一馬從二馬者投壷與射禮同亦三畨而止每畨勝者則立一馬假令賔黨三畨俱勝則立三馬或賔黨兩勝而立二馬主黨一勝但立一馬即以主黨從就賔黨二馬以少足益於多以助勝者爲榮案郷射禮􅀄畨三耦射但唱獲而巳未釋筭亦未飲不勝者第二畨耦射畢賔主之黨皆射畢乃數筭飲不勝者第三畨三耦及賔主等皆射中鼓節乃爵筭飲罰爵今投壷􅀄則不立三耦唯賔主三畨而止十三矢長短壷廣狹席逺近籌室中五扶堂上七扶庭中九扶筭長尺二寸壷頸脩七寸腹脩五寸口徑二寸半容斗五􅂛壷中實小豆焉爲其矢之躍而岀也壷去席二矢半矢以柘若􅁄毋去其皮注曰籌矢也鋪四指曰扶一指案寸春秋傳曰膚寸而合投壷者或於室或於堂或於庭其禮䙝隨晏早之宜無常處其節三扶可也或曰筭長尺有握握素也脩長也腹容斗五􅂛三分益一則爲二斗得圜囷之象積三百二十四寸也以腹脩五寸約之所得求其圜周圜周二尺七寸有竒是爲腹徑九寸有餘也實以小豆取其滑且堅以柘􅁄取其堅且重也舊􅀃云矢大七分或言去其皮節正義曰今檢鄭之文注之意以二斗整數計之不取經文斗五􅂛之義故云圜周二尺七寸有竒今筭者以其二尺七寸之圍必受斗五􅂛之物數不相㑹也云壷體腹之上下各漸減殺苟欲望合恐非鄭意十四魯薛令弟子辭魯令弟子辭曰毋幠毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子辭曰毋幠毋敖毋偝立毋踰言􅀂是者浮注云弟子賔黨主黨年穉者也爲其立堂下相䙝慢司射戒令之記魯薛者禮衰乖異不知孰是也幠敖慢也偝立不正郷前也踰言逺談語也常爵常所以罰人之爵也浮亦謂是也晏子春秋曰酌者奉觴而進曰君令浮晏子時以罰梁丘據浮或作匏或作符踰或爲􅁋十五魯薛投壷射禮皷節取半以下爲投壷禮盡用之爲射禮注云此魯薛擊鼓之節也圜者擊鼙方者擊鼔古者舉事鼓各有節聞其節則知其事矣投壷之鼔半射節者投壷射之細也射謂燕射十六投壷有賔主黨司射庭長及冠士立者皆屬賔黨樂人及使者童子皆屬主黨注云庭長司正也使者主人所使薦羞者樂人國子能爲樂者此皆與於投壷正義曰庭長司正也冠士者謂外人來觀投壷成人加冠之士尊之故令屬賔黨􅀂童子賤則屬主黨也云樂人國子能爲樂者以國子習樂故云國子能爲樂者欲明此樂人非瞽矇視瞭之徒以其能與主人之黨而觀禮故知非作樂瞽人也案國子是王子公卿大夫元士之子今來觀樂士大夫投壷者以國之俊選皆在學習樂共士子來觀投壷十七衣少所居服冠長所居冠丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也郷丘不知儒服注云逢猶大也大掖之衣大􅃑禪衣也此君子有道藝者所衣也孔子生魯長而之宋而冠焉宋其祖所出也衣少所居之服冠長所居之冠是之謂郷言不知儒服非哀公意不在於儒乃今問其服庶人禪衣袂二尺二寸祛尺二寸正義曰庶人禪衣􅃑二尺二寸者庶人無朝􅀕之事故知禪衣􅃑二尺二寸云祛尺二寸者玉藻文言深衣之制如此今夫子著禪衣與庶人同其􅃑大與庶人異故謂衣爲逢掖也則此大􅃑深衣也長居宋冠章甫之冠言夫子生於魯長於宋魯有大􅃑禪衣宋有章甫之冠故知大􅃑之衣是少所居之服也章甫之冠是長所居之冠案曲禮云去國三丗唯興之日從新國之法孔子曽祖防叔防叔生木金木金生伯夏伯夏生良紇良紇生孔子防叔奔魯至孔子五丗應從魯冠而猶著殷章甫冠者以丘爲制法之主故有異於人所行之事多用殷禮不與㝷常同也且曲禮從新國之法秪謂禮儀法用未必衣服盡從也禮臣朝於君應著朝服而著常服者時孔子自衞新還哀公館之非是常朝故衣冠異也十八麤而翹之又不急爲陳言而伏静而正之上弗知也麤而翹之又不急爲也注云麤猶䟽也微也君不知己有善言正行則觀色縁事而微翹發其意使知之又必舒而脫脫焉巳爲之疾則君納之速君納之速怪妬所由生也十九孔子作儒行自衞反魯時今衆人之命儒也妄常以儒相詬病孔子至舎哀公館之聞此言也言加信行加義終没吾丗不敢以儒爲戲注云妄之言無也言今丗名儒無有常人遭人名爲儒而以儒靳故相戲此哀公輕儒之所由也詬病猶恥辱也儒行之作蓋孔子自衞􅀄反魯時也孔子歸至其舎哀公就而以禮館之問儒服而遂問儒行乃始􅁴焉言没丗不敢以儒爲戲當時服二十歷叙孔子不遇案史記孔子丗家云在魯哀公不用在齊犂鉏所毁入楚子西所譛適􅀳趙鞅欲害伐樹於宋削跡於衞畏匡厄陳則身􅀍辱累多矣鄭以其如此故釋云不以慁累閔病而違道云孔子自謂也禮記要義卷第三十
