  text: 禮記要義卷第二十五􅀕統
  hash: sha256:92b65059d5501d4f6eb11a46513f5c4ab780f3eeb6d3bc72d3ef14ca4cbb85fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_024-1a}
body:
  text: 一祭非自外至心􅇶而奉之以禮夫祭者非物自外至者也自中出生於心也心􅇶而奉之以禮是故唯賢者能盡祭之義注云􅇶感念親之貌也正義曰自猶從也言孝子祭親非假他物從外至於身使巳爲之但從孝子身中出生於孝子之心也二請玉女共事宗社此求助之本國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也注云言玉女者美言之也君子於玉比德焉三盡物盡志身致其誠信水草之菹陸産之醢小物備矣三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣凢天之所生地之所長茍可薦者莫不咸在示盡物也外則盡物内則盡志此祭之心也是故天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也注云水草之菹芹􅈋之屬陸産之醢蚳蝝之屬天子之祭八簋昆蟲謂温生寒死之蟲也内則可食之物有蜩范草木之實蓤芡榛栗之屬咸皆也純服亦冕服也玄言之爾純以見繒色冕以著祭服東郊少陽諸侯象也夫人不蠶於西郊婦人禮少變也齊或作粢四鄭讀純有二義文與音亦不同正義曰純服亦冕服也者天子云純諸侯言冕冕祭服故知純亦是祭服天子言衣色諸侯亦有衣色是其互也鄭氏之意凢言純者其義有二一絲旁才是古之緇字二是絲旁屯是純字但書文相亂雖是緇字並皆作純鄭氏所注於􅁝理可知於色不明者即讀爲緇即論語云今也純儉及此純服皆讀爲黒色􅀂衣色見絲文不明者讀純以爲絲也五君夫人散致齊及祼薦之節君致齊於外夫人致齊於内者外謂君之路寢内謂夫人正寢是致齊並皆於正寢其實散齊亦然但此文對㑹於大廟故云君致齊於外夫人致齊於内耳然後㑹於大廟者祭曰君與夫人俱至大廟之中廟即始祖廟也夫人副禕立於東房者副及禕后之上服魯及二王之後夫人得服之侯伯夫人揄狄子男夫人闕狄而並立東房以俟行事尸旣入之後轉就西房故禮器云夫人在房雖不云東西房下云夫人東酌罍尊則知夫人在房謂西房也大宗執璋瓉亞祼者大宗主宗廟禮者以亞祼之禮夫人親爲之此不云夫人而云大宗者記有廣言容夫人有故故大宗伯代夫人行禮執璋瓉亞祼之禮圭瓉璋瓉並是祼器也以圭璋爲柄酌鬱鬯曰祼也宗婦執盎齊從夫人而來奠盎齊於位夫人乃就盎齊之尊酌此涗齊而薦之者因盎齊有明水連言水耳夫人薦豆者於君羞嚌之時夫人薦此饋食之豆六重祼重升歌重武宿夜夫祭有三重焉獻之屬莫重於祼聲莫重於􅂛歌舞莫重於武宿夜此周道也凡三道者所以假於外而以増君子之志也故與志進退志輕則亦輕志重則亦重注云武宿夜武曲名也周道猶周之禮正義曰舞莫重於武宿夜者武宿夜是武曲之名是衆舞之中無能重於武宿夜之舞皇氏曰師􅀃書傳云武王伐紂至於商郊停止宿夜士卒皆歡樂歌舞以待旦因名焉武宿夜其樂亡也熊氏云此即大武之樂也七尸亦餕􅀑神之餘是故古之君子曰尸亦餕􅀑神之餘也者又引古言證餕義也言亦者亦人餕尸之餘乃是人食尸餘而云尸亦餕􅀑神餘者􅀂王侯􅀄薦毛血燔燎是薦於􅀑神至薦孰時尸乃食之是尸餕􅀑神之餘􅀂大夫士隂厭亦是先薦􅀑神而後尸乃食亦尸餕􅀑神餘八二簋留陽厭四簋餕是故以四簋􅁰見其脩於廟中也者謂餕之時君與三卿以四簋之􅁰脩整普徧也所以用四簋多􅁰而餕者欲見其恩惠脩整徧於廟中諸侯之祭有六簋今云以四簋者以二簋留爲陽厭之祭故以四簋而餕簋有􅁰稷特云􅁰者見其美舉􅁰稷可知也九君子事君恕已乃行之是故君子之事君也必身行之所不安於上則不以使下所惡於下則不以事上非諸人行諸已非教之道也注云必身行之言恕已乃行之十設同几詔祝於室出于祊鋪筵設同几爲依神也詔祝於室而出于祊此交神明之道也注云同之言詷也祭者以其妃配亦不特几也詔祝告事於尸也岀於祊謂索祭也正義曰設之曰筵坐之曰席同之言詷詷共也言人生時形體異故夫婦別几死則䰟氣同歸於此故夫婦共几鋪席設几使神依之設此夫婦所共之几席亦共之必云同几者筵席旣長几則短小恐其各設故特云同几詔祝於室者詔告也祝祝也謂祝官以言詔告祝請其尸於室求之而岀于祊者謂明日繹祭而出廟門旁廣求神於門外之祊古文字林皆訓詷爲共是漢魏之時字義如此是以讀同爲詷今則揔爲一字云祭者以其妃配者儀禮少牢文謂祭夫祝辭云以某妃配云亦不特几也者謂不但不特設辭亦不特設其几謂祝辭與几皆同於夫不特設也故鄭注司几筵云祭於廟同几精氣合也十一尸用同姓適孫父北靣事之一云西靣夫祭之道孫爲王父尸所使爲尸者於祭者子行也父北靣而事之所以明子事父之道也此父子之倫也注云子行猶子列也祭祖則用孫列皆取於同姓之適孫也天子諸侯之祭朝事延尸於户外是以有北靣事尸之禮正義曰以少牢特牲尸皆在室之奥主人西靣事之無北靣事尸之禮故知是天子諸侯也十二酳尸獻賔之節尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等也注云尸飲五謂酳尸五獻也大夫士祭三獻而獻賔正義曰此據備九獻之禮者至主人酳尸故尸飲五也凡􅀕二獻祼用鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸此等皆尸飲之故云尸飲五於此之時以獻卿獻卿之後乃主婦酳尸酳尸畢賔長獻尸是尸飲七也乃瑶爵獻大夫是正九獻禮畢但􅀄二祼不飲故云尸飲七自此以後長賔長兄弟更爲加爵尸又飲二是并前尸飲九主人乃散爵獻士及羣有司也此謂上公九獻故以酳尸之一獻爲尸飲五也􅀂侯伯七獻朝踐饋食時各一獻食訖酳尸但尸飲三也子男五獻食訖酳尸尸飲一云大夫士祭三獻而獻賔者欲明諸侯獻賔時節與大夫士獻賔不同知大夫士祭三獻而獻賔者特牲禮文下大夫不賔尸與士同亦三獻而獻賔知者有司徹文其上大夫別行賔尸之禮此異也十三尸主有昭穆主賔亦爲昭穆有事於大廟則羣昭羣穆咸在而不失其倫此之謂親䟽之殺也注云昭穆咸在同宗父子皆來正義曰父南靣子北靣親者近䟽者逺又各有次序是故有事於大廟則羣昭羣穆咸在者祭大廟之時則衆廟尸主皆來及助祭之人同宗父子皆至則羣昭穆咸在􅀂不於大廟餘廟之祭唯有當廟尸主及所出之廟子孫來至不得羣昭羣穆咸在也而不失其倫者尸主旣有昭穆故主人及衆賔亦爲昭穆列在廟不失倫􅀋十四賜爵禄於太廟所命者北靣受古者明君爵有德而禄有功必賜爵禄於大廟示不敢專也故祭之日一獻君降立于阼階之南南郷所命北靣史由君右執䇿命之再拜稽首受書以歸而舎奠于其廟此爵賞之施也注云一奠一酳尸也舎當爲釋聲之誤也非時而祭曰奠正義曰經云一獻知非􅀄祼及朝踐饋食之一獻必爲一酳尸者以一酳尸之前皆爲祭事承奉􅀑神未暇䇿命而尸食巳畢祭事方了始可以行其爵賞及賜勞臣下此一獻則上尸飲五君獻卿之時也􅀂天子命羣臣則不因常祭之日特假於廟故大宗伯云王命諸侯則儐注云王將岀命假祖廟立依前南郷是也十五夫婦授受不襲處不承爵夫人薦豆執校者校謂豆之中央直者夫人薦豆之時手執此校執醴授之執鐙者鐙謂豆下跗夫人薦豆之時此執醴之人以豆授夫人之時則執豆之下跗夫人授之乃執校也尸酢夫人執柄者爵爲雀形以尾爲柄夫人獻尸尸酢夫人尸則執雀尾授夫人也夫人爲尸執足者夫人授酢於尸則執爵足也夫婦相授受不相襲處者謂夫婦交相致爵之時襲因也其執之物不相因故處􅀂夫婦交相致爵不得執故處以明男女有別酢必易爵者謂夫婦交相致爵之時主人受主婦之酢易換其爵故特牲主人受主婦之酢爵更爵酢鄭注云主人更爵自酢男子不承婦人爵十六俎以骨爲主前貴於後凡爲俎者以骨爲主骨有貴賤殷人貴髀周人貴肩凡前貴於後俎者所以明祭之必有惠也注云殷人貴髀爲其厚也周人貴肩爲其顯也凡前貴於後謂脊脅臂臑之屬十七旅酬時賜助祭者爵昭穆各齒凡賜爵昭爲一穆爲一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長㓜有序注云昭穆猶特牲少牢饋食之禮衆兄弟也羣有司猶衆賔下及執事者君賜之爵謂􅀂酬之正義曰謂祭祀旅酬時賜助祭者酒爵故云賜爵特牲饋食禮􅀄有主人獻衆賔兄弟之禮後乃旅酬衆賔兄弟此經直云賜爵知非獻時而特云酬者以獻時不以昭穆爲次者此云昭與昭齒穆與穆齒當旅酬之事故知賜爵爲酬十八􅂌煇胞翟閽至尊不忘至賤祭有􅂌煇胞翟閽者惠下之道也煇者甲吏之賤者也胞者􅁏吏之賤者也翟者樂吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊旣祭之末而不忘至賤而以其餘􅂌之注云煇周禮作韗謂韗磔皮革之官也翟謂教羽舞者也古者不使刑人守門謂夏殷時正義曰古者不使刑人守門者此作記之人以見周刑人守門以祭末又得恩賜與刑人故明之云古者夏殷之時不使刑人守門雖是賤人所以得恩賜十九禘發爵賜服嘗出田邑等古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也故記曰甞之日發公室示賞也草艾則墨未發秋政則民弗敢草也注云言爵命屬陽國地屬隂發公室出賞物也草艾謂艾取草也秋草木成可芟艾給爨亨時則始行小刑也二十義章雖不親祭於義不失夫義者所以濟志也諸德之發也是故其德盛者其志厚其志厚者其義章其義章者其祭也敬祭敬則竟内之子孫莫敢不敬矣是故君子之祭也必身親涖之有故則使人可也雖使人也君不失其義者君明其義故也注云濟成也發謂機發也竟内之子孫萬人爲子孫涖臨也君不失其義者言君雖不自親祭祭禮無闕於君德不損也卄乙秋賜侯氏車服等四時皆有賞正義曰案左傳云賞以春夏刑以秋冬此嘗之日發公室示賞者文各有所對以賞對刑則賞屬春夏刑屬秋冬其實四時之間皆有賞故車服屬夏田邑屬秋岀田邑之時亦有物也故覲禮秋時賜侯氏車服及篋服也卄二觀銘旣美所稱又美所爲君子之觀於銘也旣美其所稱又美其所爲爲之者明足以見之仁足以與之知足以利之可謂賢矣賢而勿伐可謂恭矣注云美其所爲美此人爲此銘明足以見之見其先祖之美也仁足以與之與其先祖之銘也非有仁恩君不使與之也知足以利之利己名得比於先祖正義曰所稱謂先祖也所爲謂巳身行業也君子有德之士觀銘必見此二事之美爲之者謂爲銘之人也卄三衛莊公䇿命孔悝稱其祖之美公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射注曰叔舅者公爲䇿書尊呼孔悝而命之也乃猶女也莊叔悝七丗之祖衛大夫孔逹也隨難者謂成公爲晉文公所伐出奔楚命莊叔從焉漢楚之川也即宫於宗周後反得國坐殺弟叔武晉人執而歸之於京師寘之深室也射厭也言莊叔常奔走至勞苦而不厭倦也周旣去鎬京猶名王城爲宗周也卄五孔悝對􅀭君命施于烝彞鼎悝拜稽首曰對揚以辟之勤大命施于烝彞鼎此衛孔悝之鼎銘也注云對遂也辟明也言遂揚君命以明我先祖之德也施猶著也言我將行君之命又刻著於烝祭之彞鼎彞尊也周禮大約劑書於宗彞言銘之􅀋衆多也略取此一以言之卄六蒯聵孔悝雖無令德於禮是古之君子論譔其先祖之美而明著之後丗者也以比其身以重其國家如此注云如莊公命孔悝之爲也莊公孔悝雖無令德以終其事於禮是行之非卄七康周公故賜魯以重祭昔者周公旦有勲勞於天下周公旣没成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也注云言此者王室所銘􅀂周公之功清廟頌文王之詩也管象吹管而舞武象之樂也朱干赤盾戚斧也此武象之舞所執也佾猶列也大夏禹樂文舞也執羽籥文武之舞皆八列互言之耳康猶褒大也易晉卦曰康侯用錫馬禮記要義卷第二十五
