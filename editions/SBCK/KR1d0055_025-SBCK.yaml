front:
  text: 禮記要義卷第二十六經解至方記一辨昬姻二字正義曰案爾雅釋親云壻之父爲姻婦之父爲㛰此云壻曰昬妻曰姻者爾雅據男女父母此據男子之身壻則昬時而迎婦則因而隨之故云壻曰昬妻曰姻二䟽以差􅀂豪􅈊爲易繫文易曰君子慎始差􅀂豪􅈊繆以千里此之謂也正義曰易曰君子慎始差􅀂豪􅈊繆以千里此之謂也者此易繫辭文也言君子謹慎事之􅀄始差錯􅀂豪􅈊之小至後廣大錯繆以至千里之大引之者證禮之防人在於未形者之前
