body:
  text: 二主人無親受􅉠非尸柩之事不親􅉠者旣致命坐委之擯者舉之主人無親受也注云䘮者非尸柩之事不親也舉之舉以東正義曰吉時􅀂人饋物主人皆自拜受之􅀂有䘮主於哀戚凡有四方使者以物􅉠己悉不得拜受故使擯者受舉之而巳知舉以東者雜記云含者入升堂致命坐委于殯東南宰夫朝服即䘮屨升自西階西面坐取璧降自西階以東後禭者􅉠者並然而升堂致命是告殯之辭也􅀂􅉠生人則致命擯者不告殯而不升堂然車馬不舉以東而鄭云舉以東者謂幣之屬也三不疑不度不願不訾四事不疑在躬者旣問主人之道藝則巳亦當習學明了不得使疑事在其躬而爲賔爲主皆然也不度民械者謂爲客至主人之家不得度民家所有器械使已亦有也不願於大家者大家謂冨貴廣大之家謂大夫之家也謂士徃於卿大夫之見彼冨大不可願斆之也非分而願必有亂心也不訾重器者訾思也重器寳珍之物主謂客至主人之家見有珍物重器不可思玩之􅀂思玩之則憎疾已貧賤生淫亂濫惡也䟽四婦人以肅拜爲正凶事乃手拜婦人吉事雖有君賜肅拜爲尸坐則不手拜肅拜爲䘮主則不手拜注云肅拜拜低頭也手拜手至地也婦人以肅拜爲正㐫事乃手拜耳爲尸爲祖姑之尸也士虞禮曰男男尸女女尸爲䘮主不拜手者爲夫與長子當稽顙也其餘亦手拜而巳雖或爲唯或曰䘮爲主則不手拜肅拜也五虞祭婦人爲祖姑作尸爲尸坐者謂虞祭婦人爲祖姑作尸也周禮坐尸嫌婦人或異故明之也􅀂平常祭無婦人之尸示主於夫故設同几而巳六昬禮婦拜扱地穆嬴頓首云婦人以肅拜爲正者言肅拜是婦人之常而昬禮婦拜扱地以其新來爲婦盡禮於舅姑故也左傳穆嬴頓首於宣子之門者有求於宣子非禮之正也云凶事乃手拜耳者言婦人除爲䘮主其餘輕䘮凶事乃有手拜耳鄭知然者以經云爲䘮主則不手拜明不爲䘮主則手拜七祭無跣燕有跣凡祭於室中堂上無跣燕則有之注云祭不跣者主敬也燕則有跣爲歡也天子諸侯祭有坐尸於堂之禮祭所尊在室燕所尊在堂將燕降􅀃屨乃升堂八貳車佐車倅車乗貳車則式佐車則否注云貳車佐車皆副車也朝祀之副曰貳戎獵之副曰佐魯莊公敗于乾時公䘮戎路傳乗而歸正義曰貳車云式主敬故謂朝祀之副曰貳佐車不式主武故云戎獵之副曰佐􅀂戎獵相對則戎車之副曰倅田車之副曰佐故周禮戎僕馭倅車田僕馭佐車熊氏曰此云戎獵之副曰佐者據諸侯禮也九有爵者乗馬服車不齒有貳車者之乗馬服車不齒注云尊有爵者之物廣敬也服車所乗車者車有新舊正義曰不敢齒次論其年歳評其價數髙下以尊者之物也十恭敬哀詡恭貌而敬心賔客主恭祭祀主敬䘮事主哀㑹同主詡注云恭在貌也而敬又在心詡謂敏而有勇􅀂齊國佐正義曰成二年左傳齊晉戰於鞌齊國佐陳辭以拒晉師是敏而有勇也十一冬時陽氣在魚腹夏在脊冬右􅃾者􅃾謂魚腹冬時陽氣下在魚腹故右􅃾夏右鰭者鰭謂魚脊夏時陽氣上在魚脊故右鰭凡陽所在之處肥美故進魚使嚮右以右手取之便也十二車旁凡爲軓車旁九爲軌案周禮大馭祭兩軹祭􅁤此云祭左右軌范兩文不同則左右􅁤與兩軹是一故云軓與軹於車同謂轊頭謂車轂小頭也此云范大馭云􅁤兩事是一聲同字異故云聲同謂式前之範與此范俱是式前也但式前之軓車旁著凡或作範字聲同而字異即詩邶風濟􅄹不濡軓亦車旁凡與此同也􅀂轂末之軌則車旁著九此經左右􅁤是也其車轍亦謂之􅁤亦車旁著九則考工記經涂九軌十三不食豢􅃾謂豬犬腸君子不食圂􅃾注云周禮圂作豢謂犬豕之屬食米榖者也􅃾有似於人穢正義曰􅃾豬犬腸也言豬犬亦食米榖其腹與人相似故君子但食他處辟其􅃾謂腸胃也故鼎闕一也十四設尊折爼行爵嘗羞之儀尊者以酌者之左爲上尊尊壷者面其鼻飲酒者禨者醮者有折爼不坐未歩爵不嘗羞注云尊者設尊者也酌者郷尊其左則右尊也鼻在面中言郷人也折爼尊徹之乃坐也巳沐飲曰機酌始冠曰醮歩行也正義曰􅁃云燕禮司宫尊于東楹之西兩方壷左􅀇酒南上注玉藻云唯君面尊􅀇酒在南順君之面也下云公席阼階上西郷下又云執幂者升自西階立于尊南北面東上案左􅀇酒南上之言是設尊者東郷酌者西郷設者之右則酌者之左也又曰此謂無筭爵之時􅀂正羞脯醢折爼未飲則嘗之見郷飲十五食飲勿氣辟咡洗盥執食飲者勿氣有問焉則辟咡而對注云示不敢歆臭也口旁曰咡十六國家靡敝减損車服器馬國家靡敝則車不雕幾甲不組縢食器不刻鏤君子不履􅁝屨馬不常秣注云靡敝賦稅亟也雕畫也幾附纒爲沂鄂也組縢以組飾之及紟帶也詩云公徒三萬貝胄朱綅亦鎧飾也十七注䟽以刀禾枕皆有頴義云頴警枕也者以經枕外別言頴是頴發之義故爲警枕刀卻刃授頴言授人以刀卻仰其刃授之以頴頴謂刀鐶也言以刀鐶授之頴是頴發之氣刀之在手謂之爲頴禾之秀穗亦謂之爲頴枕之警動亦謂之頴其事雖異大意同也十八燕食所進魚體與祭祀饗食正禮異此濡魚進尾乾魚進首及右􅃾右鰭之屬皆謂㝷常燕食所進魚體非祭祀及饗食正禮也􅀂祭祀魚在於爼皆縮載爼旣橫設魚則隨爼而從於人爲橫無進首進尾之理故少牢魚用鮒而爼縮載其主人正饗亦然公食大夫禮魚七縮爼是也正祭魚旣縮載少牢主人獻祝佐食三魚一橫之彼是正􅀕魚橫者以魚與牲體共爼故特橫之殊於牲體也􅀂天子諸侯繹祭及卿大夫儐尸魚則橫載之於爼爼在人前而橫魚則於人爲從得有進首尾也故有司徹云尸爼五魚橫載之侑主人皆一魚亦横載之彼注云橫載之有異於牲體如鄭此言正祭之時牲體橫而魚縮載儐尸之時牲體縮而魚横載之故云橫載之者異於牲體也正祭則右首進􅃾故少牢魚右首進􅃾變於主人􅀂生人右首進鰭故公食大夫云寢右注云右首也寢右進鰭也乾魚近􅃾多骨鯁案特牲少牢魚皆十有五鄭云從隂􅀋昬禮魚有十四減一從偶數士䘮禮大斂及士虞禮及公食禮魚皆七其天子諸侯魚數禾聞祭膴者膴謂刳魚腹下爲大臠此處肥美故食魚則刳取以祭先也卄一未有燭告後至者執燭不讓不辤不歌其未有燭而有後至者則以在者告道瞽亦然注爲其不見意欲知之也師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯凡飲酒爲獻主者執燭抱燋客作而辭然後以授人爲宵言也主人親執燭敬賔示不倦也言獻主者容君使宰夫也未􅅡曰燋執燭不讓不辭不歌以燭繼晝禮殺正義曰凡飲酒爲獻主者獻主主人也謂爲飲酒主人法也凡飲酒主人自獻賔􅀂尊卑不敵則使宰夫爲主人以獻賔故云爲獻主也執燭者謂夜闇執燭抱燋者燋謂未􅅡之炬旣欲留客又取未然之炬抱之也客作而辭主人見客起辤故從辤而止以燭乃授己執事之人執燭不讓不辭不歌者執燭夜時也禮賔主有讓及更相辭謝又各歌詩相顯德今旣夜莫所以殺於三事禮記要義卷第十七
