front:
  text: 禮記要義卷第十七少儀一適有䘮者曰比曰聽事適有䘮者曰比童子曰聽事注云適之也曰某願比於將命者比猶比方俱給事曰某願聽事於將命者童子未成人不敢當相見之禮正義曰此謂徃適者䘮家也比比方也䘮不主相見凡徃者皆是助事故云比謂比方其年力以給䘮事也􅀂五十從反哭四十待􅄹坎皆是比方其事故鄭云比謂比方俱給事故辭云願比於將命者也
  hash: sha256:b10500a1241b75bfc151fb76b08a99a941ebcd0e0c028d4a14b2c3ad376654ed
