front:
  text: 禮記要義卷第十六大傳
  hash: sha256:d2af007608a2019a93848721eb15b57d018049912fada231bece241cea10724b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_015-1a}
body:
  text: 一王者諸侯大夫士禘祫之尊禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其大祖大夫士有大事省於其君干祫及其髙祖注云凡大􅀕曰禘自由也大􅀕其先祖所由生謂郊祀天也太祖受封君也大事㓂戍之事也省善也善於其君謂免於大難也于猶空也空祫謂無廟祫􅀕之於壇墠二武王柴祈奠牧之野武王之大事也旣事而退柴於上帝祈於社設奠於牧室注云柴祈奠告天地及先祖也牧室牧野之室也古者郊􅀜皆有館焉先祖者行主也三追王不以卑臨尊然亦有不必追王者追王大王亶父王季歴文王昌不以卑臨尊也注云不用諸侯之號臨天子也文王稱王早矣於殷猶爲諸侯於是著焉正義曰案此武王追王大王亶父王季歴文王昌案合符后云文王立后稷配天追王大王亶甫王季歴與此不同者文王暫追王耳號謚未定至武王時乃定之矣中庸云周公追王大王王季者謂以王禮改葬耳不改葬文王者先以王禮葬故也此大王王季追王者王迹所由興故追王也所以追王者以子爲天子而不以卑臨尊􅀂非王迹所由不必追王也故小記云父爲士子爲天子諸侯􅀕以天子諸侯其尸服以士服是也周語云先王不窋武成云先王建􅀖啓土謂后稷皆稱先王者以王者之先祖故通稱先王也契稱􅀇王與此同矣五賜姓賜氏賜族之別凡姓族異者所以別異人也猶萬物皆各有名以相分別天子賜姓賜氏諸侯但賜氏不得賜姓降於天子也故隱八年左傳云無駭卒公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字爲謚因以爲族官有丗功則有官族邑亦如之以此言之天子因諸侯先祖所生賜之曰姓杜預云􅀂舜生嬀汭賜姓曰嬀封舜之後於陳以所封之土命爲氏舜後姓嬀而氏曰陳故鄭駮異義云炎帝姓姜大皡之所賜也黃帝姓􅁎炎帝之所賜也故堯賜伯夷姓曰姜賜禹姓曰姒賜契姓曰子賜稷姓曰􅁎著在書傳如鄭此言是天子賜姓也諸侯賜卿大夫以氏􅀂同姓公之子曰公子公子之子曰公孫公孫之子其親巳逺不得上連於公故以王父字爲氏􅀂適夫人之子則以五十字伯仲爲氏􅀂魯之仲孫季孫是也􅀂庶子妾子則以二十字爲氏則展氏臧氏是也􅀂異姓則以父祖官及所食之邑爲氏以官爲氏者則司馬司城是也以邑爲氏者􅀂韓趙魏是也凡賜氏族者此爲卿乃賜有大功德者生賜以族􅀂叔孫得臣是也雖公子之身􅀂有大功德則以公子之字賜以爲族􅀂仲遂是也其無功徳死後乃賜族􅀂無駭是也􅀂子孫不爲卿其君不賜族子孫自以王父字爲族也氏族對之爲別散則通也故左傳云問族於衆仲下云公命以字爲展氏是也其姓與氏散亦得通故春秋有姜氏子氏姜子皆姓而云氏是也六弟妻亦謂之婦嫂不謂之母凡子行之妻乃謂之爲婦弟非子行其妻亦謂之婦者以兄弟同倫嫌相褻瀆弟雖非子行其妻同子行之妻謂之爲婦欲卑逺之弟妻旣得爲婦號記者恐兄妻得爲母號故記者明之云是嫂亦可謂之母乎言嫂不可亦謂之爲母也七姓丗所由生有正姓有庶姓四丗而緦服之窮也五丗􅃝免殺同姓也六丗親屬竭矣其庶姓別於上而戚單於下昏姻可以通乎繫之以姓而弗別綴之以食而弗殊雖百丗而昬姻不通者周道然也注云四丗共髙祖五丗髙祖昆弟六丗以外親盡無屬名通乎問之也􅀇孫之子姓別於髙祖五丗而無服姓丗所由生周之禮所建者長也姓正姓也始祖爲正姓髙祖爲庶姓繫之弗別謂􅀂今宗室屬籍也周禮小史掌定繫丗辨昭穆正義曰玄孫與髙祖服屬仍同其姓與髙祖不異玄孫之子則從兄弟承髙祖父之後至已五丗而無服各事小宗因字因官爲氏不同髙祖之父是庶姓別於上庶姓爲衆姓也則氏族之謂也云姓丗所由生者據五丗無服不相禀承各爲氏姓繫之以姓而弗別者周法雖庶姓別於上而有丗繫連繫之以本姓而不分別􅀂􅁎氏姜氏大宗百丗不改也姓正姓者對氏族爲正姓也云始祖爲正姓者􅀂炎帝姓姜黃帝姓􅁎周姓􅁎本於黃帝齊姓姜本於炎帝宋姓子本於契是始祖爲正姓也云髙祖爲庶姓者􅀂魯之三􅁊慶父叔牙季友之後及鄭之七穆子游子國之後爲游氏國氏之等八服術有六服術有六一曰親親二曰尊尊三曰名四曰出入五曰長㓜六曰從服注云術猶道也親親父母爲首尊尊君爲首名丗母叔母之屬也出入女子子嫁者及在室者長㓜成人及殤也從服􅀂夫爲妻之父母妻爲夫之黨服九從服有六從服有六有屬從有徒從有從有服而無服有從無服而有服有從重而輕有從輕而重注云子爲母之黨臣爲君之黨公子爲其妻之父母公子之妻爲公子之外兄弟夫爲妻之父母公子之妻爲其皇姑十別子繼別繼禰別子爲祖繼別爲宗繼禰者爲小宗注云別子謂公子􅀂始來在此國者後丗以爲祖也別子之丗適也族人尊之謂之大宗是宗子也父之適也兄弟尊之謂之小宗十一大宗小宗有百丗不遷之宗有五丗則遷之宗百丗不遷者別子之後也宗其繼別子之所自出者百丗不遷者也宗其繼髙祖者五丗則遷者也尊祖故敬宗敬宗尊祖之義也注云遷猶變易也繼别子别子之丗適也繼髙祖者亦小宗也先言繼禰者據别子子弟之子也以髙祖與禰皆有繼者則曽祖亦有也則小宗四與大宗凡五正義曰云有百丗不遷之宗者謂大宗也云有五丗則遷之宗者謂小宗也云百丗不遷者别子之後也宗有繼别子之所自出者百丗不遷者也此覆明大宗子百丗不遷之義也云宗其繼髙祖者五丗則遷者也此覆明小宗子五丗則遷之義云尊祖故敬宗敬宗尊祖之義也者此揔結大宗小宗以大宗是逺祖之正體小宗是髙祖之正體尊崇其祖故敬宗子小宗四與大宗凡五者小宗四謂一是繼禰與親兄弟爲宗二是繼祖與同堂兄弟爲宗三是繼曽祖與再從兄弟爲宗四是繼髙祖與三從兄弟爲宗是小宗四并繼別子之大宗凡五宗也十二宗適如大宗宗庶如小宗公子有宗道公子之公爲其士大夫之庶者宗其士大夫之適者公子之宗道也注云公子不得宗君君命適昆弟爲之宗使之宗之是公子之宗道也所宗者適則如大宗死爲之齊衰九月其母則小君也爲其妻齊衰三月無適而宗庶則如小宗死爲之大功九月其母妻無服公子唯已而巳則無所宗亦莫之宗十三同髙祖者緦麻族屬絶則無移服絶族無移服注族昆弟之子不相爲服正文親者屬也注有親者服各以其屬親䟽正義曰此一節論親盡則無服有親則有服絶族者謂三從兄弟同髙祖者族兄弟緦麻族兄弟之子及四從兄弟爲族屬旣絶故無移服在旁而及曰移言不延移及之十四不顯不承鄭詩禮注異以注有先後詩云不顯不承無斁於人斯此之謂也斁厭也言文王之德不顯乎不承成先人之業乎言其顯且承之人樂之無厭也正義曰詩箋云周公祭清廟是不光明文王之德與言其光明之也是不承順文王志意與言其承順之也與此注不同者禮注在前詩箋在後故詩有與禮注不同故鄭荅炅模云然也禮記要義卷第十六
