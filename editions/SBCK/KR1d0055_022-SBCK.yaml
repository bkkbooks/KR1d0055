front:
  text: 禮記要義卷第二十三祭法
  hash: sha256:6f720a27e8ec274fa059f794219d83eb4aa2825ac03c8a411e08bcd9327e66e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_022-1a}
body:
  text: 一郊禘祖宗之􅀃王鄭異祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊㝠祖契而宗湯周人禘嚳而郊稷祖文王而宗武王注云禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言爾下有禘郊宗祖孝經曰宗祀文王於明堂以配上帝明堂月令春曰其帝大昊其神勾芒夏曰其帝炎帝其神祝融中央曰其帝黃帝其神后土秋曰其帝少昊其神蓐収冬曰其帝顓頊其神玄㝠有虞氏以上尚德禘郊祖宗配用有德者而巳自夏巳下稍用其姓代之先後之次有虞氏夏后氏冝郊顓頊殷人冝郊契郊祭一帝而明堂祭五帝小德配寡大德配衆亦禮之殺也正義曰此禘謂祭昊天於圜丘也者但經傳之文􅁛禘非一其義各殊論語云禘自旣灌及春秋禘于大廟謂宗廟之祭也䘮服小記云王者禘其祖之所自出也及大傳云禮不王下禘謂祭感生之帝於南郊也以禘文旣名故云此禘謂祭昊天上帝於圜丘必知此是圜丘者以禘文在於郊祭之前郊前之祭唯圜丘耳但爾雅釋天云禘大祭以此餘處爲大祭緫得稱禘案聖證論以此禘黃帝是宗廟五年祭之名故小記云王者禘其祖之所自岀以其祖配之謂虞氏之祖出自黃帝以祖顓頊配黃帝而祭故云以其祖配之依五帝本紀黃帝爲虞氏九丗祖黃帝生昌意昌意生顓頊虞氏七丗祖以顓頊配黃帝而祭是禘其祖之所自岀以其祖配之也肅又以祖宗爲祖有功宗有德其廟不毀肅又以郊與圜丘是一郊即圜丘故肅難鄭云案易帝出乎震震東方生萬物之􅀄故王者制之􅀄以木德王天下非謂木精之所生五帝㫮黃帝之子孫各改號代變而以五行爲次焉何大微之精所生乎又郊祭鄭玄云祭感生之帝唯祭一帝耳郊特牲何得云郊之􅀕大報天而主日又天唯一而巳何得有六又家語云季康子問五帝孔子曰天有五行木火金水及土分四時化育以成萬物其神謂之五帝是五帝之佐也猶三公輔王三公可得稱王輔不得稱天王五帝可得稱天佐不得稱上天而鄭云以五帝爲靈威仰之屬非也玄以圜丘祭昊天最爲首禮周人立后稷廟不立嚳廟是周人尊嚳不􅀂后稷及文武以嚳配至重之天何輕重顚倒之失所郊則圜丘圜丘則郊猶王城之内與京師異名而同處又王肅孔晁云虞夏出黃帝殷周出帝嚳祭法四代禘此二帝上下相證之明文也詩云天命玄鳥履帝武敏歆自是正義非䜟緯之妖􅀃此皆王肅難大略如此張融以禘爲五年大祭又以圜丘即郊引董仲舒劉向馬融之論皆以爲周禮圜丘則孝經云南郊與王肅同非鄭義也二泰壇泰折用犢燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢注云壇折封土爲祭處也壇之言坦也坦明貌也折炤晢也必爲炤明之名尊神也地隂祀用􅉳牲與天俱用犢連言爾正義曰云地隂祀用􅉳牲與天俱用犢連言爾者案牧人云隂祀用􅉳牲毛之鄭康成注云隂祀祭地北郊及社稷也又郊特牲云郊之用犢貴誠也彼文雖主南郊其北郊與天相對故知俱用犢也三祭時寒暑日月星水旱四方等埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗除星也雩宗祭水旱也四坎壇祭四方也山林川谷立陵能出雲爲風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭注云昭明也亦謂壇也時四時也亦謂隂陽之神也埋之者隂陽出入於地中也凡此以下皆祭用少牢相近當爲攘祈聲之誤也攘猶卻也祈求也寒暑不時則或攘之或祈之寒於坎暑於壇王宫日壇王君也日稱君宫壇營域也夜明亦謂月壇也宗皆當爲禜字之誤也幽禜亦謂星壇也星以昏始見禜之言營也雩禜亦謂水旱壇也雩之言吁嗟也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之不時於是乎禜之四方即謂山林川谷丘陵之神也祭山林丘谷於壇川谷於坎每方各爲坎爲壇怪物雲氣非常見者也有天下謂天子也百者假成數也四鄭謂祭時等非常禮王肅等謂六宗正義曰時四時也亦謂隂陽之神也者以天是陽神地爲隂神春夏爲陽秋冬爲隂故云亦謂隂陽之神言亦者亦天地也案周禮大宗伯備列諸祀而不見祭四時寒暑水旱者宗伯所謂依周禮常祀歳時􅁪祭此經所載謂四時乖序寒暑僣逆水旱失時須有祈禱之禮非關正禮之事故不列於宗伯也是以康成之意謂此諸神爲祈禱之禮故康成六宗之義不以此神尊之明非常禮也祭時者謂春夏秋冬四時之氣不和爲人害故祭此氣之神也祭寒暑者或寒暑大甚祭以攘之或寒暑頓無祭以祈之祭水旱者水甚祭水旱甚祭旱謂祭此水旱之神􅀂王肅及先儒之意以此爲六宗歳之常禮宗伯不見文不具也非鄭義今不取五王者祭無不用牛六天災有幣無牲亦有用牲埋少牢之文在諸祭之首故知以下皆祭用少牢案小司徒小祭祀奉牛牲則王者之祭無不用牛此用少牢者謂祈禱之祭也必知祈禱者以有寒暑水旱非歳時常祀是祈禱所爲故鄭皆以爲祈禱之祭也故讀相近爲攘祈之祈讀宗爲禜也然案莊二十五年左傳云凡天災有幣無牲此禱祈得用少牢者彼天災者謂日月食之示以戒懼人君􅀄有水旱之災先須脩德不當用牲故未災有幣無牲􅀂水旱歷時禱而不止則當用牲故詩雲漢云靡愛斯牲又鄭注大祝云􅀋造禬禜皆有牲攻􅀃用幣而巳七六宗之􅀃各不同案聖證論王肅六宗之􅀃用家語之文以此四時也寒暑也日也月也星也水旱也爲六宗孔注尚書亦同之伏生與馬融以天地四時爲六宗劉歆孔􅄯以爲乾坤之子六爲六宗賈逵云天宗三日月星也地宗三河海岱也鄭駮之云書云􅀋于上帝禋于六宗望于山川旣六宗云禋山川言望則六宗無山川明矣大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師凡此所祭皆天神也郊特牲曰郊之祭也大報天而主日配以月則郊天並祭日月可知其餘星也辰也司中也司命也風師也雨師也此之謂六宗亦明矣如鄭此言六宗稱禋則天神也日月也在郊祭之中又􅀋于上帝之内故以其餘爲六宗也案禮論六宗司馬彪等各爲異􅀃旣非鄭義今略而不論八廟祧壇墠􅀑之數天下有王分地建國置都立邑設廟祧壇墠而祭之乃爲親䟽多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟爲祧有二祧享嘗乃止去祧爲壇去壇爲墠壇墠有禱焉祭之無禱乃止去墠曰􅀑諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖爲壇去壇爲墠壇墠有禱焉祭之無禱乃止去墠爲􅀑大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉爲壇祭之去壇爲􅀑適士三廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉爲壇祭之去壇爲􅀑官師一廟曰考廟王考無廟而祭之去王考爲􅀑庶士庶人無廟死曰􅀑注云建國封諸侯也置都立邑爲卿大夫之采地及賜士有功者之地廟之言貌也宗廟者先祖之尊貌也祧之言超也超上去意也封土曰壇除地曰墠書曰三壇同墠王皇皆君也顯明也祖始也名先人以君明始者所以尊本之意此天子遷廟之主以昭穆合藏於二祧之中諸侯無祧藏於祖考之廟中聘禮曰不腆先君之祧是謂始祖廟也享嘗謂四時之祭天子諸侯爲壇墠所禱謂後遷在祧者也旣事則反其主於祧􅀑亦在祧顧逺之於無事祫乃祭之爾春秋文二年秋大事於大廟傳曰毀廟之主陳于大祖未毀廟之主皆升合食於大祖是也魯煬公者伯禽之子也至昭公定公乆巳爲􅀑而季氏禱之而立其宫則􅀑之主在祧明矣唯天子諸侯有主禘祫大夫有祖考者亦􅀑其百丗不禘祫無主爾其無祖考者庶士以下􅀑其考王考官師􅀑其皇考大夫適士􅀑顯考而巳大夫祖考謂别子也凡􅀑者薦而不祭王制曰大夫士有田則祭無田則薦適士上士也官師中士下士庶士府史之屬此適士云顯考無廟非也當爲皇考字之誤十七廟親四始祖一文武不遷王立七廟者親四始祖一文武不遷合爲七廟也一壇一墠者七廟之外又立壇墠各一也起土爲壇除地曰墠近者起土逺親除地示將去然也曰考廟者父廟曰考考成也謂父有成德之美也曰王考廟者祖廟也王君也君考者言祖有君成之德也祖尊於父故加君名也曰皇考廟者曽祖也皇大也君也曾祖轉尊又加大君之稱也曰顯考廟者髙祖也顯明髙祖居四廟之上故以髙祖目之曰祖考廟者祖始也此廟爲王家之始故云祖考也計則祖考之廟當在二祧壇墠之上應合在後始陳今在此言之者因皇考顯考同皆月祭故此先言之也十一遷主􅀉藏文武二祧􅀑入石函逺廟爲祧者逺廟謂文武廟也文武並在應遷之例故云逺廟也特爲功德而留故謂爲祧祧之言超也言其超然上去也有二祧者有文武二廟不遷故云有祧焉享嘗乃止者享嘗四時祭祀文武特留故不得月􅀕但四時􅀕而巳去祧而壇者謂髙祖之父也􅀂是昭行寄藏武王祧􅀂是穆行即􅀉藏文王祧不得四時祭之􅀂有四時之祈禱則岀就壇受祭也去壇爲墠者謂髙祖之祖也不得在壇􅀂有祈禱則出就墠受祭也髙祖之父旣􅀄􅀉在祧而不得於祧中受祭故曰去祧也髙祖之祖經在壇而今不得祭故云去壇也去墠曰􅀑者􅀂又有從壇遷來墠者則此前在墠者遷入石函爲􅀑雖有祈禱亦不得及唯禘祫乃出也十二官師一廟祖禰共之庶人􅀑薦於寢官師一廟者諸侯中士下士也謂爲官師者言爲一官之長也一廟祖禰共之又無壇也曰考廟者父立之也王考無廟而祭之者王考祖也雖無廟而猶獲祭也謂在考廟者去王考爲􅀑者謂曾祖則不得祭又無壇􅀂有祈禱則薦之於廟也庶士庶人無廟者庶士府史之屬庶人平民也賤故無廟也死曰􅀑者旣無廟故死則曰􅀑􅀑亦得薦之於寢也王制云庶人祭於寢是也十三先公遷主藏后稷廟文武以下藏二祧云天子遷廟之主以昭穆合藏於二祧之中者昭之遷主其數雖多緫合藏武王祧中穆之遷主緫合藏文王祧中故鄭周禮守祧先公遷主藏于后稷之廟先王之遷主藏於武王之廟鄭必知然者案文二年八月丁夘大事于大廟公羊傳云大事者何大祫也毀廟之主陳于大祖是毀廟在大廟祫乃陳之故知不窋以下先公遷主藏於后稷廟也文武二廟旣不毀則文武以下遷主不可越文武上藏后稷之廟故知藏於文武廟也十四凡廟皆曰祧不必遷主所藏遷主所藏曰祧者是對例言之耳􅀂散而通論則凡廟曰祧故昭元年左傳云其敢愛豐氏之祧彼祧逺祖廟也襄九年左傳云君冠必以先君之祧處之服䖍注云曾祖之廟曰祧者以魯襄公於時冠於衛成公之廟成公是衛今君之曽祖故云曽祖之廟曰祧也十五大夫不得有主十六凡木主之制云不禘祫無主爾者雖有百丗之􅀑不得禘祫無主爾案左傳衛大夫孔悝有主者鄭駮異義從公羊􅀃大夫無主許君謹案卿大夫士無昭穆不得有主鄭云孔悝祏主者祭其所出之君爲之主耳宗廟之主所用之木案異義今春秋公羊􅀃祭有主者孝子之主繫心夏后氏以松殷人以栢周人以栗又周禮􅀃虞主用桑練主以栗無夏后氏以松爲主之事許君謹案從周禮􅀃論語所云謂社主也鄭氏無駮從許義也其主之制案漢儀髙帝廟主九寸前方後圎圍一尺后主七寸文二年作僖公主何休云主狀正方穿中央逹四方天子長尺二寸諸侯長一尺此是木主之制也十七泰厲公厲族厲及山神之謬士䘮禮曰疾病禱於五祀司命與厲其時不著今時民家或春秋祠司命行神山神門户竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山爲之謬乎春秋傳曰􅀑有所歸乃不爲厲曰泰厲者謂古帝王無後者也此􅀑無所依歸好爲民作禍故祀之也曰公厲者謂古諸侯無後者諸侯稱公其􅀑爲厲故曰公厲曰族厲者謂古大夫無後者􅀑也族衆也大夫衆多其􅀑無後者衆故言族厲十八嚳序星辰以著衆帝嚳能序星辰以著衆者嚳能紀星辰序時􅀱以明著使民休作有期不失時節故祀之也十九鯀非誅死乃放歸東裔不反鯀鄣鴻水而殛死者鯀塞水無功而􅀍堯殛死于羽山亦是有微功於人故得祀之􅀂無微功焉能治水九載又丗本云作城郭是有功也鄭答趙商云鯀非誅死鯀放居東裔至死不得反於朝禹乃其子也以有聖功故堯與之􅀂以爲殺人父用其子而舜禹何以忍乎而尚書云鯀則殛死禹乃嗣興者箕子見武王誅紂今與己言懼其意有慙德爲􅀃父不肖則罪子賢則舉之以滿武王意也恐不然二十大夫無主遷廟則以制幣招神而藏云唯天子諸侯有主禘祫者案王制天子諸侯有禘祫故知有主云大夫有祖考者亦􅀑其百丗者案王制云大夫三廟一昭一穆與大祖而三大祖即是大夫之祖考旣有祖考明應遷之祖以制幣招其神而藏焉故云亦􅀑其百丗大夫􅀂無考者秪得立曾祖與祖及父三廟而巳則不得􅀑百丗也禮記要義卷第二十三
