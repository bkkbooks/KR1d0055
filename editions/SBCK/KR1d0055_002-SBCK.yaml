  text: 禮記要義卷第四檀弓下
  hash: sha256:5e76b03dd1e168883b24410bd580b76247c98f30bf3819835a5921aefa812bbd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0055_SBCK_002-1a}
body:
  text: 一遣車之數父母而賔客之周禮巾車云大䘮飾遣車鄭云使人以次舉之以如墓也又雜記遣車視牢具置于四隅鄭云四隅椁中之四隅以此而推故知小也所以必湏遣車者雜記云大饗旣饗卷三牲之爼歸于賔舘父母而賔客之所以爲哀也是言父母方將逺去亦如賔客之義所以載牲體送之也但遣車之數貴賤不同二公吊䘮必有拜者䘮公弔之必有拜者雖朋友州里舎人可也注云往謝之謂無主後正義曰䘮謂諸侯臣之䘮公來親弔或遣人來弔䘮家雖無主後必有以次䟽親而往拜之以謝其恩䟽親亦無雖死者朋友及同州同里及䘮家典舎之人而往拜之可也此以無後故許他人拜謝若其有後主人故自當親拜是以旣夕禮云主人乗惡車鄭注云拜君命是也三齊衰不以弔謂無服者子張死曽子有母之䘮齊衰而往哭之或曰齊衰不以弔曽子曰我弔也與哉注云以其無服非之於朋友哀痛甚而往哭之非若凡弔正義曰言曽子與子張無服不應往哭故或人非之也若有服者雖緦亦徃之四魯莊公爲王􅁎服齊榖王姬之䘮注云榖當爲告聲之誤也王􅁎周女齊襄公之夫夫莊公齊襄公女弟文姜之子當爲舅之妻五葬北方北首謂國北葬於北方北首三代之逹禮也之幽之故也注云北方國北也六辟踊有筭撫心爲辟跳躍爲踊孝子䘮親哀慕至懣男踊女辟是哀痛之至極也若不裁限恐傷其性故辟踊有筭爲準節文章準節之數其事不一每一踊三跳三踊九跳都爲一節士含死日三日而殯凡有三踊􅀄死日襲襲而踊明日小斂小斂而踊又明日大斂大斂又踊凡三日爲三踊也大夫五踊含死日四日而殯􅀄死日一踊明日襲又踊至三日小斂朝一踊至小斂時又一踊至四日大斂朝不踊當大斂時又一踊凡四日爲五踊諸侯七踊含死日六日而殯􅀄死日一明日襲又一至三日小斂朝一當小斂時又一四日無事一五日又一至六日朝不踊亦當大斂時又一凡六日七踊周禮王九踊含死日八日而殯死日一明日襲一其間二日爲二至五日小斂爲二其間二日又二至八日大斂則其朝不踊也大斂時又一凡八日九踊故云爲之節文也故雜記云公七踊大夫五踊士三踊鄭注云士小斂之朝不踊君大夫大斂之朝乃不踊是也七葬北首殯南首言葬於國北及北首者􅀑神尚幽闇往詣幽㝠故也殯時仍南首者孝子猶若其生不忍以神待之八虞用日中再虞三虞用質明反日中而虞者反謂所使奠墓左有司歸也虞者葬日還殯宫安神之􅀕名必用日中者是日時之正也士虞禮云日中而行事注云朝葬日中而虞君子舉事必用辰正也再虞三虞皆用質明案周人尚赤大事用日岀故朝葬也鄭恐奠墓有司未歸即作虞􅀕故云奠墓有司來歸乃虞也必知歸始虞者以經云奠於墓左反日中而虞是奠墓者廽反日中而虞九虞祔卒哭用剛日柔日之節鄭注士虞禮云虞安也所以安神虞皆用柔日柔日者鄭注士虞禮云柔日隂隂取其靜最後一虞用剛者故士虞記云三虞卒哭他用剛日鄭注云用剛日剛日陽也陽取其動謂動而將祔廟也雜記云諸侯七虞然則天子九虞也士三虞卒哭同在一月􅀄虞巳葬日而用柔第二虞亦用柔日假令丁日葬葬日而虞則己日二虞後虞改用剛則庚日三虞也故鄭注士虞禮云士則庚日三虞三虞與卒哭相接則壬日卒哭也士虞禮云明日祔於祖父則􅀕明日祔也士之三虞用四日則大夫五虞當八日諸侯七虞當十二日天子九虞當十六日最後一虞與卒哭例同用剛日大夫以上卒哭者去虞相校兩月則虞􅀕旣終不得與卒哭相接其日尚賖不可無􅀕謂之爲變其旣虞之後變禮而之吉􅀕也之徃也旣虞徃至吉􅀕其禮如何旣虞比至於祔以來必於是日接謂於是三虞卒哭之間剛日而連接其􅀕謂恒用剛日所以恒用剛日接之者孝子不忍使親毎一日之間無所歸依十殯廟謂殯宫或云殯于祖廟殷人尚質敬􅀑神而逺之死則爲神故云朝而殯於祖廟周則尚文親雖亡没故猶􅀂存在不忍便以神事之故殯於路寢及朝廟遂葬夫子不論二代得失皆合當代之禮無所是非以此言之則周人不殯於廟案僖八年致哀姜左傳云不殯于廟則弗致也則正禮當殯於廟者服氏云不薨於􅃦􅃦謂小􅃦不殯於廟廟謂殯宫􅀑神所在謂之廟鄭康成以爲春秋變周之文從殷之質故殯於廟杜預以爲不以殯朝廟未詳孰是十一大夫有致仕有待放巳去未去正義曰案䘮服齊衰三月章爲舊君凡有三條其一云爲舊君君之母妻傳云仕焉而巳者也注云謂老􅀂有廢疾而致仕者兼服其母妻其二大夫在外其妻長子爲舊國君注云在外待放巳去者傳云妻言與民同者長子言未去也注云妻雖從夫而岀古者大夫不外娶婦人歸宗徃來猶民也長子去可以無服此則大夫身不爲服唯妻與長子爲舊君耳其三爲舊君注云大夫待放未去者傳曰大夫去君埽其宗廟言其以道去君而猶未絶也注云以道去君爲三諌不從待放於郊未絶者言爵禄尚有列於朝岀入有詔於國􅀂巳絶則不服也以此言之凡舊君􅀂年老致仕退歸在國不仕者身爲之服齊衰三月并各服其母妻也􅀂三諌不從待放巳去而絶者唯妻與長子服之已則無服􅀂待放未去爵位未絶身及妻子皆爲之服然則去仕他國巳絶之後不服舊君而雜記云違諸侯之大夫不反服則違諸侯之諸侯反服得爲舊君服者雜記所云謂不便其居或辟仇讎有故不得在國者故孟子齊宣王問孟子云禮爲舊君有服何如斯可爲服矣孟子對曰諌行言聽膏澤下於民有故而去則君使人導之出疆送至彼國明其無罪其所徃三年不反然後収其田里此之謂三有禮焉如此者得爲舊君反服矣與雜記同鄭注此云仕焉而巳者取䘮服第一條謂年老致仕在國者十二晏子窆竟則反儉失禮及墓而反者及墓謂葬時也禮窆後孝子贈幣辭親辭親畢而親情賔客應是送別別竟乃反于時晏子窆竟則反賔客並去又是儉失禮也注又云言其太儉偪下十三立長立貴及卜筮卜所至則兆旣有庶子六人莫適立也故卜所以堪爲後者其掌卜之人謂之曰􅀂沐浴佩玉則得吉兆所以湏有卜者春秋左氏之義故昭二十六年云年鈞以德德鈞以卜王不立愛公卿無私􅀂公羊隱元年云立適以長不以賢立子以貴不以長何休云適夫人無子立右媵右媵無子立左媵左媵無子立嫡姪娣嫡姪娣無子立右媵姪娣右媵姪娣無子立左媵姪娣質家親親先立娣文家尊尊先立姪嫡子有孫而死質家親親先立弟文家尊尊先立孫其􅀟生也質家据見立先生文家据本意立後生何休作膏肓難左氏云􅀂其以卜隱桓以禍皆由此作乃曰古制固亦謬矣鄭箴之云立長以嫡不以賢固立長矣立子以貴不以長固立貴矣􅀂長均貴均何以別之故湏卜禮有詢立君卜立君是有卜也是從左右之義十四賞從者與居守者當一衛獻公出奔反於衛及郊將班邑於從者而並入柳莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也母乃不可乎弗果班注云欲賞從者以懼居者獻公以魯襄十四年出奔齊二十六年復歸於衛言從守􅀂一靮紖也言有私則生怨十五萬入去籥去有聲廢無聲仲遂卒于垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹注云春秋經在宣八年仲遂魯莊公之子東門襄仲先日辛巳有事於大廟而仲遂卒明日而繹非也萬干舞也籥龠舞也傳曰去其有聲者廢其無聲者十六豐碑桓楹之制公室視豐碑三家視􅁊楹注云言視者時僣天子也豐碑斵大木爲之形如石碑於椁前後四角樹之穿中於間爲鹿盧下棺以繂繞天子六繂四碑前後各重鹿盧也時僣諸侯諸侯下天子也斵之形如大楹耳四植謂之􅁊諸侯四繂二碑碑如􅁊矣大夫二繂二碑士二繂無碑正義曰云斵大木爲之形如石碑者以禮廟庭有碑故􅀕義云牲入麗于碑儀禮毎云當碑揖此云豐碑故知斵大木爲碑也云於椁前後四角樹之者謂椁前後及兩旁樹之角落相望故云四角非謂正當椁四角也云穿中於間爲鹿盧者謂穿鑿去碑中之木令使空於此空間著鹿盧鹿盧兩頭各入碑木云下棺以繂繞者繂即紼也以紼之一頭繫棺緘以一頭繞鹿盧旣訖而人各背碑􅀒紼末頭聽鼔聲以漸郤行而下之云天子六繂四碑者案周禮大䘮屬其六引故知天子六繂也䘮大記云君四繂二碑諸侯旣二碑故知天子四也云前後各重鹿盧也者以六繂四碑明有一碑兩紼者故知一碑上下重著鹿盧知唯前後碑重鹿盧者以棺之入椁南北豎長前後用力深也案春秋天子有隧以羡道下棺所以用碑者凡天子之葬掘地以爲方壙漢書謂之方中又方中之内先累椁於其方中南畔爲羡道以蜃車載柩至壙􅀃而載以龍輴從羡道而入至方中乃屬紼於棺之緘從上而下棺入於椁之中於此之時用碑繂也以言視􅁊楹不云碑知不似碑形故云如大楹耳通而言之亦謂之碑也故䘮大記云諸侯大夫二碑是也云四植謂之􅁊者案􅀃文􅁊亭郵表也謂亭郵之所而立表木謂之􅁊即今之橋旁表柱也今諸侯二碑兩柱爲一碑而施鹿盧故云四植謂之􅁊也周禮􅁊圭而爲􅀟植者以一圭之上不應四柱但瑑爲二柱象道旁二木又宫室兩楹故􅀟植謂之􅁊也大夫亦二碑但柱形不得麤大所以異於諸侯也十八楚人陳與陵聲相似云陳或作陵楚人聲者謂陳棄疾餘本有作陵棄疾者故云陳或作陵楚人呼陳及陵聲相似故云楚人聲十九大夫正朝立燕在寢有坐士立朝之與燕皆在於􅃦􅀂路門外正朝則大夫以下皆立􅀂其燕朝在於路寢如孔子攝齊􅂛堂又詩傳云不脫屨􅂛堂謂之飫明脫屨升堂則坐也是大夫坐於上燕亦在寢故燕禮云燕朝服於寢案燕禮獻卿大夫及樂作之後西階上獻士士旣得獻者立於東階下西面無􅂛堂之文是士立於下二十車左車右及元帥居中央皷下之法其車參乗射者在左戈盾在右者案宣十二年左傳云楚許伯御樂伯攝叔爲右於時樂伯主射樂伯云左射以菆是射者在左攝叔云右入壘折馘執俘而還是戈盾勇力在右自然御者在中央此謂凡常戰士也􅀂是元帥則在中央皷下御者在左戈盾亦在右故成二年鞌之戰於時郤克爲中軍將時流血及屨未絶皷音是將居鼔下也解張御郤克解張云矢貫余手及肘余折以御左輪朱殷是御者在左自然戈盾在右􅀂天子諸侯親爲將亦居鼓下故戎右云賛王鼔成二年齊侯圍龍齊侯親鼔之是也􅀂非元帥則皆在左御者在中故成二年韓厥自其車左居中代御而逐齊侯故杜預云兵車自非元帥御者皆在中故熊氏以爲雖非元帥上軍下軍之將亦居鼔下故成十六年鄢陵之􅀾子重將左而云子重鼔之也故爲將皆在鼔下也以其親鼔故以爲鼔下案周禮諸侯執賁鼓軍將執􅀳鼔師帥執提旅帥執鼙豈皆居鼔下也其義恐非也卄一有几有筵及饋食下室之節虞而立尸有几筵卒哭而諱生事畢而􅀑事始巳注云諱辟其名謂不復饋食於下室而􅀑神􅀕之巳辭也正義曰有几筵者未葬之前殯宫雖有脯醢之奠不立几筵其大歛之奠雖在殯宫但有席而巳亦無几也此席素席故前云奠以素器其下室之内有吉几筵今葬訖旣設虞􅀕有素几筵筵雖大斂之時巳有至於虞􅀕更立筵與几相配故云有几筵故士虞禮云祝免澡􅁑絰帶布席于室中東靣右几是也然此虞􅀕而有几謂士大夫禮􅀂夫子諸侯則葬前有几故周禮司几筵云䘮事素几鄭注云謂殯奠時天子旣爾諸侯南靣之君其事亦然下室謂内寢生時飲食有事處也未葬猶生事當以脯􅊽奠殯又於下室饋設􅁰稷謝兹云下室之饋器物几杖如平生鄭君荅張逸云未葬以脯􅊽奠於殯又於下室設􅁰稷日饋下室内寢也至朔月月半而殷奠殷奠有􅁰稷而下室不設也旣虞􅀕遂用􅀕禮下室遂無事也然不復饋食於下室文承卒哭之下卒哭之時乃不復饋食於下室皇氏以爲虞則不復饋食於下室於理有疑卄四漢時禁緯候故六經皆謂之􅀃易􅀃帝乙曰易之帝乙爲成湯者鄭引易證六丗不諱故卒哭而舎髙祖之父也易􅀃者鄭引云易緯也凡鄭云􅀃者皆緯候也時禁緯侯故轉緯爲􅀃也故鄭志張逸問禮注曰書說書􅀃何書也荅曰尚書緯也當爲注時時在文網中嫌引祕書故諸所牽圖䜟皆謂之􅀃卄五殷以生日甲乙爲名丗䟽則可同湯名乙其六丗孫名祖乙即是六丗王也旣並爲帝故皆得曰帝乙也祖乙是湯六世孫與湯同名是六世得同名云天之錫命䟽可同名者此注易緯語也言帝王之名由天所錫則丗䟽可同故舉六丗以爲證也謂天所錫者殷以生日甲乙爲名則生日是天之命日爲名也白虎通云殷質以生日名子也故殷大甲帝乙武丁卄六夫子友原壤宰我左傳呉季札譏叔孫穆子好善而不能擇人原壤母死登木而歌夫子聖人與之爲友者論語云無友不如已者謂方始爲交遊湏擇賢友左傳云好善而不能擇人者謂不善之人不可委之以致今原壤是夫子故舊爲日已乆或平生舊交或親屬恩好苟無大惡不可輙離故論語云故舊無大故則不相遺棄彼注云大故謂惡逆之事殺父害君乃爲大故雖登木之歌未至於此且夫子聖人誨人不倦宰我請䘮親一期終助陳􅁪之亂互卿童子許其來進之情故志在攜􅅄不簡善惡原壤爲舊何足怪也卄七其中退然中爲身文子其中退然如不勝衣注云中身也退柔和貌郷射記曰弓二寸以爲侯中退或爲妥卄八古以精爽不攜貳者爲巫楚語昭王問觀射父絶地通天之事觀射父對云民之精爽不攜貳者明神降之在男曰覡在女曰巫然案楚語精爽不攜貳者始得爲巫此經而云愚婦人者據末丗之巫非復是精爽不攜貳之巫也卄九祔有離有合孔子曰衛人之祔也離之魯人之祔也合之善夫注云祔謂合葬也離之有以間其椁中善夫善魯人也祔葬當合也正義曰魯人則合並兩棺置椁中無別物隔之言異生不須復隔榖則異室死則同穴故善魯之祔也三十聲巳帷堂敬姜帷殯案春秋文十五年公孫敖之䘮聲己不視帷堂而哭公孫敖亦是穆伯此不云聲己之哭穆伯始者聲己是帷堂非帷殯也聲已哭在堂下怨恨穆伯不欲見其室故帷堂敬姜哭於堂上逺嫌不欲見夫之殯故帷殯案張逸荅陳鏗云敬姜早寡晝哭以辟嫌帷殯或亦辟嫌表夫之逺色也卅一殷主綴重周主重徹士有重無主重主道也始死未作主以重主其神也重旣虞而埋之乃後作主春秋傳曰虞主用桑練主用栗殷主綴重焉綴猶聮也殷人作主而聮其重縣諸廟也去顯考乃埋之周主重徹焉周人作主徹重埋之正義曰案士䘮禮云士有重無主而此云重主道者此據天子諸侯有主者言之卿大夫以下無主春秋孔悝爲祏主鄭駮異義云孔悝祭所岀君故有主云重旣虞而埋之乃後作主者謂旣虞之後乃始埋重埋重之後乃始作主案天子九虞九虞之後乃埋重重與祔相近故公羊云虞主用桑謂虞祭之末也左傳云祔而作主謂用主之􅀄俱是桑主其義不異故異義公羊􅀃虞而作主左氏􅀃天子九虞十六日祔而作主謂桑主許慎謹案左氏謹與禮同鄭氏不駮則是從左氏之義非是虞祭之日即作主也故此注云埋重之後乃作主也其卒哭之祭巳用主也必知然者以卒哭日成事以吉祭易䘮祭故知與虞異也卅二作主之狀主之狀范􅇞云正方穿中央逹四方天子長尺二寸諸侯長一尺卅三鄭􅀃重與虞主埋門外道左案旣夕禮將葬甸人抗重岀自道道左􅀝之鄭注云重旣虞將埋之是鄭埋重於門外之道左也􅀂虞主亦埋之於祖廟門外之道左案異義戴禮及公羊􅀃虞主埋於璧兩楹之間一􅀃埋之於廟北牗下左氏􅀃虞主所藏無明文鄭駮之云案士䘮禮重與柩相隨之禮柩將岀則重􅀝於道左柩將入於廟則重止於門西虞主與神相隨之禮亦當然練時旣特作栗主則入廟之時祝奉虞主於道左練􅀕訖乃岀就虞主而埋之如旣虞埋重於道左是鄭旣練埋虞主於廟門之道左也卅四大臣之喪重於疾日子卯不樂紂以甲子死桀以乙卯亡王者謂之疾者不以舉樂爲吉事所以自戒懼知悼子在堂斯其爲子卯也大矣言大臣䘮重於疾日也􅄂記曰君於卿大夫比葬不食肉比卒􅂘不舉樂卅五魯莊之丗楚稱荊僖元年始稱楚春秋莊十年荆敗蔡師于莘公羊傳曰荆者何州名也州不􅀂國國不􅀂氏氏不􅀂人人不􅀂名名不􅀂字字不􅀂子而左氏無此義荆蓋楚之本號魯莊之丗告命皆稱荆至僖元年始稱楚故杜預云荆始改號曰楚卅六位定然後禄故有仕而未禄者仕而未有禄者君有饋焉曰獻使焉曰寡君注見在臣位與有禄同也君有饋有饋於君正義曰王制云位定然後禄之是先位定而後禄也卅七軍敗稱赴素服哭於庫門外軍有憂則素服哭於庫門之外憂謂爲敵所敗也素服者縞冠也赴車不載櫜韔兵不戢示當報也以告䘮之辭言之謂還告於國櫜甲衣韔弓衣正義曰案春秋左氏傳禍福稱告崩薨稱赴今軍敗應稱告而稱赴故云以告䘮之辭言之上篇國亡大縣邑公卿大夫士皆厭冠哭於大廟或曰君舉而哭於后土卅八嫁母與廟絶族子思之母死於衛嫁母也姓庶氏赴於子思子思哭於廟門人至曰庶氏之母死何爲哭於孔氏之廟乎門人弟子也嫁母與廟絶族卅九子弑父凡在宫者殺無赦臣弑君凡在官者殺無赦子弑父凡在宫者殺無赦言諸臣子孫無尊卑皆得殺之其罪無赦正義曰此在宫字諸本或爲在官恐與上在官相渉而誤也無問尊卑皆得殺之謂理合得殺若力所不能亦不責也故春秋崔杼弑莊公而晏子不討崔杼而不責晏子若力能討而不討則責之春秋董狐書趙盾云子爲正卿亡不出竟反不討賊書以弑君是也鄭此云子孫無問尊卑皆得殺之則似父之弑祖子得殺父然子之於父天性也父雖不孝於祖子不可不孝於父今云子者因孫而連言之或容兄弟之子耳除子以外皆得殺其弑父之人異義衛輙拒父公羊以爲孝子不以父命辭王父之命許拒其父左氏以爲子而拒父悖德逆倫大惡也鄭駮異義云以父子私恩言之則傷仁恩則鄭意以公羊所云公義也左氏所云是私恩也故知今子之報殺其父是傷仁恩也􅀂妻則得殺其弑父之夫四十張老發空之詞心譏文子晉大夫發焉者發禮也晉君旣賀則朝廷大夫並發禮同從君往賀之張老心譏文子宫室飾麗故佯而美之也輪謂輪囷髙大也春秋外傳曰趙文子爲室斵其椽而礱之張老諌之是也四一管籥今之鏁須鑰匙案月令注管籥摶鍵器鍵謂鏁之入内者俗謂之鏁須管謂夾取鍵今謂之鑰匙則是管鍵爲別物而云管鍵者對則細別散則大同爲鍵而有故云管鍵四二趙文子生不交利死不屬其子生不交利者謂文子生存之日不交渉於利是謂不與利交渉也死不屬其子焉者謂臨死時不私屬其子於君及朝廷也案禮記文子成室􅀍張老所譏樂奏肆夏從文子始禮記顯其奢僣者晉爲霸主揔領諸侯武爲晉相光顯威德此乃事􅀔須然無廢德行之善四三蟹匡蟬緌不關於􅁞蜂􅁞則須匡以貯繭而今無匡蟹背有匡匡自著蟹則非爲􅁞設蜂冠無緌而蟬口有緌緌自著蟬非爲綘設譬如成人兄死􅀄不作衰後畏於子臯方爲制服服是子臯爲之非爲兄施亦如蟹匡蟬綏各不関於􅁞蜂也四四㬥㒬天乆不雨吾欲㬥㒬而奚􅀂注㒬者靣向天覬天哀而雨之四五脫君􅀕服以禭臣衛大史柳莊死獻公當􅀕不釋服而徃遂以禭之注脫君􅀕服以禭臣親賢也所以此禭之者以其不同襲也凡禭以斂正義曰明禭衣不用襲也四六邑與縣異注通言二邑與之色裘氏與縣潘氏書而納諸棺云云正義曰與之采邑曰裘氏及縣潘氏與二邑又書録其賞辭云云禮記要義卷第四終
