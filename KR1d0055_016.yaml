front:
  text: 禮記要義卷第十七少儀一適有喪者曰比曰聽事適有喪者曰比童子曰聽事注云適之也曰某願比於將命者比猶比方俱給事曰某願聽事於將命者童子未成人不敢當相見之禮正義曰此謂往適者喪家也比比方也喪不主相見凡往者皆是助事故云比謂比方其年力以給喪事也若五十從反哭四十待盈坎皆是比方其事故鄭云比謂比方俱給事故辭云願比於將命者也
  hash: sha256:bc46807842ab45a5e9419ae7ea3ab0544116b9ffdd129e21ef07abe8ae24448b
