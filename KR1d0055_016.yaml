body:
  text: 二主人無親受􅉠非尸柩之事不親􅉠者既致命坐委之擯者舉之主人無親受也注云喪者非尸柩之事不親也舉之舉以東正義曰吉時若人饋物主人皆自拜受之若有喪主於哀戚凡有四方使者以物􅉠己悉不得拜受故使擯者受舉之而巳知舉以東者雜記云含者入升堂致命坐委于殯東南宰夫朝服即喪屨升自西階西面坐取璧降自西階以東後禭者􅉠者並然而升堂致命是告殯之辭也若􅉠生人則致命擯者不告殯而不升堂然車馬不舉以東而鄭云舉以東者謂幣之屬也三不疑不度不願不訾四事不疑在躬者既問主人之道藝則巳亦當習學明了不得使疑事在其躬而為賔為主皆然也不度民械者謂為客至主人之家不得度民家所有器械使已亦有也不願於大家者大家謂冨貴廣大之家謂大夫之家也謂士往於卿大夫之見彼冨大不可願斆之也非分而願必有亂心也不訾重器者訾思也重器寶珍之物主謂客至主人之家見有珍物重器不可思玩之若思玩之則憎疾已貧賤生淫亂濫惡也疏四婦人以肅拜為正凶事乃手拜婦人吉事雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜注云肅拜拜低頭也手拜手至地也婦人以肅拜為正凶事乃手拜耳為尸為祖姑之尸也士虞禮曰男男尸女女尸為喪主不拜手者為夫與長子當稽顙也其餘亦手拜而巳雖或為唯或曰喪為主則不手拜肅拜也五虞祭婦人為祖姑作尸為尸坐者謂虞祭婦人為祖姑作尸也周禮坐尸嫌婦人或異故明之也若平常祭無婦人之尸示主於夫故設同几而巳六昏禮婦拜扱地穆嬴頓首云婦人以肅拜為正者言肅拜是婦人之常而昏禮婦拜扱地以其新來為婦盡禮於舅姑故也左傳穆嬴頓首於宣子之門者有求於宣子非禮之正也云凶事乃手拜耳者言婦人除為喪主其餘輕喪凶事乃有手拜耳鄭知然者以經云為喪主則不手拜明不為喪主則手拜七祭無跣燕有跣凡祭於室中堂上無跣燕則有之注云祭不跣者主敬也燕則有跣為歡也天子諸侯祭有坐尸於堂之禮祭所尊在室燕所尊在堂將燕降說屨乃升堂八二車佐車倅車乘二車則式佐車則否注云二車佐車皆副車也朝祀之副曰二戎獵之副曰佐魯莊公敗于乾時公喪戎路傳乘而歸正義曰二車云式主敬故謂朝祀之副曰二佐車不式主武故云戎獵之副曰佐若戎獵相對則戎車之副曰倅田車之副曰佐故周禮戎僕馭倅車田僕馭佐車熊氏曰此云戎獵之副曰佐者據諸侯禮也九有爵者乘馬服車不齒有二車者之乘馬服車不齒注云尊有爵者之物廣敬也服車所乘車者車有新舊正義曰不敢齒次論其年歲評其價數髙下以尊者之物也十恭敬哀詡恭貌而敬心賔客主恭祭祀主敬喪事主哀㑹同主詡注云恭在貌也而敬又在心詡謂敏而有勇若齊國佐正義曰成二年左傳齊晉戰於鞍齊國佐陳辭以拒晉師是敏而有勇也十一冬時陽氣在魚腹夏在脊冬右腴者腴謂魚腹冬時陽氣下在魚腹故右腴夏右鰭者鰭謂魚脊夏時陽氣上在魚脊故右鰭凡陽所在之處肥美故進魚使嚮右以右手取之便也十二車旁凡為軓車旁九為軌案周禮大馭祭兩軹祭軌此云祭左右軌范兩文不同則左右軌與兩軹是一故云軓與軹於車同謂轊頭謂車轂小頭也此云范大馭云軌兩事是一聲同字異故云聲同謂式前之範與此范俱是式前也但式前之軓車旁著凡或作範字聲同而字異即詩邶風濟盈不濡軓亦車旁凡與此同也若轂末之軌則車旁著九此經左右軌是也其車轍亦謂之軌亦車旁著九則考工記經涂九軌十三不食豢腴謂豬犬腸君子不食圂腴注云周禮圂作豢謂犬豕之屬食米榖者也腴有似於人穢正義曰腴豬犬腸也言豬犬亦食米榖其腹與人相似故君子但食他處辟其腴謂腸胃也故鼎闕一也十四設尊折爼行爵嘗羞之儀尊者以酌者之左為上尊尊壷者面其鼻飲酒者禨者醮者有折爼不坐未步爵不嘗羞注云尊者設尊者也酌者鄉尊其左則右尊也鼻在面中言鄉人也折爼尊徹之乃坐也巳沐飲曰機酌始冠曰醮步行也正義曰庾云燕禮司宫尊于東楹之西兩方壷左玄酒南上注玉藻云唯君面尊玄酒在南順君之面也下云公席阼階上西鄉下又云執幂者升自西階立于尊南北面東上案左玄酒南上之言是設尊者東鄉酌者西鄉設者之右則酌者之左也又曰此謂無算爵之時若正羞脯醢折爼未飲則嘗之見鄉飲十五食飲勿氣辟咡洗盥執食飲者勿氣有問焉則辟咡而對注云示不敢歆臭也口旁曰咡十六國家靡敝减損車服器馬國家靡敝則車不雕幾甲不組縢食器不刻鏤君子不履絲屨馬不常秣注云靡敝賦稅亟也雕畫也幾附纒為沂鄂也組縢以組飾之及襟帶也詩云公徒三萬貝胄朱綅亦鎧飾也十七注疏以刀禾枕皆有頴義云頴警枕也者以經枕外別言頴是頴發之義故為警枕刀卻刃授頴言授人以刀卻仰其刃授之以頴頴謂刀鐶也言以刀鐶授之頴是頴發之氣刀之在手謂之為頴禾之秀穗亦謂之為頴枕之警動亦謂之頴其事雖異大意同也十八燕食所進魚體與祭祀饗食正禮異此濡魚進尾乾魚進首及右腴右鰭之屬皆謂尋常燕食所進魚體非祭祀及饗食正禮也若祭祀魚在於爼皆縮載爼既橫設魚則隨爼而從於人為橫無進首進尾之理故少牢魚用鮒而爼縮載其主人正饗亦然公食大夫禮魚七縮爼是也正祭魚既縮載少牢主人獻祝佐食三魚一橫之彼是正祭魚橫者以魚與牲體共爼故特橫之殊於牲體也若天子諸侯繹祭及卿大夫儐尸魚則橫載之於爼爼在人前而橫魚則於人為從得有進首尾也故有司徹云尸爼五魚橫載之侑主人皆一魚亦橫載之彼注云橫載之有異於牲體如鄭此言正祭之時牲體橫而魚縮載儐尸之時牲體縮而魚橫載之故云橫載之者異於牲體也正祭則右首進腴故少牢魚右首進腴變於主人若生人右首進鰭故公食大夫云寢右注云右首也寢右進鰭也乾魚近腴多骨鯁案特牲少牢魚皆十有五鄭云從隂類昏禮魚有十四減一從偶數士喪禮大斂及士虞禮及公食禮魚皆七其天子諸侯魚數禾聞祭膴者膴謂刳魚腹下為大臠此處肥美故食魚則刳取以祭先也草一未有燭告後至者執燭不讓不辭不歌其未有燭而有後至者則以在者告道瞽亦然注為其不見意欲知之也師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯凡飲酒為獻主者執燭抱燋客作而辭然後以授人為宵言也主人親執燭敬賔示不倦也言獻主者容君使宰夫也未爇曰燋執燭不讓不辭不歌以燭繼晝禮殺正義曰凡飲酒為獻主者獻主主人也謂為飲酒主人法也凡飲酒主人自獻賔若尊卑不敵則使宰夫為主人以獻賔故云為獻主也執燭者謂夜暗執燭抱燋者燋謂未爇之炬既欲留客又取未然之炬抱之也客作而辭主人見客起辭故從辭而止以燭乃授己執事之人執燭不讓不辭不歌者執燭夜時也禮賔主有讓及更相辭謝又各歌詩相顯德今既夜莫所以殺於三事禮記要義卷第十七
