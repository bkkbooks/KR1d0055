front:
  text: 禮記要義卷第二十一雜記下一雖有親之大䘮猶爲輕服者除有父之䘮如未没䘮而母死其除父之䘮也服其除服卒事反䘮服雖諸父昆弟之䘮如當父母之䘮其除諸父昆弟之䘮也皆服其除䘮之服卒事反䘮服注云没猶竟也除服謂祥祭之服也卒事旣祭反䘮服服後死者之服雖有親之大䘮猶爲輕服者除骨肉之恩也唯君之䘮不除私服言當者期大功之䘮或終始皆在三年之中小功緦麻則不除殤長中乃除
