front:
  text: 禮記要義卷第二十一雜記下一雖有親之大喪猶為輕服者除有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服注云沒猶竟也除服謂祥祭之服也卒事既祭反喪服服後死者之服雖有親之大喪猶為輕服者除骨肉之恩也唯君之喪不除私服言當者期大功之喪或終始皆在三年之中小功緦麻則不除殤長中乃除
