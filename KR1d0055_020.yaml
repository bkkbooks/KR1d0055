body:
  text: 二王父未練無廟孫得祔於祖王父死未練祥而孫又死猶是附於王父也注云未練祥嫌未祫祭序於昭穆爾王父既附則孫可祔焉猶當為由由用也附皆當作祔正義曰禮祔在練前若祔後未練之前則得祔直云未練足矣兼言祥者案文二年榖梁傳云作主壞廟有時日於練焉壞廟壞廟之道易簷可也改塗可也注云親過髙祖則毀其廟以次而遷將納新神故示有所加以此言之則練時壞祖與髙祖之廟改塗易簷示有壞意其以先祖入於大祖之廟其祖傅入髙祖廟其新死者入祖廟是練時遷廟也入三年喪畢祫於大祖廟是祥後祫也故云未練祥嫌未祫祭序於昭穆爾兼言祥者恐未祫故也故練祥兼言但祖祔祭之後即得祔新死之孫故云王父既祔則孫可祔焉然王父雖祔未練無廟孫得祔於祖其孫就王父所祔祖廟之中而祔祭王父焉三與祭視濯而父母死大夫士將與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸其它如奔喪之禮如未視濯則使人告告者反而后哭注云猶亦當為由次於異宫不可以吉與凶同處也使者反而后哭不敢專己於君命也正義曰則猶是與祭也者既與祭於公祭日前既視濯之後而遭父母之喪則猶是吉禮而與於祭也次於異宫者其時止次異宫不可以吉與凶同處也如未視濯則使人告者謂未視濯之前遭父母之喪則使人告君告者反而后哭者必待告君者反而後哭父母也四居父母喪而昆弟亦有異宫者父母之喪將祭而昆弟死既殯而祭如同宫則雖臣妾葬而后祭祭主人之升降散等執事者亦散等雖虞附亦然注云將祭謂練祥也言若同宫則是昆弟異宫也古者昆弟異居同財有東宮有西宫有南宫有北宫有父母之喪當在殯宫而在異宮者疾病或歸者主人適子散等栗階為新喪略威儀正義曰若將祭而有兄弟死則待殯後乃祭也今不待葬後者兄弟輕故始殯後便可行吉事也如同宫則雖臣妾葬而后祭者兄弟既殯後而行父母之祭謂異宫者耳若同宮雖臣妾之輕卑死猶待葬後乃行父母祭也所以爾者吉凶不相干故喪服傳云有死於中宫者則為之三月不舉祭庾氏云小祥之祭巳涉於吉尸柩至凶故不可以相干其虞祔則得為之矣苦喪柩即去者則亦祭不待於三月可知矣祭主人之升降散等者祭猶謂二祥祭散栗也等階也吉祭則涉級聚足喪祭則栗階故云散等也如此祥祭冝涉級於時為有兄弟喪故少威儀作散等也執事者亦散等者助執祭者亦栗階也雖虞附亦然者謂主人至昆弟虞附而行父母二祥祭而執事者亦散等五吉祭賔食喪祭賔不食凡侍祭喪者告賔祭薦而不食注云薦脯醢也吉祭告賔祭薦賔既祭而食之喪祭賔不食六喪不語不問不入門三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言言巳事也為人説為語在聖室之中以時事見乎母乃後入門則居廬時不入門七外除內除親喪外除兄弟之喪內除注云日月巳竟而哀未忘日月未竟而哀已殺八祥禫以後變除之節祥主人之除也於夕為期朝服祥因其故服注云為期為祭期也朝服以期至明日而祥祭亦朝服始即吉正祭服也喪服小記曰除成喪者其祭也朝服縞冠是也祭猶縞冠未純吉也既祭乃服大祥素縞麻衣釋禫之禮云玄衣黃裳則是禫祭玄冠矣黃裳者未大吉也既祭乃服禫服朝服綅冠踰月吉祭乃玄冠朝服既祭玄端而居復平常也九從祥至吉凡服有六從祥至吉凡服有六祥祭朝服縞冠一也祥訖素縞麻衣二也禫祭玄冠黃裳三也禫訖朝服綅冠四也踰月吉祭玄冠朝服五也既祭玄端而居六也十卒哭成事附與虞異上大夫之虞也少牢卒哭成事附皆大牢下大夫之虞也犆牲卒哭成事附皆少牢注云卒哭成事附言皆則卒哭成事附與虞異矣下大夫虞以犆牲與士虞禮同與正義曰鄭以士虞禮云三虞卒哭他用剛日先儒以此三虞卒哭同是一事鄭因此經云上大夫虞用少牢卒哭用大牢其牢既別明卒哭與虞不同鄭引此文破先儒之義故云卒哭成事與虞異矣十一居喪受酒肉之遺三年之喪如或遺之酒肉則受之必三辭主人衰絰而受之如君命則不敢辭受而薦之喪者不遺人人遺之雖酒肉受也從父昆弟以下既卒哭遺人可也注云受之必正服明不苟於滋味薦於廟貴君之禮言齊斬之喪重志不在施惠於人正義曰衰絰而受之者雖受之猶不得食也尊者食之乃得食肉猶不得飲酒故喪大記云既葬若君食之則食之大夫父之友食之則食之矣不辟梁肉若有酒醴則辭是也十二父在為母練祥禫之節期之喪十一月而練十三月而祥十五月而禫注云此謂父在為母也當在練則弔上十三居喪有不弔不聽事不與禮之異三年之喪雖功衰不弔自諸侯達諸士如有服而將往哭之則服其服而往練則弔既葬大功弔哭而退不聽事焉期之喪未葬弔於鄉人哭而退不聽事焉功衰弔待事不執事小功緦執事不與於禮注云功衰既練之服也諸侯服新死者之服而往哭謂所不臣也父在為母功衰可以弔人者以父在故輕於出也然則凡齊衰十一月皆可以出矣聽猶待也事謂襲斂執綍之屬謂為姑姊妹無主殯不在己族者禮饋奠也正義曰三年之喪雖功衰不弔者謂重喪小祥後衰與大功同故曰功衰衰雖外輕而痛猶內重故不得弔人也功衰雖不弔人若自有五服之親喪則往哭之將往哭則不著己功衰而依彼親之節以服之申於骨肉之情故也故云則服其服而往也伹著彼服不著己功衰也賀㻛云若新死者服輕則不為之制服雖不為重變而為之制服往奔喪哭之則暫服所制之服往彼哭之事畢反服故服也此練則弔又承十一月練之下故知是父在為母以經云練故云功衰也大祥始除衰杖而練得弔人者以父在為母故輕於出言得出也以母喪至練父在而得出則其餘喪雖無父亦得出也母既可矣諸父灼然既葬大功者謂身有大功之喪既葬之後往弔他喪弔哭而退不聽事焉者謂弔哭既畢則退去不待主人襲斂之事期喪練弔則亦然也期之喪未葬弔於鄉人哭而退不聽事焉者謂姑姊妹無主為之服期喪未至於葬往弔於鄉人之喪哭畢則退不聽待主人襲斂之事焉功衰弔待事不執事者謂此姑姊妹等期喪至既葬受以大功衰謂之功衰至此之後若弔於鄉人其情稍輕於未葬之前得待主人襲斂之事但不親自執事小功緦執事不與於禮者執事檳相也禮饋奠也緦小功服輕故未葬便可弔人今不論鄉人之同異也亦為彼擯相但不得助彼饋奠耳案曾子問云廢喪服可以與於饋奠之事乎孔子曰説衰與奠非禮也以擯相可也是擯相輕而饋奠重也十四弔喪本助事非從主人弔喪者本是來助事非為空隨從主人而巳故云非從主人也四十者執綍者既助主人故使年二十以上至四十強壯者皆執綍也鄉人五十者從反哭者鄉人同鄉之人也五十始衰故待主人窆竟而孝子反哭故鄉人助葬老者亦從孝子反也四十者待盈坎者謂窆竟以土盈滿其坎四十強壯不得即反故待土滿坎而反也若非鄉人則無問長少皆從主人歸優饒逺者十五葬近而反哭者免逺則冠非從柩與反哭無免於堩注云言喪服出入非此二事皆冠也免所以代冠人於道路不可以無飾堩道路正義曰此謂葬近而反哭者若葬逺反哭在路則著冠至郊則乃反著免故小記云逺葬者比反哭者皆冠及郊而后免是也十六哭父母無常聲曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有注云嬰猶鷖彌也言其若小兒亡母啼號安得常聲乎所謂哭不偯十七大夫士從政有正禮權禮正義曰案王制云父母之喪三年不從政齊衰大功三月不從政此云期之喪卒哭而從政九月之喪既葬而從政與王制不同者此庶人依士禮卒哭與既葬同三月故王制省文總云三月也若大夫士三年之喪期不從政是正禮也卒哭金革之事無辟是權禮也十八卒哭而諱卒哭而諱王父母兄弟丗父叔父姑姊妹子與父同諱母之諱宮中諱妻之諱不舉諸其側與從祖昆弟同名則諱注云自此而鬼神事之尊而諱其名父為其親諱則子不敢不從諱也謂王父母以下之親諱是謂士也天子諸侯諱羣祖母之所為其親諱子孫於宫中不言妻之所為其親諱夫於其側亦不言也孝子聞名心瞿凡不言人諱者亦為其相感動也子與父同諱則子可盡曾祖之親也從祖昆弟在其中於父輕不為諱與母妻之親同名重則諱之十九大功小功之末冠嫁取謂卒哭後大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦已雖小功既卒哭可以冠取妻下殤之小功則不可注云此皆謂可用吉禮之時父大功卒哭而可以冠子嫁子小功卒哭而可以取婦己大功卒哭而可以冠子小功卒哭而可以取妻必偕祭乃行也下殤小功齊衰之親除喪而後可為昏禮凡冠者其時當冠則因喪而冠之正義曰大功之末可以冠子可以嫁子者末謂卒哭之後謂己有大功之喪既卒哭可以冠子嫁子也父小功之未可以冠子可以嫁子子可以取婦者謂父有小功喪未可以冠子可以嫁子可以取婦大功之末云身不云父小功之末云父不云身互而相通是嫁及冠於身大功之末可以冠子嫁子小功之末非但得冠子嫁子復可取婦所以取婦必在小功之末者以取婦有酒食之會集鄉黨僚友涉近歡樂故小功之末乃可得為也已雖小功既卒哭可以冠取妻者以前文云父小功之末可以取婦恐已有小功於情為重不得冠取故云已身雖同有小功既卒哭之後可以冠取此文云既卒哭明上云末者並卒哭後也下殤之小功則不可者謂其餘小功可以冠取若本服齊衰下殤降在小功者則不可不可者不可冠嫁也以本服是齊衰重故也若其長殤中殤之大功者庾氏注要記云卒哭之後則得與尋常大功同於大功之末可以身自冠嫁所以然者雖本期年但降在大功其服稍伸故得冠嫁也賀氏云小功下殤本是期親以其重故不得冠取推此而言之降在大功理不得冠嫁矣今謂齊衰下殤尚不可冠取而況齊衰長殤中殤降在大功何可冠嫁庾記非也今從賀義經文大功據已身小功據其父今鄭同之謂父及已身俱有大功之末小功之末故又注云己大功卒哭而可以冠子小功卒哭而可以取妻是父子同也云必偕祭乃行也偕俱也父是大功之末己亦是大功之末乃得行此冠子嫁子父小功之末已亦小功之末可以嫁取必父子俱然乃得行事故云必偕祭乃行知父子俱大功小功者若姑及姊妹出適父子俱為大功若從祖兄弟父為之小功己亦為之小功是父子其服同也若父有齊衰子有大功則不可若父有大功子有小功可以冠嫁末可以取婦必父子俱有小功之末可以取婦若父是小功己在緦麻灼然合取可知又案正本云必偕祭乃行者言為諸吉禮必待祭訖乃行也云下殤小功齊衰之親除喪而後可為昏禮者言除訖可為昏禮則未除喪不可為昏禮經云小功則不可者唯謂昏也其冠嫁則可也二一父母妻有服避樂父有服宫中子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側注云宫中子與父同宫者也禮由命士以上父子異宫不與於樂謂出行見之不得觀也正義曰崔云父有服齊衰以下之服也若重服則期後猶有子姓之冠自當不得與於樂二四無子寡而死族鄰里尹主喪妻黨弗主姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之或曰主之而附於夫之黨注云此謂姑姊妹無子寡而死也夫黨無兄弟無緦之親也其主喪不使妻之親而使夫之族人婦人外成主必宜得夫之姓類喪無無主也里尹閭胥里宰之屬王度記曰百户為里里一尹其祿如庶人在官者里或為士諸侯弔於異國之臣則其君為主里尹主之亦斯義也妻之黨自主之非也夫之黨其祖姑也正義曰云里尹閭胥里宰之屬者案周禮六鄉之內二十五家為里里置一宰下士也引王度記者更證里尹之事案別録王度記云似齊宣王時淳于髠等所説也其記云百户為里里一尹其祿如庶人在官者則里尹之祿也案撰考云古者七十二家為里洛誥傳云古者八家為鄰三鄰為朋三朋為里鄭云蓋虞夏時制也其百戶為里未知何代或云殷制云諸侯弔於異國之臣則其君為主里尹主之亦斯義也者以已國臣在國而死他國君來弔則君為主死者雖有至親不得為主今此婦人死於此里正得里尹主之妻家之親不得為主故云亦斯義也草五葬即反虞天子至士葬即反虞者以其不忍一日末有所歸尊卑皆然草六君於卿大夫疾病葬哭之節卿大夫疾君問之無算士一問之君於卿大夫比葬不食肉比卒哭不舉樂為士比殯不舉樂正義曰案喪大記君於大夫疾三問之此云無算謂有師保恩舊之親故問之無算或可喪大記云三問者謂君自行此云無算謂遣使也草七都家采地之制天子公卿大夫案小司徒職注云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸然則大都公之采地方百里小都卿之采地方五十里家邑大夫采地方二十五里熊氏云以此推之公之大都采地方百里侯伯大都采地方五十里子男大都采地方二十五里以畿外地闊故公之大都與天子大都同也其中都采地無文其小都則下大夫三百家一成之地也一成所以三百家者一成九百夫宫室塗巷山澤三分去一餘有六百夫地又不易再易通率一家而受二夫之地是定稅三百家也草八孔子以士喪禮教孺悲禮得存恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是乎書注云時人轉而僣上士之喪禮巳廢矣孔子以教孺悲國人乃復書而存之草九孟獻子以郊天之對月禘祖失之孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也注云記魯失禮所由也孟獻子魯大夫仲孫蔑也魯以周公之故得以正月日至之後郊天亦以始祖后稷配之獻子欲尊其祖以郊天之月對月禘之非也魯之宗廟猶以夏時之孟月爾明堂位曰季夏六月以禘禮祀周公於大廟正義曰此一節明魯之郊禘之事獻子魯大夫仲孫蔑諡曰獻子正月周正月建子之月也日至冬至日也有事謂南郊祭所出之帝也上帝靈威仰也而周以十一月為正其月日至王云若天子則圎丘魯以周公之故得郊天所以於此月得郊所出之帝靈威仰而已故云正月日至可以有事於上帝也此言是也七月日至可以有事於祖者七月周七月建午之月也日至夏至日也有事謂禘祭於祖廟故云有事於祖獻子言十一月建子冬至既祭上帝故建午夏至亦可禘祖以兩月日至相對故欲祭祖廟與天相對也故云七月日至可以有事於祖也此言非也所以為非者魯之祭祀宗廟亦猶用夏家之法凡大祭冝用首時應禘於孟月孟月於夏家是四月於周為六月故明堂位云季夏六月以禘禮祀周公於大廟是夏之孟月也獻子捨此義欲以此二至相當以天對祖乖失禮意此章與左傳襄七年異三十以魯昭公取同姓自是夫人不命於天子夫人之不命於天子自魯昭公始也汪云亦記魯失禮所由也周之制同姓百丗昏姻不通吳大伯之後魯同姓昭公取於吳謂之吳孟子不告於天子自此後取者遂不告於天子天子亦不命之正義曰諸侯夫人亦天子所命或是王后無畿外之事故天子命畿外諸侯夫人此文是也若畿內諸侯及卿大夫之妻則玉藻注云天子諸侯命其臣后夫人亦命其妻是也卅一孔子拜弔火者廄焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道也注云拜謝之言拜之者為其來弔已宗伯職曰以弔禮哀禍災正義曰廄焚孔子馬廄𬒳火焚也卅二內亂不與然力能討則當討之內亂不與焉外患弗辟也注云謂卿大夫也同僚將為亂已力不能討不與而巳至於鄰國為寇則當死之也春秋魯公子友如陳葬原仲傳曰君子辟內難而不辟外難正義曰引春秋者莊二十七年公羊傳文案彼云公子友如陳葬原仲大夫不書葬此何以書通乎季子之私行也又云君子辟內難而不辟外難內難者何公子慶父公子牙通乎夫人以脅公季子起而治之則不得與于國政坐而視之則親親何休云不忍見其如此故請至于陳而葬原仲時季友不討慶父為不與國政力不能討至莊三十二年季子與國政故逐慶父而鴆叔牙也此注云力不能討亦謂不與國政若與國政力能討之而不討則責之故宣二年晉史董狐書趙盾以弒君云子亡不越竟是也卅三釁廟之禮成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣注云廟新成必釁之尊而神之也宗人先請於君曰請命以釁某廟君諾之乃行卅四路寢生人所居不釁廟器釁路寢成則考之而不釁釁屋者交神明之道也凡宗廟之器其名者成則釁之以豭豚注云言路寢者生人所居不釁者不神之也考之者設盛食以落之爾檀弓曰晉獻文子成室諸大夫發焉是也宗廟名器謂尊彞之屬卅五釁門夾室皆用雞門夾室皆用雞者門廟門也夾室東西廂也其減於廟室故釁不用羊也門與夾室各一雞凡用三雞故云皆也謂釁門夾室用雞之時如上用羊之法亦升屋而割之先門而後夾室者謂先釁門後釁夾室又卑於門也其衈皆於屋下者謂未刲割羊與雞之時先滅耳旁毛以薦神廟則在廟之屋下門與夾室則在門夾室之屋下故云衈訖升屋而釁禮記要義卷第二十一
