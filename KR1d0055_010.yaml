body:
  text: 六王親祭用牛及㹅論牲色王者之祭無不用牛又禮緯云六宗五嶽四瀆之牛角尺則日月以下之祀皆用牛者蓋日月以下常祀則用羊王親祭則用牛故小司徒注云玄冕所祭據王親祭也此郊特牲指用而言故下文云用騂犢故牧人云陽祀用騂牲毛之注云陽祀祭天於南郊及宗廟以此約之夏殷以上祭感生之帝各用其正之色其迎五方之帝其牲上巳備陳帝牛稷牛其牲雖異其色冝同凡配祭之人牲與天同色也其四月大雩九月大饗其天及配人其牲各依當方之色其文武泛配則用大牢其牲色無文周人尚赤當用騂也論語云敢用玄牡敢昭告于皇皇后帝注云帝謂大微五帝用玄牡者彼謂告祭也其四鎮五嶽之等各用當方之色故牧人云望祀各以其方之色牲毛之若尋常山川時祭以下則用純物不隨四方之色若國外表貉磔禳之等則用雜色故牧人云凡時祀之牲則用牷物凡外祭毀事用尨可也其常祀之牲則皆用牡祈禱之祭或用牝唯孟春禁之故月令孟春犧牲無用牝七社稷神州牲幣器服之制社稷大牢者社五土揔神稷是原隰之神功及於人人賴其功故以大牢報祭其牲則􅉳色牧人云隂祀用􅉳牲注云隂祀祭地北郊及社稷也則神州亦用􅉳牲也其昆崘地祗用黃犢故大宗伯黃琮禮地牲幣各放其器之色是也其社稷與神州其樂用大蔟與應鐘故大司樂云乃奏大蔟歌應鍾以祭地祗注云謂神州之神及社稷其玉神州則用兩圭有邸其社稷無文崔氏云玉當與神州同用兩圭有邸以四望亦用兩圭故也其服社稷則絺冕神州與昆崘服無明文八血腥爓孰貴氣饗味之别崔氏云周禮之法郊天燔柴為始宗廟以祼地為始社稷以血為始小祀疈辜為始此云郊血大饗腥三獻爓一獻孰者謂正祭之時薦於尸坐之前也至敬不饗味而貴氣臭也者此解郊血義血氣也夫孰食有味味者為人道人道卑近而天神尊貴事冝極敬極敬不䙝近故用血也用血是貴氣而不重味故云貴氣臭也而宗廟敬降於天故用腥腥稍近味社又降於宗廟故用爓爓又稍近味九三獻之介君專席而酢鄭謂苟敬大饗君三重席而酢焉三獻之介君專席而酢焉此降尊以就卑也注云言諸侯相饗獻酢禮敵也三獻卿大夫來聘主君饗燕之以介為賔賔為苟敬則徹重席而受酢也專猶卑也正義曰三獻卿大夫者以五等諸侯有九獻七獻五獻故五等諸侯之卿皆三獻也大夫卿之揔號若春秋之時則與此禮有異若霸國之卿則禮同子男故昭元年鄭人饗趙孟具五獻籩豆杜元凱云朝聘之制大國之卿五獻其侯伯次國其卿與大國大夫同故昭六年季武子如晉晉人享之武子辭云下臣得貺不過三獻杜云大夫三獻是也云來聘主君饗燕之以介為賔賔為苟敬者案燕禮記云若與四方之賔燕賔為苟敬席于阼階之西北靣其介為賔注云主國君饗時親進醴于賔今燕又冝獻焉人臣不敢䙝煩尊者至此升堂而辭讓欲以臣禮燕為恭敬也於是席之如獻諸公之位言苟敬者賔客主國所冝敬如鄭此言則燕時賔為苟敬饗時則否今此注云饗燕之賔為苟敬連言饗者因燕而連言饗其實饗時賔自為賔不為苟敬也儀禮注苟且也假也疏曰為辭讓故以命介為賔不可全不敬於是席之於阼階西而且敬之十食嘗無樂而嘗亦有樂孤子耆老亦互文饗禘有樂而食嘗無樂隂陽之義也凡飮養陽氣也凡食養隂氣也故春禘而秋嘗春饗孤子秋食耆老其義一也而食嘗無樂飲養陽氣也故有樂食養隂氣也故無聲凡聲陽也注云言義同而或用樂或不用樂也此禘當為禴字之誤也王制曰春禴夏禘正義曰依禮三代無春禘之文周則春曰祠王制夏殷之禮云春曰禴今云春曰禘故知禘當為禴此經所論謂夏殷禮也熊氏云此夏殷禮秋嘗無樂而下文云殷人先求諸陽則秋嘗亦有樂者謂殷人春夏祭時有樂秋冬即無也舉春見夏舉秋見冬也若周則四時祭皆有樂熊氏云春饗孤子亦饗耆老秋食耆老亦食孤子而皇氏云此既破禘為禴故於祭統春禘秋嘗不復更破從此可知也十一孔子屢歎之十二樂以氣化禮以形教賔入大門而奏肆夏示易以敬也卒爵而樂闋孔子屢歎之奠酬而工升歌發德也歌者在上匏竹在下貴人聲也樂由陽來者也禮由隂作者也隂陽和而萬物得注云賔朝聘者易和說也美此禮也以詩之義發明賔主之德匏笙也得得其所正義曰此一節論朝聘之賔及己之臣子有王事勞者設燕饗之禮奏樂之節各依文解之饗禮既亡無可馮據今約大射及燕禮解其奏樂及樂闋之節賔入大門謂朝聘之賔行朝聘既畢受燕饗之時燕則大門是寢門也饗則大門是廟門也卒爵而樂闋者賔至庭樂作乃至主人獻賔賔受爵啐酒拜告旨而樂止賔飲訖酢主人主人受酢畢主人獻公而樂作公飲卒爵而樂止是卒爵而樂闋也此卒爵謂兼賔及主君也依大射禮主人受酢不作樂若其饗時主君親獻賔賔親酢主君賔主俱作樂也孔子屢歎之者孔子見禮入門而縣興卒爵而樂闋屢數也數數歎美此禮善其和易恭敬之義歌者在上匏竹在下貴人聲也解所以不升笙之義也匏笙也竹篪笛也歌是人聲人聲可貴故升之在堂匏竹可賤故在堂下然瑟亦升堂者瑟工隨歌工故也樂由至物得此因上有賔主禮樂之事遂說禮樂之義樂由陽來者也者此明樂也陽天也天氣化故作樂象之樂以氣為化是樂由陽來者也氣化謂五聲八音也禮由隂作也者隂地也地以形生故制禮象之禮以形為教是禮由隂作也形教謂尊卑大小拜伏之事也十五臣出使有私覿從君而行則無庭實私覿何為乎諸侯之庭者當周衰之後有臣從君而行設庭實私覿於主國之庭作記者譏其與君無別也為人臣者無外交不敢二君也者解所以從君而行不敢私覿之意案聘禮臣出使有私覿今云私覿非禮也故知從君行也十六諸侯無饗君禮君有迎諸侯禮天子無客禮莫敢為主焉君適其臣升自阼階臣不敢有其室臣既不敢為主明饗君非禮結上文也春秋之時則有諸侯饗天子故莊二十一年鄭伯享王于闕西辟樂備亂丗非正法也案覲禮天子負斧依南靣侯氏執玉入是不下堂見諸侯也若春朝夏宗則以客禮待諸侯以車出迎熊氏云春夏受三享之時乃有迎法義或然也故齊僕云各以其等為車送逆之節注云節謂王乘車迎賔客及送相去遠近之數是也十七大夫僣諸侯旅樹反坫等臺門而旅樹反坫繡黼丹朱中衣大夫之僣禮也注云言此皆諸侯之禮也旅道也屏謂之樹樹所以蔽行道管氏樹塞門塞猶蔽也禮天子外屏諸侯內屏大夫以簾士以帷反坫反爵之坫也蓋在尊南兩君相見主君既獻於反爵焉繡黼丹朱以為中衣領緣也繡讀為綃綃繪名也詩云素衣朱綃又云素衣朱襮襮黼領也十八魯立文王廟三家見而僣焉諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也由三桓始也注云言仲孫叔孫季孫氏皆立桓公廟魯以周公之故立文王廟三家見而僣焉十九諸侯有祖天子者王子弟亦得立祖王廟魯得立文王廟者案襄十二年秋吳子壽夢卒臨於周廟禮也注云周廟謂文王廟也古春秋左氏說天子之子以上德為諸侯者得祖所自出魯以周公之故立文王廟左傳宋祖帝乙鄭祖厲王猶上祖也又曰凡邑有宗廟先君之主曰都以其有先君之主公子為大夫所食采地亦自立所出公廟其立先公廟準禮公子得祖先君公孫不得祖諸侯許愼謹案周公以上德封於魯得郊天兼用四代之禮樂知亦得祖天子諸侯有得祖天子者知大夫亦得祖諸侯鄭氏無駮與許愼同也其王子母弟無大功德不得出封食采畿內賢於餘者亦得采地之中立祖王廟故都宗人家宗人皆為都家祭所出祖王之廟也二十天子存二代後天子存二代之後猶尊賢也尊賢不過二代注云過之遠難法也二或為三二一存二王後封三恪案異義公羊說存二王之後所以通天三統之義引此文古春秋左氏說周家封夏殷二王之後以為上公封黃帝堯舜之後謂之三恪許愼謹案云治魯詩丞相韋玄成治易施犨等說引外傳曰五王之樂可得觀乎知王者所封五代而巳而與左氏說同鄭駮之云所存二王之後者命使郊天以天子之禮祭其始祖受命之王自行其正朔服色恪者敬也敬其先聖而封其後與諸侯無殊異何比夏殷之後如鄭此言公羊自據二王之後左氏兼論三恪義不乖異也熊氏云周之三恪越少昊髙辛遠存黃帝者取其制作之人故易繫辭云神農氏沒黃帝堯舜氏作義當然也二二孔子朝服立阼存室神鄉人禓孔子朝服立于阼存室神也注云裼強鬼也謂時儺索室毆疫逐強鬼也禓或為獻或為儺神依人也正義曰驅逐強鬼恐已廟室之神時有驚恐故著朝服立于廟之阼階存安廟室之神使神依己而安也所以朝服者大夫朝服以祭故用祭服以依神二三繹祊朝市之失孔子曰繹之於庫門內祊之於東方朝市之於西方失之矣注云祊之禮冝於廟門外之西室繹又於其堂神位在西也此二者同時而大名曰繹其祭禮簡而事尸禮大朝市冝於市之東偏周禮市有三期大市日側而市百族為主朝市朝時而市啇賈為主夕市夕時而市販夫販婦為主正義曰釋宫云閍謂之門孫炎云謂廟門外又引詩云祝祭於祊故知廟門也知廟門外者禮器云為祊乎外故知在外也以西是鬼神之位室又求神之處故知在廟門外之西室云繹又於其堂者祊是求神之名繹是接尸之稱求神在室接尸在堂故云繹又於其堂云此二者同時而大名曰繹者祊是室內求神繹是堂上接尸一時之事故云二者同時案春秋宣八年壬午猶繹釋文云繹又祭詩絲衣云繹賔尸但有繹名而無祊稱是大名曰繹云其祭禮簡而事尸禮大者案儀禮有司徹是上大夫儐尸也但於堂上獻尸獻侑全無室中之事又絲衣云自堂徂基自羊徂牛是祭神也下云兕觥其觩旨酒思柔是接尸也二五社墉社屋社義社事社田社粢社祭土而主隂氣也君南鄉於北墉下答隂之義也日用甲用日之始也天子大社必受霜露風雨以逹天地之氣也是故喪國之社屋之不受天陽也薄社北牖使隂明也社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中􅋼而國主社示本也唯為社事單出里唯為社田國人畢作唯社丘乘共粢盛所以報本反始也注云牆謂之墉北墉社內北牆云用甲之始者國中之神莫貴於社大社王為羣姓所立北墉者絶其陽通其隂而巳薄社殷之社殷始都薄中􅋼亦土神也單出里皆往祭社於都鄙二十五家為里畢作大則盡行非徒羡也丘十六井也四丘六十四井曰甸或謂之乘乘者以於車賦出長轂一乘乘或為鄰正義曰社祭土而主隂氣也者土謂五土山林川澤丘陵墳衍原隰也以時祭之故云社祭土土是隂氣之主社既主隂隂冝在北故祭社時以社在南設主壇上北靣而君來在北牆下而南鄉祭之是對隂之義也風雨至則萬物生霜露降則萬物成故不為屋以受霜露風雨霜露風雨至是天地氣通也故云逹天地之氣也白虎通云王者諸侯必有誡社者何示有存亡也明為善者得之為惡者失之薄社北牖使隂明也者即喪國社也殷始都薄故呼其社為薄社也周立殷社為戒而屋之塞其三靣唯開北牖示絶陽而通隂隂明則物死也社所以神地之道也者言立社之祭是神明於地之道地有其物天上皆垂其象所謂在天成象在地成形也取財於地者地須財財並在地出為人所取也取法於天者人知四時早晚皆放日月星辰以為耕作之候中􅋼謂土神卿大夫之家主祭土神在於中􅋼而國主社者謂天子諸侯之國主祭土神於社示本也者以土神生財以養官之與民故皆主祭土神示其生養之本也若祭社則合里之家並盡出故云單出里也此唯每家出一人不人人出也唯為社田國人畢作者田獵也畢盡也作行也既人人得社福故若祭社先為社獵則國中之人皆盡行無得住家也唯社丘乘共粢盛者嚮說祭社用牲此明祭社用米也丘乘者都鄙井田也九夫為井四井為邑四邑為丘四丘為乘唯祭社而使丘乘共於粢盛也粢稷也稷曰明粢在器曰盛庾蔚云粢盛所須者少故丘乘共之也皇氏云若天子諸侯祭社則用藉田之榖大夫以下無藉田若祭社則丘乘之民共之示民出力也草六鄭以社為地神王肅以為人鬼社稷之義先儒所解不同鄭康成之說以社為五土總神稷為原隰之神句龍以有平水土之功配社祀之稷有播種之功配稷祀之鄭必以為此說者案郊特牲云社祭土而主隂氣又云社所以神地之道又禮運云命降于社之謂殽地又王制云祭天地社稷為越紼而行事據此諸文故知社即地神稷是社之細别别名曰稷稷乃原隰所生故以稷為原隰之神若賈逵馬融王肅之徒以社祭句龍稷祭后稷皆人鬼也非地神故聖證論王肅難鄭云禮運云祀帝於郊所以定天位祀社於國所以列地利社若是地應云定地位而言列地利故知社非地也為鄭學者馬昭之等通之云天體無形故須云定位地體有形不須云定位故唯云列地利肅又難鄭云祭天牛角繭栗而用特牲祭社用牛角尺而用大牢又祭天地大裘而冕祭社稷絺冕又唯天子令庶民祭社社若是地神豈庶民得祭地乎為鄭學者通之云以天神至尊而簡質事之故牛角繭栗而用特牲服著大裘天地至尊天子至貴天子祭社是地之别體有功於人報其載養之功故用大牢貶降於天故角尺也祭用絺冕取其隂類庶人蒙其社功故亦祭之非是方澤神州之地也肅又難鄭云召誥用牲于郊牛二明后稷配天故知二牲也又云社于新邑牛一羊一豕一明知唯祭句龍更無配祭之人為鄭學者通之云是后稷與天尊卑既别不敢同天牲句龍是上公之神社是地祗之别尊卑不甚縣絶故云配同牲也肅又難鄭云后稷配天孝經有配天明文后稷不稱天也祭法及昭二十九年傳云句龍能平水土故祀以為社不云祀以配社明知社即句龍也為鄭學者通之云后稷非能與天同功唯尊祖配之故云不得稱天句龍與社同功故得云祀以為社而得稱社也肅又難云春秋說伐鼓於社責上公不云責地祗明社是上公也又月令命民社鄭注云社后土也孝經注云社后土也句龍為后土鄭既云社后土則句龍也是鄭自相違反為鄭學者通之云伐鼓責上公者以日食臣侵君之象故以責上公言之句龍為后土之官其地神亦名后土故左傳云君戴皇天而履后土地稱后土與句龍稱后土名同而無異也鄭注云后土者謂地神也非謂句龍也故中庸云郊社之禮注云社祭地神又鼓人云以靈鼓鼓社祭注云社祭祭地祇也是社為地祇也二七天子諸侯皆有二社其社稷制度白虎通云天子之社壇方五丈諸侯半之說者又云天子之社封五色土為之若諸侯受封各割其方色土與之則東方青南方赤之等是也上皆以黃土也其天子諸侯皆有二社者祭法云王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社是各有二社又各有勝國之社故此云喪國之社屋之是天子有之也案春秋亳社災公羊云亡國之社蓋掩之掩其上而柴其下是魯有之也襄三十年左傳云鳥鳴于亳社是宋有之也此是天子諸侯二社之義二八立社之處其所置之處小宗伯云右社稷左宗廟鄭云庫門內雉門外之左右為羣姓立社者在庫門內之西自為立者在藉田之中其亡國之社榖梁傳云亡國之社以為廟屏戒或在廟或在庫門內之東則亳社在東也故左傳云閒于兩社為公室輔魯之外朝在庫門之內東有亳社西有國社朝廷執政之處故云閒于兩社也二九大夫與民得立里社其卿大夫以下案祭法云大夫以下成羣立社曰置社注云大夫不得特立社與民族居百家以上則共立一社今時里社是也如鄭此言則周之政法百家以上得立社其秦漢以來雖非大夫民二十五家以上則得立社故云今之里社又鄭志云月令命民社謂秦社也自秦以下民始得立社也三十社以所冝之木其大夫以下所置社者皆以土地所冝之木則論語云夏后氏以松殷人以柏周人以栗故大司徒云而樹之田主各以其野之所冝木是也其天子大社之等案尚書無逸篇曰大社唯松東社唯柏南社唯梓西社唯栗北社唯槐三一凡社皆有稷勝國之社稷刑官為尸其天子諸侯大夫等皆有稷也故注司徒田主田神后土田正之所依也田正則稷神也田主尚然故知天子諸侯社皆有稷其亡國之社亦有稷故士師云若祭勝國之社稷則為之尸是有稷也但亡國之社稷故略之用刑官為尸則其祭餘社為尸不用刑官也三二社祭有三主蓋用石其社之祭一歲有三仲春命民社一也詩云以社以方謂秋祭二也孟冬云大割祠于公社是三也其社主用石故鄭注宗伯云社之主蓋用石三三社稷並壇共門北嚮用玉無文三四社公非上公案條牒論稷壇在社壇西俱北嚮營並壇共門或曰在社壇北其用玉無文不可強言今禮用兩圭有邸異義今孝經說曰社者土地之主土地廣博不可遍敬封五土以為社古左氏說共工為后土后土為社許君謹案亦曰春秋稱公社今人謂社神為社公故知社是上公非地祇玄駮之云社祭土而主隂氣又云社者神地之道謂社神但言上公失之矣今人亦謂雷曰雷公天曰天公豈上公也三五鄭文辨社稷神非句龍柱棄異義稷神今孝經說稷者五榖之長榖衆多不可遍敬立稷而祭之古左氏說列山氏之子曰柱死祀以為稷稷是田正周棄亦為稷自商以來祀之許君謹案禮緣生及死故社稷人事之既祭稷榖不得但以稷米祭稷反自食同左氏義鄭駮之云宗伯以血祭祭社稷五祀五嶽社稷之神若是句龍柱棄不得先五嶽而食又引司徒五土名又引大司樂五變而致介物及土示土示五土之總神即謂社也六樂於五地無原隰而有土祇則土祇與原隰同用樂也又引詩信南山云畇畇原隰下之黍稷或云原隰生百榖黍為之長然則稷者原隰之神若逹此義不得以稷米祭稷為難三六單出里皆往祭社於都鄙單出里皆往祭社於都鄙者案周禮都鄙公卿大夫采地此卿大夫祭社其里之人皆往就祭此據采地言之故云往祭社於都鄙必知據采地者以經云唯社丘乘丘乘是采地井田之制故舉采地言焉其公邑之民所屬鄼鄙縣遂有祭社之事則亦往鄼鄙中助之其六鄉之內族祭酺黨祭禜雖滿百家以上不祭社也唯其州祭社其所屬閭民祭社祭禜祭酺之時亦皆往也但此文主於社故特言社耳三七季春火出而民乃用火今出火誓社誤季春出火為焚也然後簡其車賦而歷其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽而鹽諸利以觀其不犯命也注云謂焚萊也凡出火以火出建辰之月火始出簡歷謂算具陳列之也君親誓社誓吏士以習軍旅既而遂田以祭社也言祭社則此是仲春之禮也仲春以火田田止弊火然後獻禽至季春火出而民乃用火今云季春出火乃誓社記者誤也社或為省流猶行也行行田也鹽讀為艷行田示之以禽使歆艷之觀其用命不也謂禽為利者凡田大獸公之小禽私之三八三王之郊一用建寅之月郊之祭也迎長日之至也注云易說曰三王之郊一用夏正夏正建寅之月也此言迎長日者建卯而晝夜分分而日長也正義曰明郊祭用夏正建寅之月意以二月建卯春分後日長今正月建寅郊祭通而迎此長日之將至寅賔出日皆謂春分知此迎長日非春分者此云兆於南郊就陽位若是春分朝日當在東郊故知非也又下云帝牛不吉以為稷牛故知祭天非唯祭日也三九祭日月之處之時之牲凡祭日月之禮崔氏云一歲有四迎氣之時祭日於東祭月於西故小宗伯云兆五帝於四郊四望四類亦如之是其一也春分朝日秋分夕月是其二也此等二祭日之與月各祭於一處日之與月皆為壇而祭所謂王宫祭日夜明祭月皆為燔柴也夏正郊天之時而主日配以月祭義云大報天而主日配以月是其三也孟冬大蠟之時又祭日月故月令孟冬祈來年于天宗是其四也此二祭并祭日月共在一處則祭日於壇祭月於坎壇則實柴坎則瘞埋也其牲皆用犢故小司徒云凡小祭祀奉牛牲鄭云小祭祀王玄冕所祭是也若所祈禱則用少牢故祭法云埋少牢於泰昭祭時及日月等鄭注云凡此以下皆祭用少牢是也四十王肅謂周始郊用建子月鄭氏非之郊之用辛也周之始郊日以至注云言日以周郊天之月而至陽氣新用事順之而用辛日此說非也郊天之月而日至魯禮也三王之郊一用夏正魯以無冬至祭天於圎丘之事是以建子之月郊天示先有事也用辛日者凡為人君當齊戒自新耳周衰禮廢儒者見周禮盡在魯因推魯禮以言周事正義曰王肅用董仲舒劉向之說以此為周郊上文云郊之祭迎長日之至謂周之郊祭於建子之月而迎此冬至長日之至也而用辛者以冬至陽氣新用事故用辛也周之始郊日以至者對建寅之月又祈榖郊祭此言始者對建寅為始也鄭康成則異於王肅上文云迎長日之至自據周郊此云郊之用辛據魯禮也言郊用辛日者取齊戒自新周之始郊日以至者謂魯之始郊日以冬至之月云始者對建寅之月天子郊祭魯於冬至之月𥘉始郊祭示先有事故云始也謂董仲舒劉向而為此說所以非者案周禮冬至祭天圎丘不論郊也又此下云戴冕璪十有二旒周禮祀昊天上帝則大裘而冕是服不同周禮玉路以祀天此下云乘素車是車不同也祭法燔柴於泰壇用騂犢周禮蒼璧禮天牲從玉色是牲不同也爾雅曰非人為之丘泰壇則人功所作是圎丘與泰壇別也以是知郊與圎丘所祭非一故云此說非也四一鄭謂冬至郊天魯禮王肅謂魯亦有二郊明堂云魯君孟春乘大路載弧韣旗十有二旒日月之章祀帝于郊又雜記云正月日至可以有事於上帝故知冬至郊天魯禮也云三王之郊一用夏正者證明天子之郊必用夏正魯既降下天子不敢郊天與周同月故用建子之月而郊天欲示在天子之先而有事也但魯之郊祭師說不同崔氏皇氏用王肅之說以魯冬至郊天至建寅之月又郊以祈榖故左傳云啓蟄而郊又云郊祀后稷以祈農事是二郊也若依鄭康成之說則異於此也魯唯一郊不與天子郊天同月轉卜三正聖證論馬昭引榖梁傳以答王肅之難是魯一郊則止或用建子之月郊則此云日以至及宣三年正月郊牛之口傷是也或用建寅之月則春秋左傳云郊祀后稷以析農事是也旦春秋魯禮也無建丑之月耳若杜預不信禮記不取公羊榖梁魯唯有建寅郊天及龍見而雩四二王肅又難鄭郊用夏正嚳配圎丘之說案聖證論王肅難鄭云郊特牲曰郊之祭迎長日之至下云周之始郊日以至玄以為迎長日謂夏正也郊天日以至玄以為冬至之日說其長日至於上而妄為之說又徙其始郊日以至於下非其義也玄又云周衰禮廢儒者見周禮盡在魯因推魯禮以言周事若儒者愚人也則不能記斯禮矣茍其不愚不得亂於周魯也鄭玄以祭法禘黃帝及嚳為配圎丘之祀祭法說禘無圎丘之名周官圎丘不名為禘是禘非圎丘之祭也玄既以祭法禘嚳為圎丘又大傳王者禘其祖之所自出而玄又施之於郊祭后稷是亂禮之名實也案爾雅云禘大祭也繹又祭也皆祭宗廟之名則禘是五年大祭先祖非圎丘及郊也周立后稷廟而嚳無廟故知周人尊嚳不若后稷之廟重而玄說圎丘祭天祀大者仲尼當稱昔者周公禘祀嚳圎丘以配天今無此言知禘配圎丘非也又詩思文后稷配天之頌無帝嚳配圎丘之文知郊則圎丘圎丘則郊所在言之則謂之郊所祭言之則謂之圎丘於郊築泰壇象圎丘之形以丘言之本諸天地之性故祭法云燔柴於泰壇則圎丘也郊特牲云周之始郊日以至周禮云冬至祭天於圎丘知圎丘與郊是一也言始郊者冬至陽氣𥘉動天之始也對啓蟄又將郊祀故言始孔子家語云定公問孔子郊祀之事孔子對之與此郊特牲文同皆以為天子郊祭之事如聖證論之言王肅所據經傳分明鄭必別為其說者案聖證論馬昭申鄭云易緯云三王之郊一用夏正則周天子不用日至郊也夏正月陽氣始升日者陽氣之主日長而陽氣盛故祭其始升而迎其盛月令天子正月迎春是也若冬至祭天隂氣始盛祭隂迎陽豈為理乎周禮云冬日至祭天於地上之圎丘不言郊則非祭郊也言凡地上之丘皆可祭焉無常處故不言郊周官之制祭天圎丘其禮王服大裘而冕乘玉路建大常明堂位云魯君以孟春祀帝于郊服衮服乘素車龍旗衣服車旗皆自不同何得以諸侯之郊說天子圎丘言始郊者魯以轉卜三正以建子之月為始故稱始也四三二家又辨祭天之月日案聖證論王肅與馬昭之徒或云祭天用冬至之日或云用冬至之月據周禮似用冬至之日據禮記郊日用辛則冬至不恆在辛似用冬至之月案張融謹案郊與圎丘是一又引韓詩說三王各正其郊與王肅同又魯以轉卜三正王與鄭玄同周禮圎丘服大裘此及家語服衮冕家語又云臨燔柴脫衮冕著大裘象天臨燔柴輟祭脫衮著大裘象天恭敬之義既自不通是張融以家語及此經郊祭並為魯禮與鄭玄同融又為圎丘是祭皇天孟春祈榖於上帝及龍見而雩此五帝之等並是皇天之優其實天也融又云祀大神率執事而卜日圎丘既卜日則不得正用冬至之日此是張融之說鄭此注云以建子之月郊天用辛日者當齊戒自新如鄭此言是亦不用冬至日也但郊丘大事王鄭不同故略陳二家所據而言之也案聖證論及異義皆同榖梁之義魯轉卜三正之內一郊則止而崔氏皇氏以為魯冬至郊天夏正又郊凡二郊非鄭義也四四王卜郊及聽誓命聽祭報之節卜郊受命于祖廟作龜于禰宫尊祖親考之義也卜之日王立于澤親聽誓命受教諌之義也獻命庫門之內戒百官也大廟之命戒百姓也祭之日王皮辨以聽祭報示民嚴上也注云受命謂告之退而卜澤澤宫也所以擇賢之宫也既卜必到澤宫擇可與祭祀者因誓勑之以禮也禮器曰舉賢而置之聚衆而誓之是也王自澤宫而還以誓命重相申勑也庫門在雉門之外入庫門則至廟門外矣大廟祖廟也百官公卿以下也百姓王之親也入廟戒親親也王自此還齊路寢之室庫或為廄報猶白也夙興朝服以待白祭事者乃後服祭服而行事也周禮祭之日小宗伯逆粢省鑊告時于王告備于王也四五汜掃反道田燭汜掃反道鄉為田燭注云謂郊道之民為之也反道剗令新土在上也田燭田首為燭也正義曰郊道之民家家各當界廣掃新道也鄉為田燭者鄉謂郊內六鄉也六鄉之民各於田首設燭照路恐王嚮郊之早四六鄭謂王𬒳衮以下皆魯禮祭之日王𬒳衮以象天戴冕璪十有二旒則天數也乘素車貴其質也旗十有二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也注云謂有日月星辰之章此魯禮也周禮王祀昊天上帝則服大裘而冕祀五帝亦如之魯侯之服自衮冕而下也天之大數不過十二設日月畫於旗上素車殷路也魯公之郊用殷禮也明謂則之以示人也正義曰魯公得稱王者作記之人既以魯禮而為周郊遂以魯侯而稱王也皇氏云魯用王禮故稱王或亦當然也魯公之郊用殷禮也者公羊傳云周公用白牡魯公用騂犅周公既用殷之白牡故知用殷禮也四七周歲終索饗歲十二月合聚萬物而索饗之也注云歲十二月周之正數謂建亥之月也饗者祭其神也萬物有功加於民者神使為之也祭之以報焉造者配之也四八天子大蠟八諸侯亦有蠟大蠟八者即鄭注云先嗇一司嗇二農三郵表畷四猫虎五坊六水庸七昆蟲八所祭之神合聚萬物而索饗之但以此八神為主蠟云大者是天子之蠟對諸侯為大天子既有八神則諸侯之蠟未必八也謂若先嗇古之天子諸侯未必得祭也知諸侯亦有蠟者禮運云仲尼與於蠟賔四九神農伊耆一代總號明堂云土鼓葦籥伊耆氏之樂禮運云夫禮之𥘉始諸飲食蕢桴而土鼓俱稱土鼓則伊耆氏神農也以其𥘉為田事故為蠟祭以報天也下云主先嗇神農既為始蠟豈自祭其身以為先嗇乎皇氏云神農伊耆一代總號其子孫為天子者始為蠟祭祭其先祖造田者故有先嗇也五十郵表畷田畯所處饗農及郵表畷禽獸仁之至義之盡也注云農田畯也郵表畷謂田畯所以督約百姓於井間之處也詩云為下國畷郵禽獸服不氏所教擾猛獸也正義曰農謂古之田畯有功於民郵表畷者是田畯於井間所舍之處郵若郵亭屋宇處所表田畔畷者謂井畔相連畷於此田畔相連畷之所造此郵舍田畯處焉五一祭水土昆蟲草木有辭正義曰蠟有八神恐祭處各別故言則祭同處可知也陳辭有水土昆蟲草木者以其無知故特有辭也而先嗇之屬有知故不假辭也據此祭草木有辭則草木當有神八蠟不數之者以草木遍地皆是不如坊與水庸之屬各指一物故不數五二祭蠟以素服黃冠之等案周禮籥章云國祭蠟則吹豳頌擊土鼓息老物以物老故素服物老將終故葛帶榛杖素服衣裳皆素者謂白素衣積素裳經直云素服以送終不云皮辨者從上省文也田夫則野夫也野夫著黃冠黃冠是季秋之後草色之服故息田夫而服之也五三羅氏致鹿與女而詔客羅氏致鹿與女而詔客告也者詔亦告也客謂貢鳥獸之使者羅氏先受貢畢使者臨去羅氏又以鹿及女子致與使者而宣天子之詔於使者令使者反還其國以告戒其君曰不得好田獵及女色使國亡也言鹿是田獵所得之物女是亡國之女而王所以獲者也故與之鹿女明以此為戒也一云豈每國輒與女鹿邪正當羅氏以鹿與女示使者爾五四息民為臘與蠟異既蠟而收民息巳故既蠟君子不興功注云收謂收斂積聚也息民與蠟異則黃衣黃冠而祭為臘必矣正義曰上文雖云黃衣黃冠而祭不云臘之與蠟似為一此文云既蠟而收民息巳先蠟後息民是息民為臘與蠟異也前黃衣黃冠在蠟祭之下故知是臘也是以云為臘必矣故月令臘在祈天宗之下但不知臘與蠟祭相去幾日准隋禮及今禮皆蠟之後日經云既蠟不興功者謂不興農功若其土功則左氏傳云龍見而畢務戒事也火見而致用水昏正而裁日至而畢土功建亥之月起日至而畢也五五席羮圭車尚質莞簟之安而蒲越槀鞂之尚明之也大羮不和貴其質也大圭不琢美其質也丹􅃮雕幾之美素車之乘尊其朴也注云蒲越槀鞂藉神席也明之者神明之也琢當為篆字之誤也幾謂􅃮飾沂鄂也正義曰云蒲越槀鞂藉神席也者今禮及隋禮槀鞂為祭天席蒲越為配帝席俱藉神也云幾謂􅃮飾沂鄂也者幾與畿字相涉畿是畿限之所故以幾為沂鄂也五六大古冠布齊則緇之大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也注云大古無飾非時人緌也雜記曰大白緇布之冠不緌大白即大古白布冠今喪冠也齊則緇之者鬼神尚幽暗也唐虞以上曰大古也此重古而冠之耳三代改制齊冠不復用也以白布冠質以為喪冠也正義曰唐虞既用之為齊冠三代改唐虞之制齊冠不復用之以委貌章甫牟追三代去緇布冠其唐虞白布冠三代用之為喪冠緇布冠既棄而不用所以詩彼都人士臺笠緇撮注云緇撮緇布冠者彼謂儉且質故著古冠耳五七冠禮三加之節案士冠禮三加者謂冠時三遍加冠也至冠日賔至而主人設冠身之席于阼階上近主人之北又設笄纚櫛具于席南冠身立于東房賔揖冠身出就位佐冠為冠身梳頭著纚畢賔洗手為正髻正髻畢往西階至第一等受取緇布冠還至冠席前跪為冠身著冠著冠畢冠身起入東房著玄端玄裳士子皆隨其父朝夕之服朝用玄衣素裳夕用上士玄裳中士黃裳下士雜裳雜裳前黃後玄若大夫以上至天子當同上士玄裳也畢又揖冠身出就位就位畢賔又下西階至第二等受皮辨冠還為冠身著冠然後又著爵辨其儀皆如緇布冠也五八冠禮以士為正然天子諸侯亦有前所明悉士禮故無大夫冠禮也所以然者二十而冠五十爵為大夫故無大夫冠禮也然四十強而仕亦應無士冠禮而云士有冠禮者士是有識之目故立禮悉用士為正所以五等並依士禮冠子也若試為大夫者亦用士禮故鄭注冠禮記云周之𥘉禮年未五十而有賢才者試以大夫之事猶服士服行士禮公侯之有冠禮夏之末造也者明夏𥘉以前諸侯未有冠禮與士冠同其夏末以來諸侯有冠禮與士禮異故大戴禮有公冠篇加玄冕為四加也皇氏云諸侯亦三加與大戴禮違其義非也此經直明諸侯不云天子又下云天子之元子猶與士同則天子與士異也然則天子冠禮其來巳久但無文以言之玉藻云玄冠朱組纓天子之冠也鄭注云始冠之冠也是天子別有冠禮五五玄冕齊戒親迎鬼神隂陽也玄冕齊戒廣陳敬事也玄冕謂助祭服也五冕通玄故合為玄冕也今用助祭之服以親迎也齊戒者齊戒自整勑也鬼神隂陽也者隂陽謂夫婦也著祭服而齊戒親迎是敬此夫婦之道如事鬼神故云鬼神隂陽也將以為社稷主為先祖後而可以不致敬乎者釋所為者重故冝用敬所以冕而親迎也妻為內主故有國者是為社稷內主也始此嗣廣後丗故云先祖後也明如此之重可以不致敬乎六十祭求諸隂陽周人尚臭灌用鬯臭鬱合鬯臭隂逹於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽逹於牆屋故既奠然後􅌊蕭合羶薌凡祭愼諸此魂氣歸于天形魄歸于地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂詔祝於室坐尸於堂用牲於庭升首於室直祭祝于主索祭祝于祊注云灌謂以圭瓚酌鬯始獻神也巳乃逆牲於庭殺之天子諸侯之禮也奠謂薦孰時也特牲饋食所云祝酌奠于鉶南是也蕭薌蒿也染以脂合黍稷燒之詩云取蕭祭脂羶當為馨聲之誤也奠或為薦此其所以先後異也謂朝事時也朝事延尸于户西南靣布主席東靣取牲膟膋燎于爐炭洗肝于鬱鬯而燔之入以詔神於室又出以墮于主主人親制其肝所謂制祭也時尸薦以籩豆至薦孰乃更延主于室之奧尸來升席自北方坐于主北焉謂殺之時制祭之後升牲首於北墉下尊首尚氣也謂薦孰時也如特牲少牢饋食之為也直正氣祭以孰為正則血腥之屬盡敬心耳索求神也廟門曰祊謂之祊者以於繹祭名也六一詔妥尸尸無事則立舉斚角詔妥尸古者尸無事則立有事而后坐也尸神象也祝將命也注云妥安坐也尸始入舉奠斚若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也天子奠斚諸侯奠角古謂夏時也六二求隂求陽鬼神在天地之間聲是陽故用樂之音聲號呼告於天地之間庶神明聞之而來是先求陽之義也周人尚臭者周禮變於殷故先求隂尚臭也灌用鬯臭者臭謂鬯氣也未殺牲先酌鬯酒灌地以求神是尚臭也六三疏謂祊有正日明日二義索祭祝于祊者索求也廣博求神非但在廟又為求祭祝官行祭在於祊也祊謂廟門祭于廟門凡祊有二種一是正祭之時既設祭於廟又求神於廟門之內詩楚茨云祝祭于祊注云祊門內平生待賔客之處與祭同日也二是明日繹祭之時設饌於廟門外西室亦謂之祊即上文云祊之于東方注云祊之禮冝于廟門外之西室是也今此索祭于祊當是正祭日之祊矣知者禮器云為祊乎外以其稱外故注云祊祭明日之繹祭鄭又注上祊之于東方云祊之禮冝於廟門外之西室此經直云祊不云外又注直云廟門曰祊亦不云外是據正祭日祊也故下云肵之為言敬也相饗之也嘏大也血毛告幽全之物是皆據正祭之日明此祊亦正祭日六四肺肝心為氣主血是氣所舍祭肺肝心貴氣主也此三者並為氣之宅故祭時先用之是貴於氣之主故也血是氣之所舍故云盛氣也三者非即氣故云氣之主也六五燔膟膋有二時正義曰凡祭血腥之時巳有膟膋燔燎故前文詔祝於室鄭注云取牲膟膋燎于爐炭洗肝于鬱鬯而燔之是也至薦孰之時又取膟膋而燔之故上經云蕭合黍稷故既奠然後焫蕭合馨香故鄭此注云與蕭合燒之饋孰時也云亦有黍稷也者非但有蕭與膟膋兼有黍稷故云亦也六六大夫三廟上中士二廟一廟之制正義曰熊氏云經既稱國家則兼諸侯及大夫今注直云諸侯者注文略也大夫三廟亦事曽祖而得稱曽孫也其諸侯大夫事祖禰之時亦稱孝子孝孫事曽祖以上雖是內事則同於外稱故下曲禮云諸侯內事曰孝子某侯某外事曰曽孫某侯某是也此記不云某侯者略也上士二廟祖禰各一廟中下士一廟祖禰共廟前經注云謂祖禰據上士也禮記要義卷第十一
