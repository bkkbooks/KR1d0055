front:
  text: 禮記要義卷第十一郊特牲一王鄭天帝之同異二家語王肅私定先儒說郊其義有二案聖證論以天體無二郊即圎丘圎丘即郊鄭氏以為天有六天丘郊各異今具載鄭義兼以王氏難鄭氏謂天有六天天為至極之尊其體秖應是一而鄭氏以為六者指其尊極清虛之體其實是一論其五時生育之功其別有五以五配一故為六天據其在上之體謂之天天為體稱故說文六天顚也因其生育之功謂之帝帝為德稱也故毛詩傳云審諦如帝故周禮司服云王祀昊天上帝則大裘而冕祀五帝亦如之五帝若非天何為同服大裘又小宗伯云兆五帝於四郊禮器云饗帝於郊而風雨節寒暑時帝若非天焉能令風雨寒暑時孝經何得云嚴父配天也而賈逵馬融王肅之等以五帝非天唯用家語之文謂大暭炎帝黃帝五人帝之屬其義非也又先儒以家語之文王肅私定非孔子正旨三王肅以郊丘是一鄭氏以為二王肅以郊丘是一而鄭氏以為二者案大宗伯云蒼壁禮天典瑞又云四圭有邸以祀天是玉不同宗伯又云牲幣各放其器之色則牲用蒼也祭法又云燔柴於泰壇用騂犢是牲不同也又大司樂云凡樂圜鐘為宫黃鐘為角大蔟為徴姑洗為羽冬日至於地上之圜丘奏之若樂六變則天神皆降上文云乃奏黃鐘歌大吕舞雲門以祀天神是樂不同也故鄭以為蒼璧蒼犢圜鐘之等為祭圎丘所用以四圭有邸騂犢及奏黃鐘之等以為祭五帝及郊天所用王肅以郊特牲周之始郊日以至與圎丘同配以后稷鄭必以為異圎丘又以帝嚳配者鄭以周郊日以至自是魯禮故注郊特牲云周衰禮廢儒者見周禮盡在魯因推魯禮以言周事鄭必知是魯禮非周郊者以宣三年正月郊牛之口傷是魯郊用日至之月案周郊祭天大裘而冕郊特牲云王𬒳衮戴冕璪十有二旒故知是魯禮非周郊也又知圎丘配以帝嚳者案祭法云周人禘嚳而郊稷禘嚳在郊稷之上稷卑於嚳以明禘大於郊又爾雅云禘大祭也大祭莫過於圎丘故以圎丘為禘也圎丘比郊則圎丘為大祭法云禘嚳是也若以郊對五時之迎氣則郊為大故大傳云王者禘其祖之所自出故郊亦稱禘其宗廟五年一祭比每歲常祭為大故亦稱禘也四祭天之服之樂之玉之器之處之配五祭天無祼七獻皇氏云天有六天歲有八祭冬至圎丘一也夏正郊天二也五時迎氣五也通前為七也九月大饗八也雩與郊禖為祈祭不入數崔氏以雩為常祭九也凡祭天其服皆大裘周禮司服文其尸服亦大裘故節服氏云郊祀裘冕送逆尸是也其樂除圎丘所用圜鐘為宫之外皆奏黃鐘歌大吕舞雲門故大司樂云乃奏黃鐘歌大吕以祀天神注云天神謂五帝及日月星辰也王者又各以夏正月祀其所受命之帝於南郊是也其玉圎丘用蒼璧夏正郊天用四圭有邸其五時迎氣東方用青圭南方用赤璋西方用白琥北方用玄璜其中央無文先師以為亦用黃琮熊氏以為亦用赤璋鄭注宗伯云璧圎象天琮八方象地圭鋭象春物𥘉生半圭曰璋象夏物半死琥猛象秋嚴半璧曰璜象冬月閉藏地上無物唯天半見其牲幣各放其玉之色案天色玄而用蒼犢者但天色雖玄遠望則蒼取其遠色故用蒼也其祭天之器則用陶匏陶瓦器以薦菹醢之屬故詩生民之篇述后稷郊天云于豆于登注云木曰豆瓦曰登是用薦物也匏酌獻酒故詩大雅美公劉云酌之用匏注云儉以質祭天尚質故酌亦用匏為尊皇氏云祭天用宗廟犧尊皇氏又云祭天既用犧尊其陶匏者是盛牲牢之器今案陶匏所用如上所陳而皇氏以匏為盛牲之器義無此理其說非也其祭天之處冬至則祭於圎丘圎丘所在雖無正文應從陽位當在國南故魏氏之有天下營委粟山為圎丘在洛陽南二十里然則周家亦在國南但不知遠近者其五時迎氣則在四郊其夏正祭感生之帝亦於南郊知者孝經緯云祭帝於南郊就陽位是也其雩祭五天帝亦於國城南故鄭注論語云沂水在魯城南雩壇在其上是也其九月大饗五帝則在明堂鄭駮異義云明堂在國之南丙巳之地三里之外七里之內其圎丘之祭崔氏云其𥘉先燔柴及牲玉於丘訖次乃掃丘下而設正祭若夏正及五郊𥘉則燔柴及牲玉於壇故祭法云燔柴於泰壇祭天也次則於壇下掃地而設正祭故禮器云至敬不壇掃地而祭是也其所配之人虞夏商周用人各異文具祭法圎丘之祭周人則以嚳配之祭法禘嚳是也其感生之帝則以后稷配之五時迎氣及雩祭則以五方人帝配之九月大饗五帝則以五人帝及文武配之以文王配五天帝則謂之祖以武王配五人神則謂之宗崔氏云皆在明堂之上祖宗通言其祭天之樂皆用雷鼓故鼓人云以雷鼓鼓神祀是也其圎丘之祭皇氏云祭日之旦王立丘之東南西嚮燔柴及牲玉於丘上升壇以降其神故韓詩內傳云天子奉玉升柴加於牲上詩又云圭璧既卒是燔牲玉也次乃奏圜鐘之樂六變以降其神天皇之神為尊故有再降之禮次則掃地而設正祭置蒼璧於神坐以禮之其在先燔者亦蒼璧也次則少豆薦血腥祭天無祼故鄭注小宰云唯人道宗廟有祼天地大神至尊不祼莫稱焉然則祭天唯七獻也故鄭注周禮云大事于大廟備五齊三酒則圎丘之祭與宗廟祫同朝踐王酌泛齊以獻是一獻也后無祭天之事大宗伯次酌醴齊以獻是為二獻也王進爵之時皆奏樂但不皆六變次薦孰王酌盎齊以獻是為三獻也宗伯次酌醍齊以獻是為四獻也次尸食之訖王酌朝踐之泛齊是為五獻也又次宗伯酌饋食之醍齊以獻是為六獻也次諸臣為賔長酌泛齊以獻是為七獻也以外皆加爵非正獻之數其尸酢王以清酒酢宗伯以昔酒酢諸臣以事酒
